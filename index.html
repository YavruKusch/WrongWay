    setTimeout(()=>{setCelebrating(false);setScreen('end');},2200);
  };
  const EMOTE_DUR=2600;
  const playEmoteSound=type=>{
    if(type==='laugh')playSound('laugh');
    else if(type==='cry')playSound('cry');
    else if(type==='angry')playSound('angry');
    else if(type==='confused')playSound('confused');
  };
  const showEmote=(player,type)=>{
    playEmoteSound(type);
    const id=Date.now()+Math.random();
    setEmotes(e=>({...e,[player]:{type,id}}));
    setTimeout(()=>{
      setEmotes(e=>(e[player]&&e[player].id===id)?{...e,[player]:null}:e);
    },EMOTE_DUR);
  };
  const triggerEmote=type=>{
    if(emoteCooldown||winner||screen!=='game')return;
    const me=gameMode==='online'?onlineRole:(gameMode==='pvc'?'A':turn);
    if(!me)return;
    setEmoteCooldown(true);
    setEmotePicker(false);
    showEmote(me,type);
    // Online: an Gegner senden
    if(gameMode==='online'&&lobbyId){
      window.db.ref(`barricade_emote_${lobbyId}/${me}`).set(JSON.stringify({type,ts:Date.now()}));
    }
    if(emoteTimerRef.current)clearTimeout(emoteTimerRef.current);
    emoteTimerRef.current=setTimeout(()=>setEmoteCooldown(false),EMOTE_DUR);
  };

  const myTurn=gameMode==='online'?turn===onlineRole:true;
  const canDrag=!winner&&!aiThinking&&myTurn&&barrLeft[turn]>0&&screen==='game';
  const color=PC[turn];

  // ── Init game ──
  const initGame=(mode,role='A',lid=null,isRematch=false)=>{
    setGameMode(mode);setOnlineRole(role);setLobbyId(lid);
    setPA({...INIT_A});setPB({...INIT_B});setWalls(new Set());
    let starter;
    const prevMoves=S.current.moveHist;
    if(isRematch&&prevMoves&&prevMoves.length>0&&prevMoves[0].p){
      starter=prevMoves[0].p==='A'?'B':'A';
    }else{
      starter=Math.random()<0.5?'A':'B';
    }
    setBarrLeft({A:BARR,B:BARR});setTurn(starter);setWinner(null);setMoveHist([]);
    setFlash('');setAiThinking(false);setGiveUpArmed(false);
    setDragging(null);setPreviewKey(null);setSnapPos(null);
    setRematchA(false);setRematchB(false);setRematchDeclined(null);
    if(mode!=='online')setGameNum(0);
    setScreen('game');
  };

  // ── Sync online ──
  const doSync=(gs)=>{
    const{gameMode:gm,lobbyId:lid,rematchA:rA,rematchB:rB,rematchDeclined:rD,gameNum:gN}=S.current;
    if(gm!=='online'||!lid)return;
    stoSet(`barricade_game_${lid}`,{
      ...gs,
      walls:[...gs.walls],
      rematchA:gs.rematchA===undefined?rA:gs.rematchA,
      rematchB:gs.rematchB===undefined?rB:gs.rematchB,
      rematchDeclined:gs.rematchDeclined===undefined?rD:gs.rematchDeclined,
      gameNum:gs.gameNum===undefined?(gN||1):gs.gameNum,
      lastUpdated:Date.now()
    });
  };

  // ── AI ──
  useEffect(()=>{
    if(gameMode!=='pvc'||turn!=='B'||winner||screen!=='game')return;
    setAiThinking(true);
    const delay=aiDifficulty==='hard'?1100:aiDifficulty==='easy'?500:700;
    const t=setTimeout(()=>{
      const{pA:a,pB:b,walls:w,barrLeft:bl,moveHist:mh}=S.current;
      // Letzte 5 AI-Positionen (inkl. aktuelle) für Anti-Cycling
      const recentAi=[{r:b.r,c:b.c}];
      for(let i=mh.length-1;i>=0&&recentAi.length<6;i--){
        const m=mh[i];
        if(m.type==='move'&&m.p==='B')recentAi.push({r:m.r,c:m.c});
      }
      const d=aiMove(b,a,w,bl.B,bl.A,aiDifficulty,recentAi);
      if(d){
        if(d.type==='move'){
          playSound('move');setPB(d.pos);
          const nm=[...mh,{type:'move',p:'B',r:d.pos.r,c:d.pos.c}];setMoveHist(nm);
          if(d.pos.r===0){setAiThinking(false);triggerWin('B');return;}
        }else{
          playSound('wall');setWalls(d.walls);setBarrLeft(p=>({...p,B:p.B-1}));
          const nk=[...d.walls].find(k=>[...w].indexOf(k)===-1);
          if(nk)setMoveHist(p=>[...p,{type:'wall',p:'B',k:nk}]);
        }
      }
      setTurn('A');setAiThinking(false);
    },delay);
    return()=>clearTimeout(t);
  },[turn,gameMode,winner,screen,aiDifficulty]);

  // ── Online realtime listener ──
  useEffect(()=>{
    if(gameMode!=='online'||!lobbyId||(screen!=='game'&&screen!=='end'))return;
    const ref=window.db.ref(`barricade_game_${lobbyId}`);
    const cb=ref.on('value',snap=>{
      const v=snap.val();if(!v)return;
      let gs;try{gs=JSON.parse(v);}catch{return;}
      // Robuste Filterung: Updates aus alter Runde oder mit weniger moves ignorieren.
      // Clock-Skew-sicher (kein Date.now()-Vergleich mehr).
      const newGN=gs.gameNum||1;
      const oldGN=S.current.gameNum||0;
      const newMoveCount=(gs.moves||[]).length;
      const oldMoveCount=S.current.moveHist.length;
      if(newGN<oldGN)return;
      if(newGN===oldGN&&newMoveCount<oldMoveCount)return;
      lastOnlineTs.current=gs.lastUpdated||Date.now();

      // Neue Runde erkannt → Spiel mit neuer Rolle starten
      if(newGN>oldGN&&oldGN>0){
        const myNewRole=gs.swapRoles?(S.current.onlineRole==='A'?'B':'A'):S.current.onlineRole;
        setOnlineRole(myNewRole);
        setPA(gs.pA);setPB(gs.pB);setWalls(new Set(gs.walls||[]));
        setBarrLeft(gs.barrLeft);setTurn(gs.turn);setMoveHist(gs.moves||[]);
        setWinner(null);setCelebrating(false);
        setRematchA(false);setRematchB(false);setRematchDeclined(null);
        setGameNum(newGN);
        setGiveUpArmed(false);setFlash('');
        setScreen('game');
        return;
      }
      setGameNum(newGN);

      // Rematch flags
      const rA=gs.rematchA||false,rB=gs.rematchB||false,rD=gs.rematchDeclined||null;
      setRematchA(rA);setRematchB(rB);setRematchDeclined(rD);

      // Beide wollen Rematch → Spieler A (im aktuellen Spiel) erstellt neue Runde
      if(rA&&rB&&!rD&&S.current.onlineRole==='A'&&S.current.winner){
        const swap=Math.random()<0.5;
        const prevMoves=S.current.moveHist||[];
        const prevStarter=prevMoves.length>0&&prevMoves[0].p?prevMoves[0].p:'A';
        // Fair: derjenige der letztes Mal NICHT angefangen hat, beginnt jetzt
        // swap=false: gleiche Rollen → opposite role
        // swap=true: getauschte Rollen → gleiche role (= andere Person)
        const startTurn=swap?prevStarter:(prevStarter==='A'?'B':'A');
        const ngs={
          pA:{...INIT_A},pB:{...INIT_B},walls:[],
          barrLeft:{A:BARR,B:BARR},turn:startTurn,winner:null,moves:[],
          rematchA:false,rematchB:false,rematchDeclined:null,
          gameNum:newGN+1,swapRoles:swap,
          lastUpdated:Date.now()
        };
        stoSet(`barricade_game_${lobbyId}`,ngs);
        lastOnlineTs.current=ngs.lastUpdated;
        return;
      }

      // Normales Game-Update
      const newMoves=gs.moves||[];
      const oldLen=S.current.moveHist.length;
      if(newMoves.length>oldLen){
        const last=newMoves[newMoves.length-1];
        if(last&&last.p!==S.current.onlineRole)playSound(last.type==='move'?'move':'wall');
      }
      setPA(gs.pA);setPB(gs.pB);setWalls(new Set(gs.walls||[]));
      setBarrLeft(gs.barrLeft);setTurn(gs.turn);setMoveHist(newMoves);
      if(gs.winner&&!S.current.winner){triggerWin(gs.winner);}
    });
    return()=>ref.off('value',cb);
  },[gameMode,lobbyId,screen]);

  // ── Online Emote-Listener (Gegner-Emotes empfangen) ──
  useEffect(()=>{
    if(gameMode!=='online'||!lobbyId||screen!=='game')return;
    const oppRole=onlineRole==='A'?'B':'A';
    const ref=window.db.ref(`barricade_emote_${lobbyId}/${oppRole}`);
    const initTs=Date.now();
    const cb=ref.on('value',snap=>{
      const v=snap.val();
      if(!v)return;
      let data;try{data=JSON.parse(v);}catch{return;}
      if(!data||!data.type||!data.ts)return;
      // Ignoriere alte Emotes (vor Listener-Start)
      if(data.ts<initTs-1000)return;
      showEmote(oppRole,data.type);
    });
    return()=>ref.off('value',cb);
  },[gameMode,lobbyId,screen,onlineRole]);

  // ── Heartbeat: Anwesenheit prüfen, 15s Timeout = automatischer Verlust ──
  useEffect(()=>{
    if(gameMode!=='online'||!lobbyId||screen!=='game'||winner)return;
    const myRef=window.db.ref(`barricade_hb_${lobbyId}/${onlineRole}`);
    const send=()=>myRef.set(Date.now());
    send();
    // OnDisconnect: setzt 0 wenn Verbindung weg → Gegner sieht sofort dass wir weg sind
    myRef.onDisconnect().set(0);
    const iv=setInterval(send,2000);
    return()=>{clearInterval(iv);myRef.onDisconnect().cancel();};
  },[gameMode,lobbyId,screen,winner,onlineRole]);

  useEffect(()=>{
    if(gameMode!=='online'||!lobbyId||screen!=='game'||winner)return;
    const oppRole=onlineRole==='A'?'B':'A';
    oppLastSeenRef.current=Date.now();
    const ref=window.db.ref(`barricade_hb_${lobbyId}/${oppRole}`);
    const cb=ref.on('value',snap=>{
      const v=snap.val();
      if(v&&v>0)oppLastSeenRef.current=v;
    });
    return()=>ref.off('value',cb);
  },[gameMode,lobbyId,screen,winner,onlineRole]);

  useEffect(()=>{
    if(gameMode!=='online'||screen!=='game'||winner){setOppCountdown(null);return;}
    const iv=setInterval(()=>{
      const last=oppLastSeenRef.current;
      if(!last)return;
      const elapsed=Date.now()-last;
      if(elapsed>15000){
        const winP=onlineRole;
        const s=S.current;
        if(s.winner)return;
        doSync({pA:s.pA,pB:s.pB,walls:s.walls,barrLeft:s.barrLeft,turn:s.turn,winner:winP,moves:s.moveHist});
        setOppCountdown(null);
        triggerWin(winP,true);
      }else if(elapsed>5000){
        setOppCountdown(Math.ceil((15000-elapsed)/1000));
      }else{
        setOppCountdown(null);
      }
    },500);
    return()=>clearInterval(iv);
  },[gameMode,screen,winner,onlineRole]);

  // ── Rematch actions ──
  const requestRematch=()=>{
    const s=S.current;
    if(s.rematchDeclined)return;
    const isA=s.onlineRole==='A';
    doSync({
      pA:s.pA,pB:s.pB,walls:s.walls,barrLeft:s.barrLeft,
      turn:s.turn,winner:s.winner,moves:s.moveHist,
      rematchA:isA?true:s.rematchA,
      rematchB:isA?s.rematchB:true,
      rematchDeclined:null,
      gameNum:s.gameNum
    });
  };
  const declineRematch=()=>{
    const s=S.current;
    if(s.gameMode!=='online'||!s.lobbyId)return;
    doSync({
      pA:s.pA,pB:s.pB,walls:s.walls,barrLeft:s.barrLeft,
      turn:s.turn,winner:s.winner,moves:s.moveHist,
      rematchA:false,rematchB:false,
      rematchDeclined:s.onlineRole,
      gameNum:s.gameNum
    });
  };

  // ── Lobby polling ──
  useEffect(()=>{
    if(screen!=='waiting'&&screen!=='online')return;
    const poll=async()=>{
      const list=await stoGet('barricade_lobby_list');
      const now=Date.now();
      const all=list||[];
      const fresh=all.filter(l=>now-l.ts<15000);
      const stale=all.filter(l=>now-l.ts>=15000);
      setLobbyList(fresh);
      // Stale-Einträge aus Firebase entfernen, damit andere Clients sie auch nicht mehr sehen
      if(stale.length>0){
        await stoSet('barricade_lobby_list',fresh);
        for(const l of stale){
          await stoDel(`barricade_lobby_${l.id}`);
        }
      }
      if(screen==='waiting'&&lobbyId&&onlineRole==='A'){
        const lobby=await stoGet(`barricade_lobby_${lobbyId}`);
        if(lobby&&lobby.guestId){
          const gs={pA:{...INIT_A},pB:{...INIT_B},walls:[],barrLeft:{A:BARR,B:BARR},turn:Math.random()<0.5?'A':'B',winner:null,moves:[],rematchA:false,rematchB:false,rematchDeclined:null,gameNum:1,lastUpdated:Date.now()};
          await stoSet(`barricade_game_${lobbyId}`,gs);
          lastOnlineTs.current=gs.lastUpdated;
          initGame('online','A',lobbyId);
        }
      }
    };
    const iv=setInterval(poll,1500);poll();
    return()=>clearInterval(iv);
  },[screen,lobbyId,onlineRole]);

  // ── Host-Heartbeat: hält die Lobby in der Liste am Leben solange der Host wartet ──
  useEffect(()=>{
    if(screen!=='waiting'||onlineRole!=='A'||!lobbyId)return;
    const hb=async()=>{
      const lobby=await stoGet(`barricade_lobby_${lobbyId}`);
      if(!lobby)return;
      await stoSet(`barricade_lobby_${lobbyId}`,{...lobby,ts:Date.now()});
      // Nur öffentliche Lobbys stehen in der Liste
      if(!lobby.isPrivate){
        const list=await stoGet('barricade_lobby_list')||[];
        const updated=list.map(l=>l.id===lobbyId?{...l,ts:Date.now()}:l);
        await stoSet('barricade_lobby_list',updated);
      }
    };
    hb();
    const iv=setInterval(hb,3000);
    return()=>clearInterval(iv);
  },[screen,onlineRole,lobbyId]);

  // ── Cleanup: Lobby aus der Liste entfernen wenn Host ins Spiel startet ──
  useEffect(()=>{
    if(gameMode!=='online'||onlineRole!=='A'||screen!=='game'||!lobbyId)return;
    const cleanup=async()=>{
      const list=await stoGet('barricade_lobby_list')||[];
      if(list.some(l=>l.id===lobbyId)){
        await stoSet('barricade_lobby_list',list.filter(l=>l.id!==lobbyId));
      }
    };
    cleanup();
  },[gameMode,onlineRole,screen,lobbyId]);

  // ── Create lobby ──
  const createLobby=async(isPrivate)=>{
    setFlash('');
    const id=randId(6);
    const code=isPrivate?randId(4):null;
    const ok=await stoSet(`barricade_lobby_${id}`,{id,code,isPrivate,hostId:SESSION,guestId:null,ts:Date.now()});
    if(!ok){setFlash(t('firebaseError')+(window.lastFbError||'?')+t('checkRules'));return;}
    if(isPrivate)await stoSet(`barricade_code_${code}`,{id});
    else{const list=await stoGet('barricade_lobby_list')||[];await stoSet('barricade_lobby_list',[...list.filter(l=>l.hostId!==SESSION),{id,hostId:SESSION,ts:Date.now()}]);}
    setLobbyId(id);setOnlineRole('A');
    setPrivateCode(isPrivate?code:null);
    setScreen('waiting');
  };

  const cleanupLobby=async(id)=>{
    if(!id)return;
    const lobby=await stoGet(`barricade_lobby_${id}`);
    await stoDel(`barricade_lobby_${id}`);
    if(lobby&&lobby.code)await stoDel(`barricade_code_${lobby.code}`);
    const list=await stoGet('barricade_lobby_list')||[];
    await stoSet('barricade_lobby_list',list.filter(l=>l.id!==id));
  };

  const joinLobby=async(id)=>{
    const lobby=await stoGet(`barricade_lobby_${id}`);
    if(!lobby||lobby.guestId){setFlash(t('lobbyFull'));return;}
    await stoSet(`barricade_lobby_${id}`,{...lobby,guestId:SESSION,ts:Date.now()});
    setLobbyId(id);setOnlineRole('B');setPrivateCode(null);setScreen('waiting');
    for(let i=0;i<40;i++){
      await new Promise(r=>setTimeout(r,500));
      const gs=await stoGet(`barricade_game_${id}`);
      if(gs){lastOnlineTs.current=gs.lastUpdated;initGame('online','B',id);return;}
    }
    setFlash(t('hostNotResponding'));setScreen('online');
  };

  const joinByCode=async()=>{
    const code=codeInput.trim().toUpperCase();if(!code){return;}
    const ref=await stoGet(`barricade_code_${code}`);
    if(!ref){setFlash(t('codeNotFound'));return;}
    await joinLobby(ref.id);
  };

  // ── Replay sounds ──
  const lastReplayStep=useRef(0);
  useEffect(()=>{
    if(screen!=='replay'){lastReplayStep.current=replayStep;return;}
    if(replayStep>lastReplayStep.current){
      const m=moveHist[replayStep-1];
      if(m)playSound(m.type==='move'?'move':'wall');
    }
    lastReplayStep.current=replayStep;
  },[replayStep,screen,moveHist]);

  // ── Valid moves ──
  const getValidMoves=(pos,opp,w)=>{
    const moves=[];
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=pos.r+dr,nc=pos.c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      if(edgeBlocked(pos.r,pos.c,nr,nc,w))continue;
      if(nr===opp.r&&nc===opp.c){
        for(const[dr2,dc2]of[[-1,0],[1,0],[0,-1],[0,1]]){
          const jr=nr+dr2,jc=nc+dc2;
          if(jr===pos.r&&jc===pos.c)continue;
          if(jr<0||jr>=ROWS||jc<0||jc>=COLS)continue;
          if(edgeBlocked(nr,nc,jr,jc,w))continue;
          moves.push({r:jr,c:jc});
        }
      }else{moves.push({r:nr,c:nc});}
    }
    return moves;
  };

  const cur=turn==='A'?pA:pB;
  const other=turn==='A'?pB:pA;

  const handleCellClick=(r,c)=>{
    if(winner||aiThinking||dragging||!myTurn||screen!=='game')return;
    if(!getValidMoves(cur,other,walls).some(m=>m.r===r&&m.c===c))return;
    playSound('move');
    const np={r,c};const isA=turn==='A';
    if(isA)setPA(np);else setPB(np);
    const nm=[...S.current.moveHist,{type:'move',p:turn,r,c}];
    setMoveHist(nm);
    const newTurn=turn==='A'?'B':'A';
    if(r===0){
      doSync({pA:isA?np:S.current.pA,pB:isA?S.current.pB:np,walls,barrLeft,turn:newTurn,winner:turn,moves:nm});
      triggerWin(turn);
      return;
    }
    setTurn(newTurn);setFlash('');
    doSync({pA:isA?np:S.current.pA,pB:isA?S.current.pB:np,walls,barrLeft,turn:newTurn,winner:null,moves:nm});
  };

  const validDot=(r,c)=>{
    if(winner||aiThinking||dragging||!myTurn||screen!=='game')return false;
    return getValidMoves(cur,other,walls).some(m=>m.r===r&&m.c===c);
  };

  // ── Give up ──
  const handleGiveUp=()=>{
    if(!giveUpArmed){setGiveUpArmed(true);setTimeout(()=>setGiveUpArmed(false),3000);return;}
    setGiveUpArmed(false);
    const loser=gameMode==='online'?onlineRole:turn;
    const winP=loser==='A'?'B':'A';
    if(gameMode==='online'){
      const s=S.current;
      doSync({pA:s.pA,pB:s.pB,walls:s.walls,barrLeft:s.barrLeft,turn:s.turn,winner:winP,moves:s.moveHist});
    }
    triggerWin(winP,true);
  };

  // ── Drag ──
  useEffect(()=>{
    if(!dragging)return;
    const OFFSET=90;
    const getRel=(x,y)=>{if(!gridRef.current)return null;const rect=gridRef.current.getBoundingClientRect();return{x:x-rect.left,y:y-rect.top};};
    const onMove=(x,y)=>{
      setGhostPos({x,y});
      const rect=gridRef.current?gridRef.current.getBoundingClientRect():null;
      const inZone=rect&&y<=rect.bottom+20;
      const rel=getRel(x,y-OFFSET);
      if(inZone&&rel&&rel.x>=0&&rel.x<=COLS*CELL&&rel.y>=0&&rel.y<=ROWS*CELL){
        const key=snapWall(rel.x,rel.y,dragging.orient);
        setPreviewKey(key);
        const wp=wallPos(key);
        setSnapPos({x:rect.left+wp.left+wp.width/2,y:rect.top+wp.top+wp.height/2});
      }else{setPreviewKey(null);setSnapPos(null);}
    };
    const onEnd=(x,y)=>{
      if(snapPosRef.current){
        const rel=getRel(x,y-OFFSET);
        if(rel&&rel.x>=0&&rel.x<=COLS*CELL&&rel.y>=0&&rel.y<=ROWS*CELL){
          const key=snapWall(rel.x,rel.y,dragging.orient);
          const{walls:w,pA:a,pB:b,barrLeft:bl,turn:t,moveHist:mh}=S.current;
          if(bl[t]>0){
            const next=tryWall(key,w,a,b);
            if(next){
              playSound('wall');
              setWalls(next);
              const newBl={...bl,[t]:bl[t]-1};setBarrLeft(newBl);
              const nm=[...mh,{type:'wall',p:t,k:key}];setMoveHist(nm);
              const newTurn=t==='A'?'B':'A';setTurn(newTurn);setFlash('');
              doSync({pA:a,pB:b,walls:next,barrLeft:newBl,turn:newTurn,winner:null,moves:nm});
              setTimeout(()=>window.scrollTo(0,savedScroll.current),0);
            }else setFlash(t('invalidPos'));
          }
        }
      }
      setDragging(null);setPreviewKey(null);setSnapPos(null);
    };
    const mm=e=>onMove(e.clientX,e.clientY);
    const mu=e=>onEnd(e.clientX,e.clientY);
    const tm=e=>{e.preventDefault();const t=e.touches[0];onMove(t.clientX,t.clientY);};
    const te=e=>{e.preventDefault();const t=e.changedTouches[0];onEnd(t.clientX,t.clientY);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
    document.addEventListener('touchmove',tm,{passive:false});document.addEventListener('touchend',te);
    return()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);document.removeEventListener('touchmove',tm);document.removeEventListener('touchend',te);};
  },[dragging]);

  const startDrag=(e,orient)=>{
    if(!canDrag)return;e.preventDefault();
    savedScroll.current=window.scrollY;
    const x=e.touches?e.touches[0].clientX:e.clientX,y=e.touches?e.touches[0].clientY:e.clientY;
    setDragging({orient});setGhostPos({x,y});setPreviewKey(null);setSnapPos(null);setFlash('');
  };

  const previewValid=useMemo(()=>{
    if(!previewKey)return false;
    return!!tryWall(previewKey,S.current.walls,S.current.pA,S.current.pB);
  },[previewKey]);

  const gW=dragging&&dragging.orient==='H'?CELL*2:WW;
  const gH=dragging&&dragging.orient==='V'?CELL*2:WW;

  // ── MENU ──────────────────────────────────────────────────
  if(screen==='menu') return (
    <div style={sPage}>
      <button onClick={()=>setShowOptions(true)} style={{
        position:'fixed',top:'calc(env(safe-area-inset-top) + 14px)',right:14,
        width:40,height:40,borderRadius:'50%',background:'var(--card)',border:'1.5px solid var(--border)',
        cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',
        boxShadow:'var(--shadow-soft)',zIndex:100}}>⚙️</button>
      <div style={{textAlign:'center',marginBottom:40}}>
        <div style={{fontSize:44,marginBottom:10}}>🧱</div>
        <div style={{fontSize:30,fontWeight:900,letterSpacing:-1.5,color:'var(--text)',lineHeight:1}}>{t('title')}</div>
        <div style={{fontSize:13,fontWeight:600,letterSpacing:0.5,color:'var(--subtle)',marginTop:6,fontStyle:'italic'}}>{t('subtitle')}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10,width:240}}>
        <GBtn onClick={()=>initGame('pvp')} dark>{t('twoPlayer')}</GBtn>
        <GBtn onClick={()=>setScreen('difficulty')} dark>{t('vsAI')}</GBtn>
        <GBtn onClick={()=>setScreen('online')} blue>{t('online')}</GBtn>
      </div>
      {showOptions&&(
        <div onClick={()=>setShowOptions(false)} style={{position:'fixed',inset:0,
          background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'center',justifyContent:'center',
          zIndex:600,padding:24}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'var(--card)',borderRadius:18,
            padding:'22px 22px 16px',width:'100%',maxWidth:320,
            boxShadow:'0 24px 64px rgba(0,0,0,0.25)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
              <div style={{fontSize:18,fontWeight:900,color:'var(--text)'}}>{t('options')}</div>
              <button onClick={()=>setShowOptions(false)} style={{background:'none',border:'none',
                fontSize:22,cursor:'pointer',color:'var(--subtle)',padding:0,lineHeight:1}}>×</button>
            </div>
            <div style={{fontSize:11,color:'var(--subtle)',fontWeight:700,letterSpacing:1,marginBottom:10}}>
              {t('theme').toUpperCase()}
            </div>
            <div style={{display:'flex',gap:6,marginBottom:18}}>
              {[{k:false,label:t('light'),emoji:'☀️'},{k:true,label:t('dark'),emoji:'🌙'}].map(o=>(
                <button key={o.label} onClick={()=>setDarkMode(o.k)} style={{
                  flex:1,padding:'11px 8px',borderRadius:10,fontSize:13,fontWeight:600,
                  cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,
                  background:darkMode===o.k?'var(--text)':'var(--card)',
                  color:darkMode===o.k?'var(--bg)':'var(--text)',
                  border:`1.5px solid ${darkMode===o.k?'var(--text)':'var(--border)'}`,
                  fontFamily:'system-ui,-apple-system,sans-serif'}}>
                  <span>{o.emoji}</span>{o.label}
                </button>
              ))}
            </div>
            <div style={{fontSize:11,color:'var(--subtle)',fontWeight:700,letterSpacing:1,marginBottom:10}}>
              {t('language').toUpperCase()}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {Object.keys(LANGS).map(k=>(
                <button key={k} onClick={()=>changeLang(k)} style={{
                  padding:'11px 14px',borderRadius:10,fontSize:14,fontWeight:600,
                  textAlign:'left',cursor:'pointer',
                  background:lang===k?'var(--text)':'var(--card)',
                  color:lang===k?'var(--bg)':'var(--text)',
                  border:`1.5px solid ${lang===k?'var(--text)':'var(--border)'}`,
                  fontFamily:'system-ui,-apple-system,sans-serif'}}>
                  {LANGS[k]}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );

  // ── DIFFICULTY ──────────────────────────────────────────
  if(screen==='difficulty') return (
    <div style={sPage}>
      <div style={{fontSize:20,fontWeight:800,color:'var(--text)',marginBottom:24}}>{t('chooseDifficulty')}</div>
      <div style={{display:'flex',flexDirection:'column',gap:10,width:280}}>
        {[
          {k:'easy',emoji:'🟢',color:'#16a34a'},
          {k:'normal',emoji:'🟡',color:'#3b82f6'},
          {k:'hard',emoji:'🔴',color:'#ef4444'}
        ].map(d=>(
          <button key={d.k} onClick={()=>{setAiDifficulty(d.k);initGame('pvc');}} style={{
            padding:'14px 16px',background:'var(--card)',border:`1.5px solid ${d.color}30`,
            borderRadius:12,cursor:'pointer',textAlign:'left',
            boxShadow:'var(--shadow-soft)',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:2}}>
              <span style={{fontSize:16}}>{d.emoji}</span>
              <span style={{fontSize:15,fontWeight:800,color:d.color}}>{t(d.k)}</span>
            </div>
            <div style={{fontSize:11,color:'var(--subtle)',fontWeight:500,marginLeft:26}}>{t(d.k+'Desc')}</div>
          </button>
        ))}
      </div>
      <button onClick={()=>setScreen('menu')} style={sBack}>{t('back')}</button>
    </div>
  );

  // ── ONLINE ──────────────────────────────────────────────
  if(screen==='online') return (
    <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 24px)'}}>
      <div style={{width:'100%',maxWidth:340,display:'flex',flexDirection:'column',alignItems:'center'}}>

        {/* Header */}
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:24,marginBottom:6}}>🌐</div>
          <div style={{fontSize:22,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>{t('playOnline')}</div>
        </div>

        {/* Create section */}
        <div style={{width:'100%',marginBottom:18}}>
          <button onClick={()=>{setLobbyCfgPrivate(false);setLobbyCfgMode('classic');setFlash('');setScreen('lobbyConfig');}} style={{
            width:'100%',padding:'14px 16px',background:'#1e293b',color:'white',border:'none',
            borderRadius:12,fontWeight:700,fontSize:14,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',gap:8,
            boxShadow:'0 2px 8px rgba(30,41,59,0.18)',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
            <span style={{fontSize:18}}>➕</span>
            <span>{t('createLobby')}</span>
          </button>
        </div>

        {/* Code join */}
        <div style={{width:'100%',marginBottom:18}}>
          <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginBottom:6,paddingLeft:2}}>
            {t('joinWithCode')}
          </div>
          <input value={codeInput} onChange={e=>setCodeInput(e.target.value.toUpperCase())} placeholder="XXXX"
            maxLength={4}
            style={{width:'100%',padding:'12px 12px',borderRadius:10,border:'1.5px solid var(--border)',
              fontSize:18,fontWeight:800,letterSpacing:6,textAlign:'center',outline:'none',
              fontFamily:'system-ui,-apple-system,sans-serif',background:'var(--card)',color:'var(--text)',
              marginBottom:6,display:'block',boxSizing:'border-box'}}/>
          <button onClick={joinByCode} style={{width:'100%',padding:'11px 14px',background:'#3b82f6',color:'white',
            border:'none',borderRadius:10,fontWeight:700,cursor:'pointer',fontSize:13,
            boxShadow:'0 2px 8px rgba(59,130,246,0.25)',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>{t('join')}</button>
        </div>

        {flash&&<div style={{color:'#ef4444',fontSize:12,fontWeight:500,marginBottom:10,width:'100%',textAlign:'center'}}>{flash}</div>}

        {/* Lobby list header */}
        <div style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,paddingLeft:2,paddingRight:2}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'#16a34a',
              animation:'piece-pulse 1.6s ease-in-out infinite'}}/>
            <span style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5}}>{t('live')}</span>
            <span style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginLeft:4}}>· {t('openLobbies')}</span>
          </div>
          {lobbyList.length>0&&(
            <div style={{fontSize:10,fontWeight:700,color:'#3b82f6',
              background:'rgba(59,130,246,0.1)',padding:'2px 8px',borderRadius:10}}>
              {lobbyList.length} {t('lobbyCount')}
            </div>
          )}
        </div>

        {/* Scrollable lobby list */}
        <div style={{
          width:'100%',maxHeight:240,overflowY:'auto',overflowX:'hidden',
          borderRadius:12,background:'var(--card)',border:'1.5px solid var(--border)',
          WebkitOverflowScrolling:'touch',
          boxShadow:'inset 0 2px 6px rgba(0,0,0,0.04)'}}>
          {lobbyList.length===0?(
            <div style={{padding:'34px 20px',textAlign:'center'}}>
              <div style={{fontSize:28,marginBottom:8,opacity:0.4}}>🎮</div>
              <div style={{fontSize:13,fontWeight:700,color:'var(--muted)',marginBottom:4}}>{t('noLobbies')}</div>
              <div style={{fontSize:11,color:'var(--subtle)',fontWeight:500}}>{t('noLobbiesHint')}</div>
            </div>
          ):(
            <div style={{padding:6,display:'flex',flexDirection:'column',gap:5}}>
              {lobbyList.map(l=>{
                const age=Math.floor((Date.now()-l.ts)/1000);
                const ageLabel=age<60?`${age}s`:`${Math.floor(age/60)}m`;
                return(
                  <div key={l.id} onClick={()=>joinLobby(l.id)}
                    style={{padding:'12px 14px',background:'var(--bg)',borderRadius:9,
                      border:'1px solid var(--border-soft)',cursor:'pointer',
                      display:'flex',alignItems:'center',justifyContent:'space-between',
                      transition:'all 0.15s'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:32,height:32,borderRadius:8,background:'linear-gradient(135deg,#ef4444,#3b82f6)',
                        display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,
                        boxShadow:'0 2px 6px rgba(0,0,0,0.12)'}}>⚔️</div>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:'var(--text)',letterSpacing:0.5}}>
                          {t('lobby')} {l.id.slice(0,4).toUpperCase()}
                        </div>
                        <div style={{fontSize:10,color:'var(--subtle)',fontWeight:600,marginTop:1}}>
                          {ageLabel} · 1/2
                        </div>
                      </div>
                    </div>
                    <div style={{padding:'5px 12px',background:'#3b82f6',color:'white',
                      borderRadius:14,fontSize:11,fontWeight:700,
                      boxShadow:'0 2px 6px rgba(59,130,246,0.3)'}}>
                      {t('join')}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <button onClick={()=>setScreen('menu')} style={{...sBack,marginTop:16}}>{t('back')}</button>
      </div>
    </div>
  );

  // ── LOBBY CONFIG ────────────────────────────────────────
  if(screen==='lobbyConfig'){
    const VisRow=({k,emoji,desc})=>{
      const sel=lobbyCfgPrivate===(k==='private');
      return(
        <button onClick={()=>setLobbyCfgPrivate(k==='private')} style={{
          width:'100%',padding:'12px 14px',marginBottom:6,
          background:sel?'var(--text)':'var(--card)',
          color:sel?'var(--bg)':'var(--text)',
          border:`1.5px solid ${sel?'var(--text)':'var(--border)'}`,
          borderRadius:11,cursor:'pointer',textAlign:'left',
          display:'flex',alignItems:'center',gap:10,
          fontFamily:'system-ui,-apple-system,sans-serif'}}>
          <span style={{fontSize:20}}>{emoji}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:800,marginBottom:1}}>{t(k)}</div>
            <div style={{fontSize:10,fontWeight:500,opacity:0.7}}>{desc}</div>
          </div>
          {sel&&<span style={{fontSize:14,fontWeight:900}}>✓</span>}
        </button>
      );
    };
    const ModeRow=({k,emoji,desc,disabled})=>{
      const sel=lobbyCfgMode===k;
      return(
        <button onClick={()=>!disabled&&setLobbyCfgMode(k)} disabled={disabled} style={{
          width:'100%',padding:'12px 14px',marginBottom:6,
          background:sel?'var(--text)':'var(--card)',
          color:sel?'var(--bg)':'var(--text)',
          border:`1.5px solid ${sel?'var(--text)':'var(--border)'}`,
          borderRadius:11,cursor:disabled?'not-allowed':'pointer',textAlign:'left',
          display:'flex',alignItems:'center',gap:10,opacity:disabled?0.5:1,
          fontFamily:'system-ui,-apple-system,sans-serif'}}>
          <span style={{fontSize:20}}>{emoji}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:800,marginBottom:1,display:'flex',alignItems:'center',gap:6}}>
              {t(k)}
              {disabled&&<span style={{fontSize:8,fontWeight:700,letterSpacing:0.5,
                background:'#f59e0b',color:'white',padding:'1px 6px',borderRadius:6}}>SOON</span>}
            </div>
            <div style={{fontSize:10,fontWeight:500,opacity:0.7}}>{disabled?t('comingSoon'):desc}</div>
          </div>
          {sel&&<span style={{fontSize:14,fontWeight:900}}>✓</span>}
        </button>
      );
    };
    return(
      <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 24px)'}}>
        <div style={{width:'100%',maxWidth:340}}>
          <div style={{textAlign:'center',marginBottom:22}}>
            <div style={{fontSize:24,marginBottom:6}}>⚙️</div>
            <div style={{fontSize:20,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>{t('lobbySettings')}</div>
          </div>
          <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginBottom:8,paddingLeft:2}}>
            {t('visibility').toUpperCase()}
          </div>
          <VisRow k="public" emoji="🌍" desc={t('publicDesc')}/>
          <VisRow k="private" emoji="🔒" desc={t('privateDesc')}/>
          <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginTop:16,marginBottom:8,paddingLeft:2}}>
            {t('gameMode').toUpperCase()}
          </div>
          <ModeRow k="classic" emoji="⚔️" desc={t('classicDesc')}/>
          <ModeRow k="ranked" emoji="🏆" desc={t('rankedDesc')} disabled/>
          <button onClick={()=>createLobby(lobbyCfgPrivate)} style={{
            width:'100%',padding:'14px 16px',marginTop:22,
            background:'#3b82f6',color:'white',border:'none',borderRadius:12,
            fontWeight:800,fontSize:14,cursor:'pointer',
            boxShadow:'0 4px 14px rgba(59,130,246,0.35)',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
            {t('createNow')}
          </button>
          <button onClick={()=>setScreen('online')} style={{...sBack,width:'100%',textAlign:'center'}}>{t('back')}</button>
        </div>
      </div>
    );
  }

  // ── WAITING ─────────────────────────────────────────────
  if(screen==='waiting') return (
    <div style={sPage}>
      <div style={{fontSize:18,fontWeight:800,color:'var(--text)',marginBottom:20}}>
        {onlineRole==='A'?t('waitingOpponent'):t('connecting')}
      </div>
      {privateCode&&(
        <div style={{fontSize:28,fontWeight:900,letterSpacing:6,color:'var(--text)',
          background:'var(--card)',padding:'16px 32px',borderRadius:16,marginBottom:20,
          border:'2px solid var(--border)',boxShadow:'var(--shadow-soft)'}}>
          {t('codePrefix')}{privateCode}
        </div>
      )}
      <div style={{fontSize:12,color:'var(--subtle)',marginBottom:28}}>
        {onlineRole==='A'?t('shareCode'):t('waitingStart')}
      </div>
      <button onClick={async()=>{await cleanupLobby(lobbyId);setScreen('menu');setLobbyId(null);}} style={sBack}>{t('cancel')}</button>
    </div>
  );

  // ── REPLAY ──────────────────────────────────────────────
  if(screen==='replay'){
    const rs=applyMoves(moveHist,replayStep);
    const curMove=moveHist[replayStep];
    return (
      <div style={{...sCont,paddingBottom:80}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',maxWidth:360,marginBottom:12}}>
          <div style={{fontSize:16,fontWeight:800,color:'var(--text)'}}>{t('replay')}</div>
          <div style={{fontSize:12,color:'var(--subtle)',fontWeight:600}}>
            {replayStep} / {moveHist.length}
          </div>
        </div>
        <div style={{fontSize:9,letterSpacing:3,color:'#16a34a',fontWeight:700,textTransform:'uppercase',marginBottom:2}}>{t('goalLabel')}</div>
        <div style={{position:'relative',width:COLS*CELL,height:ROWS*CELL,...sGrid}}>
          {Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},(_,c)=>(
            <div key={`${r}-${c}`} style={{position:'absolute',left:c*CELL,top:r*CELL,width:CELL,height:CELL,
              background:r===0?'var(--goal)':r===ROWS-1?'var(--start)':(r+c)%2===0?'var(--cell-b)':'var(--cell-a)',
              border:'1px solid var(--cell-line)',boxSizing:'border-box'}}>
              {r===0&&<div style={{position:'absolute',top:0,left:0,right:0,height:3,background:'linear-gradient(90deg,#16a34a,#22c55e)'}}/>}
            </div>
          )))}
          {[...rs.walls].map(k=><Wall key={k} wkey={k} color={darkMode?'#e2e8f0':'#1e293b'} opacity={1}/>)}
          {['A','B'].map(p=>{const pos=p==='A'?rs.pA:rs.pB;const sz=30,off=(CELL-sz)/2;return(
            <div key={p} style={{position:'absolute',left:pos.c*CELL+off,top:pos.r*CELL+off,width:sz,height:sz,
              transition:'left 0.15s ease,top 0.15s ease',zIndex:20,pointerEvents:'none'}}>
              <Piece color={PC[p]} dark={PD[p]}/>
            </div>
          );})}
        </div>
        <div style={{fontSize:9,letterSpacing:3,color:'var(--subtle)',fontWeight:600,textTransform:'uppercase',marginTop:2,marginBottom:16}}>{t('startLabel')}</div>
        {curMove&&(
          <div style={{fontSize:12,color:'var(--muted)',fontWeight:600,marginBottom:10}}>
            {pname(curMove.p)} – {curMove.type==='move'?t('step'):t('wallPlaced')}
          </div>
        )}
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <button onClick={()=>setReplayStep(s=>Math.max(0,s-1))} disabled={replayStep===0} style={rBtn(replayStep===0)}>◀</button>
          <button onClick={()=>setReplayStep(s=>Math.min(moveHist.length,s+1))} disabled={replayStep>=moveHist.length} style={rBtn(replayStep>=moveHist.length)}>▶</button>
        </div>
        <button onClick={()=>setScreen('end')} style={{...sBack,marginTop:16}}>{t('back')}</button>
      </div>
    );
  }

  // ── END ──────────────────────────────────────────────────
  if(screen==='end'){
    const myRematch=onlineRole==='A'?rematchA:rematchB;
    const otherRematch=onlineRole==='A'?rematchB:rematchA;
    const otherDeclined=rematchDeclined&&rematchDeclined!==onlineRole;
    return (
      <div style={sPage}>
        {winner&&!isOwnLoss(winner)&&<Confetti color={PC[winner]}/>}
        <div style={{fontSize:40,marginBottom:8,animation:'trophy-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both'}}>{winner&&isOwnLoss(winner)?'😔':'🏆'}</div>
        <div style={{fontSize:24,fontWeight:900,color:winner?PC[winner]:'var(--muted)',marginBottom:4,letterSpacing:-0.5}}>
          {winner?`${pname(winner)} ${t('wins')}`:t('givenUp')}
        </div>

        {gameMode==='online'&&otherDeclined&&(
          <div style={{fontSize:13,fontWeight:700,color:'#ef4444',marginTop:14,padding:'8px 16px',background:'rgba(239,68,68,0.1)',borderRadius:20}}>
            ✗ {t('rematchDeclined')}
          </div>
        )}
        {gameMode==='online'&&!otherDeclined&&myRematch&&!otherRematch&&(
          <div style={{fontSize:13,fontWeight:700,color:'#f59e0b',marginTop:14,padding:'8px 16px',background:'rgba(245,158,11,0.1)',borderRadius:20,display:'flex',alignItems:'center',gap:8}}>
            <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'#f59e0b',animation:'piece-pulse 1.4s ease-in-out infinite'}}/>
            {t('rematchWaiting')}
          </div>
        )}
        {gameMode==='online'&&!otherDeclined&&!myRematch&&otherRematch&&(
          <div style={{fontSize:13,fontWeight:700,color:'#16a34a',marginTop:14,padding:'8px 16px',background:'rgba(22,163,74,0.1)',borderRadius:20}}>
            ↻ {t('rematchAsked')}
          </div>
        )}

        <div style={{display:'flex',flexDirection:'column',gap:10,width:240,marginTop:24}}>
          {gameMode!=='online'&&<GBtn onClick={()=>initGame(gameMode,'A',null,true)} dark>{t('rematch')}</GBtn>}
          {gameMode==='online'&&!otherDeclined&&!myRematch&&<GBtn onClick={requestRematch} dark>{t('rematch')}</GBtn>}
          {moveHist.length>0&&<GBtn onClick={()=>{setReplayStep(0);setScreen('replay');}} outline>{t('replayBtn')}</GBtn>}
          <GBtn onClick={()=>{
            if(gameMode==='online'&&!otherDeclined)declineRematch();
            setScreen('menu');setGameMode(null);setLobbyId(null);
          }} outline>{t('menu')}</GBtn>
        </div>
      </div>
    );
  }

  // ── GAME ─────────────────────────────────────────────────
  const isOnlineWait=gameMode==='online'&&!myTurn&&!winner;
  return (
    <div style={{...sCont,paddingBottom:100}}>

      {/* Ghost */}
      {dragging&&(
        snapPos
          ? <div style={{position:'fixed',pointerEvents:'none',zIndex:1000,width:gW,height:gH,
              background:previewValid?'#f59e0b':'#ef4444',borderRadius:4,opacity:0.9,
              boxShadow:previewValid?'0 0 20px #f59e0b80':'0 0 20px #ef444480',
              left:snapPos.x-gW/2,top:snapPos.y-gH/2,transition:'left 0.05s,top 0.05s,background 0.12s'}}/>
          : <div style={{position:'fixed',pointerEvents:'none',zIndex:1000,width:44,height:44,borderRadius:'50%',
              background:'#94a3b8',opacity:0.85,left:ghostPos.x-22,top:ghostPos.y-22-90,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'white',fontWeight:800}}>✕</div>
      )}

      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',maxWidth:360,marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>{t('title')}</div>
        {!winner&&(
          <button onClick={handleGiveUp} style={{
            padding:'5px 14px',fontSize:11,fontWeight:700,cursor:'pointer',
            background:giveUpArmed?'#ef4444':'transparent',
            color:giveUpArmed?'white':'var(--subtle)',
            border:`1px solid ${giveUpArmed?'#ef4444':'var(--border)'}`,
            borderRadius:20,transition:'all 0.2s',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
            {giveUpArmed?t('sure'):t('giveUp')}
          </button>
        )}
      </div>

      {/* Score cards */}
      <div style={{display:'flex',gap:8,marginBottom:10,width:'100%',maxWidth:360}}>
        {['A','B'].map(p=>{
          const active=turn===p&&!winner;
          return(
            <div key={p} style={{flex:1,padding:'8px 12px',borderRadius:12,
              background:active?PC[p]:'var(--score-bg)',
              border:`1.5px solid ${active?PC[p]:'var(--score-border)'}`,
              boxShadow:active?`0 3px 12px ${PC[p]}35`:'var(--shadow-soft)',
              transition:'all 0.2s',display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:12,height:12,borderRadius:'50%',flexShrink:0,
                background:active?'rgba(255,255,255,0.9)':PC[p],
                border:active?`2px solid rgba(255,255,255,0.5)`:`2px solid ${PD[p]}`}}/>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:active?'rgba(255,255,255,0.75)':'var(--subtle)'}}>{pname(p)}</div>
                <div style={{fontSize:12,fontWeight:700,color:active?'white':'var(--text)'}}>{barrLeft[p]} {t('walls')}</div>
              </div>
              {active&&!winner&&(
                <div style={{marginLeft:'auto',fontSize:9,letterSpacing:0.5,
                  color:'rgba(255,255,255,0.75)',fontWeight:600}}>
                  {isOnlineWait&&p===turn?t('statusWait'):aiThinking&&p==='B'?t('statusThink'):t('statusTurn')}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {flash&&<div style={{color:'#ef4444',fontSize:11,marginBottom:4,fontWeight:500}}>{flash}</div>}

      <div style={{fontSize:9,letterSpacing:3,color:'#16a34a',fontWeight:700,textTransform:'uppercase',marginBottom:2}}>{t('goalLabel')}</div>

      {/* Grid */}
      <div ref={gridRef} style={{position:'relative',width:COLS*CELL,height:ROWS*CELL,...sGrid}}>
        {Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},(_,c)=>{
          const isA=pA.r===r&&pA.c===c,isB=pB.r===r&&pB.c===c;
          const vDot=validDot(r,c);
          const isGoal=r===0,isStart=r===ROWS-1;
          let bg=(r+c)%2===0?'var(--cell-b)':'var(--cell-a)';
          if(isGoal)bg='var(--goal)';if(isStart)bg='var(--start)';
          return(
            <div key={`${r}-${c}`} data-r={r} data-c={c} onClick={()=>handleCellClick(r,c)}
              style={{position:'absolute',left:c*CELL,top:r*CELL,width:CELL,height:CELL,
                background:bg,border:'1px solid var(--cell-line)',
                display:'flex',alignItems:'center',justifyContent:'center',
                cursor:vDot&&!dragging?'pointer':'default',boxSizing:'border-box'}}>
              {isGoal&&<div style={{position:'absolute',top:0,left:0,right:0,height:3,background:'linear-gradient(90deg,#16a34a,#22c55e)',pointerEvents:'none'}}/>}
              {isStart&&<div style={{position:'absolute',bottom:0,left:0,right:0,height:2,background:'var(--border)',pointerEvents:'none'}}/>}
              {vDot&&!isA&&!isB&&<div style={{width:10,height:10,borderRadius:'50%',background:color,opacity:0.32,pointerEvents:'none'}}/>}
            </div>
          );
        }))}
        {[...walls].map(k=><Wall key={k} wkey={k} color={darkMode?'#e2e8f0':'#1e293b'} opacity={1} animate/>)}
        {previewKey&&<Wall wkey={previewKey} color={previewValid?'#f59e0b':'#ef4444'} opacity={0.6}/>}
        {['A','B'].map(p=>{
          const pos=p==='A'?pA:pB;const sz=30,off=(CELL-sz)/2;
          const isActive=turn===p&&!winner;
          return(
            <div key={p} style={{position:'absolute',left:pos.c*CELL+off,top:pos.r*CELL+off,
              width:sz,height:sz,
              transition:'left 0.18s cubic-bezier(0.25,0.46,0.45,0.94),top 0.18s cubic-bezier(0.25,0.46,0.45,0.94)',
              zIndex:20,pointerEvents:'none'}}>
              {isActive&&<div style={{position:'absolute',inset:-2,borderRadius:'50%',
                background:PC[p],animation:'piece-pulse 1.6s ease-in-out infinite'}}/>}
              <Piece color={PC[p]} dark={PD[p]}/>
            </div>
          );
        })}
      </div>

      <div style={{fontSize:9,letterSpacing:3,color:'var(--subtle)',fontWeight:600,textTransform:'uppercase',marginTop:2}}>{t('startLabel')}</div>

      {(isOnlineWait||oppCountdown!==null)&&(
        <div style={{position:'fixed',bottom:80,left:0,right:0,display:'flex',justifyContent:'center',zIndex:50,pointerEvents:'none'}}>
          <div style={{background:oppCountdown!==null?'rgba(239,68,68,0.92)':'rgba(15,23,42,0.75)',color:'white',padding:'8px 20px',borderRadius:20,fontSize:12,fontWeight:600,backdropFilter:'blur(8px)',display:'flex',alignItems:'center',gap:8}}>
            {oppCountdown!==null?(<>
              <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'white',animation:'piece-pulse 1s ease-in-out infinite'}}/>
              {t('reconnecting')} · {oppCountdown}s
            </>):t('opponentTurn')}
          </div>
        </div>
      )}

      {celebrating&&winner&&(
        <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
          zIndex:500,pointerEvents:'none',background:'rgba(0,0,0,0.15)'}}>
          <div style={{animation:'person-grow 0.3s ease-out both'}}>
            <WinnerPerson color={PC[winner]} dark={PD[winner]} speed={danceSpeed} dance={danceStyle}/>
          </div>
        </div>
      )}

      {winner&&!celebrating&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.45)',
          display:'flex',alignItems:'center',justifyContent:'center',zIndex:500}}
          onClick={()=>setScreen('end')}>
          {!isOwnLoss(winner)&&<Confetti color={PC[winner]}/>}
          <div style={{background:'var(--card)',borderRadius:22,padding:'32px 44px',textAlign:'center',
            boxShadow:'0 24px 64px rgba(0,0,0,0.25)',zIndex:9999,position:'relative'}}>
            <div style={{fontSize:40,marginBottom:10,animation:'trophy-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both'}}>{isOwnLoss(winner)?'😔':'🏆'}</div>
            <div style={{fontSize:22,fontWeight:900,color:PC[winner],letterSpacing:-0.5}}>{pname(winner)} {t('wins')}</div>
            <div style={{fontSize:11,color:'var(--subtle)',marginTop:10,fontWeight:500}}>{t('tapContinue')}</div>
          </div>
        </div>
      )}

      {/* Floating barricade chips */}
      {!winner&&myTurn&&!isOnlineWait&&(
        <div style={{position:'fixed',bottom:16,left:0,right:0,zIndex:200,
          display:'flex',justifyContent:'center',alignItems:'flex-end',gap:12,pointerEvents:'none'}}>
          <div style={{position:'absolute',bottom:'100%',marginBottom:5,
            fontSize:9,color:'var(--muted)',fontWeight:600,letterSpacing:1,
            background:darkMode?'rgba(20,30,50,0.7)':'rgba(255,255,255,0.72)',backdropFilter:'blur(8px)',
            padding:'2px 10px',borderRadius:20,border:`1px solid ${darkMode?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)'}`}}>
            {barrLeft[turn]} {t('wallsLeft')}
          </div>
          {[['H'],['V']].map(([orient])=>(
            <div key={orient}
              onMouseDown={e=>startDrag(e,orient)}
              onTouchStart={e=>startDrag(e,orient)}
              style={{pointerEvents:'all',
                width:orient==='H'?84:42,height:orient==='V'?54:42,
                display:'flex',alignItems:'center',justifyContent:'center',
                cursor:canDrag?'grab':'not-allowed',touchAction:'none',
                borderRadius:12,background:darkMode?'rgba(30,41,68,0.7)':'rgba(255,255,255,0.7)',
                backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',
                border:`1px solid ${darkMode?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.85)'}`,
                boxShadow:'0 4px 14px rgba(0,0,0,0.1)',opacity:canDrag?1:0.35}}>
              <div style={{width:orient==='H'?58:WW,height:orient==='V'?28:WW,
                background:canDrag?(darkMode?'#e2e8f0':'#1e293b'):(darkMode?'#475569':'#aaa'),borderRadius:3,pointerEvents:'none'}}/>
            </div>
          ))}
        </div>
      )}

      {/* Emote-Anzeigen (beide Spieler) - eigener links unten, Gegner rechts unten */}
      {['A','B'].map(p=>{
        const em=emotes[p];
        if(!em)return null;
        const myRole=gameMode==='online'?onlineRole:(gameMode==='pvc'?'A':null);
        const isMine=myRole?p===myRole:false;
        const posStyle=isMine
          ?{left:14,bottom:74}
          :myRole?{right:14,bottom:74}:{left:p==='A'?14:96,bottom:74};
        return(
          <div key={`emote-${p}-${em.id}`} style={{
            position:'fixed',...posStyle,
            zIndex:450,pointerEvents:'none',
            animation:'emote-pop 0.32s cubic-bezier(0.34,1.56,0.64,1) both'}}>
            <EmoteChar color={PC[p]} dark={PD[p]} type={em.type}/>
          </div>
        );
      })}

      {/* Emote-Picker (Clash Royale Style 2x2 mit Charakter-Köpfen) */}
      {emotePicker&&!winner&&(
        <div onClick={()=>setEmotePicker(false)} style={{
          position:'fixed',inset:0,zIndex:480}}>
          <div onClick={e=>e.stopPropagation()} style={{
            position:'fixed',left:14,bottom:74,
            background:darkMode?'rgba(22,30,51,0.96)':'rgba(255,255,255,0.97)',
            borderRadius:18,padding:10,
            display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,
            border:`1.5px solid ${darkMode?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.06)'}`,
            boxShadow:'0 8px 28px rgba(0,0,0,0.25)',
            animation:'picker-pop 0.22s cubic-bezier(0.34,1.56,0.64,1) both',
            transformOrigin:'bottom left'}}>
            {[
              {k:'laugh'},
              {k:'cry'},
              {k:'angry'},
              {k:'confused'}
            ].map(e=>{
              const myRole=gameMode==='online'?onlineRole:(gameMode==='pvc'?'A':turn);
              const c=PC[myRole]||PC.A;
              const d=PD[myRole]||PD.A;
              return(
                <button key={e.k} onClick={()=>triggerEmote(e.k)}
                  disabled={emoteCooldown}
                  style={{
                    width:58,height:58,padding:0,
                    background:darkMode?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.04)',
                    border:'none',borderRadius:12,
                    cursor:emoteCooldown?'not-allowed':'pointer',
                    opacity:emoteCooldown?0.4:1,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    transition:'transform 0.12s',
                    fontFamily:'system-ui,-apple-system,sans-serif'}}>
                  <EmoteHead color={c} dark={d} type={e.k} size={48}/>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Sprachblase-Button unten links */}
      {!winner&&screen==='game'&&(
        <button onClick={()=>!emoteCooldown&&setEmotePicker(p=>!p)}
          disabled={emoteCooldown}
          style={{
            position:'fixed',left:14,bottom:16,zIndex:200,
            width:48,height:48,borderRadius:'50%',
            background:darkMode?'rgba(30,41,68,0.75)':'rgba(255,255,255,0.78)',
            backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',
            border:`1px solid ${darkMode?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.85)'}`,
            boxShadow:'0 4px 14px rgba(0,0,0,0.12)',
            cursor:emoteCooldown?'not-allowed':'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:22,opacity:emoteCooldown?0.45:1,
            animation:emotePicker?'none':'bubble-pulse 2.5s ease-in-out infinite',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
          💬
        </button>
      )}
    </div>
  );
}

const DANCES={
  robot:{body:'dance-robot',handL:'robot-hand-l',handR:'robot-hand-r',head:'robot-head',belly:null,legL:null,legR:null,slow:1.7,fast:1.1,ease:'cubic-bezier(0.65,0,0.35,1)'},

};

// Gesichts-Content für ein bestimmtes Emote — wird in Kopf eingebettet
function EmoteFace({type,dark,animate}){
  if(type==='laugh')return(
    <g>
      {/* Lachende zusammengekniffene Augen ^^ — dicker, expressiver */}
      <path d="M 18 22 Q 24 14 30 22" stroke="white" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
      <path d="M 34 22 Q 40 14 46 22" stroke="white" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
      {/* Wangen-Röte (rot vor Lachen) */}
      <ellipse cx="16" cy="28" rx="3.5" ry="2.5" fill="#fbb6ce" opacity="0.7"/>
      <ellipse cx="48" cy="28" rx="3.5" ry="2.5" fill="#fbb6ce" opacity="0.7"/>
      {/* Riesiger offener lachender Mund */}
      <path d="M 16 28 Q 32 44 48 28 Q 32 42 16 28 Z" fill="white" stroke={dark} strokeWidth="1"/>
      {/* Zunge */}
      <ellipse cx="32" cy="36" rx="6" ry="3" fill="#f87171"/>
      <path d="M 32 33 L 32 38" stroke="#dc2626" strokeWidth="0.8" opacity="0.6"/>
      {/* Lach-Tränen aus den Augen */}
      {animate&&<>
        <circle cx="14" cy="24" r="1.8" fill="#7dd3fc" style={{animation:'laugh-tear 0.9s ease-in 0s infinite'}}/>
        <circle cx="50" cy="24" r="1.8" fill="#7dd3fc" style={{animation:'laugh-tear 0.9s ease-in 0.4s infinite'}}/>
      </>}
    </g>
  );
  if(type==='cry')return(
    <g>
      {/* Augenbrauen stark runter - traurig zusammengezogen */}
      <path d="M 14 14 Q 20 11 28 18" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      <path d="M 50 14 Q 44 11 36 18" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      {/* Zusammengekniffene Augen die viele Tränen produzieren */}
      <path d="M 16 24 Q 22 19 28 24" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      <path d="M 36 24 Q 42 19 48 24" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      {/* Tränen-Wasserfälle */}
      {animate&&<>
        <ellipse cx="20" cy="27" rx="2.5" ry="3" fill="#7dd3fc" style={{['--tx']:'-2px',animation:'tear-spurt 0.7s ease-in 0s infinite'}}/>
        <ellipse cx="44" cy="27" rx="2.5" ry="3" fill="#7dd3fc" style={{['--tx']:'2px',animation:'tear-spurt 0.7s ease-in 0.15s infinite'}}/>
        <ellipse cx="18" cy="27" rx="2" ry="2.5" fill="#7dd3fc" style={{['--tx']:'-3px',animation:'tear-spurt 0.7s ease-in 0.35s infinite'}}/>
        <ellipse cx="46" cy="27" rx="2" ry="2.5" fill="#7dd3fc" style={{['--tx']:'3px',animation:'tear-spurt 0.7s ease-in 0.5s infinite'}}/>
      </>}
      {/* Heulender weit offener Mund */}
      <g style={animate?{transformOrigin:'32px 36px',animation:'mouth-wail 0.6s ease-in-out infinite'}:{}}>
        <ellipse cx="32" cy="36" rx="9" ry="6" fill={dark} stroke="white" strokeWidth="1.5"/>
        <ellipse cx="32" cy="37" rx="5" ry="3" fill="#1e1b1b"/>
      </g>
    </g>
  );
  if(type==='angry')return(
    <g>
      {/* Wütende Augenbrauen V-förmig stark runter */}
      <path d="M 12 12 L 28 22" stroke="white" strokeWidth="3" fill="none" strokeLinecap="round"/>
      <path d="M 52 12 L 36 22" stroke="white" strokeWidth="3" fill="none" strokeLinecap="round"/>
      {/* Rote Gesicht-Röte (Wut-Flush) */}
      {animate&&<ellipse cx="32" cy="26" rx="20" ry="8" fill="#fca5a5" opacity="0.55"
        style={{animation:'face-flush 0.6s ease-in-out infinite'}}/>}
      {/* Funkelnde böse Augen mit kleinem Pupillen-Glow */}
      <circle cx="22" cy="24" r="3" fill="white"/>
      <circle cx="22" cy="24" r="1.5" fill={dark}/>
      <circle cx="42" cy="24" r="3" fill="white"/>
      <circle cx="42" cy="24" r="1.5" fill={dark}/>
      {/* Knurrender Mund mit Reißzähnen */}
      <path d="M 18 32 L 46 32 L 44 36 L 20 36 Z" fill="white" stroke={dark} strokeWidth="1"/>
      <polygon points="22,32 24,38 26,32" fill="white"/>
      <polygon points="38,32 40,38 42,32" fill="white"/>
      <line x1="28" y1="32" x2="28" y2="36" stroke={dark} strokeWidth="0.6"/>
      <line x1="32" y1="32" x2="32" y2="36" stroke={dark} strokeWidth="0.6"/>
      <line x1="36" y1="32" x2="36" y2="36" stroke={dark} strokeWidth="0.6"/>
      {/* Zorn-Ader pulsierend */}
      {animate&&<g style={{transformOrigin:'48px 10px',animation:'vein-throb 0.5s ease-in-out infinite'}}>
        <path d="M 48 8 L 50 12 L 47 13 L 49 17" stroke="#dc2626" strokeWidth="1.8" fill="none" strokeLinecap="round"/>
        <path d="M 50 12 L 53 10" stroke="#dc2626" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
      </g>}
      {/* Dampf-Puffs aus den Ohren */}
      {animate&&<>
        <circle cx="6" cy="18" r="3.5" fill="white" opacity="0.85" style={{['--sx']:'-14px',animation:'steam-puff 0.7s ease-out 0s infinite'}}/>
        <circle cx="6" cy="18" r="2.8" fill="white" opacity="0.75" style={{['--sx']:'-12px',animation:'steam-puff 0.7s ease-out 0.25s infinite'}}/>
        <circle cx="58" cy="18" r="3.5" fill="white" opacity="0.85" style={{['--sx']:'14px',animation:'steam-puff 0.7s ease-out 0.1s infinite'}}/>
        <circle cx="58" cy="18" r="2.8" fill="white" opacity="0.75" style={{['--sx']:'12px',animation:'steam-puff 0.7s ease-out 0.35s infinite'}}/>
      </>}
    </g>
  );
  // confused
  return(
    <g>
      {/* Eine Augenbraue hoch (links), eine schräg runter (rechts) - klassisch verwirrt */}
      <path d="M 14 11 Q 22 6 30 14" stroke="white" strokeWidth="2.4" fill="none" strokeLinecap="round"/>
      <path d="M 36 18 L 50 16" stroke="white" strokeWidth="2.4" fill="none" strokeLinecap="round"/>
      {/* Augen: links weit offen (großes Pupille), rechts zusammengekniffen */}
      <circle cx="22" cy="22" r="4" fill="white"/>
      <circle cx="22" cy="22" r="2" fill={dark}/>
      <path d="M 36 24 Q 42 19 48 24" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      {/* Schiefer kleiner Mund + leicht offen */}
      <path d="M 22 33 Q 28 30 36 34" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      <ellipse cx="29" cy="33" rx="2" ry="1" fill={dark}/>
      {/* Schweißtropfen am Kopf */}
      {animate&&<ellipse cx="50" cy="14" rx="2" ry="3" fill="#7dd3fc"
        style={{['--sw']:'4px',animation:'sweat-drop 1.2s ease-in 0.3s infinite'}}/>}
      {/* Fragezeichen über Kopf — 3 Stück */}
      {animate&&<>
        <text x="48" y="10" fill="#fbbf24" fontSize="16" fontWeight="900" stroke={dark} strokeWidth="0.8"
          style={{animation:'q-mark-float 1.5s ease-out 0s infinite',transformOrigin:'48px 10px'}}>?</text>
        <text x="40" y="4" fill="#fde047" fontSize="11" fontWeight="900" stroke={dark} strokeWidth="0.6"
          style={{animation:'q-mark-float 1.5s ease-out 0.5s infinite',transformOrigin:'40px 4px'}}>?</text>
        <text x="56" y="6" fill="#fbbf24" fontSize="9" fontWeight="900" stroke={dark} strokeWidth="0.5"
          style={{animation:'q-mark-float 1.5s ease-out 0.9s infinite',transformOrigin:'56px 6px'}}>?</text>
      </>}
    </g>
  );
}

// Kleiner statischer Kopf für den Picker — nur Kopf in Spielerfarbe mit Gesicht
function EmoteHead({color,dark,type,size=44}){
  return(
    <svg width={size} height={size} viewBox="0 0 64 50" style={{overflow:'visible',display:'block'}}>
      {/* Kopf-Kreis */}
      <circle cx="32" cy="24" r="18" fill={color} stroke={dark} strokeWidth="2"/>
      <g transform="translate(0,2)">
        <EmoteFace type={type} dark={dark} animate={false}/>
      </g>
    </svg>
  );
}

function EmoteChar({color,dark,type}){
  // Kleiner Charakter mit emote-spezifischem Gesicht + Body-Animation
  const size={w:72,h:90};

  // Animations-Config je Emote — alle deutlich schneller/dramatischer
  const cfg=(()=>{
    if(type==='laugh')return{body:'laugh-body 0.45s ease-in-out infinite',head:'laugh-head 0.45s ease-in-out infinite',handL:'laugh-hand-l 0.45s ease-in-out infinite',handR:'laugh-hand-r 0.45s ease-in-out infinite'};
    if(type==='cry')return{body:'cry-body 0.6s ease-in-out infinite',head:'cry-head 0.6s ease-in-out infinite',handL:'cry-hand-l 0.6s ease-in-out infinite',handR:'cry-hand-r 0.6s ease-in-out infinite'};
    if(type==='angry')return{body:'angry-body 0.4s ease-in-out infinite',head:'angry-head 0.3s ease-in-out infinite',handL:'angry-hand-l 0.3s ease-in-out infinite',handR:'angry-hand-r 0.3s ease-in-out infinite'};
    return{body:'confused-body 0.9s ease-in-out infinite',head:'confused-head 0.9s ease-in-out infinite',handL:'confused-hand-l 0.9s ease-in-out infinite',handR:'confused-hand-r 0.9s ease-in-out infinite'};
  })();

  return(
    <div style={{
      width:size.w,height:size.h,
      filter:'drop-shadow(0 4px 12px rgba(0,0,0,0.3))'}}>
      <div style={{
        animation:cfg.body,
        transformOrigin:'center bottom',width:'100%',height:'100%'}}>
        <svg width={size.w} height={size.h} viewBox="0 0 72 90" style={{overflow:'visible',display:'block'}}>
          {/* Beine */}
          <circle cx="30" cy="78" r="6" fill={dark}/>
          <circle cx="42" cy="78" r="6" fill={dark}/>
          {/* Körper (rund) */}
          <circle cx="36" cy="56" r="15" fill={color} stroke={dark} strokeWidth="1.8"/>
          {/* Linke Hand */}
          <g style={{transformOrigin:'22px 56px',animation:cfg.handL}}>
            <circle cx="22" cy="56" r="6" fill={dark}/>
          </g>
          {/* Rechte Hand */}
          <g style={{transformOrigin:'50px 56px',animation:cfg.handR}}>
            <circle cx="50" cy="56" r="6" fill={dark}/>
          </g>
          {/* Kopf mit Gesicht */}
          <g style={{transformOrigin:'36px 28px',animation:cfg.head}}>
            <g transform="translate(4,6)">
              <circle cx="32" cy="22" r="16" fill={color} stroke={dark} strokeWidth="1.8"/>
              <EmoteFace type={type} dark={dark} animate={true}/>
            </g>
          </g>
        </svg>
      </div>
    </div>
  );
}

function WinnerPerson({color,dark,speed,dance}){
  const cfg=DANCES[dance]||DANCES.robot;
  const dur=speed==='fast'?cfg.fast:cfg.slow;
  const ease=cfg.ease;
  const anim=name=>name?`${name} ${dur}s ${ease} infinite`:'none';
  const browDur=dance==='robot'?(dur*0.55):(dur*1.2);
  const browAnim=`brow-pump ${browDur}s ease-in-out infinite`;

  const face=<g>
    {/* Augenbrauen — gebogen, pumpen hoch/runter */}
    <g style={{transformOrigin:'45px 16px',animation:browAnim}}>
      <path d="M 33 17 Q 37 13.5 41 17" stroke="white" strokeWidth="1.7" fill="none" strokeLinecap="round"/>
      <path d="M 49 17 Q 53 13.5 57 17" stroke="white" strokeWidth="1.7" fill="none" strokeLinecap="round"/>
    </g>
    {/* Ekliges Augenkneifen — zusammengekniffene Augen mit Spitze nach oben */}
    <path d="M 35 23.5 Q 39 19.5 43 23.5" stroke="white" strokeWidth="1.7" fill="none" strokeLinecap="round"/>
    <path d="M 47 23.5 Q 51 19.5 55 23.5" stroke="white" strokeWidth="1.7" fill="none" strokeLinecap="round"/>
    {/* Großes Grinsen mit sauberen Zähnen */}
    <g style={{transformOrigin:'45px 30px',animation:anim('robot-grin')}}>
      <path d="M 32 28 L 58 28 Q 45 41 32 28 Z" fill="white" strokeLinejoin="round"/>
      <line x1="38" y1="28" x2="38" y2="32.5" stroke={dark} strokeWidth="0.6"/>
      <line x1="41.5" y1="28" x2="41.5" y2="35" stroke={dark} strokeWidth="0.6"/>
      <line x1="45" y1="28" x2="45" y2="36" stroke={dark} strokeWidth="0.6"/>
      <line x1="48.5" y1="28" x2="48.5" y2="35" stroke={dark} strokeWidth="0.6"/>
      <line x1="52" y1="28" x2="52" y2="32.5" stroke={dark} strokeWidth="0.6"/>
    </g>
  </g>;

  return <div style={{animation:`${cfg.body} ${dur}s ${ease} infinite`,transformOrigin:'center bottom'}}>
    <svg width="220" height="260" viewBox="0 0 90 100" style={{overflow:'visible',display:'block'}}>
      {/* Linkes Bein */}
      <g style={{transformOrigin:'40px 85px',animation:anim(cfg.legL)}}>
        <circle cx="40" cy="85" r="7" fill={dark}/>
      </g>
      {/* Rechtes Bein */}
      <g style={{transformOrigin:'50px 85px',animation:anim(cfg.legR)}}>
        <circle cx="50" cy="85" r="7" fill={dark}/>
      </g>
      {/* Bauch */}
      <g style={{transformOrigin:'45px 55px',animation:anim(cfg.belly)}}>
        <circle cx="45" cy="55" r="16" fill={dark}/>
      </g>
      {/* Linke Hand — näher am Körper */}
      <g style={{transformOrigin:'30px 56px',animation:anim(cfg.handL)}}>
        <circle cx="30" cy="56" r="6.5" fill={dark}/>
      </g>
      {/* Rechte Hand — näher am Körper */}
      <g style={{transformOrigin:'60px 56px',animation:anim(cfg.handR)}}>
        <circle cx="60" cy="56" r="6.5" fill={dark}/>
      </g>
      {/* Kopf */}
      <g style={{transformOrigin:'45px 24px',animation:anim(cfg.head)}}>
        <circle cx="45" cy="24" r="13" fill={dark}/>
        {face}
      </g>
    </svg>
  </div>;
}

function Confetti({color}){
  const pieces=useMemo(()=>{
    const colors=color?[color,'#f59e0b','#10b981','#8b5cf6','#ec4899','#fbbf24']:['#ef4444','#3b82f6','#f59e0b','#10b981','#8b5cf6','#ec4899'];
    return Array.from({length:90},(_,i)=>({
      left:Math.random()*100,
      delay:Math.random()*0.6,
      dur:2.2+Math.random()*2.2,
      color:colors[i%colors.length],
      size:5+Math.random()*7,
      drift:(Math.random()-0.5)*20
    }));
  },[color]);
  return <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9998,overflow:'hidden'}}>
    {pieces.map((p,i)=>(
      <div key={i} style={{
        position:'absolute',top:-20,left:`${p.left}%`,
        width:p.size,height:p.size*0.55,background:p.color,
        borderRadius:1,
        animation:`confetti-fall ${p.dur}s linear ${p.delay}s forwards`,
        marginLeft:p.drift+'vw'
      }}/>
    ))}
  </div>;
}

function Piece({color,dark}){
  return <div style={{width:30,height:30,borderRadius:'50%',
    background:`radial-gradient(circle at 30% 30%, ${color}, ${dark})`,
    border:'2.5px solid rgba(255,255,255,0.55)',
    boxShadow:`0 3px 12px ${color}70,inset 0 1px 0 rgba(255,255,255,0.35)`,
    position:'relative',pointerEvents:'none'}}/>;
}
function Wall({wkey,color,opacity,animate}){
  const p=wallPos(wkey);
  const isH=wkey[0]==='H';
  return <div style={{position:'absolute',...p,background:color,borderRadius:WW/2,
    zIndex:10,pointerEvents:'none',opacity,
    boxShadow:opacity===1?'0 2px 6px rgba(0,0,0,0.22)':'none',
    transformOrigin:isH?'center center':'center center',
    animation:animate?`${isH?'wall-enter-h':'wall-enter-v'} 0.28s cubic-bezier(0.34,1.56,0.64,1) both`:'none'}}/>;
}
function GBtn({onClick,children,dark,blue,outline}){
  return <button onClick={onClick} style={{padding:'13px 16px',
    background:dark?'#1e293b':blue?'#3b82f6':outline?'var(--card)':'var(--border)',
    color:dark||blue?'white':'var(--text)',
    border:`1.5px solid ${outline?'var(--border)':dark?'#1e293b':blue?'#3b82f6':'transparent'}`,
    borderRadius:12,cursor:'pointer',fontWeight:700,fontSize:13,width:'100%',
    fontFamily:'system-ui,-apple-system,sans-serif',
    boxShadow:dark?'0 2px 8px rgba(30,41,59,0.18)':blue?'0 2px 8px rgba(59,130,246,0.25)':'none',
    transition:'all 0.15s'}}>{children}</button>;
}
const rBtn=dis=>({padding:'10px 24px',background:dis?'var(--border)':'#1e293b',color:dis?'var(--subtle)':'white',
  border:'none',borderRadius:10,cursor:dis?'not-allowed':'pointer',fontWeight:700,fontSize:16,
  fontFamily:'system-ui,-apple-system,sans-serif'});
const sPage={minHeight:'100vh',minHeight:'100dvh',background:'var(--bg)',display:'flex',flexDirection:'column',
  alignItems:'center',justifyContent:'center',padding:'24px',fontFamily:'system-ui,-apple-system,sans-serif'};
const sCont={minHeight:'100vh',minHeight:'100dvh',background:'var(--bg)',display:'flex',flexDirection:'column',
  alignItems:'center',padding:'12px 8px',fontFamily:'system-ui,-apple-system,sans-serif',userSelect:'none',WebkitUserSelect:'none'};
const sGrid={background:'var(--grid-bg)',borderRadius:14,overflow:'hidden',
  boxShadow:'var(--shadow-card)',border:'1.5px solid var(--border)'};
const sBack={background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--subtle)',
  fontWeight:600,padding:'8px 0',fontFamily:'system-ui,-apple-system,sans-serif',marginTop:8};

// ── Mount ─────────────────────────────────────────────────
const loader=document.getElementById('loader');
if(loader)loader.style.display='none';
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
