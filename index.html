    if(d.type==='match_start'||d.type==='resync'||d.type==='state'){
      setWsConn(true);
      // Schutz bei gemischten Versionen: Server-Brett muss zum Client-Brett passen
      if((d.type==='match_start'||d.type==='resync')&&d.cols&&d.rows&&(d.cols!==COLS||d.rows!==ROWS)){WSNET._dbg('GEO-MISMATCH! Server '+d.cols+'x'+d.rows+' vs Client '+COLS+'x'+ROWS);}
      if((d.type==='match_start'||d.type==='resync')&&d.skins!==undefined)setMatchSkins(d.skins||null);
      if(typeof d.deineNummer==='number')setOnlineRole(d.deineNummer===0?'A':'B');
      if(d.pos){ setPA({...d.pos[0]}); setPB({...d.pos[1]}); }
      if(d.walls){ setWalls(new Set(d.walls)); }
      if(d.barr){ setBarrLeft({A:d.barr[0],B:d.barr[1]}); }
      if(d.hammers!==undefined){ setHammers(d.hammers); }
      if(d.held){ var ph=S.current.hammerHeld||{A:false,B:false}; if((d.held.A&&!ph.A)||(d.held.B&&!ph.B))playSound('pickup'); setHammerHeld(d.held); }
      if(d.used){ setHammerUsed(d.used); }
      if(d.golden){ if(d.golden.length>(S.current.goldenWalls?S.current.goldenWalls.size:0))playSound('wall'); setGoldenWalls(new Set(d.golden)); }
      if(d.chaosItem!==undefined){ if(d.chaosItem&&!S.current.chaosItem)playSound('wall'); if(!d.chaosItem&&S.current.chaosItem&&!d.winner)playSound('wall'); setChaosItem(d.chaosItem); }
      if(typeof d.amZug==='number'){ setTurn(d.amZug===0?'A':'B'); }
      if(typeof d.turnMs==='number'){ wsTurnEndsRef.current=d.turnMs>0?(Date.now()+d.turnMs):0; }
      // Ranked-Uhr-Anker vom Server: Anzeige wird hieraus abgeleitet (keine Drift, kein Freeze-Fehler)
      if(d.clk&&d.clk.length===2){ clkAnchorRef.current={at:Date.now(),rem:[d.clk[0],d.clk[1]],active:(typeof d.amZug==='number'?d.amZug:null)}; }
      if(typeof d.skipped==='number'&&(d.skipped===0?'A':'B')===S.current.onlineRole&&(d.winner===undefined||d.winner===null)){
        // Eigener Zug ist per Blitz-Timer verfallen -> kurzes Feedback
        setFlash(t('turnSkipped'));
        setTimeout(function(){ setFlash(function(f){ return f===t('turnSkipped')?'':f; }); },1600);
      }
      if(d.gaveUp!==undefined&&d.gaveUp!==null)setGaveUp(d.gaveUp===0?'A':'B');
      var mh=S.current.moveHist;
      if(d.lm){
        const lp=d.lm.p===0?'A':'B';
        var lmEnt;
        if(d.lm.type==='wall')lmEnt={type:'wall',p:lp,k:d.lm.k};
        else if(d.lm.type==='break')lmEnt={type:'break',p:lp,k:d.lm.k};
        else lmEnt={type:'move',p:lp,r:d.lm.r,c:d.lm.c};
        mh=(S.current.moveHist||[]).concat([lmEnt]);
        setMoveHist(mh);
        if(lp!==S.current.onlineRole)playSound(d.lm.type==='wall'?'wall':d.lm.type==='break'?'break':'move');
      }
      if(d.winner!==undefined&&d.winner!==null&&!S.current.winner){
        const wRole=d.winner===0?'A':'B';
        if(d.reason)setLossReason(d.reason);
        triggerWin(wRole,false,mh);
      }
      // Verlorenen eigenen Zug automatisch erneut senden (Anti-Verlust auf wackeliger Verbindung)
      if(d.winner===undefined||d.winner===null){
        setLossReason(null); // laufendes Spiel -> Grund zuruecksetzen (kein stale beim naechsten Spiel)
        setBugOpen(false);setBugStatus(null); // Bug-Report-Formular gehoert nur zum Endscreen
        if(S.current.repSrc!=='chat'){setRepOpen(false);setRepStatus(null);} // Endscreen-Meldeformular ebenso — Chat-Melden lebt im laufenden Match, darf nicht per Sync geschlossen werden
        var myRoleP=(typeof d.deineNummer==='number')?(d.deineNummer===0?'A':'B'):S.current.onlineRole;
        var myNumP=myRoleP==='A'?0:1;
        var srvTurnP=(typeof d.amZug==='number')?(d.amZug===0?'A':'B'):S.current.turn;
        var pend=pendingWsRef.current;
        if(pend){
          if(d.lm&&d.lm.p===myNumP){ pendingWsRef.current=null; } // eigener Zug bestaetigt
          else if(srvTurnP===myRoleP){ // Server: ich bin noch dran -> Zug kam nicht an -> erneut senden
            if(pend.tries<3){ pend.tries++; if(pend.kind==='move')WSNET.move(pend.to); else WSNET.wall(pend.key); }
            else pendingWsRef.current=null;
          } else { pendingWsRef.current=null; } // Gegner ist dran -> Zug wurde angewendet
        }
      } else { pendingWsRef.current=null; }
    }else if(d.type==='chat'){
      setChatMsgs(prev=>[...prev,{u:(d.from===0?'A':'B'),m:d.text,ts:d.ts}].slice(-30));
      setTimeout(()=>{if(chatScrollRef.current){chatScrollRef.current.scrollTop=chatScrollRef.current.scrollHeight;}},50);
    }else if(d.type==='emote'){
      var myNrEmo=onlineRole==='A'?0:1;
      if(d.from!==myNrEmo)showEmote(d.from===0?'A':'B',d.emote);
    }else if(d.type==='opponent_disconnected'){
      if(d.countdown)setFlash(t('oppDisconnectedWinsIn')+' '+d.countdown+t('secLabel'));
      if(clkAnchorRef.current)clkAnchorRef.current.active=null; // Uhr einfrieren solange Gegner weg (Server pausiert sie)
    }else if(d.type==='opponent_back'){
      setFlash('');
      try{WSNET.requestSync();}catch(e){} // frische Uhr holen -> Anzeige laeuft korrekt weiter
    }else if(d.type==='opponent_left'){
      setOppLeft(true);
    }else if(d.type==='rematch_state'){
      setRematchA(!!(d.req&&d.req[0]));
      setRematchB(!!(d.req&&d.req[1]));
    }else if(d.type==='rematch_start'){
      // Vollreset wie neue Runde
      if(d.skins!==undefined)setMatchSkins(d.skins||null);
      if(d.pos){ setPA({...d.pos[0]}); setPB({...d.pos[1]}); }
      setWalls(new Set(d.walls||[]));
      if(d.barr)setBarrLeft({A:d.barr[0],B:d.barr[1]});
      var csRtm=S.current.gameTimeMode||''; var csR=(csRtm==='classic-3')?180:(csRtm==='classic-5')?300:(csRtm==='classic-8')?480:0; setTimeLeft({A:csR,B:csR}); // Classic-Uhr bei Revanche wieder auf voll
      // Server-Uhr-Anker fuer die Revanche neu setzen (sonst leitet die Anzeige aus dem alten Anker von Spiel-1-Ende = falsche/0-Uhr)
      if(d.clk&&d.clk.length===2){ clkAnchorRef.current={at:Date.now(),rem:[d.clk[0],d.clk[1]],active:(typeof d.amZug==='number'?d.amZug:null)}; } else { clkAnchorRef.current=null; }
      if(typeof d.amZug==='number')setTurn(d.amZug===0?'A':'B');
      if(typeof d.turnMs==='number'){ wsTurnEndsRef.current=d.turnMs>0?(Date.now()+d.turnMs):0; }
      setWinner(null);setCelebrating(false);setGaveUp(null);
      setRematchA(false);setRematchB(false);setRematchDeclined(null);setOppLeft(false);
      setMoveHist([]);
      setGameNum((S.current.gameNum||1)+1);
      winnerFiredRef.current=false;
      pendingWsRef.current=null;
      setGiveUpArmed(false);setFlash('');
      setEloChange(null);
      if(d.hammers!==undefined){setHammers(d.hammers);}else{setHammers([]);}
      if(d.held){setHammerHeld(d.held);}else{setHammerHeld({A:false,B:false});}
      if(d.used){setHammerUsed(d.used);}else{setHammerUsed(freshHammerUsed());}
      if(d.golden!==undefined){setGoldenWalls(new Set(d.golden||[]));}else{setGoldenWalls(new Set());}
      if(d.chaosItem!==undefined){setChaosItem(d.chaosItem);}else{setChaosItem(null);}
      hammerWave2Ref.current=false;hammerWave1ClearedRef.current=null;
      setScreen('game');
    }else if(d.type==='ws_open'){
      setWsConn(true);
    }else if(d.type==='ws_closed'){
      setWsConn(false);
    }else if(d.type==='error'){
      // Server hat eine Aktion abgelehnt -> optimistischen Stand SOFORT durch die Server-Wahrheit ersetzen.
      // (Vorher wurde der Fehler ignoriert: Geisterzug blieb lokal stehen, Zugwechsel nur lokal ->
      //  BEIDE Spieler sahen "Gegner ist dran" und einer konnte scheinbar doppelt ziehen.)
      if(d.grund==='nicht dein zug'||d.grund==='ungueltiger zug'||d.grund==='ungueltige wand'||d.grund==='keine waende uebrig'||d.grund==='match beendet'){
        pendingWsRef.current=null;
        try{WSNET.requestSync();}catch(e){}
      }
    }else if(d.type==='reconnect_failed'){
      // Raum existiert nicht mehr (Server-Neustart oder aufgeraeumt nach langem Doppel-Disconnect)
      const sc2=S.current;
      if(sc2.gameMode==='online'&&sc2.screen==='game'&&!sc2.winner){
        // Laufendes Match unrettbar -> ehrlich beenden statt ewig "Gegner ist dran" zu zeigen
        try{WSNET.close();}catch(e){}
        setFlash(t('wsRoomGone'));
        setScreen('menu');setGameMode(null);setLobbyId(null);
      }else if(sc2.winner){
        try{WSNET.close();}catch(e){} // Match vorbei, Raum weg -> nichts mehr zu retten
      }else if(WSNET.roomId){
        // Warteraum: Raum auf dem (neu gestarteten) Server einfach frisch anlegen/beitreten
        if(WSNET.role==='A')WSNET._send(WSNET._createMsg());
        else WSNET._send(WSNET._joinMsg());
      }
    }
  };

  const initGame=(mode,role='A',lid=null,isRematch=false,tmOverride,ranked=false,mapOverride,sizeOverride,forcedTurn,wsKeep=false)=>{
    if(WS_ENABLED)WSNET._dbg('start mode='+mode);
    setIsRanked(ranked);
    setGameMode(mode);setOnlineRole(role);setLobbyId(lid);
    // wsGo = Raum besteht bereits seit der Lobby-Phase auf dem WS-Server (match_start kam vom Server).
    // Der Server ist hier die Wahrheit: lokale Modus-Reste (Hammer/Chaos/Drop vom Gast) werden ignoriert.
    const wsGo=wsKeep&&WS_ENABLED&&mode==='online'&&WSNET.roomId&&WSNET.roomId===lid;
    // Ranked = faires Standard-Regelwerk: keine Modifikatoren (Casual-Einstellungen bleiben erhalten)
    const effHammer=(ranked||wsGo)?false:hammerMode;
    const effDrop=(ranked||wsGo)?false:dropMode;
    const tm=tmOverride!==undefined?tmOverride:gameTimeMode;
    if(tmOverride!==undefined)setGameTimeMode(tmOverride);
    // Spawn-Positionen je nach Spielfeld (Duell: A unten zentriert, B oben zentriert)
    const mapToUse=mapOverride!==undefined?mapOverride:selectedMap;
    const sizeToUse=sizeOverride!==undefined?sizeOverride:duelSize;
    CUR_MAP=mapToUse;
    applyBoardSize(mapToUse,sizeToUse); // setzt COLS/ROWS/CELL je nach Modus+Größe
    setSelectedMap(mapToUse);setDuelSize(sizeToUse); // React-State synchron halten
    const sp=startPos(mapToUse);
    setPA({...sp.A});setPB({...sp.B});setWalls(new Set());
    let starter;
    const prevMoves=S.current.moveHist;
    if(forcedTurn==='A'||forcedTurn==='B'){
      starter=forcedTurn;
    }else if(isRematch&&prevMoves&&prevMoves.length>0&&prevMoves[0].p){
      starter=prevMoves[0].p==='A'?'B':'A';
    }else{
      starter=Math.random()<0.5?'A':'B';
    }
    setBarrLeft({A:gameBarr,B:gameBarr});setTurn(starter);setWinner(null);setGaveUp(null);setMoveHist([]);
    // Server-autoritative Anbindung fuer Race UND Duell (inkl. Classic-Zeit 3/5/8 und Blitz-Zugzeit 5/8/10s).
    // Ausgeschlossen: Ranked, Hammer, Chaos, Zufalls-Waende (Drop) — laufen weiter ueber Firebase.
    if(wsGo){
      // Raum existiert schon seit der Lobby -> nur den Handler aufs laufende Spiel umhaengen.
      WSNET.onState=applyServerState;
    }else if(WS_ENABLED&&mode==='online'&&!ranked&&!S.current.hammerMode&&!S.current.chaosMode&&!S.current.dropMode){
      // Spielernamen aus dem Lobby-Spielstand holen (Sieg-Zaehler nach Namen, nicht Farbe)
      if(lid){ try{ stoGet('barricade_game_'+lid).then(function(g){ if(g&&(g.nameA||g.nameB))setPlayerNames({A:g.nameA||'',B:g.nameB||''}); }); }catch(e){} }
      WSNET.connect(lid,role,applyServerState,{map:mapToUse,size:sizeToUse,barr:gameBarr,tm:tm});
    }else if(WSNET.roomId){ WSNET.close(); }
    if(!isRematch)setSeriesScore({A:0,B:0});
    setEloChange(null);
    winnerFiredRef.current=false;
    setChaosItem(null);
    chaosSpawnRef.current=18+Math.floor(Math.random()*8); // 18–25
    setHammerHeld({A:false,B:false});
    setHammerUsed(freshHammerUsed());
    setHammers(effHammer?makeHammers():[]);
    setBreakingWall(null);setHammerDrag(false);setHammerTarget(null);setCollecting([]);
    hammerWave2Ref.current=false;
    hammerWave1ClearedRef.current=null;
    aiProgRef.current={best:Infinity,stall:0};
    dropNextRef.current=effDrop?dropInterval(effDrop):99999;
    setGoldenWalls(new Set());
    // Timer initialisieren falls Classic-Mode aktiv
    const classicSecs=tm==='classic-3'?180:tm==='classic-5'?300:tm==='classic-8'?480:0;
    setTimeLeft({A:classicSecs,B:classicSecs});
    setFlash('');setAiThinking(false);setGiveUpArmed(false);
    setAddFriendSent(false);
    setDragging(null);setPreviewKey(null);setSnapPos(null);
    setRematchA(false);setRematchB(false);setRematchDeclined(null);setOppLeft(false);
    setChatMsgs([]);setChatInput('');
    setGameNum(0);
    if(mode!=='online')setPlayerNames({A:null,B:null});
    if(mode==='online'&&lid){
      const acc=accRef.current;
      const presKey=acc?acc.key:GUEST_ID;
      setGamePresence(presKey,true,lid);
    }
    setScreen('game');
  };

  // ── WS-Lobby-Router: verarbeitet Server-Nachrichten waehrend Lobby/Warteschirm ──
  // Plain-Assignment pro Render (kein Hook, kein TDZ) — alle referenzierten Funktionen existieren hier bereits.
  wsLobbyMsgRef.current=function(d){
    if(!d||!d.type)return;
    if(d.type==='ranked_denied'){ try{WSNET.cancelRanked();}catch(e){} setNavDir('back'); setScreen('menu'); return; }
    if(d.type==='ranked_cancelled'){ try{WSNET.close();}catch(e){} setFlash(t('wsRoomGone')); setNavDir('back'); setScreen('menu'); return; }
    if(d.type==='resync'&&!d.gestartet&&WSNET.roomId&&d.settings&&d.settings.ranked){ try{WSNET._send({type:'ranked_confirm'});}catch(e){} return; }
    if(d.type==='match_start'||(d.type==='resync'&&d.gestartet)){
      var st=d.settings||{}; var role=d.deineNummer===0?'A':'B';
      setMatchSkins(d.skins||null);
      var mapS=st.map==='duel'?'duel':'classic'; var sizeS=st.size==='blitz'?'blitz':'standard';
      var tmS=(st.tm!==undefined&&st.tm!==null)?st.tm:'none';
      var brS=parseInt(st.barr,10);if(!(brS>=1&&brS<=25))brS=10; setGameBarr(brS);
      setChaosMode(!!st.ch);setHammerMode(!!st.hm);setDropMode(st.dp!==undefined?st.dp:false);
      var nm=d.namen||[];var ak=d.akeys||[];
      setPlayerNames({A:nm[0]||'',B:nm[1]||''});
      setOppAccountKey(role==='A'?(ak[1]||null):(ak[0]||null));
      setPendingInvite(null);setFriendLobbyState(null);setPrivateCode(null);setFlash('');
      setNavDir('fwd');
      if(st.ranked){
        var _rm=st.rankedMode==='duel'?'duel':'classic';
        setRankedMode(_rm);
        setRankedOppRating(WSNET._lastOppRating||1000);
        var _acc=accRef.current;
        setRankedMyRating((_acc&&_acc.stats&&_acc.stats.ranked&&_acc.stats.ranked[_rm]&&_acc.stats.ranked[_rm].rating)||1000);
      }
      initGame('online',role,WSNET.roomId,false,tmS,!!st.ranked,mapS,sizeS,d.amZug===0?'A':'B',true);
      applyServerState(d); return;
    }
    if(d.type==='lobby_ready'){
      // Firebase-Modus-Match: Server hat gepaart, Raum geloescht — Match laeuft klassisch ueber barricade_game_
      setMatchSkins(d.skins||null);
      var stF=d.settings||{};var nmF=d.namen||[];var akF=d.akeys||[];
      var codeF=d.code||WSNET.roomId; var myNr=d.deineNummer;
      try{WSNET.close();}catch(e){}
      setPendingInvite(null);setFriendLobbyState(null);setPrivateCode(null);setFlash('');
      var mapF=stF.map==='duel'?'duel':'classic'; var dsF=stF.size==='blitz'?'blitz':'standard';
      var brF=parseInt(stF.barr,10);if(!(brF>=1&&brF<=25))brF=10;
      if(myNr===0){
        // Host: Spielzustand anlegen wie frueher der Warteschirm-Poll
        CUR_MAP=mapF;applyBoardSize(mapF,dsF);
        const spF=startPos(mapF);
        const gsF={pA:{...spF.A},pB:{...spF.B},walls:[],barrLeft:{A:brF,B:brF},turn:Math.random()<0.5?'A':'B',winner:null,moves:[],rematchA:false,rematchB:false,rematchDeclined:null,gameNum:1,chaosItem:null,hammers:hammerMode?makeHammers():[],hammerHeld:{A:false,B:false},tm:gameTimeMode,map:mapF,duelSize:dsF,nameA:nmF[0]||'',nameB:nmF[1]||'',accountKeyA:akF[0]||null,accountKeyB:akF[1]||null,lastUpdated:Date.now()};
        stoSet('barricade_game_'+codeF,gsF);
        lastOnlineTs.current=gsF.lastUpdated;
        setPlayerNames({A:gsF.nameA,B:gsF.nameB}); setOppAccountKey(akF[1]||null);
        setNavDir('fwd');
        initGame('online','A',codeF,false,undefined,false,mapF,dsF,gsF.turn);
      }else{
        // Gast: Settings uebernehmen, dann auf Spielzustand des Hosts warten
        if(stF.tm!==undefined)setGameTimeMode(stF.tm);
        setChaosMode(!!stF.ch);setGameBarr(brF);
        setDropMode(stF.dp!==undefined?stF.dp:false); setHammerMode(!!stF.hm);
        if(stF.hd!==undefined)setHammerDrops(stF.hd);
        setSelectedMap(mapF);setDuelSize(dsF);
        setLobbyId(codeF);setOnlineRole('B');
        setPlayerNames({A:nmF[0]||'',B:nmF[1]||''}); setOppAccountKey(akF[0]||null);
        if(S.current.screen!=='waiting'){setNavDir('fwd');setScreen('waiting');}
        waitForGame(codeF,30000).then(function(gsW){
          if(joinCancelledRef.current)return;
          if(gsW){ lastOnlineTs.current=gsW.lastUpdated;
            if(gsW.nameA||gsW.nameB)setPlayerNames({A:gsW.nameA||'',B:gsW.nameB||''});
            setOppAccountKey(gsW.accountKeyA||null);
            initGame('online','B',codeF,false,gsW.tm,false,gsW.map||mapF,gsW.duelSize||dsF,gsW.turn);
          }else if(S.current.screen==='waiting'){ setFlash(t('hostNotResponding')); setNavDir('back');setScreen('online'); }
        });
      } return;
    }
    if(d.type==='opponent_left'&&S.current.screen==='waiting'&&S.current.onlineRole==='B'){
      // Server erkennt jetzt sofort wenn der Host die Lobby verlaesst/die Verbindung verliert
      // (Heartbeat, max ~10s) - kein Warten mehr auf den 60s-Notfall-Timer noetig.
      try{WSNET.leaveRoom();}catch(e){}
      setFlash(t('hostNotResponding'));
      setNavDir('back');setScreen('online');
      return;
    }
    if(d.type==='error'){
      if((d.grund==='raum nicht gefunden'||d.grund==='raum nicht verfuegbar'||d.grund==='raum voll')&&S.current.screen==='waiting'&&S.current.onlineRole==='B'){
        try{WSNET.leaveRoom();}catch(e){}
        setFlash(d.grund==='raum voll'?t('lobbyFull'):t('codeNotFound'));
        setNavDir('back');setScreen('online');
      } return;
    }
    if(d.type==='reconnect_failed'){
      // Server kennt Token nicht mehr (Restart) — Raum neu anlegen/beitreten
      if(WSNET.roomId){ if(WSNET.role==='A')WSNET._send(WSNET._createMsg()); else WSNET._send(WSNET._joinMsg()); }
      return;
    }
  };

  // ── Sync online ──
  const doSync=(gs)=>{
    if(WSNET.roomId)return; // WS-Modus: der Server ist die Wahrheit, kein Firebase-Schreiben
    const{gameMode:gm,lobbyId:lid,rematchA:rA,rematchB:rB,rematchDeclined:rD,gameNum:gN}=S.current;
    if(gm!=='online'||!lid)return;
    var mvs=gs.moves||[];
    var newGN=gs.gameNum===undefined?(gN||1):gs.gameNum;
    // Volle Moves-Liste nur bei Spielende oder neuer Runde senden (für Replay-Integrität).
    // Bei normalen Zügen: nur letzten Zug + Anzahl → spart wachsende Download-Last.
    var sendFull=gs.winner||newGN!==(gN||1)||mvs.length===0;
    var payload={
      ...gs,
      walls:[...gs.walls],
      map:gs.map===undefined?(S.current.selectedMap||'classic'):gs.map,
      duelSize:gs.duelSize===undefined?(S.current.duelSize||'standard'):gs.duelSize,
      rematchA:gs.rematchA===undefined?rA:gs.rematchA,
      rematchB:gs.rematchB===undefined?rB:gs.rematchB,
      rematchDeclined:gs.rematchDeclined===undefined?rD:gs.rematchDeclined,
      gameNum:newGN,
      chaosItem:gs.chaosItem===undefined?chaosItem:gs.chaosItem,
      goldenWalls:gs.goldenWalls!==undefined?gs.goldenWalls:[...goldenWalls],
      hammers:gs.hammers===undefined?hammers:gs.hammers,
      hammerHeld:gs.hammerHeld===undefined?hammerHeld:gs.hammerHeld,
      hammerUsed:gs.hammerUsed===undefined?hammerUsed:gs.hammerUsed,
      mc:mvs.length,
      lastUpdated:Date.now()
    };
    if(sendFull){
      payload.moves=mvs;
    }else{
      payload.lm=mvs[mvs.length-1];
      delete payload.moves;
    }
    stoSet(`barricade_game_${lid}`,payload);
  };

  // ── Classic-Timer-Tick ──
  // Helpers
  const getTurnTime=mode=>{
    if(!mode)return 0;
    if(mode.indexOf('classic-')===0)return 60;
    if(mode==='blitz-5')return 5;
    if(mode==='blitz-8')return 8;
    if(mode==='blitz-10')return 10;
    return 0;
  };
  const isTimerMode=mode=>mode&&(mode.indexOf('classic-')===0||mode.indexOf('blitz-')===0);

  // Reset Zug-Zeit bei jedem Turn-Wechsel (oder Spielstart)
  useEffect(()=>{
    if(!isTimerMode(gameTimeMode))return;
    setTurnTimeLeft(getTurnTime(gameTimeMode));
  },[turn,gameNum,gameTimeMode]);

  // ── Chaos-Item Spawn ──
  useEffect(()=>{
    if(!chaosMode||isRanked||winner||screen!=='game'||chaosItem)return;
    if(moveHist.length<chaosSpawnRef.current)return;
    if(gameMode==='online'&&WSNET.roomId)return;
    if(gameMode==='online'&&onlineRole!=='A')return;
    const pos=pickChaosPos(pA,pB,walls,goalRowOf('A',selectedMap),goalRowOf('B',selectedMap));
    if(pos){
      setChaosItem(pos);
      playSound('wall');
      if(gameMode==='online'){
        doSync({pA:S.current.pA,pB:S.current.pB,walls:S.current.walls,barrLeft:S.current.barrLeft,turn:S.current.turn,winner:null,moves:S.current.moveHist,chaosItem:pos});
      }
    }
  },[moveHist.length,chaosMode,winner,screen,chaosItem,pA,pB,walls,gameMode,onlineRole,isRanked]);

  // ── Hammer 2. Welle: Countdown startet wenn alle Wave-1 weg, spawnt nach 50 Zügen ──
  const hammerWave1ClearedRef=useRef(null); // moveHist.length zu dem Zeitpunkt
  const turnTimerRef=useRef(null);
  const inactivityTimerRef=useRef(null);
  const inactivityWarnRef=useRef(null);
  const inactiveCountRef=useRef(null);
  const inactiveKickedRef=useRef(false);

  // AFK-Zug-Timer: 60s pro Zug. WS-Modus: Countdown fuer beide vom Server, Timeout handhabt der Server.
  useEffect(function(){
    if(turnTimerRef.current){clearInterval(turnTimerRef.current);turnTimerRef.current=null;}
    setAfkTimeLeft(0);
    if(screen!=='game'||gameMode!=='online'||winner)return;
    if(WSNET.roomId&&gameTimeMode&&gameTimeMode.indexOf('blitz-')===0)return; // WS-Blitz: eigener Zug-Timer-Badge, kein AFK-Countdown daneben
    if(WSNET.roomId){
      // Server beendet den Zug bei Ablauf. Hier nur Countdown anzeigen (fuer beide Spieler).
      turnTimerRef.current=setInterval(function(){
        var ends=wsTurnEndsRef.current;
        if(!ends||S.current.winner){ setAfkTimeLeft(0); return; }
        setAfkTimeLeft(Math.max(0,Math.ceil((ends-Date.now())/1000)));
      },500);
      return function(){
        if(turnTimerRef.current){clearInterval(turnTimerRef.current);turnTimerRef.current=null;}
        setAfkTimeLeft(0);
      };
    }
    if(turn!==onlineRole||isRanked)return;
    if(gameTimeMode&&gameTimeMode!=='none')return;
    var secs=60;
    setAfkTimeLeft(secs);
    turnTimerRef.current=setInterval(function(){
      secs--;
      setAfkTimeLeft(secs);
      if(secs<=0){
        clearInterval(turnTimerRef.current);
        turnTimerRef.current=null;
        if(S.current&&S.current.turn===onlineRole&&!S.current.winner){
          var opp=onlineRole==='A'?'B':'A';
          if(afkTriggerRef.current) afkTriggerRef.current(opp);
        }
      }
    },1000);
    return function(){
      if(turnTimerRef.current){clearInterval(turnTimerRef.current);turnTimerRef.current=null;}
      setAfkTimeLeft(0);
    };
  },[turn,winner,screen,onlineRole,gameMode,gameTimeMode,isRanked]);

  // Inaktivitäts-Kick: 2min kein Touch → Warnung → Firebase trennen
  useEffect(function(){
    function resetInactivity(){
      if(inactiveKickedRef.current)return; // Nach Kick nicht mehr zurücksetzen
      clearTimeout(inactivityTimerRef.current);
      clearTimeout(inactivityWarnRef.current);
      clearInterval(inactiveCountRef.current);
      setInactiveWarning(false);
      setInactiveSecs(15);
      inactivityWarnRef.current=setTimeout(function(){
        setInactiveWarning(true);
        var s=15;
        setInactiveSecs(s);
        inactiveCountRef.current=setInterval(function(){
          s--;
          setInactiveSecs(s);
          if(s<=0)clearInterval(inactiveCountRef.current);
        },1000);
      },105000);
      inactivityTimerRef.current=setTimeout(function(){
        inactiveKickedRef.current=true;
        setInactiveWarning(false);
        setInactiveKicked(true);
        // Firebase trennen → stoppt Datentransfer, spart Kosten
        try{if(window.firebase&&window.firebase.database)window.firebase.database().goOffline();}catch(e){}
      },120000);
    }
    var evts=['touchstart','mousedown','click','keydown'];
    evts.forEach(function(e){document.addEventListener(e,resetInactivity,{passive:true,capture:true});});
    resetInactivity();
    return function(){
      evts.forEach(function(e){document.removeEventListener(e,resetInactivity,{capture:true});});
      clearTimeout(inactivityTimerRef.current);
      clearTimeout(inactivityWarnRef.current);
      clearInterval(inactiveCountRef.current);
    };
  },[]);

  useEffect(()=>{
    if(!hammerMode||isRanked||hammerDrops!==2||winner||screen!=='game')return;
    if(hammerWave2Ref.current)return;
    const wave1Remaining=hammers.some(h=>h.id.indexOf('hw2-')===-1);
    const anyUsed=hammerUsed.A.w1||hammerUsed.B.w1;
    if(wave1Remaining||!anyUsed){hammerWave1ClearedRef.current=null;return;}
    // Wave 1 komplett eingesammelt → Countdown-Startpunkt merken
    if(hammerWave1ClearedRef.current===null){
      hammerWave1ClearedRef.current=moveHist.length;
      return;
    }
    // Warte 50 Züge seit Wave-1-Abschluss
    if(moveHist.length-hammerWave1ClearedRef.current<50)return;
    if(gameMode==='online'&&WSNET.roomId)return;
    if(gameMode==='online'&&onlineRole!=='A')return;
    const wave=makeHammersWave2(pA,pB,walls,goalRowOf('A',selectedMap),goalRowOf('B',selectedMap));
    if(wave.length){
      hammerWave2Ref.current=true;
      const merged=[...S.current.hammers,...wave];
      setHammers(merged);
      playSound('pickup');
      if(gameMode==='online'){
        doSync({pA:S.current.pA,pB:S.current.pB,walls:S.current.walls,barrLeft:S.current.barrLeft,turn:S.current.turn,winner:null,moves:S.current.moveHist,chaosItem:S.current.chaosItem,hammers:merged,hammerHeld:S.current.hammerHeld});
      }
    }
  },[hammers,hammerUsed,moveHist.length,hammerMode,hammerDrops,winner,screen,pA,pB,walls,gameMode,onlineRole,isRanked]);

  // ── Random-Wand-Drop ──
  useEffect(()=>{
    if(!dropMode||isRanked||winner||screen!=='game')return;
    if(moveHist.length<dropNextRef.current)return;
    if(gameMode==='online'&&WSNET.roomId)return;
    if(gameMode==='online'&&onlineRole!=='A')return;
    const key=pickFairDropWall(pA,pB,walls,goalRowOf('A',selectedMap),goalRowOf('B',selectedMap));
    if(key){
      const next=new Set([...walls,key]);
      setWalls(next);
      setGoldenWalls(prev=>{const g=new Set([...prev]);g.add(key);return g;});
      playSound('wall');
      dropNextRef.current=moveHist.length+dropInterval(dropMode);
      if(gameMode==='online'){
        const gw=new Set([...S.current.goldenWalls]);gw.add(key);
        doSync({pA:S.current.pA,pB:S.current.pB,walls:next,barrLeft:S.current.barrLeft,turn:S.current.turn,winner:null,moves:S.current.moveHist,chaosItem:S.current.chaosItem,goldenWalls:[...gw]});
      }
    }else{
      dropNextRef.current=moveHist.length+3; // kein fairer Drop möglich → bald erneut
    }
  },[moveHist.length,dropMode,winner,screen,pA,pB,walls,gameMode,onlineRole,isRanked]);

  // ── Match-Opening-Animation triggern (nur Online; einmal pro Lobby+Runde) ──
  // Sperrt das Brett ~2.7s → gibt dem Online-State Zeit sich zu synchronisieren,
  // bevor der Spieler ziehen kann (verhindert "Zug setzt sich zurueck" beim Start).
  useEffect(()=>{
    if(gameMode!=='online'||screen!=='game'||winner)return;
    const key=(lobbyId||'')+'#'+gameNum;
    if(introKeyRef.current===key)return;
    introKeyRef.current=key;
    setMatchIntro({ts:Date.now()});
    if(introTimerRef.current)clearTimeout(introTimerRef.current);
    introTimerRef.current=setTimeout(()=>setMatchIntro(null),2700);
  },[gameMode,screen,gameNum,lobbyId,winner]);
  // Beim Verlassen des Spiels Intro sicher zuruecksetzen
  useEffect(()=>{
    if(screen!=='game'){if(introTimerRef.current)clearTimeout(introTimerRef.current);setMatchIntro(null);introKeyRef.current='';}
  },[screen]);

  useEffect(()=>{
    if(screen!=='game')return;
    if(winner)return;
    if(!isTimerMode(gameTimeMode))return;
    const isBlitz=gameTimeMode.indexOf('blitz-')===0;
    if(isBlitz&&WSNET.roomId&&gameMode==='online'){
      // WS-Blitz: der SERVER skippt autoritativ bei Ablauf (kein Verlust, Zug wechselt).
      // Hier nur Countdown aus der Server-Deadline anzeigen + Sicherheitsnetz: bei 0
      // einmalig skip senden (falls die Server-Uhr haengt; Server validiert eh).
      const ivW=setInterval(()=>{
        if(S.current.winner||S.current.screen!=='game')return;
        var ends=wsTurnEndsRef.current;
        if(!ends){setTurnTimeLeft(getTurnTime(gameTimeMode));return;}
        var rest=Math.max(0,Math.ceil((ends-Date.now())/1000));
        setTurnTimeLeft(rest);
        // Server skippt selbst ~600ms nach Ablauf (Kulanz fuer Zuege in letzter Sekunde).
        // Erst wenn 900ms nach Deadline IMMER NOCH kein neuer State kam (Skip-Broadcast
        // verloren / Server-Uhr haengt), einmalig selbst skip schicken. Server validiert eh.
        if(S.current.turn===S.current.onlineRole&&(Date.now()-ends)>900&&wsSkipForRef.current!==ends){
          wsSkipForRef.current=ends; // pro Deadline nur ein skip
          try{WSNET.skipTurn();}catch(e){}
        }
      },300);
      return()=>clearInterval(ivW);
    }
    const iv=setInterval(()=>{
      if(S.current.winner||S.current.screen!=='game')return;
      // SCHACHUHR (Ranked ODER Casual mit Classic-Zeit): Anzeige aus dem Server-Anker ableiten.
      // Keine lokale Uhr, kein Selbst-Beenden. Wert = Server-Rest minus Wanduhrzeit seit dem Anker
      // -> driftet nie, friert auf Handy nie falsch ein. Der Server beendet das Spiel autoritativ.
      if(S.current.isRanked||(typeof S.current.gameTimeMode==='string'&&S.current.gameTimeMode.indexOf('classic-')===0)){
        const a=clkAnchorRef.current;
        if(a){
          let r0=a.rem[0],r1=a.rem[1];const el=Date.now()-a.at;
          if(a.active===0)r0=Math.max(0,r0-el);else if(a.active===1)r1=Math.max(0,r1-el);
          setTimeLeft({A:Math.ceil(r0/1000),B:Math.ceil(r1/1000)});
        }
        return;
      }
      let turnExpired=false;
      setTurnTimeLeft(tt=>{
        if(tt<=0)return 0;
        const nt=tt-1;
        if(nt<=0){
          if(isBlitz){
            // Guard: turn könnte sich seit Interval-Erstellung geändert haben
            if(S.current.turn!==turn)return getTurnTime(gameTimeMode);
            const newTurn=turn==='A'?'B':'A';
            setTurn(newTurn);
            if(gameMode==='online'){
              const s=S.current;
              // Nur das Gerät des aktuellen Spielers synct den Turn-Skip
              if(s.onlineRole===turn||s.onlineRole==='A'){
                doSync({pA:s.pA,pB:s.pB,walls:s.walls,barrLeft:s.barrLeft,turn:newTurn,winner:null,moves:s.moveHist,chaosItem:s.chaosItem});
              }
            }
            return getTurnTime(gameTimeMode);
          }
          turnExpired=true;
          return 0;
        }
        return nt;
      });
      // Classic: Zug-Zeit abgelaufen → Gegner gewinnt (außerhalb des State-Setters)
      // Ranked: KEIN 60s-pro-Zug-Limit — die Server-Schachuhr (Gesamtzeit) entscheidet allein.
      if(turnExpired&&!S.current.winner&&!S.current.isRanked){
        const other=turn==='A'?'B':'A';
        // WS: Verlierer (aktiver Spieler) meldet Zeitablauf an Server
        if(WSNET.roomId&&S.current.turn===S.current.onlineRole)WSNET.timeout();
        triggerWin(other);
      }
      // Gesamt-Zeit nur für Classic runterzählen
      if(!isBlitz){
        let totalExpired=false;
        setTimeLeft(tl=>{
          const cur=tl[turn];
          if(cur<=0)return tl;
          const next=cur-1;
          if(next<=0){
            totalExpired=true;
            return{...tl,[turn]:0};
          }
          return{...tl,[turn]:next};
        });
        // Ranked: Server-Schachuhr beendet das Spiel autoritativ — Client meldet/beendet nichts.
        if(totalExpired&&!S.current.winner&&!S.current.isRanked){
          const other=turn==='A'?'B':'A';
          // WS: Verlierer (aktiver Spieler) meldet Zeitablauf an Server
          if(WSNET.roomId&&S.current.turn===S.current.onlineRole)WSNET.timeout();
          triggerWin(other);
        }
      }
    },1000);
    return()=>clearInterval(iv);
  },[screen,winner,turn,gameTimeMode,gameMode]);

  // ── WS Anti-Deadlock ──
  // Solange wir auf den Gegner warten, regelmaessig den echten Stand vom Server anfordern.
  // Faengt verlorene State-Nachrichten ab (z.B. wenn die Verbindung still abbricht ohne onclose),
  // sodass kein Spiel haengen bleibt weil beide denken der andere sei dran.
  useEffect(()=>{
    if(!WSNET.roomId||gameMode!=='online'||screen!=='game')return;
    const iv=setInterval(()=>{
      const s=S.current;
      if(!s||s.gameMode!=='online'||s.winner)return;
      if(s.turn!==s.onlineRole){ // wir warten auf den Gegner -> Stand pruefen
        try{ WSNET.requestSync(); }catch(e){}
        try{ if(!WSNET.sock||WSNET.sock.readyState!==1)WSNET._open(); }catch(e){}
      }
    },4000);
    return()=>clearInterval(iv);
  },[gameMode,screen]);

  // ── AI ──
  useEffect(()=>{
    if(gameMode!=='pvc'||turn!=='B'||winner||screen!=='game')return;
    setAiThinking(true);
    const delay=aiDifficulty==='hard'?1100:aiDifficulty==='easy'?500:700;
    const t=setTimeout(()=>{
      const st=S.current;
      let a=st.pA,b=st.pB,w=new Set(st.walls),bl=st.barrLeft,moves=[...st.moveHist];
      const hms=st.hammers,hh=st.hammerHeld||{A:false,B:false};
      // Zielreihen je nach Map: Bot=B, Mensch=A
      const mp=st.selectedMap||'classic';
      const aiGoal=goalRowOf('B',mp);   // Bot
      const humGoal=goalRowOf('A',mp);  // Mensch
      // Letzte 5 AI-Positionen (inkl. aktuelle) für Anti-Cycling
      const recentAi=[{r:b.r,c:b.c}];
      for(let i=moves.length-1;i>=0&&recentAi.length<6;i--){
        const m=moves[i];
        if(m.type==='move'&&m.p==='B')recentAi.push({r:m.r,c:m.c});
      }
      // Hammer gratis nutzen, falls die AI sich selbst befreien kann
      let heldB=!!hh.B;
      if(st.hammerMode&&heldB){
        const bk=aiHammerBreak(b,w,aiGoal);
        if(bk){
          w.delete(bk);
          moves.push({type:'break',p:'B',k:bk});
          heldB=false;
          setBreakingWall(bk);setTimeout(()=>setBreakingWall(null),450);
          playSound('break');
        }
      }
      // Zug bestimmen: smarte Hammer-Logik
      let d=null;
      if(st.hammerMode&&!heldB&&hms&&hms.length){
        const nh=nearestHammer(b,w,hms);
        const ownPath=bfsPath(b,w,aiGoal);
        const humPath=bfsPath(a,w,humGoal);
        const ownD=ownPath?ownPath.length-1:99;
        const humD=humPath?humPath.length-1:99;
        const hammerDist=nh&&nh.path?nh.path.length-1:99;
        // Hammer nur holen wenn:
        // - Gegner NICHT kurz vor dem Ziel (humD>2)
        // - Umweg ist klein (max 3 Schritte)
        // - Kein klarer Vorsprung vorhanden (sonst lieber sprinten)
        // - Kein direkter Schritt Richtung Ziel verfügbar
        const enemyDangerous=humD<=3;
        const detourOk=hammerDist<=4;
        const aiClearlyAhead=ownD<=humD-3;
        if(nh&&nh.path&&nh.path.length>1&&!enemyDangerous&&detourOk&&!aiClearlyAhead){
          const step=nh.path[1];
          // Nur zum Hammer wenn nächster Schritt nicht schlechter als Zielrichtung
          if(!(step.r===a.r&&step.c===a.c))d={type:'move',pos:step};
        }
      }
      if(!d){
        _hamCtx=st.hammerMode?buildHamCtx(hms,hh,a,b):null;
        // Duell-Modus: dedizierte aggressive/strategische KI (A*-Distanz, Blocken/Vordrang)
        if(mp==='duel'&&aiDifficulty==='hard'){
          d=aiDuelHard(b,a,w,bl.B,bl.A,recentAi,chaosItem,aiGoal,humGoal);
        }else if(mp==='duel'&&aiDifficulty==='normal'){
          d=aiDuelNormal(b,a,w,bl.B,bl.A,recentAi,chaosItem,aiGoal,humGoal);
        }else{
          d=aiMove(b,a,w,bl.B,bl.A,aiDifficulty,recentAi,chaosItem,aiGoal,humGoal);
        }
        _hamCtx=null;
      }
      // ── Anti-Stall-Garantie ──
      // Greift NUR wenn der Bot mehrere Züge in Folge keinen Distanz-Fortschritt macht.
      // Dann wird der deterministische BFS-Schritt erzwungen → garantiert Fortschritt, kein Kreiseln.
      // Strategische Barrikaden-Züge und Item-Pickups bleiben unangetastet.
      if(d&&d.type==='move'){
        const beforeP=bfsPath(b,w,aiGoal);
        const beforeD=beforeP?beforeP.length-1:Infinity;
        const afterP=bfsPath(d.pos,w,aiGoal);
        const afterD=afterP?afterP.length-1:Infinity;
        const isItem=!!(chaosItem&&d.pos.r===chaosItem.r&&d.pos.c===chaosItem.c);
        if(afterD<beforeD||isItem)aiProgRef.current.stall=0;
        else aiProgRef.current.stall++;
        if(aiProgRef.current.stall>=3&&afterD>=beforeD&&!isItem&&beforeP){
          const forced=moveTowardGoal(b,a,w,beforeP);
          if(forced){d={type:'move',pos:forced};aiProgRef.current.stall=0;}
        }
      }
      let nextHammers=hms,nextHeld={A:hh.A,B:heldB};
      if(d){
        if(d.type==='move'){
          playSound('move');setPB(d.pos);
          // Chaos-Item einsammeln (AI/B)
          if(chaosItem&&chaosItem.r===d.pos.r&&chaosItem.c===d.pos.c){
            setBarrLeft(p=>({...p,B:p.B+2}));
            setChaosItem(null);
            chaosSpawnRef.current=moves.length+1+18+Math.floor(Math.random()*8);
            playSound('wall');
          }
          // Hammer aufsammeln (AI/B)
          if(st.hammerMode&&!nextHeld.B&&hms&&hms.length){
            const hit=hms.find(h=>h.r===d.pos.r&&h.c===d.pos.c);
            if(hit){
              const wv=waveOf(hit.id);
              const hu=st.hammerUsed||freshHammerUsed();
              if(!hu.B[wv]){
                playSound('pickup');
                nextHeld={...nextHeld,B:true};
                const nextUsedAI={...hu,B:{...hu.B,[wv]:true}};
                setHammerUsed(nextUsedAI);
                collectItem(hit);
                let rem=hms.filter(h=>h.id!==hit.id);
                if(nextHeld.A&&nextHeld.B){rem.forEach(collectItem);rem=[];}
                // Wenn beide je einen Wave-1-Hammer haben → restliche Wave-1 entfernen
                const bothUsedW1AI=nextUsedAI.A.w1&&nextUsedAI.B.w1;
                if(bothUsedW1AI){
                  const leftover=rem.filter(h=>h.id.indexOf('hw2-')===-1);
                  leftover.forEach(collectItem);
                  rem=rem.filter(h=>h.id.indexOf('hw2-')===0);
                }
                nextHammers=rem;setHammers(rem);
              }
            }
          }
          moves.push({type:'move',p:'B',r:d.pos.r,c:d.pos.c});
          setWalls(w);setMoveHist(moves);setHammerHeld(nextHeld);
          if(d.pos.r===aiGoal){setAiThinking(false);triggerWin('B',false,moves);return;}
        }else{
          playSound('wall');setWalls(d.walls);setBarrLeft(p=>({...p,B:p.B-1}));
          const nk=[...d.walls].find(k=>!w.has(k));
          if(nk)moves.push({type:'wall',p:'B',k:nk});
          setMoveHist(moves);setHammerHeld(nextHeld);
        }
      }else{setWalls(w);setMoveHist(moves);setHammerHeld(nextHeld);}
      setTurn('A');setAiThinking(false);
    },delay);
    return()=>clearTimeout(t);
  },[turn,gameMode,winner,screen,aiDifficulty]);

  // ── Online realtime listener ──
  useEffect(()=>{
    if(gameMode!=='online'||!lobbyId||(screen!=='game'&&screen!=='end'))return;
    if(WSNET.roomId)return; // WS-Modus: kein Firebase-Listener
    const ref=window.db.ref(`barricade_game_${lobbyId}`);
    const cb=ref.on('value',snap=>{
      const v=snap.val();if(!v)return;
      dlTrack('barricade_game_'+lobbyId,v);
      let gs;try{gs=JSON.parse(v);}catch{return;}
      // Robuste Filterung: Updates aus alter Runde oder mit weniger moves ignorieren.
      // Clock-Skew-sicher (kein Date.now()-Vergleich mehr).
      const newGN=gs.gameNum||1;
      const oldGN=S.current.gameNum||0;
      const newMoveCount=gs.mc!==undefined?gs.mc:(gs.moves||[]).length;
      const oldMoveCount=S.current.moveHist.length;
      if(newGN<oldGN)return;
      if(newGN===oldGN&&newMoveCount<oldMoveCount)return;
      lastOnlineTs.current=gs.lastUpdated||Date.now();
      // Ein empfangener Spielzustand vom Gegner ist ein sicheres Lebenszeichen:
      // Gegner-Timeout-Timer zurücksetzen (verhindert Fehl-Disconnect bei aktivem Spiel).
      oppLastSeenRef.current=Date.now();

      // Timer-Modus aus Spielzustand uebernehmen (beide Spieler sehen dieselbe Minutenanzahl)
      if(gs.tm!==undefined&&gs.tm!==S.current.gameTimeMode){
        setGameTimeMode(gs.tm);
        if(typeof gs.tm==='string'&&gs.tm.indexOf('classic-')===0){
          const cs=gs.tm==='classic-3'?180:gs.tm==='classic-5'?300:480;
          setTimeLeft(tl=>(tl.A>0||tl.B>0)?tl:{A:cs,B:cs});
        }
      }

      // Neue Runde erkannt → Spiel mit neuer Rolle starten
      if(newGN>oldGN&&oldGN>0){
        const myNewRole=gs.swapRoles?(S.current.onlineRole==='A'?'B':'A'):S.current.onlineRole;
        setOnlineRole(myNewRole);
        setPA(gs.pA);setPB(gs.pB);setWalls(new Set(gs.walls||[]));
        setBarrLeft(gs.barrLeft);setTurn(gs.turn);setMoveHist(gs.moves||[]);
        setChaosItem(gs.chaosItem||null);
        setGoldenWalls(new Set(gs.goldenWalls||[]));
        setHammers(gs.hammers||[]);
        setHammerHeld(gs.hammerHeld||{A:false,B:false});
        setHammerUsed(gs.hammerUsed||freshHammerUsed());
        setWinner(null);setCelebrating(false);setGaveUp(null);
        setRematchA(false);setRematchB(false);setRematchDeclined(null);
        setGameNum(newGN);setEloChange(null);
        winnerFiredRef.current=false;
        setGiveUpArmed(false);setFlash('');
        // Map aus Online-State übernehmen
        if(gs.map){setSelectedMap(gs.map);CUR_MAP=gs.map;}
        // Timer zurücksetzen
        const rtm=gs.tm||gameTimeMode;
        const classicSecs=rtm==='classic-3'?180:rtm==='classic-5'?300:rtm==='classic-8'?480:0;
        setTimeLeft({A:classicSecs,B:classicSecs});
        // Chat leeren
        setChatMsgs([]);setChatInput('');
        // Spielernamen aktualisieren
        if(gs.nameA||gs.nameB)setPlayerNames({A:gs.nameA||'',B:gs.nameB||''});
        setScreen('game');
        return;
      }
      setGameNum(newGN);

      // Spielernamen synchron halten — aktualisieren sobald sich etwas aendert
      if(gs.nameA||gs.nameB){
        const cn=S.current.playerNames||{A:null,B:null};
        const na=gs.nameA||cn.A||'';
        const nb=gs.nameB||cn.B||'';
        if(na!==cn.A||nb!==cn.B)setPlayerNames({A:na,B:nb});
      }
      const rA=gs.rematchA||false,rB=gs.rematchB||false,rD=gs.rematchDeclined||null;
      setRematchA(rA);setRematchB(rB);setRematchDeclined(rD);

      // Beide wollen Rematch → Spieler A (im aktuellen Spiel) erstellt neue Runde
      if(rA&&rB&&!rD&&S.current.onlineRole==='A'&&S.current.winner){
        // Rollen tauschen immer beim Rematch (vorhersehbar: Runde 1 unten = Runde 2 oben)
        const swap=true;
        const prevMoves=S.current.moveHist||[];
        const prevStarter=prevMoves.length>0&&prevMoves[0].p?prevMoves[0].p:'A';
        // Fair: derjenige der letztes Mal NICHT angefangen hat, beginnt jetzt
        // swap=false: gleiche Rollen → opposite role
        // swap=true: getauschte Rollen → gleiche role (= andere Person)
        const startTurn=swap?prevStarter:(prevStarter==='A'?'B':'A');
        // Rematch behält die aktuelle Map (Ranked-Modi sind je eigene Map: classic bzw. duel)
        const nextRound=newGN+1;
        const nextMap=S.current.selectedMap||'classic';
        const nextSize=S.current.duelSize||'standard';
        applyBoardSize(nextMap,nextSize);
        const spR=startPos(nextMap);
        const ngs={
          pA:{...spR.A},pB:{...spR.B},walls:[],
          barrLeft:{A:gameBarr,B:gameBarr},turn:startTurn,winner:null,moves:[],
          rematchA:false,rematchB:false,rematchDeclined:null,
          gameNum:nextRound,swapRoles:swap,
          chaosItem:null,
          hammers:hammerMode?makeHammers():[],hammerHeld:{A:false,B:false},
          tm:S.current.gameTimeMode,
          map:nextMap,duelSize:nextSize,
          // Spielernamen aus vorheriger Runde erhalten — beim Rollentausch ebenfalls tauschen
          nameA:swap
            ?(S.current.playerNames&&S.current.playerNames.B?S.current.playerNames.B:'')
            :(S.current.playerNames&&S.current.playerNames.A?S.current.playerNames.A:''),
          nameB:swap
            ?(S.current.playerNames&&S.current.playerNames.A?S.current.playerNames.A:'')
            :(S.current.playerNames&&S.current.playerNames.B?S.current.playerNames.B:''),
          accountKeyA:accRef.current?accRef.current.key:null,
          lastUpdated:Date.now()
        };
        stoSet(`barricade_game_${lobbyId}`,ngs);
        stoSet(`barricade_chat_${lobbyId}`,[]);
        lastOnlineTs.current=ngs.lastUpdated;
        return;
      }

      // Normales Game-Update
      // Moves rekonstruieren: volle Liste (gs.moves) ODER inkrementell (gs.lm anhängen)
      const oldLen=S.current.moveHist.length;
      var newMoves;
      if(gs.moves!==undefined){
        newMoves=gs.moves;
      }else if(gs.lm&&newMoveCount===oldLen+1){
        newMoves=S.current.moveHist.concat([gs.lm]);
      }else if(gs.lm&&newMoveCount>oldLen){
        // Fallback (sollte bei alternierenden Zügen nicht auftreten): letzten Zug anhängen
        newMoves=S.current.moveHist.concat([gs.lm]);
      }else{
        // Kein neuer Zug (z.B. Chaos-Item-Update) → moveHist unverändert
        newMoves=S.current.moveHist;
      }
      // Map synchron halten (wichtig für Freunde-/Online-Duell, falls Gast andere Map gewählt hatte)
      if(gs.map){CUR_MAP=gs.map;if(gs.map!==S.current.selectedMap)setSelectedMap(gs.map);
        const ds=gs.duelSize||'standard';
        applyBoardSize(gs.map,ds);
        if(ds!==S.current.duelSize)setDuelSize(ds);}
      if(newMoves.length>oldLen){
        const last=newMoves[newMoves.length-1];
        if(last&&last.p!==S.current.onlineRole){
          if(last.type==='move')playSound('move');
          else if(last.type==='wall'||last.type==='break')playSound(last.type==='break'?'break':'wall');
          // emote-Typ: kein Sound hier, wird via barricade_emote empfangen
        }
      }
      setPA(gs.pA);setPB(gs.pB);setWalls(new Set(gs.walls||[]));
      setBarrLeft(gs.barrLeft);setTurn(gs.turn);setMoveHist(newMoves);
      setGoldenWalls(new Set(gs.goldenWalls||[]));
      setHammers(gs.hammers||[]);
      setHammerHeld(gs.hammerHeld||{A:false,B:false});
      setHammerUsed(gs.hammerUsed||freshHammerUsed());
      const prevCI=S.current.chaosItem;
      const nextCI=gs.chaosItem||null;
      setChaosItem(nextCI);
      if(prevCI&&!nextCI&&S.current.onlineRole==='A'){
        // Guest hat Item eingesammelt → neuen Spawn-Timer setzen
        chaosSpawnRef.current=newMoves.length+18+Math.floor(Math.random()*8);
      }
      if(gs.gaveUp&&!S.current.gaveUp)setGaveUp(gs.gaveUp);
      if(gs.winner&&!S.current.winner){triggerWin(gs.winner);}
    });
    return()=>ref.off('value',cb);
  },[gameMode,lobbyId,screen]);

  // ── Online Emote-Listener (Gegner-Emotes empfangen) ──

  // ── Zuschauer-Anzahl (Live) ──
  useEffect(()=>{

  useEffect(()=>{
    if(gameMode!=='online'||!lobbyId||screen!=='game'||winner)return;
    if(WSNET.roomId)return; // WS-Match: Server ueberwacht Verbindungen selbst, kein Firebase-Heartbeat
    const myRef=window.db.ref(`barricade_hb_${lobbyId}/${onlineRole}`);
    const send=()=>myRef.set(Date.now());
    send();
    // OnDisconnect: setzt 0 wenn Verbindung weg → Gegner sieht sofort dass wir weg sind
    myRef.onDisconnect().set(0);
    const iv=setInterval(send,2000);
    // Beim Zurückkehren in den Tab sofort Lebenszeichen senden
    const onVis=()=>{if(document.visibilityState==='visible')send();};
    document.addEventListener('visibilitychange',onVis);
    return()=>{clearInterval(iv);myRef.onDisconnect().cancel();document.removeEventListener('visibilitychange',onVis);};
  },[gameMode,lobbyId,screen,winner,onlineRole]);

  useEffect(()=>{
    if(gameMode!=='online'||!lobbyId||screen!=='game'||winner)return;
    if(WSNET.roomId)return; // WS-Match: kein Firebase-Gegner-Heartbeat
    const oppRole=onlineRole==='A'?'B':'A';
    oppLastSeenRef.current=Date.now();
    const ref=window.db.ref(`barricade_hb_${lobbyId}/${oppRole}`);
    const cb=ref.on('value',snap=>{
      const v=snap.val();
      // WICHTIG: lokale Empfangszeit speichern, NICHT den fremden Zeitstempel.
      // Sonst verfälscht eine Uhren-Differenz zwischen den Geräten (Clock-Skew) die Berechnung
      // und ein anwesender Gegner wird fälschlich als "weg" erkannt.
      // v===0 = Gegner hat onDisconnect ausgelöst (Verbindung weg) → nicht updaten, Timer-Grace greift.
      if(v&&v>0)oppLastSeenRef.current=Date.now();
    });
    return()=>ref.off('value',cb);
  },[gameMode,lobbyId,screen,winner,onlineRole]);

  useEffect(()=>{
    if(gameMode!=='online'||screen!=='game'||winner){setOppCountdown(null);return;}
    if(WSNET.roomId){setOppCountdown(null);return;} // WS-Match: NUR der Server entscheidet Disconnect-Forfeits
    let lastTick=Date.now();
    const iv=setInterval(()=>{
      const nowT=Date.now();
      const gap=nowT-lastTick;
      lastTick=nowT;
      // Eigener Tab war im Hintergrund (Timer pausiert) → Grace statt Fehlurteil
      if(gap>3000){
        oppLastSeenRef.current=nowT;
        setOppCountdown(null);
        return;
      }
      const last=oppLastSeenRef.current;
      if(!last)return;
      const elapsed=nowT-last;
      if(elapsed>20000){
        const winP=onlineRole;
        const s=S.current;
        if(s.winner)return;
        doSync({pA:s.pA,pB:s.pB,walls:s.walls,barrLeft:s.barrLeft,turn:s.turn,winner:winP,moves:s.moveHist,chaosItem:s.chaosItem});
        setOppCountdown(null);
        triggerWin(winP,true);
      }else if(elapsed>8000){
        setOppCountdown(Math.ceil((20000-elapsed)/1000));
      }else{
        setOppCountdown(null);
      }
    },500);
    // Beim Zurückkehren in den Tab: Gegner-Timer zurücksetzen (Grace)
    const onVis=()=>{
      if(document.visibilityState==='visible'){
        oppLastSeenRef.current=Date.now();
        lastTick=Date.now();
        setOppCountdown(null);
      }
    };
    document.addEventListener('visibilitychange',onVis);
    return()=>{clearInterval(iv);document.removeEventListener('visibilitychange',onVis);};
  },[gameMode,screen,winner,onlineRole]);

    });

    });

  // ── Menü: tote Lobbys einmalig bereinigen ──
  useEffect(()=>{
    if(WS_ENABLED)return; // WS-Modus: Server raeumt Raeume selbst auf
    if(screen!=='menu')return;
    if(Date.now()-LOBBY_CLEAN_TS.t<60000)return; // max. 1x/min — Menue-Rueckkehr loest sonst jedes Mal Downloads aus
    var cleanup=async function(){
      try{
        LOBBY_CLEAN_TS.t=Date.now();
        var list=await stoGet('barricade_lobby_list');
        if(!list||!list.length)return;
        var now=Date.now();
        var alive=list.filter(function(l){return (now-l.ts)<45000&&(l.ts-now)<60000;});
        if(alive.length<list.length){
          await stoSet('barricade_lobby_list',alive);
          var dead=list.filter(function(l){return (now-l.ts)>=45000||(l.ts-now)>=60000;});
          for(var i=0;i<dead.length;i++){await stoDel('barricade_lobby_'+dead[i].id);}
        }
      }catch(e){}
    };
    cleanup();
  },[screen]);

  // ── Lobby-Liste: Push-Listener statt 2s-Polling ──
  // on('value') laedt NUR bei Aenderungen — leere Liste im Leerlauf = 0 Downloads.
  // Lokaler 5s-Refilter haelt die 20s-Frische-Anzeige aktuell OHNE neue Downloads.
  const lobbyListRawRef=useRef([]);
  useEffect(()=>{
    if(WS_ENABLED)return; // WS-Modus: Browse-Effekt unten uebernimmt
    if(screen!=='online')return;
    const ref=window.db.ref('barricade_lobby_list');
    const apply=()=>{
      const now=Date.now();
      const all=lobbyListRawRef.current||[];
      setLobbyList(all.filter(l=>(l.ts-now)<30000&&(now-l.ts)<20000));
    };
    const handler=snap=>{
      const v=snap.val();
      dlTrack('barricade_lobby_list',v);
      let list=[];
      if(v){try{list=JSON.parse(v)||[];}catch(e){list=[];}}
      lobbyListRawRef.current=list;
      apply();
      // Tote Eintraege bereinigen: max. 1x pro 30s pro Client (sonst Schreib-Sturm bei vielen Zuschauern)
      const now=Date.now();
      const dead=list.filter(l=>(l.ts-now)>60000||(now-l.ts)>=45000);
      if(dead.length>0&&now-LOBBY_CLEAN_TS.t>30000){
        LOBBY_CLEAN_TS.t=now;
        stoSet('barricade_lobby_list',list.filter(l=>now-l.ts<45000));
        dead.forEach(l=>stoDel(`barricade_lobby_${l.id}`));
      }
    };
    // Listener nur bei SICHTBAREM Tab: Hintergrund-Tabs im Lobby-Screen laden sonst
    // jede Listen-Aenderung mit (groesster Kostenposten, skaliert quadratisch mit Spielerzahl)
    let attached=false;
    const anhaengen=()=>{if(attached)return;attached=true;ref.on('value',handler);};
    const abhaengen=()=>{if(!attached)return;attached=false;ref.off('value',handler);};
    const onVis=()=>{if(document.hidden)abhaengen();else anhaengen();};
    onVis();
    document.addEventListener('visibilitychange',onVis);
    const iv=setInterval(apply,5000);
    return()=>{abhaengen();document.removeEventListener('visibilitychange',onVis);clearInterval(iv);};
  },[screen]);

  // ── WS-Lobby-Liste: 4s-Poll ueber WebSocket (Traffic praktisch kostenlos) ──

        const lobby=await stoGet(`barricade_lobby_${lobbyId}`);

  // ── Host-Heartbeat: hält die Lobby in der Liste am Leben solange der Host wartet ──
  useEffect(()=>{
    if(WS_ENABLED)return; // WS-Modus: offener Socket = Heartbeat
    if(screen!=='waiting'||onlineRole!=='A'||!lobbyId)return;
    let hbCount=0;
    const hb=async()=>{
      // Transaction: nur ts aktualisieren — guestId NIEMALS ueberschreiben,
      // sonst geht ein gerade beigetretener Gast wieder verloren (Connection haengt).
      let lobby=null;
      try{
        const res=await window.db.ref(`barricade_lobby_${lobbyId}`).transaction(cur=>{
          if(cur===null)return cur; // Lobby weg → nicht neu anlegen
          let obj;try{obj=JSON.parse(cur);}catch(e){return cur;}
          obj.ts=Date.now();
          return JSON.stringify(obj);
        });
        if(res&&res.snapshot&&res.snapshot.val()){try{lobby=JSON.parse(res.snapshot.val());}catch(e){}}
      }catch(e){}
      if(!lobby)return;
      // Nur öffentliche Lobbys stehen in der Liste; volle Liste nur jedes 3. Mal (alle 9s)
      // lesen+schreiben statt alle 3s — Anzeigefenster ist 20s, bleibt sicher. Spart Downloads.
      hbCount++;
      if(!lobby.isPrivate&&hbCount%3===1){
        const list=await stoGet('barricade_lobby_list')||[];
        const updated=list.map(l=>l.id===lobbyId?{...l,ts:Date.now()}:l);
        await stoSet('barricade_lobby_list',updated);
      }
    };
    hb();
    const iv=setInterval(hb,3000);
    return()=>clearInterval(iv);
  },[screen,onlineRole,lobbyId]);

  useEffect(()=>{

  // Chat leeren wenn man Lobby/Game wechselt
  useEffect(()=>{

  },[gameMode,lobbyId]);

  const sendChat=async()=>{
    const msg=chatInput.trim();
    if(!msg||!lobbyId||gameMode!=='online')return;
    const text=msg.slice(0,140);
    if(WSNET.roomId){ WSNET._send({type:'chat',text:text}); setChatInput(''); return; } // WS-Spiel: Chat ueber WebSocket statt Firebase
    const now=Date.now();
    const key='barricade_chat_'+lobbyId;
    setChatInput('');
    try{
      await window.db.ref(key).transaction(val=>{
        let cur=[];
        if(val){try{cur=JSON.parse(val)||[];}catch(e){cur=[];}}
        // Spam-Schutz: max 1 Nachricht pro Sekunde
        const myLast=cur.filter(m=>m.u===onlineRole).slice(-1)[0];
        if(myLast&&now-myLast.ts<1000)return val; // Abort transaction
        return JSON.stringify([...cur,{u:onlineRole,m:text,ts:now}].slice(-30));
      });
    }catch(e){console.error('chat send fail',e);}
  };

  // ── Create lobby ──
  const createLobby=async(isPrivate)=>{
    setFlash('');
    if(WS_ENABLED){
      // WS-Modus: Raum auf dem Server, Code = Raum-ID (privat kurz, oeffentlich lang)
      const id=isPrivate?randId(4):randId(6);
      WSNET.openLobby(id,{map:selectedMap,size:duelSize,barr:gameBarr,tm:gameTimeMode,ch:chaosMode?1:0,dp:dropMode,hm:hammerMode?1:0,hd:hammerDrops,fb:0,priv:isPrivate?1:0},{name:getDisplayName(account),akey:account?account.key:null},wsLobbyTrampRef.current);
      setLobbyId(id);setOnlineRole('A');
      setPrivateCode(isPrivate?id:null);
      setScreen('waiting');
      return;
    }
    const id=randId(6);
    const code=isPrivate?randId(4):null;
    const cfg={tm:gameTimeMode,ch:chaosMode,br:gameBarr,dp:dropMode,hm:hammerMode,hd:hammerDrops,map:selectedMap,duelSize:duelSize};
    const hostName=getDisplayName(account);
    const hostAccountKey=account?account.key:null;
    const ok=await stoSet(`barricade_lobby_${id}`,{id,code,isPrivate,hostId:SESSION,hostName,hostAccountKey,guestId:null,ts:Date.now(),...cfg});
    if(!ok){setFlash(t('firebaseError')+(window.lastFbError||'?')+t('checkRules'));return;}
    // Ghost-Lobby-Schutz: verliert der Host die Verbindung (App zu / Crash / kein Netz),
    // löscht Firebase Lobby- UND Code-Node automatisch. Verhindert ewig offene Zombie-Lobbys.
    try{
      window.db.ref(`barricade_lobby_${id}`).onDisconnect().remove();
      if(isPrivate)window.db.ref(`barricade_code_${code}`).onDisconnect().remove();
    }catch(e){}
    if(isPrivate)await stoSet(`barricade_code_${code}`,{id});
    else{const list=await stoGet('barricade_lobby_list')||[];await stoSet('barricade_lobby_list',[...list.filter(l=>l.hostId!==SESSION),{id,hostId:SESSION,ts:Date.now(),...cfg}]);}
    setLobbyId(id);setOnlineRole('A');
    setPrivateCode(isPrivate?code:null);
    setScreen('waiting');
  };

  const cleanupLobby=async(id)=>{
    if(!id)return;
    const lobby=await stoGet(`barricade_lobby_${id}`);
    await stoDel(`barricade_lobby_${id}`);
    if(lobby&&lobby.code)await stoDel(`barricade_code_${lobby.code}`);
    const list=await stoGet('barricade_lobby_list')||[];
    await stoSet('barricade_lobby_list',list.filter(l=>l.id!==id));
  };

  const joinCancelledRef=useRef(false);

  const joinLobby=async(id)=>{
    joinCancelledRef.current=false;
    if(WS_ENABLED){
      setFlash('');
      setLobbyId(id);setOnlineRole('B');setPrivateCode(null);
      setNavDir('fwd');setScreen('waiting');
      WSNET.joinRoom(id,{name:getDisplayName(account),akey:account?account.key:null},wsLobbyTrampRef.current);
      return;
    }
    // Atomarer Beitritt via Transaction — verhindert dass der Host-Heartbeat
    // den gerade gesetzten guestId wieder ueberschreibt (Ursache fuer "Lobby voll").
    // Gibt {lobby} bei Erfolg, sonst {reason:'gone'|'full'} zurueck.
    const tryJoin=async()=>{
      let out={reason:'gone'};
      try{
        const res=await window.db.ref(`barricade_lobby_${id}`).transaction(cur=>{
          if(cur===null){out={reason:'gone'};return cur;} // existiert nicht
          let obj;try{obj=JSON.parse(cur);}catch(e){out={reason:'gone'};return cur;}
          // Zombie-Schutz: uralte Lobby (Host lange weg) ignorieren statt beizutreten.
          if(obj.ts&&(Date.now()-obj.ts>120000)){out={reason:'gone'};return cur;}
          if(obj.guestId){out={reason:'full'};return;} // besetzt → abbrechen
          obj.guestId=SESSION;
          obj.guestName=getDisplayName(account);
          obj.guestAccountKey=account?account.key:null;
          obj.ts=Date.now();
          return JSON.stringify(obj);
        });
        if(res&&res.committed&&res.snapshot&&res.snapshot.val()){
          let lb=null;try{lb=JSON.parse(res.snapshot.val());}catch(e){lb=null;}
          if(lb&&lb.guestId===SESSION)out={lobby:lb};
        }
      }catch(e){out={reason:'gone'};}
      return out;
    };
    let r=await tryJoin();
    // "not found" ist oft nur ein kurzer Cache-Glitch → einmal kurz warten und erneut.
    if(r.reason==='gone'){
      await new Promise(res=>setTimeout(res,350));
      if(joinCancelledRef.current)return;
      r=await tryJoin();
    }
    const lobby=r.lobby||null;
    if(!lobby){setFlash(r.reason==='full'?t('lobbyFull'):(t('lobbyGone')||t('lobbyFull')));return;}
    // Host-Settings übernehmen
    if(lobby.tm!==undefined)setGameTimeMode(lobby.tm);
    if(lobby.ch!==undefined)setChaosMode(!!lobby.ch);
    if(lobby.br!==undefined)setGameBarr(lobby.br);
    if(lobby.dp!==undefined)setDropMode(lobby.dp);
    if(lobby.hm!==undefined)setHammerMode(!!lobby.hm);
    if(lobby.hd!==undefined)setHammerDrops(lobby.hd);
    if(lobby.map!==undefined)setSelectedMap(lobby.map);
    if(joinCancelledRef.current)return;
    setLobbyId(id);setOnlineRole('B');setPrivateCode(null);setScreen('waiting');
    {
      const gs=await waitForGame(id,30000);
      if(joinCancelledRef.current)return;
      if(gs){
        lastOnlineTs.current=gs.lastUpdated;
        if(gs.nameA||gs.nameB)setPlayerNames({A:gs.nameA||'',B:gs.nameB||''});
        setOppAccountKey(gs.accountKeyA||null);
        initGame('online','B',id,false,lobby.tm,false,lobby.map||selectedMap,lobby.duelSize||'standard',gs.turn);return;
      }
    }
    if(!joinCancelledRef.current){
      setFlash(t('hostNotResponding'));setScreen('online');
      // Platz wieder freigeben, sonst bleibt die Lobby fuer alle "voll".
      try{
        await window.db.ref(`barricade_lobby_${id}`).transaction(cur=>{
          if(cur===null)return cur;
          let obj;try{obj=JSON.parse(cur);}catch(e){return cur;}
          if(obj.guestId===SESSION){obj.guestId=null;obj.guestName=null;obj.guestAccountKey=null;return JSON.stringify(obj);}
          return; // anderer Gast ist drin → nichts tun
        });
      }catch(e){}
    }
  };

  const joinByCode=async()=>{

  // ── Replay sounds ──
  const lastReplayStep=useRef(0);
  useEffect(()=>{

    const rMoves=replayHistEntry?replayHistEntry.moveHist:moveHist;
    const rWinner=replayHistEntry?replayHistEntry.winner:winner;
    if(replayStep>lastReplayStep.current){
      const m=rMoves[replayStep-1];

        else if(m.type!=='emote')playSound(m.type==='move'?'move':'wall');

  // ── Valid moves ──
  const getValidMoves=(pos,opp,w)=>{
    const moves=[];
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=pos.r+dr,nc=pos.c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      if(edgeBlocked(pos.r,pos.c,nr,nc,w))continue;
      if(nr===opp.r&&nc===opp.c){
        for(const[dr2,dc2]of[[-1,0],[1,0],[0,-1],[0,1]]){
          const jr=nr+dr2,jc=nc+dc2;
          if(jr===pos.r&&jc===pos.c)continue;
          if(jr<0||jr>=ROWS||jc<0||jc>=COLS)continue;
          if(edgeBlocked(nr,nc,jr,jc,w))continue;
          moves.push({r:jr,c:jc});
        }
      }else{moves.push({r:nr,c:nc});}
    }
    return moves;
  };

      const hit=hammers.find(h=>h.r===r&&h.c===c);

          setHammerHeld(nextHeld);
          setHammerUsed(nextUsed);

          let rem=hammers.filter(h=>h.id!==hit.id);
          if(nextHeld.A&&nextHeld.B){rem.forEach(collectItem);rem=[];}
          // Wenn beide je einen Wave-1-Hammer gesammelt haben → restliche Wave-1 entfernen
          const bothUsedW1=nextUsed.A.w1&&nextUsed.B.w1;
          if(bothUsedW1){
            const leftover=rem.filter(h=>h.id.indexOf('hw2-')===-1);
            leftover.forEach(collectItem);
            rem=rem.filter(h=>h.id.indexOf('hw2-')===0);
          }
          nextHammers=rem;setHammers(rem);
        }
      }
    }
    const nm=[...S.current.moveHist,{type:'move',p:turn,r,c}];
    setMoveHist(nm);
    const newTurn=turn==='A'?'B':'A';
    if(r===goalRowOf(turn,selectedMap)){
      doSync({pA:isA?np:S.current.pA,pB:isA?S.current.pB:np,walls,barrLeft:newBl,turn:newTurn,winner:turn,moves:nm,chaosItem:nextChaos,hammers:nextHammers,hammerHeld:nextHeld,hammerUsed:nextUsed});
      triggerWin(turn,false,nm);
      return;
    }
    setTurn(newTurn);setFlash('');
    doSync({pA:isA?np:S.current.pA,pB:isA?S.current.pB:np,walls,barrLeft:newBl,turn:newTurn,winner:null,moves:nm,chaosItem:nextChaos,hammers:nextHammers,hammerHeld:nextHeld,hammerUsed:nextUsed});
  };

  const validDot=(r,c)=>{
    if(winner||aiThinking||dragging||!myTurn||screen!=='game'||matchIntro)return false;
    return getValidMoves(cur,other,walls).some(m=>m.r===r&&m.c===c);

  // ── Give up ──

      }

  // ── Drag ──
  useEffect(()=>{
    if(!dragging)return;
    const OFFSET=90;
    const boardFlip=S.current.gameMode==='online'&&S.current.onlineRole==='B'&&S.current.selectedMap==='duel';
    const getRel=(x,y)=>{if(!gridRef.current)return null;const rect=gridRef.current.getBoundingClientRect();let rx=x-rect.left,ry=y-rect.top;if(boardFlip)ry=ROWS*CELL-ry;return{x:rx,y:ry};};
    const onMove=(x,y)=>{
      setGhostPos({x,y});
      const rect=gridRef.current?gridRef.current.getBoundingClientRect():null;
      const inZone=rect&&y<=rect.bottom+90&&y>=rect.top-20;
      const rel=getRel(x,y-OFFSET);
      if(inZone&&rel){
        const key=snapWall(rel.x,rel.y,dragging.orient);

        const wp=wallPos(key);
        const dispTop=boardFlip?(ROWS*CELL-wp.top-wp.height):wp.top;
        setSnapPos({x:rect.left+wp.left+wp.width/2,y:rect.top+dispTop+wp.height/2});
      }else{setPreviewKey(null);setSnapPos(null);}
    };
    const onEnd=(x,y)=>{
      if(snapPosRef.current){
        // Blitz-Race-Condition: Timer hat Zug gewechselt während Drag → verwerfen
        if(dragging.dragPlayer&&S.current.turn!==dragging.dragPlayer){
          setDragging(null);setPreviewKey(null);setSnapPos(null);return;
        }
        const rel=getRel(x,y-OFFSET);
        if(rel){
          const key=snapWall(rel.x,rel.y,dragging.orient);
          if(WSNET.roomId){
            // Optimistisch: Wand lokal pruefen+setzen, Server bestaetigt parallel
            const sc=S.current;
            if(sc.barrLeft[sc.turn]>0){
              const next=tryWall(key,sc.walls,sc.pA,sc.pB,goalRowOf('A',sc.selectedMap),goalRowOf('B',sc.selectedMap));
              if(next){
                playSound('wall');
                setWalls(next);
                setBarrLeft({...sc.barrLeft,[sc.turn]:sc.barrLeft[sc.turn]-1});
                setTurn(sc.turn==='A'?'B':'A');
                pendingWsRef.current={kind:'wall',key:key,tries:0};
                WSNET.wall(key);
              }else setFlash(t('invalidPos'));
            }
            setDragging(null);setPreviewKey(null);setSnapPos(null);
            return;
          }
          const{walls:w,pA:a,pB:b,barrLeft:bl,turn:curT,moveHist:mh}=S.current;
          if(bl[curT]>0){
            _hamCtx=S.current.hammerMode?buildHamCtx(S.current.hammers,S.current.hammerHeld,a,b):null;
            const next=tryWall(key,w,a,b,goalRowOf('A',S.current.selectedMap),goalRowOf('B',S.current.selectedMap));
            _hamCtx=null;
            if(next){
              playSound('wall');
              setWalls(next);
              const newBl={...bl,[curT]:bl[curT]-1};setBarrLeft(newBl);
              const nm=[...mh,{type:'wall',p:curT,k:key}];setMoveHist(nm);
              const newTurn=curT==='A'?'B':'A';setTurn(newTurn);setFlash('');
              doSync({pA:a,pB:b,walls:next,barrLeft:newBl,turn:newTurn,winner:null,moves:nm,chaosItem:S.current.chaosItem});
              setTimeout(()=>{if(gameContainerRef.current)gameContainerRef.current.scrollTop=savedScroll.current;},0);
            }else setFlash(t('invalidPos'));
          }
        }
      }
      setDragging(null);setPreviewKey(null);setSnapPos(null);
    };
    const mm=e=>onMove(e.clientX,e.clientY);
    const mu=e=>onEnd(e.clientX,e.clientY);
    const tm=e=>{e.preventDefault();const t=e.touches[0];onMove(t.clientX,t.clientY);};
    const te=e=>{e.preventDefault();const t=e.changedTouches[0];onEnd(t.clientX,t.clientY);};

  // ── Hammer-Drag: Mauer zerschlagen ──
  useEffect(()=>{

      if(!gridRef.current)return null;

                {repStatus!=='ok'&&(
