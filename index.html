            borderRadius:18,padding:'16px 10px',display:'flex',flexDirection:'column',alignItems:'center',gap:7,
            boxShadow:'0 2px 12px rgba(0,0,0,0.08)'}}>
            <div style={{position:'relative',width:50,marginBottom:xpSystemOn&&xp!==null?14:0}}>
              <div style={{width:50,height:50,borderRadius:'50%',
                background:account?account.color:'#8b5cf6',
                display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:'0 4px 12px '+(account?account.color+'55':'rgba(139,92,246,0.35)')}}>
                <span style={{fontSize:20,fontWeight:900,color:'#fff'}}>
                  {account?account.name.slice(0,1).toUpperCase():'?'}
                </span>
              </div>
              {xpSystemOn&&xp!==null&&(
                <div style={{position:'absolute',bottom:-11,left:'50%',transform:'translateX(-50%)'}}>
                  <LevelBadge level={levelAusXp(xp)} size='sm'/>
                </div>
              )}
            </div>
            <div style={{fontSize:12,fontWeight:800,color:'var(--text)',textAlign:'center',
              lineHeight:1.2,maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {account?account.name:t('guest')}
            </div>
            <div style={{display:'inline-flex',alignItems:'center',gap:3,
              background:'rgba(34,197,94,0.1)',borderRadius:10,padding:'2px 7px'}}>
              <span style={{width:4,height:4,borderRadius:'50%',background:'#22c55e',
                display:'inline-block',animation:'pulse 1.5s ease-in-out infinite'}}/>
              <span style={{fontSize:9,fontWeight:800,color:'#22c55e',letterSpacing:0.5}}>{'READY'}</span>
            </div>
          </div>
          {/* VS */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',width:24,flexShrink:0}}>
            <span style={{fontSize:12,fontWeight:900,color:'var(--subtle)',letterSpacing:0.5}}>{'VS'}</span>
          </div>
          {/* Gegner-Slot */}
          <div style={{flex:1,background:'var(--card)',border:'1.5px dashed var(--border)',
            borderRadius:18,padding:'16px 10px',display:'flex',flexDirection:'column',alignItems:'center',gap:7,
            opacity:0.6}}>
            <div style={{width:50,height:50,borderRadius:'50%',
              background:'var(--bg)',border:'2px dashed var(--border)',
              display:'flex',alignItems:'center',justifyContent:'center',
              animation:'pulse 2s ease-in-out infinite'}}>
              <span style={{fontSize:22,color:'var(--subtle)',fontWeight:300,lineHeight:1}}>{'?'}</span>
            </div>
            <div style={{fontSize:12,fontWeight:700,color:'var(--subtle)',textAlign:'center'}}>
              {t('opponent')||'Opponent'}
            </div>
            <div style={{display:'flex',gap:3}}>
              {[0,1,2].map(function(i){return(
                <span key={i} style={{width:4,height:4,borderRadius:'50%',background:'var(--subtle)',
                  display:'inline-block',animation:'ms-dots 1.4s ease-in-out infinite',
                  animationDelay:(i*0.2)+'s'}}/>
              );})}
            </div>
          </div>
        </div>
        {privateCode&&(
          <>
            <div style={{fontSize:9,fontWeight:800,color:'var(--subtle)',letterSpacing:2.5,
              textTransform:'uppercase',marginBottom:8,textAlign:'center'}}>
              {'Room Code'}
            </div>
            <div style={{fontSize:32,fontWeight:900,letterSpacing:8,color:'var(--text)',
              background:'linear-gradient(135deg,var(--card),var(--bg))',
              padding:'16px 28px',borderRadius:16,marginBottom:10,
              border:'1.5px solid var(--border)',boxShadow:'var(--shadow-soft)',
              textAlign:'center',width:'100%',boxSizing:'border-box'}}>
              {privateCode}
            </div>
            <button onClick={()=>{
              try{navigator.clipboard.writeText(privateCode);setCopyFlash(true);setTimeout(()=>setCopyFlash(false),1500);}catch(e){}
            }} style={{padding:'7px 16px',background:'var(--card)',
              border:'1.5px solid var(--border)',borderRadius:20,
              fontSize:11,fontWeight:700,color:'var(--text)',cursor:'pointer',marginBottom:18,
              fontFamily:'system-ui,-apple-system,sans-serif'}}>
              {copyFlash?<span style={{display:'inline-flex',alignItems:'center',gap:5}}><CheckIcon size={13} color="currentColor"/>{t('copied')}</span>:<span style={{display:'inline-flex',alignItems:'center',gap:5}}><ClipboardIcon size={14}/>{t('copyCode')}</span>}
            </button>

            {/* QR Code */}
            <div style={{background:'white',padding:10,borderRadius:14,marginBottom:14,
              boxShadow:'var(--shadow-soft)',border:'1.5px solid var(--border)'}}>
              <img alt="QR" src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=0&data=${encodeURIComponent(shareUrl)}`}
                style={{width:160,height:160,display:'block'}}/>
            </div>
            <div style={{fontSize:10,fontWeight:700,color:'var(--subtle)',letterSpacing:1,marginBottom:18}}>
              {t('scanQR')}
            </div>

            {/* Share Buttons */}
            <div style={{display:'flex',gap:8,width:'100%',marginBottom:20}}>
              <button onClick={()=>{window.open('https://wa.me/?text='+waMsg,'_blank');}}
                style={{flex:1,padding:'12px 10px',background:'#25D366',color:'white',
                  border:'none',borderRadius:12,fontWeight:800,cursor:'pointer',fontSize:13,
                  textAlign:'center',boxShadow:'0 4px 12px rgba(37,211,102,0.32)',
                  fontFamily:'system-ui,-apple-system,sans-serif'}}>
                <span style={{display:'inline-flex',alignItems:'center',gap:6,justifyContent:'center'}}>
                  <PhoneIcon size={14} color="#fff"/>{t('shareWhatsApp')}
                </span>
              </button>
              <button onClick={()=>{
                try{navigator.clipboard.writeText(shareUrl).then(function(){
                  var b=document.getElementById('copy-link-btn');
                  if(b){b.textContent=t('copied');setTimeout(function(){b.textContent=t('copyLink');},2000);}
                });}catch(e){}
              }} id="copy-link-btn"
                style={{flex:1,padding:'12px 10px',background:'var(--card)',color:'var(--text)',
                  border:'1.5px solid var(--border)',borderRadius:12,fontWeight:800,cursor:'pointer',fontSize:13,
                  textAlign:'center',boxShadow:'var(--shadow-soft)',
                  fontFamily:'system-ui,-apple-system,sans-serif'}}>
                {t('copyLink')}
              </button>
            </div>
          </>
        )}
        <div style={{fontSize:12,color:'var(--subtle)',marginBottom:22,textAlign:'center'}}>
          {onlineRole==='A'?t('shareCode'):t('waitingStart')}
        </div>
        <button onClick={async()=>{
          joinCancelledRef.current=true;
          if(WS_ENABLED&&WSNET.roomId){
            try{WSNET.leaveRoom();}catch(e){} // Server raeumt Raum/Slot auf
          }else if(onlineRole==='A'){
            await cleanupLobby(lobbyId);
          }else{
            // Guest: nur guestId entfernen, Host-Lobby bleibt bestehen
            try{
              const lob=await stoGet(`barricade_lobby_${lobbyId}`);
              if(lob&&lob.guestId===SESSION){
                await stoSet(`barricade_lobby_${lobbyId}`,{...lob,guestId:null,guestName:'',guestAccountKey:null});
              }
            }catch(e){}
          }
          setScreen('menu');setLobbyId(null);setPrivateCode(null);
        }} style={sBack}>{t('cancel')}</button>
        </>
        )}
      </div>
    </div>
    );
  }

  // ── REPLAY ──────────────────────────────────────────────
  if(screen==='replay'){
    const rEntry=replayHistEntry;
    const rMoves=rEntry?rEntry.moveHist:moveHist;
    const rMap=rEntry?rEntry.map:selectedMap;
    const rSize=rEntry?rEntry.duelSize:duelSize;
    applyBoardSize(rMap,rSize);
    const rs=applyMovesWithOwner(rMoves,replayStep,rMap);
    const curMove=rMoves[replayStep];
    const progress=rMoves.length>0?Math.round((replayStep/rMoves.length)*100):0;
    const rNameA=rEntry&&rEntry.nameA?rEntry.nameA:pname('A');
    const rNameB=rEntry&&rEntry.nameB?rEntry.nameB:pname('B');
    const rPname=p=>p==='A'?rNameA:rNameB;
    const rWinner=rEntry?rEntry.winner:winner;
    const isEnd=replayStep>=rMoves.length;
    const rBoardFlip=rEntry?(rEntry.myRole==='B'&&rEntry.map==='duel'):(gameMode==='online'&&onlineRole==='B'&&selectedMap==='duel');
    // Emote aus aktuellem Move
    const curEmote=curMove&&curMove.type==='emote'?curMove:null;
    // Emote aus vorherigem Move (bleibt kurz sichtbar)
    const prevMove=replayStep>0?rMoves[replayStep-1]:null;
    const prevEmote=prevMove&&prevMove.type==='emote'?prevMove:null;
    const activeEmote=curEmote||prevEmote||null;
    return (
      <div style={{...sCont,paddingBottom:80,paddingTop:'calc(env(safe-area-inset-top) + 16px)'}}>
        {/* Gewinner-Tanz am Ende */}
        {isEnd&&rWinner&&(
          <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
            zIndex:500,pointerEvents:'none',background:'rgba(0,0,0,0.15)'}}>
            <Confetti color={PC[rWinner]}/>
            <div style={{animation:'person-grow 0.3s ease-out both'}}>
              <WinnerPerson color={PC[rWinner]} dark={PD[rWinner]} speed={danceSpeed} dance={danceStyle}/>
            </div>
          </div>
        )}

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:COLS*CELL+26,marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:11}}>
            <div style={{width:36,height:36,borderRadius:11,
              background:'linear-gradient(145deg,#7c3aed,#6366f1 48%,#3b82f6)',
              display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:'0 5px 16px rgba(99,102,241,0.5),inset 0 1px 0 rgba(255,255,255,0.4),inset 0 -3px 6px rgba(49,46,129,0.6)'}}>
              <BrickWallIcon size={20} light/>
            </div>
            <div style={{fontSize:19,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>{t('replay')}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,
            background:'var(--card)',border:'1.5px solid var(--border)',
            borderRadius:20,padding:'4px 12px',boxShadow:'var(--shadow-soft)'}}>
            <ReplayIcon size={12}/>
            <span style={{fontSize:12,fontWeight:800,color:'var(--text)',fontVariantNumeric:'tabular-nums'}}>
              {replayStep}<span style={{color:'var(--subtle)'}}>/{rMoves.length}</span>
            </span>
          </div>
        </div>

        {/* Progress bar */}
        <div style={{width:COLS*CELL+26,height:3,background:'var(--border)',borderRadius:2,marginBottom:10,overflow:'hidden'}}>
          <div style={{height:'100%',width:progress+'%',background:'linear-gradient(90deg,#3b82f6,#8b5cf6)',borderRadius:2,transition:'width 0.15s'}}/>
        </div>

        <div className="ww-goalext t" style={{width:COLS*CELL+26,color:rMap==='duel'?PC['A']:'#16a34a'}}>
          <span className="ln"/>
          <span className="ar">{'\u25b2'}</span>
          {rMap==='duel'&&<span className="nm2">{pname('A').toUpperCase()}</span>}
          <span className="ln"/>
        </div>
        <div style={{position:'relative',width:COLS*CELL+26,margin:'0 auto',borderRadius:24,padding:13,
          background:darkMode?'linear-gradient(160deg,#5f6b7e,#2e3748 36%,#141a26)':'linear-gradient(160deg,#ffffff,#ced6e2 36%,#9aa6ba)',
          boxShadow:'0 26px 56px rgba(0,0,0,0.5),0 9px 20px rgba(0,0,0,0.38),inset 0 2px 0 rgba(255,255,255,0.28),inset 0 -3px 6px rgba(0,0,0,0.5),inset 0 0 0 1px rgba(0,0,0,0.2)'}}>
          <div className="ww-edge ww-edge-t" style={{opacity:darkMode?0.85:0.5}}/>
          <div className="ww-edge ww-edge-b" style={{opacity:darkMode?0.85:0.5}}/>
          <div className="ww-stud ww-stud-l"/>
          <div className="ww-stud ww-stud-r"/>
        <div style={{position:'relative',width:COLS*CELL,height:ROWS*CELL,...sGrid,
          background:darkMode?'linear-gradient(170deg,#1c2740,#161e33 52%,#0f1729)':'linear-gradient(170deg,#fcfcfb,#f1f3f6 52%,#e9edf2)',
          border:'none',
          boxShadow:darkMode?'inset 0 0 0 2px #05080f,inset 0 3px 9px rgba(0,0,0,0.18),inset 0 -3px 9px rgba(0,0,0,0.1)':'inset 0 0 0 2px #b6bfce,inset 0 3px 9px rgba(0,0,0,0.18),inset 0 -3px 9px rgba(0,0,0,0.1)',
          transform:rBoardFlip?'scaleY(-1)':'none'}}>
          <div className="ww-board-tex" style={{mixBlendMode:darkMode?'screen':'multiply',opacity:darkMode?0.12:0.4}}/>
          <div className="ww-board-veins" style={{opacity:darkMode?0.3:0.45}}/>
          <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,pointerEvents:'none',zIndex:0,background:darkMode?'radial-gradient(120% 65% at 50% -6%,rgba(125,160,220,0.1),transparent 48%)':'radial-gradient(120% 65% at 50% -6%,rgba(255,255,255,0.5),transparent 48%)'}}/>
          <div style={{position:'absolute',top:0,left:0,right:0,height:CELL,pointerEvents:'none',zIndex:1,
            background:`linear-gradient(180deg,${rMap==='duel'?'#ef4444':'#22c55e'}28 0%,${rMap==='duel'?'#ef4444':'#22c55e'}12 60%,transparent 100%)`,
            boxShadow:`inset 0 0 0 1.5px ${rMap==='duel'?'#ef4444':'#22c55e'}55,inset 0 2px 10px ${rMap==='duel'?'#ef4444':'#22c55e'}33`,
            animation:'ww-goalpulse 3s ease-in-out infinite'}}/>
          {rMap==='duel'&&<div style={{position:'absolute',bottom:0,left:0,right:0,height:CELL,pointerEvents:'none',zIndex:1,
            background:'linear-gradient(0deg,rgba(59,130,246,0.16) 0%,rgba(59,130,246,0.07) 60%,transparent 100%)',
            boxShadow:'inset 0 0 0 1.5px rgba(59,130,246,0.33),inset 0 -2px 10px rgba(59,130,246,0.2)',
            animation:'ww-goalpulse 3s ease-in-out infinite'}}/>}
          <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,pointerEvents:'none',zIndex:0,
            backgroundImage:`linear-gradient(${darkMode?'rgba(255,255,255,0.08)':'rgba(20,28,45,0.11)'} 1px,transparent 1px),linear-gradient(90deg,${darkMode?'rgba(255,255,255,0.08)':'rgba(20,28,45,0.11)'} 1px,transparent 1px),radial-gradient(circle at 0 0, ${darkMode?'rgba(255,255,255,0.13)':'rgba(20,28,45,0.16)'} 1.4px, transparent 2px)`,
            backgroundSize:`${CELL}px ${CELL}px,${CELL}px ${CELL}px,${CELL}px ${CELL}px`}}/>
          {Array.from({length:ROWS},function(_,r){return Array.from({length:COLS},function(_,c){return(
            <div key={r+'-'+c} style={{position:'absolute',left:c*CELL,top:r*CELL,width:CELL,height:CELL,
              background:'transparent',boxSizing:'border-box'}}>
            </div>
          );})})}
          {[...rs.walls].map(function(k){
            var owner=rs.wallOwner[k];
            var wallColor=owner?PC[owner]:(darkMode?'#e2e8f0':'#1e293b');
            return <Wall key={k} wkey={k} color={wallColor} opacity={1} steel={isSteelWall(k)} steelColor={owner?PC[owner]:null}/>;
          })}
          {['A','B'].map(function(p){var pos=p==='A'?rs.pA:rs.pB;var sz=Math.round(CELL*0.66),off=(CELL-sz)/2;return(
            <div key={p} style={{position:'absolute',left:pos.c*CELL+off,top:pos.r*CELL+off,width:sz,height:sz,
              transition:'left 0.15s ease,top 0.15s ease',zIndex:20,pointerEvents:'none'}}>
              <Piece color={PC[p]} dark={PD[p]} size={sz}/>
            </div>
          );})}
          {/* Emote-Anzeige neben Spieler */}
          {activeEmote&&(
            <div key={replayStep+'e'} style={{position:'absolute',
              left:(activeEmote.p==='A'?rs.pA.c:rs.pB.c)*CELL+CELL+4,
              top:(activeEmote.p==='A'?rs.pA.r:rs.pB.r)*CELL-18,
              zIndex:30,pointerEvents:'none',animation:'emote-pop 0.35s cubic-bezier(0.34,1.56,0.64,1) both',
              transform:rBoardFlip?'scaleY(-1)':'none'}}>
              <EmoteChar color={PC[activeEmote.p]} dark={PD[activeEmote.p]} type={activeEmote.emote}/>
            </div>
          )}
        </div>
        </div>
        <div className="ww-goalext b" style={{width:COLS*CELL+26,marginBottom:14,color:rMap==='duel'?PC['B']:'var(--subtle)',opacity:rMap==='duel'?1:0.4}}>
          <span className="ln"/>
          {rMap==='duel'&&<span className="ar">{'\u25bc'}</span>}
          {rMap==='duel'&&<span className="nm2">{pname('B').toUpperCase()}</span>}
          <span className="ln"/>
        </div>

        {/* Legende Wandfarben */}
        <div style={{display:'flex',gap:12,marginBottom:12,alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:18,height:5,borderRadius:3,background:'#ef4444'}}/>
            <span style={{fontSize:10,fontWeight:700,color:'var(--subtle)'}}>{rNameA}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:18,height:5,borderRadius:3,background:'#3b82f6'}}/>
            <span style={{fontSize:10,fontWeight:700,color:'var(--subtle)'}}>{rNameB}</span>
          </div>
        </div>

        {/* Current move info */}
        {curMove&&(
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',marginBottom:12,
            background:'var(--card)',border:'1.5px solid var(--border)',borderRadius:12,
            boxShadow:'var(--shadow-soft)'}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:PC[curMove.p],flexShrink:0}}/>
            <span style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>{rPname(curMove.p)}</span>
            <span style={{fontSize:12,color:'var(--subtle)'}}>-</span>
            <span style={{fontSize:12,fontWeight:600,color:'var(--subtle)'}}>
              {curMove.type==='move'?t('step'):curMove.type==='emote'?('Emote'):t('wallPlaced')}
            </span>
          </div>
        )}
        {isEnd&&rWinner&&(
          <div style={{padding:'8px 16px',borderRadius:12,background:PC[rWinner]+'22',
            border:'1.5px solid '+PC[rWinner]+'55',fontSize:13,fontWeight:800,
            color:PC[rWinner],textAlign:'center',marginBottom:12}}>
            {rPname(rWinner)} {t('wins')}
          </div>
        )}

        {/* Navigation */}
        <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:16}}>
          <button onClick={function(){setReplayStep(function(s){return Math.max(0,s-1);});}} disabled={replayStep===0}
            style={{flex:1,padding:'12px',borderRadius:12,border:'1.5px solid var(--border)',
              background:'var(--card)',color:replayStep===0?'var(--subtle)':'var(--text)',
              fontSize:18,cursor:replayStep===0?'not-allowed':'pointer',
              opacity:replayStep===0?0.4:1,fontFamily:'system-ui,-apple-system,sans-serif',
              boxShadow:'var(--shadow-soft)'}}>|◀</button>
          <button onClick={function(){setReplayStep(function(s){return Math.min(rMoves.length,s+1);});}} disabled={replayStep>=rMoves.length}
            style={{flex:1,padding:'12px',borderRadius:12,border:'none',
              background:replayStep>=rMoves.length?'var(--border)':'linear-gradient(135deg,#3b82f6,#8b5cf6)',
              color:'white',fontSize:18,cursor:replayStep>=rMoves.length?'not-allowed':'pointer',
              opacity:replayStep>=rMoves.length?0.4:1,fontFamily:'system-ui,-apple-system,sans-serif',
              boxShadow:replayStep>=rMoves.length?'none':'0 3px 10px rgba(59,130,246,0.3)'}}>▶|</button>
        </div>

        <button onClick={function(){
          setReplayHistEntry(null);
          setScreen(rEntry?'replayHistory':'end');
        }} style={{
          padding:'11px 28px',borderRadius:12,background:'var(--card)',
          border:'1.5px solid var(--border)',color:'var(--text)',cursor:'pointer',
          fontWeight:700,fontSize:13,fontFamily:'system-ui,-apple-system,sans-serif',
          boxShadow:'var(--shadow-soft)'}}>{t('back')}</button>
      </div>
    );
  }

  // ── END ──────────────────────────────────────────────────
  if(screen==='end'){
    const myRematch=onlineRole==='A'?rematchA:rematchB;
    const otherRematch=onlineRole==='A'?rematchB:rematchA;
    const otherDeclined=rematchDeclined&&rematchDeclined!==onlineRole;
    const isLoss=isOwnLoss(winner);
    const canAddFriend=gameMode==='online'&&account&&oppAccountKey&&oppAccountKey!==account.key&&!addFriendSent;
    var xpProg=xpSystemOn&&xp!==null?xpProgress(xp):null;
    var xpGainedEnd=xpGainAnim?xpGainAnim.gained:0;
    var didLevelUp=xpGainAnim?xpGainAnim.lvBefore<xpGainAnim.lvAfter:false;
    var xpTier=xpProg?levelTier(xpProg.level):{color:'#8b5cf6',glow:'rgba(139,92,246,0.5)'};
    var mh=moveHist||[];
    var statMovA=mh.filter(function(m){return m.type==='move'&&m.p==='A';}).length;
    var statMovB=mh.filter(function(m){return m.type==='move'&&m.p==='B';}).length;
    var statWallA=mh.filter(function(m){return m.type==='wall'&&m.p==='A';}).length;
    var statWallB=mh.filter(function(m){return m.type==='wall'&&m.p==='B';}).length;
    return (
      <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 32px)',
        background:'transparent',position:'relative',zIndex:1,animation:'fadeSlideUp 0.40s cubic-bezier(0.22,1,0.36,1) both'}}>
        <MenuBG dark={darkMode}/>
        {winner&&!isLoss&&<Confetti color={MC[winner]}/>}

        {/* Winner Card */}
        <div style={{width:'100%',maxWidth:300,position:'relative',zIndex:1}}>
          <div style={{borderRadius:22,overflow:'hidden',
            boxShadow:winner?`0 16px 48px ${MC[winner]}50,0 4px 16px rgba(0,0,0,0.15)`:'0 8px 24px rgba(0,0,0,0.12)',
            marginBottom:16,
            border:winner?`1.5px solid ${MC[winner]}30`:'1.5px solid var(--border)'}}>
            {/* Animated top stripe */}
            <div style={{height:8,background:winner?`linear-gradient(90deg,${MC[winner]},${MC[winner]}99,${MC[winner]}cc,${MC[winner]})`:'var(--border)',
              backgroundSize:'200% 100%',animation:winner?'rankGlow 2s ease infinite':'none'}}/>
            <div style={{background:isLoss?'var(--bg)':'var(--card)',padding:'24px 20px',textAlign:'center',position:'relative'}}>
              {winner&&!isLoss&&<div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 0%, '+MC[winner]+'18 0%, transparent 65%)',pointerEvents:'none'}}/>}
              {/* Icon */}
              <div style={{marginBottom:8,animation:'trophy-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both',
                position:'relative',zIndex:1,
                filter:winner&&!isLoss?'drop-shadow(0 6px 20px '+MC[winner]+'80)':'none'}}>
                {winner&&isLoss?<SadIcon size={68}/>:<TrophyIcon size={68}/>}
              </div>
              {/* Result text — BIG */}
              <div style={{fontSize:40,fontWeight:900,letterSpacing:-1.5,textTransform:'uppercase',lineHeight:1,
                color:winner?MC[winner]:'var(--subtle)',marginBottom:6,position:'relative',zIndex:1,
                textShadow:winner&&!isLoss?'0 0 40px '+MC[winner]+'50':'none',
                animation:winner&&!isLoss?'trophy-pop 0.6s 0.1s cubic-bezier(0.34,1.56,0.64,1) both':'none'}}>
                {winner?(isLoss?t('lossLabel'):t('victoryLabel')):t('giveUpLabel')}
              </div>
              <div style={{fontSize:18,fontWeight:800,letterSpacing:-0.3,lineHeight:1.2,
                color:winner?MC[winner]+'cc':'var(--subtle)',marginBottom:3,position:'relative',zIndex:1}}>
                {winner?pname(winner):t('givenUp')}
              </div>
              <div style={{fontSize:12,fontWeight:600,color:'var(--subtle)',marginBottom:gaveUp?10:0,position:'relative',zIndex:1}}>
                {winner&&!isLoss?t('wins'):''}
                {winner&&isLoss?t('lossSubtitle'):''}
              </div>
              {/* Move count */}
              {moveHist&&moveHist.length>0&&(
                <div style={{fontSize:11,fontWeight:600,color:'var(--subtle)',marginTop:6,opacity:0.6}}>
                  {moveHist.filter(m=>m.type!=='emote').length} {t('movesPlayed')}
                </div>
              )}
              {gaveUp&&(
                <div style={{fontSize:12,fontWeight:700,color:'#ef4444',
                  background:'rgba(239,68,68,0.09)',padding:'5px 12px',borderRadius:10,display:'inline-block',marginTop:6}}>
                  {pname(gaveUp)} {t('lostGiveUp')}
                </div>
              )}
              {!gaveUp&&winner&&isLoss&&lossReason==='timeout'&&(
                <div style={{fontSize:12,fontWeight:700,color:'#f59e0b',
                  background:'rgba(245,158,11,0.10)',padding:'5px 12px',borderRadius:10,display:'inline-block',marginTop:6}}>
                  {t('lostOnTime')}
                </div>
              )}
              {!gaveUp&&winner&&isLoss&&lossReason==='forfeit'&&(
                <div style={{fontSize:12,fontWeight:700,color:'#f59e0b',
                  background:'rgba(245,158,11,0.10)',padding:'5px 12px',borderRadius:10,display:'inline-block',marginTop:6}}>
                  {t('lostConnection')}
                </div>
              )}
            </div>
          </div>

          {/* Spieler-Vergleich */}
          {mh.filter(function(m){return m.type!=='emote';}).length>0&&(
            <div style={{marginBottom:12,borderRadius:16,background:'var(--card)',border:'1.5px solid var(--border)',overflow:'hidden'}}>
              <div style={{display:'flex',alignItems:'stretch'}}>
                {/* Player A */}
                <div style={{flex:1,padding:'14px 12px',textAlign:'center',borderRight:'1px solid var(--border)'}}>
                  <div style={{width:32,height:32,borderRadius:'50%',margin:'0 auto 6px',
                    background:'radial-gradient(circle at 38% 32%, '+MC.A+', '+MD.A+' 100%)',
                    boxShadow:'0 3px 8px rgba(0,0,0,0.3),inset 0 1px 2px rgba(255,255,255,0.25)'}}/>
                  <div style={{fontSize:11,fontWeight:800,color:MC.A,letterSpacing:0.3,
                    whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:80,margin:'0 auto'}}>
                    {pname('A')}
                  </div>
                  {winner==='A'&&<div style={{fontSize:8,fontWeight:900,letterSpacing:1,color:MC.A,opacity:0.7,marginTop:2}}>{'WIN'}</div>}
                  {winner==='B'&&<div style={{fontSize:8,fontWeight:900,letterSpacing:1,color:'var(--subtle)',opacity:0.5,marginTop:2}}>{'LOSS'}</div>}
                </div>
                {/* Stats middle */}
                <div style={{flex:1.4,padding:'12px 8px',display:'flex',flexDirection:'column',gap:8,justifyContent:'center'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:4}}>
                    <span style={{fontSize:14,fontWeight:900,color:statMovA>statMovB?MC.A:'var(--text)',minWidth:22,textAlign:'right'}}>{statMovA}</span>
                    <span style={{fontSize:9,fontWeight:700,color:'var(--subtle)',letterSpacing:0.5,textTransform:'uppercase',flex:1,textAlign:'center'}}>{t('movesLabel')||'Züge'}</span>
                    <span style={{fontSize:14,fontWeight:900,color:statMovB>statMovA?MC.B:'var(--text)',minWidth:22,textAlign:'left'}}>{statMovB}</span>
                  </div>
                  <div style={{height:1,background:'var(--border)',opacity:0.5}}/>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:4}}>
                    <span style={{fontSize:14,fontWeight:900,color:statWallA>statWallB?MC.A:'var(--text)',minWidth:22,textAlign:'right'}}>{statWallA}</span>
                    <span style={{fontSize:9,fontWeight:700,color:'var(--subtle)',letterSpacing:0.5,textTransform:'uppercase',flex:1,textAlign:'center'}}>{t('wallsLabel')||'Mauern'}</span>
                    <span style={{fontSize:14,fontWeight:900,color:statWallB>statWallA?MC.B:'var(--text)',minWidth:22,textAlign:'left'}}>{statWallB}</span>
                  </div>
                  {isRanked&&rankedMyRating&&rankedOppRating&&(
                    <div>
                      <div style={{height:1,background:'var(--border)',opacity:0.5,marginBottom:8}}/>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:4}}>
                        <span style={{fontSize:14,fontWeight:900,color:'var(--text)',minWidth:22,textAlign:'right'}}>
                          {onlineRole==='A'?rankedMyRating:rankedOppRating}
                        </span>
                        <span style={{fontSize:9,fontWeight:700,color:'var(--subtle)',letterSpacing:0.5,textTransform:'uppercase',flex:1,textAlign:'center'}}>{'ELO'}</span>
                        <span style={{fontSize:14,fontWeight:900,color:'var(--text)',minWidth:22,textAlign:'left'}}>
                          {onlineRole==='B'?rankedMyRating:rankedOppRating}
                        </span>
                      </div>
                    </div>
                  )}
                </div>
                {/* Player B */}
                <div style={{flex:1,padding:'14px 12px',textAlign:'center',borderLeft:'1px solid var(--border)'}}>
                  <div style={{width:32,height:32,borderRadius:'50%',margin:'0 auto 6px',
                    background:'radial-gradient(circle at 38% 32%, '+MC.B+', '+MD.B+' 100%)',
                    boxShadow:'0 3px 8px rgba(0,0,0,0.3),inset 0 1px 2px rgba(255,255,255,0.25)'}}/>
                  <div style={{fontSize:11,fontWeight:800,color:MC.B,letterSpacing:0.3,
                    whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:80,margin:'0 auto'}}>
                    {pname('B')}
                  </div>
                  {winner==='B'&&<div style={{fontSize:8,fontWeight:900,letterSpacing:1,color:MC.B,opacity:0.7,marginTop:2}}>{'WIN'}</div>}
                  {winner==='A'&&<div style={{fontSize:8,fontWeight:900,letterSpacing:1,color:'var(--subtle)',opacity:0.5,marginTop:2}}>{'LOSS'}</div>}
                </div>
              </div>
            </div>
          )}

          {/* XP-Sektion */}
          {xpProg&&(
            <div className="ww-xp-section">
              {/* Tier-Farbstreifen oben */}
              <div style={{height:5,background:'linear-gradient(90deg,'+xpTier.color+'44,'+xpTier.color+','+xpTier.color+'44)'}}/>
              <div className="ww-xp-section-body">
                {/* Level + Gewinn-Zeile */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,marginBottom:12}}>
                  <div style={{display:'flex',flexDirection:'column',gap:5}}>
                    <div style={{fontSize:10,fontWeight:800,letterSpacing:1.8,textTransform:'uppercase',color:'var(--subtle)'}}>{'Level'}</div>
                    <LevelBadge level={xpProg.level} size='lg' levelUp={didLevelUp}/>
                  </div>
                  {xpGainedEnd>0&&(
                    <div style={{textAlign:'right',display:'flex',flexDirection:'column',gap:4}}>
                      <div style={{fontSize:10,fontWeight:800,letterSpacing:1.8,textTransform:'uppercase',color:'var(--subtle)'}}>{'Verdient'}</div>
                      <div className="ww-xp-gain-txt" style={{color:xpTier.color,textShadow:'0 0 18px '+xpTier.glow}}>
                        {'+'+xpGainedEnd}
                        <span style={{fontSize:13,fontWeight:800,marginLeft:4,opacity:0.9}}>{'XP'}</span>
                      </div>
                    </div>
                  )}
                </div>
                {/* XP-Bar */}
                <div className="ww-xp-bar-outer">
                  <div className={'ww-xp-bar-fill'+(xpGainedEnd>0&&didLevelUp?' glow':'')}
                    style={{width:xpProg.pct+'%',
                      animation:xpGainedEnd>0?undefined:'none',
                      background:'linear-gradient(90deg,'+xpTier.color+'cc,'+xpTier.color+','+xpTier.color+'ee)',
                      boxShadow:'0 0 10px '+xpTier.glow}}/>
                </div>
                {/* Fortschritts-Labels */}
                <div style={{display:'flex',justifyContent:'space-between',marginTop:7,fontSize:10,fontWeight:700,color:'var(--subtle)'}}>
                  <span>{xpProg.needed===0?'MAX LEVEL':xpProg.current+' / '+xpProg.needed+' XP'}</span>
                  {xpProg.needed===0
                    ?<span style={{color:xpTier.color,fontWeight:900,fontSize:10,letterSpacing:2}}>{'LEGEND'}</span>
                    :didLevelUp
                    ?<span className="ww-xp-levelup-lbl" style={{color:xpTier.color,fontWeight:900}}>{'LEVEL UP!'}</span>
                    :<span>{'Next Level'}</span>}
                </div>
              </div>
            </div>
          )}

          {/* Serien-Punktestand (ab Runde 2) */}
          {(gameMode==='online'
            ?((seriesScore[playerNames.A]||0)+(seriesScore[playerNames.B]||0))
            :(seriesScore.A+seriesScore.B))>1&&(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,padding:'12px 16px',marginBottom:12,
              borderRadius:14,background:'var(--card)',border:'1.5px solid var(--border)'}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:10,fontWeight:700,color:'var(--subtle)',letterSpacing:0.5,marginBottom:2}}>{pname('A')}</div>
                <div style={{fontSize:24,fontWeight:900,color:PC.A}}>{gameMode==='online'?(seriesScore[playerNames.A]||0):seriesScore.A}</div>
              </div>
              <div style={{fontSize:14,fontWeight:700,color:'var(--subtle)'}}>:</div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:10,fontWeight:700,color:'var(--subtle)',letterSpacing:0.5,marginBottom:2}}>{pname('B')}</div>
                <div style={{fontSize:24,fontWeight:900,color:PC.B}}>{gameMode==='online'?(seriesScore[playerNames.B]||0):seriesScore.B}</div>
              </div>
            </div>
          )}

          {/* ELO-Änderung nach Ranked */}
          {isRanked&&eloChange&&(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:'12px 16px',marginBottom:12,
              borderRadius:14,
              background:eloChange.reason==='pair_limit'?'rgba(120,120,120,0.08)':eloChange.won?'rgba(22,163,74,0.10)':'rgba(239,68,68,0.08)',
              border:'1.5px solid '+(eloChange.reason==='pair_limit'?'rgba(120,120,120,0.2)':eloChange.won?'rgba(22,163,74,0.25)':'rgba(239,68,68,0.2)')}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--subtle)',letterSpacing:0.5,marginBottom:2}}>RANKED ELO</div>
                {eloChange.reason==='pair_limit' ? (
                  <div>
                    <div style={{fontSize:16,fontWeight:800,color:'var(--subtle)'}}>{t('noEloLimit')}</div>
                    <div style={{fontSize:11,color:'var(--subtle)',fontWeight:500,marginTop:3}}>{t('noEloLimitSub')}</div>
                  </div>
                ) : (
                  <div style={{width:'100%'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                      <span style={{fontSize:12,fontWeight:700,color:'var(--subtle)'}}>{t('you')||'Du'}</span>
                      <span style={{display:'flex',alignItems:'baseline',gap:5}}>
                        <span style={{fontSize:20,fontWeight:900,color:eloChange.won?'#16a34a':'#ef4444',letterSpacing:-0.5}}>{eloChange.change>=0?'+':''}{eloChange.change}</span>
                        <span style={{fontSize:11,color:'var(--subtle)',fontWeight:600}}>{eloChange.newRating} ELO</span>
                      </span>
                    </div>
                    {typeof eloChange.oppChange==='number'&&(
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:4,borderTop:'1px solid '+(true?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)')}}>
                        <span style={{fontSize:12,fontWeight:700,color:'var(--subtle)'}}>{t('opponent')||'Gegner'}</span>
                        <span style={{display:'flex',alignItems:'baseline',gap:5}}>
                          <span style={{fontSize:20,fontWeight:900,color:eloChange.oppChange>=0?'#16a34a':'#ef4444',letterSpacing:-0.5}}>{eloChange.oppChange>=0?'+':''}{eloChange.oppChange}</span>
                          <span style={{fontSize:11,color:'var(--subtle)',fontWeight:600}}>{eloChange.oppNewRating} ELO</span>
                        </span>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          )}
          {gameMode==='online'&&oppLeft&&(
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',marginBottom:12,
              background:'rgba(239,68,68,0.08)',border:'1.5px solid rgba(239,68,68,0.2)',borderRadius:12}}>
              <span style={{fontSize:14,color:'#ef4444'}}>✕</span>
              <span style={{fontSize:13,fontWeight:700,color:'#ef4444'}}>{t('reconnectFail')}</span>
            </div>
          )}
          {gameMode==='online'&&!oppLeft&&otherDeclined&&(
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',marginBottom:12,
              background:'rgba(239,68,68,0.08)',border:'1.5px solid rgba(239,68,68,0.2)',borderRadius:12}}>
              <span style={{fontSize:14}}>✗</span>
              <span style={{fontSize:13,fontWeight:700,color:'#ef4444'}}>{t('rematchDeclined')}</span>
            </div>
          )}
          {gameMode==='online'&&!oppLeft&&!otherDeclined&&myRematch&&!otherRematch&&(
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',marginBottom:12,
              background:'rgba(245,158,11,0.08)',border:'1.5px solid rgba(245,158,11,0.2)',borderRadius:12}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:'#f59e0b',
                animation:'piece-pulse 1.4s ease-in-out infinite',flexShrink:0}}/>
              <span style={{fontSize:13,fontWeight:700,color:'#f59e0b'}}>{t('rematchWaiting')}</span>
            </div>
          )}
          {gameMode==='online'&&!oppLeft&&!otherDeclined&&!myRematch&&otherRematch&&(
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',marginBottom:12,
              background:'rgba(22,163,74,0.08)',border:'1.5px solid rgba(22,163,74,0.2)',borderRadius:12}}>
              <span style={{fontSize:14}}>↻</span>
              <span style={{fontSize:13,fontWeight:700,color:'#16a34a'}}>{t('rematchAsked')}</span>
            </div>
          )}

          {/* Action buttons */}
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            {gameMode!=='online'&&!isRanked&&(
              <MenuItem icon={<RematchIcon size={18} color="#fff"/>}
                iconBg="linear-gradient(135deg,#16a34a,#15803d)"
                title={t('rematch')} desc={t('rematchDescLocal')||'Same mode, new round'}
                highlight highlightBg="linear-gradient(135deg,#16a34a,#15803d)"
                onClick={()=>initGame(gameMode,'A',null,true)}/>
            )}
            {gameMode==='online'&&!isRanked&&!oppLeft&&!otherDeclined&&!myRematch&&(
              <MenuItem icon={<RematchIcon size={18} color="#fff"/>}
                iconBg="linear-gradient(135deg,#16a34a,#15803d)"
                title={t('rematch')} desc={t('rematchDescOnline')||'Challenge opponent to rematch'}
                highlight highlightBg="linear-gradient(135deg,#16a34a,#15803d)"
                onClick={requestRematch}/>
            )}
            {gameMode==='online'&&oppAccountKey&&(!account||oppAccountKey!==account.key)&&(
              <MenuItem icon={<TrophySmIcon size={18} color="#fff"/>}
                iconBg="linear-gradient(135deg,#0ea5e9,#0284c7)"
                title={t('viewProfile')||'Profil ansehen'} desc={t('viewProfileDesc')||'Stats des Gegners'}
                onClick={openOppProfile}/>
            )}
            {canAddFriend&&(
              <MenuItem icon={<PeopleIcon size={18} color="#fff"/>}
                iconBg="linear-gradient(135deg,#8b5cf6,#6d28d9)"
                title={t('addFriendTitle')} desc={t('addFriendDesc')}
                onClick={async()=>{
                  await sendFriendRequestByKey(account.key,oppAccountKey);
                  setAddFriendSent(true);
                }}/>
            )}
            {addFriendSent&&(
              <div style={{padding:'10px 14px',borderRadius:12,background:'rgba(139,92,246,0.08)',
                border:'1.5px solid rgba(139,92,246,0.2)',fontSize:13,fontWeight:700,color:'#8b5cf6',textAlign:'center'}}>
                ✓ {t('friends_sent')}
              </div>
            )}
            <MenuItem icon={<ReplayIcon size={18}/>} iconBg="linear-gradient(135deg,#64748b,#475569)"
                title={t('replayBtn')} desc={t('replayDesc')||'Watch game move by move'}
                onClick={()=>{
                  if(gameMode==='online'&&myRematch)declineRematch();
                  setReplayStep(0);setScreen('replay');
                }}/>
            <MenuItem icon={<HomeIcon size={18}/>} iconBg="linear-gradient(135deg,#3b82f6,#2563eb)"
              title={t('menu')} desc="Zurück zum Hauptmenü"
              onClick={()=>{
                if(gameMode==='online'&&myRematch)declineRematch();
                try{WSNET.leaveRoom();}catch(e){}
                try{WSNET.close();}catch(e){}
                setScreen('menu');setGameMode(null);setLobbyId(null);
              }}/>
            {gameMode==='online'&&!bugOpen&&(
              <button onClick={()=>{setBugOpen(true);setBugStatus(null);}}
                style={{background:'none',border:'none',cursor:'pointer',padding:'6px 0 2px',
                  fontSize:12,fontWeight:700,color:'var(--subtle)',textDecoration:'underline',
                  fontFamily:'system-ui,-apple-system,sans-serif'}}>
                {t('reportBtn')}
              </button>
            )}
            {gameMode==='online'&&bugOpen&&(
              <div style={{padding:'12px 14px',borderRadius:14,background:'var(--card)',
                border:'1.5px solid var(--border)',textAlign:'left'}}>
                <div style={{fontSize:12,fontWeight:800,color:'var(--text)',marginBottom:8}}>{t('reportTitle')}</div>
                {bugStatus!=='ok'&&(
                  <div>
                    <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:8}}>
                      {[['connection',t('catConnection')],['unfair',t('catUnfair')],['display',t('catDisplay')],['other',t('catOther')]].map(function(o){
                        var selK=bugKat===o[0];
                        return <button key={o[0]} onClick={()=>setBugKat(o[0])}
                          style={{padding:'5px 10px',borderRadius:9,fontSize:11,fontWeight:700,cursor:'pointer',
                            border:'1.5px solid '+(selK?'#3b82f6':'var(--border)'),
                            background:selK?'rgba(59,130,246,0.12)':'var(--bg)',
                            color:selK?'#3b82f6':'var(--subtle)',fontFamily:'system-ui,-apple-system,sans-serif'}}>
                          {o[1]}
                        </button>;
                      })}
                    </div>
                    <textarea value={bugText} onChange={e=>setBugText(e.target.value.slice(0,500))}
                      placeholder={t('reportPlaceholder')} rows={3} maxLength={500}
                      style={{width:'100%',padding:'9px 11px',borderRadius:10,fontSize:13,resize:'vertical',
                        background:'var(--bg)',border:'1.5px solid var(--border)',color:'var(--text)',
                        fontFamily:'system-ui,-apple-system,sans-serif',boxSizing:'border-box',outline:'none',marginBottom:8}}/>
                  </div>
                )}
                {bugStatus==='ok'&&<div style={{fontSize:12,fontWeight:700,color:'#16a34a',marginBottom:8}}>{'✓'} {t('reportSent')}</div>}
                {bugStatus==='limit'&&<div style={{fontSize:12,fontWeight:700,color:'#f59e0b',marginBottom:8}}>{t('reportLimit')}</div>}
                {bugStatus==='login'&&<div style={{fontSize:12,fontWeight:700,color:'#f59e0b',marginBottom:8}}>{t('reportNeedLogin')}</div>}
                {bugStatus==='err'&&<div style={{fontSize:12,fontWeight:700,color:'#ef4444',marginBottom:8}}>{t('auth_network')}</div>}
                <div style={{display:'flex',gap:7}}>
                  {bugStatus!=='ok'&&(
                    <button disabled={!bugText.trim()||bugStatus==='sending'} onClick={()=>{
                      var txt=bugText.trim();
                      if(!txt||bugStatus==='sending')return;
                      setBugStatus('sending');
                      var sB=S.current;
                      var pNB=sB.playerNames||{};
                      var repB={ts:Date.now(),winner:winner,moveHist:sB.moveHist||[],map:sB.selectedMap||'classic',
                        duelSize:sB.duelSize||'standard',nameA:pNB.A||null,nameB:pNB.B||null,
                        gameMode:'online',myRole:sB.onlineRole||null};
                      var payloadB={text:txt,kat:bugKat,
                        client:{ranked:!!sB.isRanked,lossReason:lossReason,gaveUp:sB.gaveUp||null,
                          map:sB.selectedMap||'classic',duelSize:sB.duelSize||'standard'},
                        replay:repB};
                      try{
                        if(JSON.stringify(payloadB).length>14000){payloadB.replay=null;payloadB.client.replayZuGross=true;}
                      }catch(eB){payloadB.replay=null;}
                      WSNET.bugReport(payloadB);
                      setTimeout(function(){setBugStatus(function(stB){return stB==='sending'?'err':stB;});},6000);
                    }}
                      style={{flex:1,padding:'9px',borderRadius:10,border:'none',fontSize:12,fontWeight:800,
                        background:(!bugText.trim()||bugStatus==='sending')?'var(--border)':'#3b82f6',
                        color:'white',cursor:(!bugText.trim()||bugStatus==='sending')?'default':'pointer',
                        fontFamily:'system-ui,-apple-system,sans-serif'}}>
                      {bugStatus==='sending'?'...':t('reportSend')}
                    </button>
                  )}
                  <button onClick={()=>{setBugOpen(false);setBugStatus(null);setBugText('');}}
                    style={{flex:1,padding:'9px',borderRadius:10,fontSize:12,fontWeight:800,cursor:'pointer',
                      background:'var(--bg)',border:'1.5px solid var(--border)',color:'var(--text)',
                      fontFamily:'system-ui,-apple-system,sans-serif'}}>
                    {t('reportCancel')}
                  </button>
                </div>
              </div>
            )}
            {gameMode==='online'&&!repOpen&&(
              <button onClick={()=>{setRepOpen(true);setRepStatus(null);setRepSrc('end');setRepChatTs(null);setRepReason('reportCheating');setRepText('');}}
                style={{background:'none',border:'none',cursor:'pointer',padding:'2px 0 6px',
                  fontSize:12,fontWeight:700,color:'var(--subtle)',textDecoration:'underline',
                  fontFamily:'system-ui,-apple-system,sans-serif'}}>
                {t('reportPlayerBtn')}
              </button>
            )}

        const gcGoal=selectedMap==='duel'?MC.A:'#22c55e';
        return(
      <div ref={gridRef} style={{position:'relative',width:COLS*CELL,height:ROWS*CELL,touchAction:'auto',...sGrid,
        background:myBoardSkin?myBoardSkin.bg:(darkMode?'linear-gradient(170deg,#1c2740,#161e33 52%,#0f1729)':'linear-gradient(170deg,#fcfcfb,#f1f3f6 52%,#e9edf2)'),
        border:'none',
        boxShadow:darkMode?'inset 0 0 0 2px #05080f,inset 0 3px 9px rgba(0,0,0,0.18),inset 0 -3px 9px rgba(0,0,0,0.1)':'inset 0 0 0 2px #b6bfce,inset 0 3px 9px rgba(0,0,0,0.18),inset 0 -3px 9px rgba(0,0,0,0.1)',
        transform:boardFlip?'scaleY(-1)':'none'}}>
        <div className="ww-board-tex" style={{mixBlendMode:darkMode?'screen':'multiply',opacity:myBoardSkin?0:(darkMode?0.12:0.4)}}/>
        <div className="ww-board-veins" style={{opacity:myBoardSkin?0:(darkMode?0.3:0.45)}}/>
        <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,pointerEvents:'none',zIndex:0,background:darkMode?'radial-gradient(120% 65% at 50% -6%,rgba(125,160,220,0.1),transparent 48%)':'radial-gradient(120% 65% at 50% -6%,rgba(255,255,255,0.5),transparent 48%)'}}/>
        <div style={{position:'absolute',top:0,left:0,right:0,height:CELL,pointerEvents:'none',zIndex:1,
          background:`linear-gradient(180deg,${gcGoal}28 0%,${gcGoal}12 60%,transparent 100%)`,
          boxShadow:`inset 0 0 0 1.5px ${gcGoal}55,inset 0 2px 10px ${gcGoal}33`,
          animation:'ww-goalpulse 3s ease-in-out infinite'}}/>
        {selectedMap==='duel'&&<div style={{position:'absolute',bottom:0,left:0,right:0,height:CELL,pointerEvents:'none',zIndex:1,
          background:`linear-gradient(0deg,${MC.B}29 0%,${MC.B}12 60%,transparent 100%)`,
          boxShadow:`inset 0 0 0 1.5px ${MC.B}55,inset 0 -2px 10px ${MC.B}33`,
          animation:'ww-goalpulse 3s ease-in-out infinite'}}/>}
        <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,pointerEvents:'none',zIndex:0,
          backgroundImage:`linear-gradient(${myBoardSkin?myBoardSkin.line:(darkMode?'rgba(255,255,255,0.08)':'rgba(20,28,45,0.11)')} 1px,transparent 1px),linear-gradient(90deg,${myBoardSkin?myBoardSkin.line:(darkMode?'rgba(255,255,255,0.08)':'rgba(20,28,45,0.11)')} 1px,transparent 1px),radial-gradient(circle at 0 0, ${myBoardSkin?myBoardSkin.line:(darkMode?'rgba(255,255,255,0.13)':'rgba(20,28,45,0.16)')} 1.4px, transparent 2px)`,
          backgroundSize:`${CELL}px ${CELL}px,${CELL}px ${CELL}px,${CELL}px ${CELL}px`}}/>
        {Array.from({length:ROWS},function(_,r){return Array.from({length:COLS},function(_,c){
          const isA=pA.r===r&&pA.c===c,isB=pB.r===r&&pB.c===c;
          const vDot=validDot(r,c);
          const duel=selectedMap==='duel';
          const isGoal=r===0,isStart=r===ROWS-1;
          let bg='transparent';
          return(
            <div key={r+'-'+c} data-r={r} data-c={c} onClick={()=>handleCellClick(r,c)}
              style={{position:'absolute',left:c*CELL,top:r*CELL,width:CELL,height:CELL,
                background:bg,
                display:'flex',alignItems:'center',justifyContent:'center',
                cursor:vDot&&!dragging?'pointer':'default',boxSizing:'border-box'}}>
              {vDot&&!isA&&!isB&&<div style={{width:Math.round(CELL*0.26),height:Math.round(CELL*0.26),borderRadius:'50%',pointerEvents:'none',background:`radial-gradient(circle at 40% 34%,rgba(255,255,255,0.6),${color} 62%,${MD[turn]})`,boxShadow:`0 0 8px ${color}aa,0 1px 2px rgba(0,0,0,0.32),inset 0 1px 1px rgba(255,255,255,0.4)`,animation:'ww-dotb 1.7s ease-in-out infinite'}}/>}
            </div>
          );
        });})}
        {[...walls].map(k=><Wall key={k} wkey={k} color={darkMode?'#e2e8f0':'#1e293b'} opacity={1} animate golden={goldenWalls.has(k)} steel={isSteelWall(k)}/>)}
        {previewKey&&<Wall wkey={previewKey} color={previewValid?'#f59e0b':'#ef4444'} opacity={0.6}/>}
        {breakingWall&&<BreakingWall wkey={breakingWall} dark={darkMode}/>}
        {hammerDrag&&hammerTarget&&<Wall wkey={hammerTarget} color={'#f59e0b'} opacity={0.9}/>}
        {chaosItem&&(
          <div style={{position:'absolute',left:chaosItem.c*CELL,top:chaosItem.r*CELL,
            width:CELL,height:CELL,display:'flex',alignItems:'center',justifyContent:'center',
            pointerEvents:'none',zIndex:15,transform:boardFlip?'scaleY(-1)':'none'}}>
            <div style={{animation:'hammer-float 2.6s ease-in-out infinite'}}>
              <div style={{animation:'hammer-shine 2s ease-in-out infinite'}}><CrateIcon size={Math.round(CELL*0.72)}/></div>
            </div>
          </div>
        )}
        {hammers.map(h=>(
          <div key={h.id} style={{position:'absolute',left:h.c*CELL,top:h.r*CELL,width:CELL,height:CELL,
            display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none',zIndex:15,
            transform:boardFlip?'scaleY(-1)':'none'}}>
            <div style={{animation:'hammer-float 2.4s ease-in-out infinite'}}>
              <div style={{animation:'hammer-shine 2s ease-in-out infinite'}}><HammerIcon size={Math.round(CELL*0.72)}/></div>
            </div>
          </div>
        ))}
        {collecting.map(h=>(
          <div key={'col'+h.id} style={{position:'absolute',left:h.c*CELL,top:h.r*CELL,width:CELL,height:CELL,
            display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none',zIndex:18,
            transform:boardFlip?'scaleY(-1)':'none'}}>
            <div style={{animation:'item-collect 0.6s ease-out forwards'}}><HammerIcon size={Math.round(CELL*0.72)}/></div>
          </div>
        ))}
        {['A','B'].map(function(p){
          const pos=p==='A'?pA:pB;const sz=Math.round(CELL*0.66),off=(CELL-sz)/2;
          const isActive=turn===p&&!winner;
          return(
            <div key={p} style={{position:'absolute',left:pos.c*CELL+off,top:pos.r*CELL+off,
              width:sz,height:sz,
              transition:'left 0.25s cubic-bezier(0.34,1.3,0.5,1),top 0.25s cubic-bezier(0.34,1.3,0.5,1)',
              zIndex:20,pointerEvents:'none',transform:boardFlip?'scaleY(-1)':'none'}}>
              {isActive&&<div style={{position:'absolute',inset:-2,borderRadius:'50%',
                background:MC[p],animation:'piece-pulse 1.6s ease-in-out infinite'}}/>}
              <div key={'land'+pos.r+'-'+pos.c} style={{position:'absolute',inset:-3,borderRadius:'50%',
                border:'2px solid '+MC[p],animation:'ww-land 0.5s ease-out forwards',pointerEvents:'none'}}/>
              <Piece color={MC[p]} dark={MD[p]} size={sz}/>
              {gameMode==='online'&&p===onlineRole&&<div className="ww-me-orbit"/>}
            </div>
          );
        })}
      </div>
        );
      })()}
      </div>{/* /game-enter wrapper */}

      {/* Goal-Richtungsanzeige unten */}
      <div className="ww-goalext b" style={{width:COLS*CELL+26,color:selectedMap==='duel'?(gameMode==='online'&&onlineRole==='B'?PC['A']:PC['B']):'var(--subtle)',opacity:selectedMap==='duel'?1:0.4}}>
        <span className="ln"/>
        {selectedMap==='duel'&&<span className="ar">{'\u25bc'}</span>}
        {selectedMap==='duel'&&<span className="nm2">{pname(gameMode==='online'&&onlineRole==='B'?'A':'B').toUpperCase()}</span>}
        <span className="ln"/>
      </div>

      {!winner&&gameTimeMode&&((gameTimeMode.indexOf('classic-')===0&&!isRanked&&turnTimeLeft<=30)||gameTimeMode.indexOf('blitz-')===0)&&(
        <div style={{position:'fixed',top:'calc(env(safe-area-inset-top) + 14px)',right:64,zIndex:51,pointerEvents:'none'}}>
          <div style={{background:'rgba(239,68,68,0.45)',color:'white',padding:'4px 10px',borderRadius:12,fontSize:11,fontWeight:800,letterSpacing:0.5,backdropFilter:'blur(6px)',display:'flex',alignItems:'center',gap:5}}>
            <ModeGlyph kind="clock" size={11} color="#ffffff"/>
            <span style={{fontVariantNumeric:'tabular-nums'}}>{turnTimeLeft}s</span>
          </div>
        </div>
      )}

      {/* Eigener Reconnect-Overlay: wenn EIGENE Verbindung weg */}
      {(!serverOnline||(WSNET.roomId&&!wsConn))&&gameMode==='online'&&!winner&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.82)',backdropFilter:'blur(8px)',
          WebkitBackdropFilter:'blur(8px)',zIndex:600,display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',gap:16,padding:24}}>
          <div style={{width:44,height:44,borderRadius:'50%',border:'4px solid rgba(255,255,255,0.15)',
            borderTop:'4px solid #3b82f6',animation:'spin 0.9s linear infinite'}}/>
          <div style={{color:'#fff',fontSize:15,fontWeight:800,textAlign:'center',letterSpacing:0.2}}>
            {t('reconnectingOwn')||'Verbindung wird wiederhergestellt...'}
          </div>
          <div style={{color:'rgba(255,255,255,0.5)',fontSize:11,fontWeight:600,textAlign:'center'}}>
            {t('reconnectingOwnSub')||'Das Spiel laeuft weiter sobald du wieder online bist'}
          </div>
        </div>
      )}

      {(isOnlineWait||oppCountdown!==null)&&(
        <div style={{position:'fixed',bottom:80,left:0,right:0,display:'flex',justifyContent:'center',zIndex:50,pointerEvents:'none'}}>
          <div style={{background:oppCountdown!==null?'rgba(239,68,68,0.92)':'rgba(15,23,42,0.75)',color:'white',padding:'8px 20px',borderRadius:20,fontSize:12,fontWeight:600,backdropFilter:'blur(8px)',display:'flex',alignItems:'center',gap:8}}>
            {oppCountdown!==null?(<>
              <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'white',animation:'piece-pulse 1s ease-in-out infinite'}}/>
              {t('reconnecting')} · {oppCountdown}s
            </>):t('opponentTurn')}
          </div>
        </div>
      )}

      {celebrating&&winner&&(
        <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
          zIndex:500,pointerEvents:'none',background:'rgba(0,0,0,0.15)'}}>
          <div style={{animation:'person-grow 0.3s ease-out both'}}>
            <WinnerPerson color={MC[winner]} dark={MD[winner]} speed={danceSpeed} dance={danceStyle}/>
          </div>
        </div>
      )}

      {winner&&!celebrating&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,
          background:'rgba(0,0,0,0.5)',backdropFilter:'blur(4px)',
          display:'flex',alignItems:'center',justifyContent:'center',zIndex:500}}
          onClick={()=>setScreen('end')}>
          {!isOwnLoss(winner)&&<Confetti color={MC[winner]}/>}
          <div style={{background:'var(--card)',borderRadius:24,padding:'28px 32px',textAlign:'center',
            boxShadow:`0 24px 64px ${MC[winner]}40, 0 8px 24px rgba(0,0,0,0.25)`,
            zIndex:9999,position:'relative',minWidth:220,
            border:`1.5px solid ${MC[winner]}30`,
            animation:'trophy-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both'}}>
            <div style={{marginBottom:12,display:'flex',justifyContent:'center'}}>
              {isOwnLoss(winner)?<SadIcon size={52}/>:<TrophyIcon size={52}/>}
            </div>
            <div style={{fontSize:24,fontWeight:900,color:MC[winner],
              letterSpacing:-0.5,lineHeight:1.1,marginBottom:4}}>{pname(winner)}</div>
            <div style={{fontSize:15,fontWeight:700,color:'var(--text)',marginBottom:16}}>{t('wins')}</div>
            <div style={{fontSize:11,color:'var(--subtle)',fontWeight:600,
              display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:'var(--subtle)',
                animation:'piece-pulse 1.5s ease-in-out infinite'}}/>
              {t('tapContinue')}
            </div>
          </div>
        </div>
      )}

      {/* Untere Steuerleiste: Chat + Wand-Steuerung (Drag bleibt) */}
      {!winner&&screen==='game'&&(
        <div className={"ww-bottombar pos-"+wallBarPos} style={{position:'fixed',zIndex:200,
          left:'50%',transform:'translateX(-50%)',
          width:'min('+(COLS*CELL+26)+'px, calc(100vw - 20px))',
          bottom:'calc(30px + env(safe-area-inset-bottom, 0px))',pointerEvents:'none',
          opacity:dragging?0:1,transition:'opacity 0.12s ease'}}>
          <button onClick={()=>!emoteCooldown&&setEmotePicker(p=>!p)} disabled={emoteCooldown}
            className="ww-iconbtn chat"
            style={{pointerEvents:dragging?'none':'auto',opacity:emoteCooldown?0.5:1,
              animation:emotePicker?'none':'bubble-pulse 2.5s ease-in-out infinite'}}>
            <BubbleIcon size={24} color="#6366f1"/>
          </button>
          {!isOnlineWait&&<div className="ww-wallctl" style={{pointerEvents:'none'}}>
            <div className="wl">
              <svg width="12" height="12" viewBox="0 0 24 24"><g fill="currentColor"><rect x="2" y="4" width="9" height="6" rx="1"/><rect x="13" y="4" width="9" height="6" rx="1"/><rect x="7" y="12" width="10" height="6" rx="1"/></g></svg>
              <span>{barrLeft[turn]} {t('wallsLeft')}</span>
            </div>
            <div className="tools">
              {[['H'],['V']].map(([orient])=>(
                <div key={orient}
                  className={"ww-wtool"+(canDrag?" armed":"")}
                  onMouseDown={canDrag?e=>startDrag(e,orient):undefined}
                  onTouchStart={canDrag?e=>startDrag(e,orient):undefined}
                  style={{pointerEvents:dragging?'none':'auto',width:orient==='H'?54:36,height:orient==='V'?40:34,
                    cursor:canDrag?'grab':'not-allowed',opacity:canDrag?1:0.4,touchAction:canDrag?'none':'pan-y'}}>
                  <div style={{width:orient==='H'?34:WW,height:orient==='V'?22:WW,
                    background:canDrag?(darkMode?'#e2e8f0':'#1e293b'):(darkMode?'#475569':'#94a3b8'),
                    borderRadius:3,pointerEvents:'none',boxShadow:'inset 0 1px 0 rgba(255,255,255,0.4),0 2px 4px rgba(0,0,0,0.4)'}}/>
                </div>
              ))}
            </div>
          </div>}
        </div>
      )}

      {/* Hammer-Slot unten rechts (wenn man einen Hammer hält) */}
      {!winner&&!isOnlineWait&&hammerMode&&meRole===turn&&hammerHeld[meRole]&&(
        <div onMouseDown={startHammerDrag} onTouchStart={startHammerDrag}
          style={{position:'fixed',right:'calc(16px + env(safe-area-inset-right, 0px))',
            bottom:'calc(78px + env(safe-area-inset-bottom, 0px))',zIndex:210,
            width:60,height:60,borderRadius:16,touchAction:'none',cursor:'grab',
            display:'flex',alignItems:'center',justifyContent:'center',
            background:darkMode?'rgba(30,41,68,0.82)':'rgba(255,255,255,0.88)',
            backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',
            border:'1.5px solid #f59e0b',opacity:hammerDrag?0.4:1,
            boxShadow:'0 4px 16px rgba(245,158,11,0.4)',
            animation:hammerDrag?'none':'hammer-shine 1.8s ease-in-out infinite'}}>
          <HammerIcon size={34}/>
          <div style={{position:'absolute',bottom:-16,left:-10,right:-10,textAlign:'center',
            fontSize:8,fontWeight:700,color:'var(--muted)',letterSpacing:0.2,whiteSpace:'nowrap'}}>{t('hammerHint')}</div>
        </div>
      )}

      {/* Emote-Anzeigen (beide Spieler) - eigener links unten, Gegner rechts unten */}
      {['A','B'].map(p=>{
        const em=emotes[p];
        if(!em)return null;
        const myRole=gameMode==='online'?onlineRole:(gameMode==='pvc'?'A':null);
        const isMine=myRole?p===myRole:false;
        const posStyle=isMine
          ?{left:14,bottom:74}
          :myRole?{right:14,bottom:74}:{left:p==='A'?14:96,bottom:74};
        return(
          <div key={`emote-${p}-${em.id}`} style={{
            position:'fixed',...posStyle,
            zIndex:450,pointerEvents:'none',
            animation:'emote-pop 0.32s cubic-bezier(0.34,1.56,0.64,1) both'}}>
            <EmoteChar color={MC[p]} dark={MD[p]} type={em.type}/>
          </div>
        );
      })}

      {/* Emote-Picker (Clash Royale Style 2x2 mit Charakter-Köpfen) */}
      {emotePicker&&!winner&&(
        <div onClick={()=>setEmotePicker(false)} style={{
          position:'fixed',inset:0,zIndex:480}}>
          <div onClick={e=>e.stopPropagation()} style={{
            position:'fixed',bottom:74,
            left:wallBarPos==='left'?'auto':'calc(14px + env(safe-area-inset-left, 0px))',
            right:wallBarPos==='left'?'calc(14px + env(safe-area-inset-right, 0px))':'auto',
            background:darkMode?'rgba(22,30,51,0.96)':'rgba(255,255,255,0.97)',
            borderRadius:18,padding:10,
            display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,
            border:`1.5px solid ${darkMode?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.06)'}`,
            boxShadow:'0 8px 28px rgba(0,0,0,0.25)',
            animation:'picker-pop 0.22s cubic-bezier(0.34,1.56,0.64,1) both',
            transformOrigin:'bottom left'}}>
            {[
              {k:'laugh'},
              {k:'cry'},
              {k:'angry'},
              {k:'confused'}
            ].map(e=>{
              const myRole=gameMode==='online'?onlineRole:(gameMode==='pvc'?'A':turn);
              const c=MC[myRole]||MC.A;
              const d=MD[myRole]||MD.A;
              return(
                <button key={e.k} onClick={()=>triggerEmote(e.k)}
                  disabled={emoteCooldown}
                  style={{
                    width:58,height:58,padding:0,
                    background:darkMode?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.04)',
                    border:'none',borderRadius:12,
                    cursor:emoteCooldown?'not-allowed':'pointer',
                    opacity:emoteCooldown?0.4:1,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    transition:'transform 0.12s',
                    fontFamily:'system-ui,-apple-system,sans-serif'}}>
                  <EmoteHead color={c} dark={d} type={e.k} size={48}/>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Online Game-Chat */}
      {gameMode==='online'&&lobbyId&&(
        <div style={{width:'100%',maxWidth:360,marginTop:24,marginBottom:80}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,paddingLeft:2,paddingRight:2}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <BubbleIcon size={14} color="#8b5cf6"/>
              <span style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5}}>{t('lobbyChat')}</span>
            </div>
            {chatMsgs.length>0&&(
              <div style={{fontSize:10,fontWeight:700,color:'#8b5cf6',
                background:'rgba(139,92,246,0.1)',padding:'2px 8px',borderRadius:10}}>
                {chatMsgs.length}
              </div>
            )}
          </div>

          <div ref={chatScrollRef} style={{
            width:'100%',height:160,overflowY:'auto',overflowX:'hidden',
            touchAction:'pan-y',
            borderRadius:12,background:'var(--card)',border:'1.5px solid var(--border)',
            WebkitOverflowScrolling:'touch',
            boxShadow:'inset 0 2px 6px rgba(0,0,0,0.04)',
            boxSizing:'border-box',padding:8}}>
            {chatMsgs.length===0?(
              <div style={{padding:'22px 16px',textAlign:'center'}}>
                <div style={{marginBottom:4,opacity:0.4,display:'flex',justifyContent:'center'}}><BubbleIcon size={24} color="var(--muted)"/></div>
                <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',marginBottom:3}}>{t('noChat')}</div>
                <div style={{fontSize:10,color:'var(--subtle)',fontWeight:500}}>{t('chatHint')}</div>
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {chatMsgs.map((m,i)=>{
                  const mine=m.u===onlineRole;
                  const col=PC[m.u]||'#8b5cf6';
                  return(
                    <div key={i} style={{
                      display:'flex',flexDirection:'column',
                      alignItems:mine?'flex-end':'flex-start'}}>
                      <div style={{fontSize:9,fontWeight:700,color:col,
                        marginBottom:2,paddingLeft:mine?0:4,paddingRight:mine?4:0,letterSpacing:0.5}}>
                        {mine?t('you'):pname(m.u)}
                      </div>
                      <div style={{display:'flex',alignItems:'flex-end',gap:4,maxWidth:'88%'}}>
                        <div style={{
                          padding:'7px 11px',borderRadius:13,
                          background:mine?col:'var(--bg)',
                          color:mine?'white':'var(--text)',
                          border:mine?'none':'1px solid var(--border-soft)',
                          fontSize:12,fontWeight:500,lineHeight:1.35,
                          wordBreak:'break-word',whiteSpace:'pre-wrap',
                          borderBottomRightRadius:mine?4:13,
                          borderBottomLeftRadius:mine?13:4}}>
                          {m.m}
                        </div>
                        {!mine&&m.ts?(
                          <button onClick={()=>openChatReport(m.ts)} title={t('reportChatBtn')} aria-label={t('reportChatBtn')}
                            style={{background:'none',border:'none',cursor:'pointer',padding:'0 2px 3px',
                              fontSize:12,lineHeight:1,color:'var(--subtle)',opacity:0.65,flexShrink:0}}>
                            {'⚑'}
                          </button>
                        ):null}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          <div style={{display:'flex',gap:6,marginTop:8}}>
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();sendChat();}}}
              placeholder={t('chatPlaceholder')} maxLength={140}
              style={{flex:1,padding:'10px 12px',borderRadius:10,border:'1.5px solid var(--border)',
                fontSize:13,outline:'none',
                fontFamily:'system-ui,-apple-system,sans-serif',background:'var(--card)',color:'var(--text)',
                boxSizing:'border-box',minWidth:0}}/>
            <button onClick={sendChat} disabled={!chatInput.trim()}
              style={{padding:'10px 16px',background:chatInput.trim()?'#8b5cf6':'var(--border)',
                color:'white',border:'none',borderRadius:10,fontWeight:700,
                cursor:chatInput.trim()?'pointer':'not-allowed',fontSize:13,
                boxShadow:chatInput.trim()?'0 2px 8px rgba(139,92,246,0.3)':'none',
                fontFamily:'system-ui,-apple-system,sans-serif',
                transition:'all 0.15s',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <SendIcon size={16} color="#fff"/>
            </button>
          </div>
        </div>
      )}
      {repChatOverlayUi}

    </div>
  );
}

const DANCES={

// Gesichts-Content für ein bestimmtes Emote — wird in Kopf eingebettet

    <g>

      <path d="M 36 24 Q 42 19 48 24" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>

        <ellipse cx="20" cy="27" rx="2.5" ry="3" fill="#7dd3fc" style={{['--tx']:'-2px',animation:'tear-spurt 0.7s ease-in 0s infinite'}}/>
        <ellipse cx="44" cy="27" rx="2.5" ry="3" fill="#7dd3fc" style={{['--tx']:'2px',animation:'tear-spurt 0.7s ease-in 0.15s infinite'}}/>
        <ellipse cx="18" cy="27" rx="2" ry="2.5" fill="#7dd3fc" style={{['--tx']:'-3px',animation:'tear-spurt 0.7s ease-in 0.35s infinite'}}/>
        <ellipse cx="46" cy="27" rx="2" ry="2.5" fill="#7dd3fc" style={{['--tx']:'3px',animation:'tear-spurt 0.7s ease-in 0.5s infinite'}}/>
      </>}

        <ellipse cx="32" cy="36" rx="9" ry="6" fill={dark} stroke="white" strokeWidth="1.5"/>
        <ellipse cx="32" cy="37" rx="5" ry="3" fill="#1e1b1b"/>
      </g>
    </g>
  );
  if(type==='angry')return(
    <g>
      {/* Wütende Augenbrauen V-förmig stark runter */}
      <path d="M 12 12 L 28 22" stroke="white" strokeWidth="3" fill="none" strokeLinecap="round"/>
      <path d="M 52 12 L 36 22" stroke="white" strokeWidth="3" fill="none" strokeLinecap="round"/>
      {/* Rote Gesicht-Röte (Wut-Flush) */}
      {animate&&<ellipse cx="32" cy="26" rx="20" ry="8" fill="#fca5a5" opacity="0.55"

      <circle cx="22" cy="24" r="1.5" fill={dark}/>
      <circle cx="42" cy="24" r="3" fill="white"/>
      <circle cx="42" cy="24" r="1.5" fill={dark}/>
      {/* Knurrender Mund mit Reißzähnen */}
      <path d="M 18 32 L 46 32 L 44 36 L 20 36 Z" fill="white" stroke={dark} strokeWidth="1"/>
      <polygon points="22,32 24,38 26,32" fill="white"/>
      <polygon points="38,32 40,38 42,32" fill="white"/>

      <line x1="32" y1="32" x2="32" y2="36" stroke={dark} strokeWidth="0.6"/>

      {/* Zorn-Ader pulsierend */}

        <path d="M 50 12 L 53 10" stroke="#dc2626" strokeWidth="1.5" fill="none" strokeLinecap="round"/>

      {/* Dampf-Puffs aus den Ohren */}
      {animate&&<>
        <circle cx="6" cy="18" r="3.5" fill="white" opacity="0.85" style={{['--sx']:'-14px',animation:'steam-puff 0.7s ease-out 0s infinite'}}/>

      <ellipse cx="29" cy="33" rx="2" ry="1" fill={dark}/>

      {animate&&<ellipse cx="50" cy="14" rx="2" ry="3" fill="#7dd3fc"

      {/* Fragezeichen über Kopf — 3 Stück */}
      {animate&&<>
        <text x="48" y="10" fill="#fbbf24" fontSize="16" fontWeight="900" stroke={dark} strokeWidth="0.8"
          style={{animation:'q-mark-float 1.5s ease-out 0s infinite',transformOrigin:'48px 10px'}}>?</text>

        <text x="56" y="6" fill="#fbbf24" fontSize="9" fontWeight="900" stroke={dark} strokeWidth="0.5"
          style={{animation:'q-mark-float 1.5s ease-out 0.9s infinite',transformOrigin:'56px 6px'}}>?</text>
      </>}
    </g>
  );
}

                  style={{width:'100%',padding:'14px 16px',background:card,border:'1.5px solid '+border,
                    borderRadius:14,cursor:'pointer',textAlign:'left',
                    fontFamily:'system-ui,-apple-system,sans-serif',

function WinnerPerson({color,dark,speed,dance}){

        <circle cx="40" cy="85" r="7" fill={dark}/>
      </g>
      {/* Rechtes Bein */}
      <g style={{transformOrigin:'50px 85px',animation:anim(cfg.legR)}}>
        <circle cx="50" cy="85" r="7" fill={dark}/>
      </g>
      {/* Bauch */}
      <g style={{transformOrigin:'45px 55px',animation:anim(cfg.belly)}}>
        <circle cx="45" cy="55" r="16" fill={dark}/>
      </g>
      {/* Linke Hand — näher am Körper */}
      <g style={{transformOrigin:'30px 56px',animation:anim(cfg.handL)}}>
        <circle cx="30" cy="56" r="6.5" fill={dark}/>
      </g>
      {/* Rechte Hand — näher am Körper */}
      <g style={{transformOrigin:'60px 56px',animation:anim(cfg.handR)}}>
        <circle cx="60" cy="56" r="6.5" fill={dark}/>
      </g>
      {/* Kopf */}
      <g style={{transformOrigin:'45px 24px',animation:anim(cfg.head)}}>
        <circle cx="45" cy="24" r="13" fill={dark}/>
        {face}
      </g>
    </svg>
  </div>;

function Confetti({color}){
  const pieces=useMemo(()=>{
    const colors=color?[color,'#f59e0b','#10b981','#8b5cf6','#ec4899','#fbbf24']:['#ef4444','#3b82f6','#f59e0b','#10b981','#8b5cf6','#ec4899'];
    return Array.from({length:90},(_,i)=>({
      left:Math.random()*100,
      delay:Math.random()*0.6,
      dur:2.2+Math.random()*2.2,
      color:colors[i%colors.length],
      size:5+Math.random()*7,
      drift:(Math.random()-0.5)*20
    }));
  },[color]);
  return <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9998,overflow:'hidden'}}>
    {pieces.map((p,i)=>(
      <div key={i} style={{
        position:'absolute',top:-20,left:`${p.left}%`,
        width:p.size,height:p.size*0.55,background:p.color,
        borderRadius:1,
        animation:`confetti-fall ${p.dur}s linear ${p.delay}s forwards`,
        marginLeft:p.drift+'vw'
      }}/>
    ))}
  </div>;
}

        ?'linear-gradient(180deg,'+steelColor+'cc 0%,'+steelColor+' 50%,'+steelColor+'99 100%)'
        :'linear-gradient(90deg,'+steelColor+'cc 0%,'+steelColor+' 50%,'+steelColor+'99 100%)')
      :(isH
        ?'linear-gradient(180deg,#eef2f6 0%,#c2ccd8 16%,#94a0af 48%,#5d6878 80%,#3a4250 100%)'
        :'linear-gradient(90deg,#eef2f6 0%,#c2ccd8 16%,#94a0af 48%,#5d6878 80%,#3a4250 100%)');
    const bolts=isH
      ?[{left:5,top:p.height/2-2},{left:p.width/2-2,top:p.height/2-2},{left:p.width-9,top:p.height/2-2}]
      :[{left:p.width/2-2,top:5},{left:p.width/2-2,top:p.height/2-2},{left:p.width/2-2,top:p.height-9}];
    return <div style={{position:'absolute',...p,background:metalBg,borderRadius:2,zIndex:10,
      pointerEvents:'none',opacity:opacity!==undefined?opacity:1,transformOrigin:'center center',
      boxShadow:steelColor?('0 0 0 1px '+steelColor+'88,0 2px 8px rgba(0,0,0,0.35),inset 0 1px 1px rgba(255,255,255,0.35)'):('inset 0 0 0 1px rgba(30,41,59,0.5),inset 0 1px 1px rgba(255,255,255,0.5),0 2px 5px rgba(0,0,0,0.4)'),
      animation:animate?`${enterAnim} 0.28s cubic-bezier(0.34,1.56,0.64,1) both`:'none'}}>
      {bolts.map((b,i)=><span key={i} style={{position:'absolute',left:b.left,top:b.top,
        width:4,height:4,borderRadius:'50%',
        background:steelColor?'rgba(255,255,255,0.7)':'radial-gradient(circle at 35% 30%,#f8fafc 0%,#9aa6b4 55%,#334155 100%)',
        boxShadow:'inset 0 0 0 0.5px rgba(0,0,0,0.45)'}}/>)}
    </div>;
  }
  const goldenBg='linear-gradient(135deg,#92400e 0%,#f59e0b 30%,#fde68a 50%,#f59e0b 70%,#92400e 100%)';
  const goldenAnim=isH
    ?'golden-drop-h 0.38s cubic-bezier(0.34,1.56,0.64,1) both, golden-glow 1.6s 0.38s ease-in-out infinite'
    :'golden-drop-v 0.38s cubic-bezier(0.34,1.56,0.64,1) both, golden-glow 1.6s 0.38s ease-in-out infinite';
  const wallOverlay='linear-gradient(180deg,rgba(255,255,255,0.2) 0%,rgba(255,255,255,0) 30%,rgba(0,0,0,0) 62%,rgba(0,0,0,0.3) 73%,rgba(0,0,0,0.1) 100%), ';
  return <div style={{position:'absolute',...p,
    background:golden?goldenBg:(wallOverlay+color),
    borderRadius:4,zIndex:10,pointerEvents:'none',opacity:opacity!==undefined?opacity:1,overflow:'hidden',
    boxShadow:golden?'none':'inset 0 1.5px 1px rgba(255,255,255,0.28),inset 0 -2px 3px rgba(0,0,0,0.5),inset 0 0 0 1px rgba(0,0,0,0.1),0 4px 8px rgba(0,0,0,0.5),0 2px 3px rgba(0,0,0,0.35)',
    transformOrigin:'center center',
    animation:golden?goldenAnim:animate?`${enterAnim} 0.28s cubic-bezier(0.34,1.56,0.64,1) both`:'none'}}>
    {!golden&&<div className="ww-wall-gloss"/>}
  </div>;
}
function Wall2({wkey,color,opacity,animate}){
