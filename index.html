                        eloClassic:(p.stats&&p.stats.ranked&&p.stats.ranked.classic&&p.stats.ranked.classic.rating)||null,
                        eloDuel:(p.stats&&p.stats.ranked&&p.stats.ranked.duel&&p.stats.ranked.duel.rating)||null};
                    }catch(e2){return{uid:uid,name:'[Fehler]',games:0,wins:0,created:0,color:'#64748b',eloClassic:null,eloDuel:null};}
                  }).sort(function(a,b){return b.created-a.created;});
                  setAdminAccounts(list);
                }catch(e){setAdminAccounts([]);}
                setAdminAccountsLoading(false);
              }} style={{width:'100%',padding:'10px',borderRadius:10,
                background:'#3b82f6',color:'white',border:'none',cursor:'pointer',
                fontWeight:800,fontSize:13,fontFamily:'system-ui,-apple-system,sans-serif',marginBottom:10}}>
                {adminAccountsLoading?'Lädt...':'Accounts laden'}
              </button>
              {adminAccounts!==null&&(
                <div>
                  <div style={{fontSize:11,color:'var(--subtle)',fontWeight:700,marginBottom:8}}>
                    {adminAccounts.length} Accounts gesamt
                  </div>
                  <div style={{maxHeight:320,overflowY:'auto',WebkitOverflowScrolling:'touch',touchAction:'pan-y',
                    border:'1px solid var(--border)',borderRadius:10,background:'var(--bg)'}}>
                    {adminAccounts.length===0?(
                      <div style={{padding:'20px',textAlign:'center',color:'var(--subtle)',fontSize:12}}>Keine Accounts</div>
                    ):adminAccounts.map(function(acc,i){
                      var d=acc.created?new Date(acc.created):null;
                      var dateStr=d?(d.getDate()+'.'+(d.getMonth()+1)+'.'+d.getFullYear()):'?';
                      var wr=acc.games>0?Math.round((acc.wins/acc.games)*100):0;
                      return(
                        <div key={acc.uid} style={{
                          padding:'10px 12px',
                          borderBottom:i<adminAccounts.length-1?'1px solid var(--border)':'none',
                          display:'flex',alignItems:'center',gap:10}}>
                          <div style={{width:28,height:28,borderRadius:'50%',background:acc.color,
                            display:'flex',alignItems:'center',justifyContent:'center',
                            flexShrink:0,fontSize:12,fontWeight:900,color:'#fff'}}>
                            {(acc.name||'?').slice(0,1).toUpperCase()}
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13,fontWeight:800,color:'var(--text)',
                              overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{acc.name}</div>
                            <div style={{fontSize:10,color:'var(--subtle)',fontWeight:600}}>
                              {dateStr} · {acc.games}G · {wr}% · {acc.eloClassic?('R:'+acc.eloClassic):''}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </AdminSection>

            {/* ── FEATURE FLAGS ── */}
            <AdminSection label="FEATURE FLAGS">
              <div style={{fontSize:11,color:'var(--subtle)',marginBottom:10,lineHeight:1.5}}>
                XP- und Coin-System live ein-/ausschalten. Wirkt sofort auf den Server.
              </div>
              <AdminFlagsPanel/>
            </AdminSection>

            {/* ── FEHLER-REPORTS ── */}
            <AdminSection label="FEHLER-REPORTS">
              <div style={{fontSize:11,color:'var(--subtle)',marginBottom:10,lineHeight:1.5}}>
                JS-Fehler der Spieler (ww_error_reports). Laden nur auf Klick, kein Dauer-Listener.
              </div>
              <AdminErrorsPanel/>
            </AdminSection>

            {/* ── BUG-REPORTS (SPIELER) ── */}
            <AdminSection label="BUG-REPORTS (SPIELER)">
              <div style={{fontSize:11,color:'var(--subtle)',marginBottom:10,lineHeight:1.5}}>
                Spieler-Meldungen vom Endscreen-Button (ww_bug_reports) — mit Replay + Server-Sicht. Laden nur auf Klick.
              </div>
              <AdminBugsPanel onWatch={function(entry){
                try{applyBoardSize(entry.map||'classic',entry.duelSize||'standard');}catch(e){}
                setReplayHistEntry(entry);
                setReplayStep(0);
                setScreen('replay');
              }}/>
            </AdminSection>

            {/* ── MELDUNGEN (SPIELER) ── */}
            <AdminSection label="MELDUNGEN (SPIELER)">
              <div style={{fontSize:11,color:'var(--subtle)',marginBottom:10,lineHeight:1.5}}>
                Spieler-Meldungen (ww_reports) gruppiert nach gemeldetem Spieler, mit Server-Beweis + Ban-Werkzeug. Laden nur auf Klick.
              </div>
              <AdminReportsPanel/>
            </AdminSection>

            {/* ── COINS & SHOP ── */}
            <AdminSection label="COINS & SHOP">
              <div style={{fontSize:11,color:'var(--subtle)',marginBottom:10,lineHeight:1.5}}>
                Coins direkt vergeben oder korrigieren. Nur Server darf ww_coins schreiben — Verbindung zum WS-Server nötig.
              </div>
              <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:0.8,marginBottom:6}}>COIN-VERWALTUNG (UID aus der Liste oben)</div>
              <AdminCoinsPanel/>
              <div style={{marginTop:14,padding:'12px 14px',borderRadius:10,background:'var(--bg)',border:'1.5px solid var(--border)',textAlign:'center'}}>
                <div style={{fontSize:12,fontWeight:800,color:'var(--subtle)',marginBottom:3}}>Shop</div>
                <div style={{fontSize:11,color:'var(--subtle)'}}>Coming Soon — Shop wird später freigeschaltet</div>
              </div>
            </AdminSection>

            {/* ── KONTO-MIGRATION ── */}
            <AdminSection label="KONTO-MIGRATION (STATS-TRANSFER)">
              <div style={{fontSize:11,color:'var(--subtle)',marginBottom:10,lineHeight:1.5}}>
                Wenn ein Nutzer versehentlich ein Duplikat-Konto erstellt hat: Stats + ELO vom alten Konto ins neue übertragen. Name/Farbe bleiben unberührt.
              </div>
              <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:0.8,marginBottom:4}}>ALTES KONTO (UID aus der Liste oben)</div>
              <input value={adminMigrateFrom} onChange={e=>setAdminMigrateFrom(e.target.value.trim())}
                placeholder="Alt-UID (Quelle)"
                style={{width:'100%',padding:'10px 12px',borderRadius:10,fontSize:12,background:'var(--bg)',border:'1.5px solid var(--border)',color:'var(--text)',fontFamily:'system-ui,-apple-system,sans-serif',boxSizing:'border-box',outline:'none',marginBottom:8}}/>
              <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:0.8,marginBottom:4}}>NEUES KONTO (Ziel-UID, behält seinen Namen)</div>
              <input value={adminMigrateTo} onChange={e=>setAdminMigrateTo(e.target.value.trim())}
                placeholder="Neu-UID (Ziel)"
                style={{width:'100%',padding:'10px 12px',borderRadius:10,fontSize:12,background:'var(--bg)',border:'1.5px solid var(--border)',color:'var(--text)',fontFamily:'system-ui,-apple-system,sans-serif',boxSizing:'border-box',outline:'none',marginBottom:10}}/>
              {adminMigrateResult&&<div style={{fontSize:12,color:adminMigrateResult.startsWith('Fehler')?'#ef4444':'#16a34a',fontWeight:700,marginBottom:8,textAlign:'center'}}>{adminMigrateResult}</div>}
              <button disabled={adminMigrateBusy||!adminMigrateFrom||!adminMigrateTo} onClick={async function(){
                if(adminMigrateBusy||!adminMigrateFrom||!adminMigrateTo)return;
                if(!window.confirm('Stats von "'+adminMigrateFrom+'" nach "'+adminMigrateTo+'" übertragen? Dies überschreibt die Stats des Ziel-Kontos.'))return;
                setAdminMigrateBusy(true);setAdminMigrateResult('');
                try{
                  const r=await adminMigrateStats(adminMigrateFrom,adminMigrateTo);
                  setAdminMigrateResult('Fertig: '+r.from+' → '+r.to);
                  setAdminMigrateFrom('');setAdminMigrateTo('');
                }catch(e){setAdminMigrateResult('Fehler: '+(e&&e.message?e.message:String(e)));}
                setAdminMigrateBusy(false);
              }} style={{width:'100%',padding:'11px',borderRadius:10,
                background:(adminMigrateBusy||!adminMigrateFrom||!adminMigrateTo)?'var(--border)':'#dc2626',
                color:'white',border:'none',cursor:(adminMigrateBusy||!adminMigrateFrom||!adminMigrateTo)?'default':'pointer',
                fontWeight:800,fontSize:13,fontFamily:'system-ui,-apple-system,sans-serif'}}>
                {adminMigrateBusy?'Überträgt...':'Stats übertragen'}
              </button>
            </AdminSection>

            {/* ── NACHRICHTEN ── */}
            <AdminSection label="NACHRICHTEN (POSTKASTEN)">
              <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:0.8,marginBottom:6}}>TITEL (optional)</div>
              <input value={bcTitle} onChange={e=>setBcTitle(e.target.value)}
                placeholder="z.B. Event-Wochenende!"
                style={{width:'100%',padding:'10px 12px',borderRadius:10,fontSize:13,
                  background:'var(--bg)',border:'1.5px solid var(--border)',color:'var(--text)',
                  fontFamily:'system-ui,-apple-system,sans-serif',boxSizing:'border-box',outline:'none',marginBottom:8}}/>
              <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:0.8,marginBottom:6}}>NACHRICHT</div>
              <textarea value={bcMsg} onChange={e=>setBcMsg(e.target.value)}
                placeholder="Deine Nachricht an alle Spieler..."
                rows={3}
                style={{width:'100%',padding:'10px 12px',borderRadius:10,fontSize:13,resize:'vertical',
                  background:'var(--bg)',border:'1.5px solid var(--border)',color:'var(--text)',
                  fontFamily:'system-ui,-apple-system,sans-serif',boxSizing:'border-box',outline:'none',marginBottom:8}}/>
              <div style={{display:'flex',gap:8,marginBottom:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:0.8,marginBottom:5}}>WICHTIGKEIT</div>
                  <div style={{display:'flex',gap:4}}>
                    {[['normal','Info','#6366f1'],['important','Update','#f59e0b'],['critical','Wichtig','#ef4444']].map(function(o){
                      var sel=bcImportance===o[0];
                      return <button key={o[0]} onClick={()=>setBcImportance(o[0])} style={{
                        flex:1,padding:'6px 4px',borderRadius:8,fontSize:10,fontWeight:800,cursor:'pointer',
                        background:sel?o[2]:'var(--bg)',color:sel?'white':o[2],
                        border:'1.5px solid '+o[2],fontFamily:'system-ui,-apple-system,sans-serif'}}>{o[1]}</button>;
                    })}
                  </div>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:0.8,marginBottom:5}}>SCHRIFTGRÖSSE</div>
                  <div style={{display:'flex',gap:4}}>
                    {[['small','S'],['medium','M'],['large','L']].map(function(o){
                      var sel=bcFontSize===o[0];
                      return <button key={o[0]} onClick={()=>setBcFontSize(o[0])} style={{
                        flex:1,padding:'6px 4px',borderRadius:8,fontSize:10,fontWeight:800,cursor:'pointer',
                        background:sel?'#3b82f6':'var(--bg)',color:sel?'white':'var(--text)',
                        border:'1.5px solid '+(sel?'#3b82f6':'var(--border)'),fontFamily:'system-ui,-apple-system,sans-serif'}}>{o[1]}</button>;
                    })}
                  </div>
                </div>
              </div>
              <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:0.8,marginBottom:5}}>GÜLTIG FÜR</div>
              <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>
                {[[1,'1 Tag'],[3,'3 Tage'],[7,'7 Tage'],[14,'14 Tage'],[30,'30 Tage'],[0,'Immer']].map(function(o){
                  var sel=bcDays===o[0];
                  return <button key={o[0]} onClick={()=>setBcDays(o[0])} style={{
                    padding:'5px 9px',borderRadius:8,fontSize:10,fontWeight:700,cursor:'pointer',
                    background:sel?'#3b82f6':'var(--bg)',color:sel?'white':'var(--text)',
                    border:'1.5px solid '+(sel?'#3b82f6':'var(--border)'),fontFamily:'system-ui,-apple-system,sans-serif'}}>{o[1]}</button>;
                })}
              </div>
              <button onClick={function(){
                if(!bcMsg.trim())return;
                var id='bc_'+Date.now();
                var expiresAt=bcDays===0?0:Date.now()+bcDays*86400000;
                window.db.ref('ww_broadcasts/'+id).set({
                  title:bcTitle.trim(),message:bcMsg.trim(),
                  importance:bcImportance,fontSize:bcFontSize,
                  createdAt:Date.now(),expiresAt:expiresAt
                }).then(function(){
                  setBcTitle('');setBcMsg('');setBcImportance('normal');setBcFontSize('medium');setBcDays(7);
                  setAdminFlash('Nachricht gesendet!');setTimeout(function(){setAdminFlash('');},2500);
                }).catch(function(){setAdminFlash('Fehler!');setTimeout(function(){setAdminFlash('');},2000);});
              }} style={{width:'100%',padding:'11px',borderRadius:10,
                background:bcMsg.trim()?'linear-gradient(135deg,#fbbf24,#f59e0b)':'var(--bg)',
                color:bcMsg.trim()?'#1a1220':'var(--subtle)',border:'none',cursor:bcMsg.trim()?'pointer':'default',
                fontWeight:900,fontSize:13,fontFamily:'system-ui,-apple-system,sans-serif'}}>
                Nachricht senden
              </button>
              {broadcasts.length>0&&(
                <div style={{marginTop:10}}>
                  <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:0.8,marginBottom:6}}>AKTIVE NACHRICHTEN ({broadcasts.length})</div>
                  {broadcasts.map(function(b){
                    return(
                      <div key={b.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                        padding:'8px 10px',borderRadius:9,background:'var(--bg)',border:'1px solid var(--border)',marginBottom:5}}>
                        <div style={{fontSize:12,fontWeight:700,color:'var(--text)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginRight:8}}>
                          {b.title||b.message.slice(0,40)}
                        </div>
                        <button onClick={function(){window.db.ref('ww_broadcasts/'+b.id).remove();}} style={{
                          background:'#fee2e2',color:'#dc2626',border:'none',borderRadius:7,
                          padding:'4px 8px',fontSize:11,fontWeight:700,cursor:'pointer',
                          fontFamily:'system-ui,-apple-system,sans-serif',flexShrink:0}}>Löschen</button>
                      </div>
                    );
                  })}
                </div>
              )}
            </AdminSection>

            {/* ── 🔧 WARTUNG & AUFRÄUMEN ── */}
            <AdminSection label="🔧 WARTUNG & AUFRÄUMEN">
              {/* Wartungsmodus mit Bestätigung */}
              <AdminConfirmAction
                label={adminCfg.maintenance?'Wartungsmodus aktiv — Spiel gesperrt':'Wartungsmodus einschalten'}
                confirmLabel="Wirklich einschalten? Alle Spieler werden ausgesperrt."
                btnLabel={adminCfg.maintenance?'Deaktivieren':'Aktivieren'}
                danger={!adminCfg.maintenance}
                active={adminCfg.maintenance}
                onConfirm={()=>saveAdminCfg({...adminCfg,maintenance:!adminCfg.maintenance})}/>
              <div style={{marginTop:8}}>
                {clearConfirm?(
                  <div style={{background:'rgba(239,68,68,0.08)',border:'1.5px solid #ef4444',borderRadius:10,padding:'12px 14px'}}>
                    <div style={{fontSize:13,fontWeight:700,color:'#ef4444',marginBottom:10}}>Wirklich alle offenen Lobbys leeren?</div>
                    <div style={{display:'flex',gap:8}}>
                      <button onClick={()=>{setClearConfirm(false);clearOpenLobbies();}} style={{flex:1,padding:'10px',borderRadius:9,
                        background:'#ef4444',color:'white',border:'none',cursor:'pointer',fontWeight:800,fontSize:13,
                        fontFamily:'system-ui,-apple-system,sans-serif'}}>Ja, leeren</button>
                      <button onClick={()=>setClearConfirm(false)} style={{flex:1,padding:'10px',borderRadius:9,
                        background:'var(--bg)',color:'var(--text)',border:'1.5px solid var(--border)',cursor:'pointer',fontWeight:700,fontSize:13,
                        fontFamily:'system-ui,-apple-system,sans-serif'}}>Abbrechen</button>
                    </div>
                  </div>
                ):(
                  <button onClick={()=>setClearConfirm(true)} style={{width:'100%',padding:'11px',borderRadius:10,
                    background:'var(--bg)',color:'var(--text)',border:'1.5px solid var(--border)',cursor:'pointer',
                    fontWeight:700,fontSize:13,fontFamily:'system-ui,-apple-system,sans-serif'}}>
                    🧹 Offene Lobbys leeren
                  </button>
                )}
              </div>
            </AdminSection>

            {adminFlash?<div style={{textAlign:'center',fontSize:12,color:'#16a34a',fontWeight:700,marginTop:10}}>{adminFlash}</div>:null}
            <button onClick={()=>{setShowAdmin(false);window.location.reload();}} style={{
              width:'100%',padding:'10px',marginTop:14,borderRadius:10,
              background:'#fee2e2',color:'#dc2626',border:'1.5px solid #fecaca',
              cursor:'pointer',fontWeight:700,fontSize:12,
              fontFamily:'system-ui,-apple-system,sans-serif'}}>
              Admin-Modus beenden
            </button>
          </div>
        </div>
      )}
      {showTutorial&&<TutorialModal t={t} darkMode={darkMode} step={tutStep} setStep={setTutStep} onClose={closeTutorial}/>}
      {helpKey&&<ModeHelpModal kind={helpKey} lang={lang} onClose={()=>setHelpKey(null)}/>}


      {/* showAdminUnlock entfernt: Admin-Zugang nur per Firebase-Auth */}

      {/* Update-Banner */}
      {updateAvailable&&(
        <div style={{position:'fixed',top:'calc(env(safe-area-inset-top) + 8px)',left:'50%',
          transform:'translateX(-50%)',zIndex:500,
          background:'linear-gradient(135deg,#8b5cf6,#3b82f6)',
          borderRadius:20,padding:'10px 18px',
          display:'flex',alignItems:'center',gap:10,
          boxShadow:'0 4px 20px rgba(139,92,246,0.4)',
          cursor:'pointer',maxWidth:320,width:'calc(100% - 32px)'}
        } onClick={()=>window.location.reload()}>
          <div style={{fontSize:13,fontWeight:700,color:'white',flex:1}}>
            Neue Version verfuegbar
          </div>
          <div style={{fontSize:11,fontWeight:800,color:'rgba(255,255,255,0.85)',
            background:'rgba(255,255,255,0.2)',borderRadius:10,padding:'3px 8px'}}>
            Aktualisieren
          </div>
        </div>
      )}

      {/* Datenschutz-Link */}
      <button onClick={function(){setNavDir('fwd');setScreen('legal');}} style={{
        background:'none',border:'none',
        color:'var(--subtle)',cursor:'pointer',fontSize:11,fontWeight:600,
        fontFamily:'system-ui,-apple-system,sans-serif',opacity:0.7,
        padding:'8px 12px',marginTop:8,marginBottom:'calc(env(safe-area-inset-bottom) + 16px)'}}>
        {lang==='de'?'Datenschutz & Impressum':lang==='tr'?'Gizlilik & K\u00fcnye':lang==='fr'?'Confidentialit\u00e9 & Mentions':'Privacy & Legal'}
      </button>



      {/* BOTTOM NAVIGATION BAR */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:250,
        background:'var(--card)',borderTop:'1px solid var(--border)',
        boxShadow:'0 -2px 16px rgba(0,0,0,0.08)',
        paddingBottom:'env(safe-area-inset-bottom, 0px)',
        display:'flex',alignItems:'stretch'}}>
        {/* Home */}
        <button style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
          gap:2,background:'none',border:'none',cursor:'default',padding:'10px 0',minHeight:54}}>
          <HomeIcon size={22} color="#8b5cf6"/>
          <span style={{fontSize:9,fontWeight:900,color:'#8b5cf6',letterSpacing:0.3}}>{'Home'}</span>
        </button>
        {/* Leaderboard */}
        <button onClick={()=>{setNavDir('fwd');setScreen('leaderboard');}}
          style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            gap:2,background:'none',border:'none',cursor:'pointer',padding:'10px 0',minHeight:54}}>
          <TrophySmIcon size={22} color="var(--subtle)"/>
          <span style={{fontSize:9,fontWeight:700,color:'var(--subtle)',letterSpacing:0.3,textAlign:'center',lineHeight:1.2}}>{t('leaderboardTitle')}</span>
        </button>
        {/* Profile */}
        <button onClick={()=>{setNavDir('fwd');setScreen(account?'profile':'auth');}}
          style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            gap:2,background:'none',border:'none',cursor:'pointer',padding:'10px 0',minHeight:54}}>
          {account
            ?<div style={{width:26,height:26,borderRadius:'50%',background:account.color,
                display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:'0 2px 6px '+account.color+'66'}}>
                <span style={{fontSize:11,fontWeight:900,color:'#fff',lineHeight:1}}>{account.name.slice(0,1).toUpperCase()}</span>
              </div>
            :<PeopleIcon size={22} color="var(--subtle)"/>}
          <span style={{fontSize:9,fontWeight:700,color:'var(--subtle)',letterSpacing:0.3}}>{t('profile')}</span>
        </button>
        {/* Settings */}
        <button onClick={()=>{setOptionsTab('main');setShowOptions(true);}}
          style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            gap:2,background:'none',border:'none',cursor:'pointer',padding:'10px 0',minHeight:54}}>
          <GearIcon size={22} color="var(--subtle)"/>
          <span style={{fontSize:9,fontWeight:700,color:'var(--subtle)',letterSpacing:0.3}}>{t('options')}</span>
        </button>
      </div>

      {/* Cookie Banner */}
      {!cookieConsent&&(
        <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:3000,padding:'0 0 calc(env(safe-area-inset-bottom) + 0px) 0'}}>
          <div style={{background:'var(--card)',borderTop:'2px solid var(--border)',boxShadow:'0 -8px 32px rgba(0,0,0,0.18)',padding:'18px 18px 20px',borderRadius:'18px 18px 0 0'}}>
            <div style={{fontSize:14,fontWeight:900,color:'var(--text)',marginBottom:8}}>
              {lang==='de'?'Cookies & Einwilligungen':lang==='tr'?'\u00c7erezler & Onay':lang==='fr'?'Cookies & Consentement':'Cookies & Consent'}
            </div>
            <div style={{fontSize:12,color:'var(--subtle)',lineHeight:1.6,marginBottom:14}}>
              {lang==='de'?'Wir nutzen notwendige Cookies f\u00fcr den Spielbetrieb. Mit deiner Einwilligung k\u00f6nnen zuk\u00fcnftig personalisierte Werbeanzeigen eingeblendet werden.':
               lang==='tr'?'Oyun i\u00e7in gerekli \u00e7erezler kullan\u0131yoruz. Onay\u0131n\u0131zla gelecekte ki\u015fiselle\u015ftirilmi\u015f reklamlar g\u00f6sterilebilir.':
               lang==='fr'?'Nous utilisons des cookies n\u00e9cessaires au jeu. Avec votre consentement, des publicit\u00e9s personnalis\u00e9es pourront \u00eatre affich\u00e9es.':
               'We use necessary cookies for the game. With your consent, personalized ads may be shown in the future.'}
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={function(){try{localStorage.setItem('ww_cookie_consent','necessary');}catch(e){}setCookieConsent('necessary');}}
                style={{flex:1,padding:'11px 8px',borderRadius:11,background:'var(--bg)',color:'var(--text)',border:'1.5px solid var(--border)',cursor:'pointer',fontWeight:700,fontSize:12,fontFamily:'system-ui,-apple-system,sans-serif'}}>
                {lang==='de'?'Nur notwendige':lang==='tr'?'Yaln\u0131zca gerekli':lang==='fr'?'N\u00e9cessaires':'Necessary only'}

en auch nach der Kontol\u00f6schung gespeichert, damit Sperren nicht durch L\u00f6schen und Neuanlegen des Kontos umgangen werden k\u00f6nnen (berechtigtes Interesse, Art. 6 Abs. 1 lit. f DSGVO). Chat-Ausz\u00fcge in Meldungen und Moderations-Protokollen werden sp\u00e4testens nach 12 Monaten entfernt.','Daten\u00fcbertragung ins Ausland (KVKK Art. 9): Verarbeitung auf Servern in der EU und den USA (Google Firebase, GitHub). Mit der Nutzung willigst du in diese \u00dcbertragung ausdr\u00fccklich ein.','Werbung (geplant): freiwillige Bonus-Videos (Rewarded Ads) \u00fcber Google AdMob. Vor Aktivierung erscheint ein Einwilligungs-Banner (Google UMP); ohne Zustimmung keine personalisierte Werbung.','Speicherdauer: Bis zur Kontol\u00f6schung. Konten k\u00f6nnen jederzeit in den Profileinstellungen gel\u00f6scht werden. Ausnahme: Missbrauchsschutz-Daten (siehe oben).','Deine Rechte (DSGVO): Auskunft, Berichtigung, L\u00f6schung, Einschr\u00e4nkung, Portabilit\u00e4t, Widerspruch. Anfragen an wrongwayapp.official@gmail.com','Beschwerderecht: Du hast das Recht, dich bei einer Datenschutzaufsichtsbeh\u00f6rde zu beschweren (z. B. BfDI: bfdi.bund.de).','KVKK (T\u00fcrkei): Rechte gem. Gesetz Nr. 6698. Antr\u00e4ge an wrongwayapp.official@gmail.com \u00b7 www.kvkk.gov.tr'],

d after 12 months at the latest.','International transfers (KVKK Art. 9): processing on servers in the EU and USA (Google Firebase, GitHub). By using the app you expressly consent to this transfer.','Advertising (planned): optional reward videos (rewarded ads) via Google AdMob. A consent banner (Google UMP) appears before activation; no personalized ads without consent.','Retention: until account deletion. Accounts can be deleted anytime in profile settings. Exception: abuse-prevention data (see above).','Your rights (GDPR): access, rectification, erasure, restriction, portability, objection. Contact: wrongwayapp.official@gmail.com','Right to complain: You have the right to lodge a complaint with a data protection authority.','KVKK (Turkey): rights under Law No. 6698. Contact wrongwayapp.official@gmail.com \u00b7 www.kvkk.gov.tr'],

  const doGoogleSignIn=()=>{
    const provider=new firebase.auth.GoogleAuthProvider();
    // KRITISCH: Immer Account-Auswahl erzwingen — ohne dies waehlt Google silently den zuletzt
    // verwendeten Account, was zu unbeabsichtigten Logins und Duplikat-Konten fuehren kann.
    provider.setCustomParameters({prompt:'select_account'});
    // Gast-Session (anonyme UID) upgraden statt ersetzen: gleiche UID behaelt Coins/XP/Inventar.
    // Ist das Google-Konto schon ein bestehender Nutzer -> dort einloggen (kein Auto-Merge,
    // der Gast-Stand dieser Session verfaellt dann wie bisher).
    const curU=firebase.auth().currentUser;
    const signInP=(curU&&curU.isAnonymous)
      ?curU.linkWithPopup(provider).catch(function(e){
          if(e&&e.code==='auth/credential-already-in-use'&&e.credential){return firebase.auth().signInWithCredential(e.credential);}
          throw e;
        })
      :firebase.auth().signInWithPopup(provider);
    signInP.then(async function(result){
      if(!result||!result.user)return;
      let existing;
      try{existing=await getGoogleProfile(result.user);}
      catch(e){
        // Firebase-Verbindungsfehler: KEIN Username-Modal anzeigen (wuerde Duplikat-Konto erstellen).
        if(e&&e.isFbError){try{firebase.auth().signOut();}catch(_){}setAuthErr(t('auth_network'));return;}
        throw e;
      }
      if(existing){
        setAccount(existing);setNavDir('back');setScreen('menu');
      }else{
        setPendingGoogleUser(result.user);
        var suggested=(result.user.displayName||'').replace(/\s+/g,'_').slice(0,16);
        setGoogleName(suggested);
      }
    }).catch(function(e){
      if(e.code==='auth/account-exists-with-different-credential'||e.code==='auth/email-already-in-use'){
        setAuthErr('Diese E-Mail ist bereits per E-Mail/Passwort registriert. Bitte dort anmelden.');
      }else if(e.code!=='auth/popup-closed-by-user'&&e.code!=='auth/cancelled-popup-request'){
        setAuthErr('Google Login fehlgeschlagen');
      }
    });
  };

    setNavDir('back');setScreen('menu');
  };

  // ── FRIEND PLAY ─────────────────────────────────────────

      <MapAura map={selectedMap} dark={darkMode}/>

  // ── ONLINE ──────────────────────────────────────────────

      <MapAura map={selectedMap} dark={darkMode}/>

                            {t('lobby')} {l.id.slice(0,4).toUpperCase()}

                            background:l.map==='duel'?'rgba(139,92,246,0.15)':'rgba(59,130,246,0.12)',

                    )}
                  </div>
                );
              })}
            </div>
          )}

      </div>

        <button onClick={()=>setLobbyCfgPrivate(k==='private')} style={{
          width:'100%',padding:'12px 14px',marginBottom:6,

          border:`1.5px solid ${sel?'var(--text)':'var(--border)'}`,
          borderRadius:11,cursor:'pointer',textAlign:'left',

          <span style={{display:'flex'}}>{icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:800,marginBottom:1}}>{t(k)}</div>
            <div style={{fontSize:10,fontWeight:500,opacity:0.7}}>{desc}</div>
          </div>
          {sel&&<span style={{fontSize:14,fontWeight:900}}>✓</span>}
        </button>
      );
    };
    const ModeRow=({k,icon,desc,disabled})=>{
      const sel=lobbyCfgMode===k;
      return(
        <button onClick={()=>!disabled&&setLobbyCfgMode(k)} disabled={disabled} style={{
          width:'100%',padding:'12px 14px',marginBottom:6,
          background:sel?'var(--text)':'var(--card)',
          color:sel?'var(--bg)':'var(--text)',
          border:`1.5px solid ${sel?'var(--text)':'var(--border)'}`,

                background:'#f59e0b',color:'white',padding:'1px 6px',borderRadius:6}}>SOON</span>}

            <div style={{fontSize:10,fontWeight:500,opacity:0.7}}>{disabled?t('comingSoon'):desc}</div>
          </div>
          {sel&&<span style={{fontSize:14,fontWeight:900}}>✓</span>}
        </button>
      );
    };
    return(
      <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 24px)',background:'transparent',position:'relative',zIndex:1}}>
        <MenuBG dark={darkMode}/>
        <MapAura map={selectedMap} dark={darkMode}/>
        <div style={{width:'100%',maxWidth:340,position:'relative',zIndex:1}}>
          <div style={{textAlign:'center',marginBottom:22}}>
            <div style={{marginBottom:6,display:'flex',justifyContent:'center'}}><GearIcon size={24} color="var(--text)"/></div>

          <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginBottom:8,paddingLeft:2}}>

          <button onClick={()=>createLobby(lobbyCfgPrivate)} style={{

                padding:'8px 14px 8px 8px',borderRadius:40,
                background:'var(--card)',border:'1.5px solid var(--border)',

                <div style={{width:34,height:34,borderRadius:'50%',background:account.color,
                  display:'flex',alignItems:'center',justifyContent:'center',

                  <span style={{fontSize:14,fontWeight:900,color:'#fff'}}>{account.name.slice(0,1).toUpperCase()}</span>

                <div style={{fontSize:13,fontWeight:800,color:'var(--text)',lineHeight:1}}>{account.name}</div>

                  <span style={{fontSize:9,fontWeight:800,color:'#22c55e',letterSpacing:0.5}}>{'READY'}</span>
                </div>
              </div>
            )}
            <MatchSearch dark={darkMode} t={t} lang={lang}/>

              joinCancelledRef.current=true;
              if(WS_ENABLED&&WSNET.roomId){
                try{WSNET.leaveRoom();}catch(e){}

                await cleanupLobby(lobbyId);

              setScreen('menu');setLobbyId(null);setPrivateCode(null);
            }} style={{...sBack,marginTop:34}}>{t('cancel')}</button>
          </>
        ):(
        <>
        {/* Titel */}
        <div style={{fontSize:11,fontWeight:800,color:'var(--subtle)',letterSpacing:2,
          textTransform:'uppercase',marginBottom:16,textAlign:'center'}}>
          {onlineRole==='A'?(privateCode?t('waitingPrivate'):t('waitingOpponent')):t('connecting')}

        <div style={{display:'flex',gap:10,width:'100%',marginBottom:20,alignItems:'stretch'}}>
          {/* Meine Card */}
