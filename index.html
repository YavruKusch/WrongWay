          </div>

        </div>
        {helpKey&&<ModeHelpModal kind={helpKey} lang={lang} onClose={()=>setHelpKey(null)}/>}
    </div>
    );
  }

  // ── RANKED ──────────────────────────────────────────────
  if(screen==='leaderboard'){
    return <LeaderboardScreen t={t} darkMode={darkMode} goBack={goBack} account={account}/>;
  }

  if(screen==='ranked'){
    return <RankedScreen account={account} t={t} darkMode={darkMode} goBack={goBack}
      onStart={doStartRanked} features={adminCfg.features}/>;
  }

  // ── FRIENDS ─────────────────────────────────────────────
  if(screen==='friends'){
    if(!account){setNavDir('fwd');setScreen('auth');return null;}
    return <FriendsScreen account={account} t={t} darkMode={darkMode} goBack={goBack}
      onInvite={doInviteFriend} onSpectate={lid=>{setSpectateId(lid);setNavDir('fwd');setScreen('spectate');}}
      friendLobbyState={friendLobbyState} onCancelInvite={doCancelFriendInvite}
      showPresence={adminCfg.features.showPresence} showInGame={adminCfg.features.showInGame}/>;
  }
  // ── SPECTATE ─────────────────────────────────────────────
  if(screen==='spectate'){
    return <SpectatorScreen lobbyId={spectateId} t={t} darkMode={darkMode} goBack={goBack} account={account}/>;
  }

  // ── REPLAY HISTORY ───────────────────────────────────────
  if(screen==='replayHistory'){
    return <ReplayHistoryScreen t={t} darkMode={darkMode}
      goBack={()=>{setNavDir('back');setScreen('menu');}}
      onWatch={function(entry){
        applyBoardSize(entry.map||'classic',entry.duelSize||'standard');
        setReplayHistEntry(entry);
        setReplayStep(0);
        setNavDir('fwd');
        setScreen('replay');
      }}/>;
  }

  // ── AUTH (Login / Register) ─────────────────────────────
  if(screen==='auth'){
    const inputStyle={width:'100%',padding:'13px 14px',borderRadius:11,border:'1.5px solid var(--border)',
      fontSize:16,outline:'none',fontFamily:'system-ui,-apple-system,sans-serif',
      background:'var(--card)',color:'var(--text)',boxSizing:'border-box'};
    return(
      <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 20px)',animation:pageAnim,background:'transparent',position:'relative',zIndex:1}}>
        <MenuBG dark={darkMode}/>
        <button onClick={goBack} style={backChevron}>‹</button>
        <div style={{width:'100%',maxWidth:330,position:'relative',zIndex:1}}>
          <div style={{textAlign:'center',marginBottom:22}}>
            <div style={{width:64,height:64,borderRadius:'50%',margin:'0 auto 12px',
              background:authMode==='register'?authColor:'linear-gradient(135deg,#8b5cf6,#3b82f6)',
              display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:'0 8px 24px rgba(99,102,241,0.3)'}}>
              <PeopleIcon size={30} color="#fff"/>
            </div>
            <div style={{fontSize:21,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>
              {authMode==='register'?t('registerTitle'):t('loginTitle')}
            </div>
            <div style={{fontSize:12,color:'var(--subtle)',fontWeight:500,marginTop:6}}>{t('loginToTrack')}</div>
          </div>

          <input value={authName} onChange={e=>setAuthName(e.target.value)} placeholder={t('username')} maxLength={16}
            autoCapitalize="off" autoCorrect="off" style={inputStyle}/>
          <input value={authPw} onChange={e=>setAuthPw(e.target.value)} placeholder={t('password')} type="password" maxLength={32}
            onKeyDown={e=>{if(e.key==='Enter')doAuth();}} style={{...inputStyle,marginTop:10}}/>

          {authMode==='register'&&(
            <div style={{marginTop:14}}>
              <div style={{fontSize:11,color:'var(--subtle)',fontWeight:700,letterSpacing:1,marginBottom:8,paddingLeft:2}}>{t('chooseColor').toUpperCase()}</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
                {AVATAR_COLORS.map(c=>(
                  <button key={c} onClick={()=>setAuthColor(c)} style={{
                    width:36,height:36,borderRadius:'50%',background:c,cursor:'pointer',
                    border:authColor===c?'3px solid var(--text)':'3px solid transparent',
                    boxShadow:'0 2px 6px rgba(0,0,0,0.15)',padding:0}}/>
                ))}
              </div>
            </div>
          )}

          {authErr&&<div style={{color:'#ef4444',fontSize:12,fontWeight:600,marginTop:12,textAlign:'center'}}>{authErr}</div>}

          <button onClick={doAuth} disabled={authBusy} style={{
            width:'100%',padding:'14px',marginTop:18,borderRadius:12,
            background:authBusy?'var(--border)':'linear-gradient(135deg,#8b5cf6,#3b82f6)',
            color:'white',border:'none',cursor:authBusy?'default':'pointer',
            fontWeight:800,fontSize:15,fontFamily:'system-ui,-apple-system,sans-serif',
            boxShadow:'0 4px 14px rgba(99,102,241,0.35)'}}>
            {authBusy?'…':(authMode==='register'?t('register'):t('login'))}
          </button>

          <button onClick={()=>{setAuthMode(authMode==='register'?'login':'register');setAuthErr('');}} style={{
            width:'100%',padding:'12px',marginTop:10,background:'none',border:'none',
            color:'var(--subtle)',cursor:'pointer',fontSize:13,fontWeight:600,
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
            {authMode==='register'?t('haveAccount'):t('needAccount')}
          </button>
        </div>
      </div>
    );
  }

  // ── PROFILE ─────────────────────────────────────────────
  if(screen==='profile'){
    if(!account)return null;
    return <ProfileScreen account={account}
      onUpdate={acc=>{setAccount(acc);}}
      onLogout={doLogout}
      t={t} darkMode={darkMode} goBack={goBack}/>;
  }

  // ── DIFFICULTY ──────────────────────────────────────────
  if(screen==='difficulty') return (
    <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 24px)',animation:pageAnim,background:'transparent',position:'relative',zIndex:1}}>
      <MenuBG dark={darkMode}/>
      <MapAura map={selectedMap} dark={darkMode}/>
      <button onClick={goBack} style={backChevron}>‹</button>
      <div style={{width:'100%',maxWidth:300,position:'relative',zIndex:1}}>
        <ScreenHead icon={<BotIcon size={28} color="#fff"/>} iconBg="linear-gradient(135deg,#64748b,#475569)"
          title={t('chooseDifficulty')} sub={t('vsBotDesc')}/>
        <div style={{display:'flex',flexDirection:'column',gap:9}}>
          {[
            {k:'easy',color:'#16a34a',bg:'linear-gradient(135deg,#16a34a,#15803d)'},
            {k:'normal',color:'#eab308',bg:'linear-gradient(135deg,#eab308,#ca8a04)'},
            {k:'hard',color:'#ef4444',bg:'linear-gradient(135deg,#ef4444,#dc2626)'}
          ].map(d=>(
            <MenuItem key={d.k}
              icon={<DotIcon size={18} color="#fff"/>} iconBg={d.bg}
              title={t(d.k)} desc={t(d.k+'Desc')}
              onClick={()=>{setAiDifficulty(d.k);initGame('pvc',undefined,null,false,undefined,false,selectedMap);}}/>
          ))}
        </div>
      </div>
    </div>
  );

  // ── FRIEND PLAY ─────────────────────────────────────────
  if(screen==='friendPlay') return (
    <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 20px)',animation:pageAnim,background:'transparent',position:'relative',zIndex:1}}>
      <MenuBG dark={darkMode}/>
      <MapAura map={selectedMap} dark={darkMode}/>
      <button onClick={goBack} style={backChevron}>‹</button>
      <div style={{width:'100%',maxWidth:300,display:'flex',flexDirection:'column',position:'relative',zIndex:1}}>
        <ScreenHead icon={<PeopleIcon size={28} color="#fff"/>} iconBg="linear-gradient(135deg,#8b5cf6,#7c3aed)"
          title={t('friendPlay')} sub={t('friendDesc')}/>

        {/* Private Lobby erstellen */}
        <button onClick={()=>createLobby(true)} style={{
          width:'100%',padding:'16px 16px',marginBottom:16,
          background:'linear-gradient(135deg,#8b5cf6,#3b82f6)',color:'white',border:'none',
          borderRadius:14,fontWeight:800,fontSize:14,cursor:'pointer',
          display:'flex',alignItems:'center',gap:10,
          boxShadow:'0 4px 14px rgba(139,92,246,0.35)',
          fontFamily:'system-ui,-apple-system,sans-serif'}}>
          <span style={{display:'flex'}}><LockIcon size={22} color="#fff"/></span>
          <div style={{flex:1,textAlign:'left'}}>
            <div style={{fontWeight:800,fontSize:14}}>{t('privateLobby')}</div>
            <div style={{fontSize:10,fontWeight:500,opacity:0.85,marginTop:2}}>{t('shareCode')}</div>
          </div>
          <span style={{fontSize:18}}>›</span>
        </button>

        {/* Join via code */}
        <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginBottom:6,paddingLeft:2}}>
          {t('orJoinCode')}
        </div>
        <input value={codeInput} onChange={e=>setCodeInput(e.target.value.toUpperCase())} placeholder="XXXX"
          maxLength={4}
          style={{width:'100%',padding:'12px 12px',borderRadius:10,border:'1.5px solid var(--border)',
            fontSize:18,fontWeight:800,letterSpacing:6,textAlign:'center',outline:'none',
            fontFamily:'system-ui,-apple-system,sans-serif',background:'var(--card)',color:'var(--text)',
            marginBottom:6,display:'block',boxSizing:'border-box'}}/>
        <button onClick={joinByCode} style={{width:'100%',padding:'12px 14px',background:'#3b82f6',color:'white',
          border:'none',borderRadius:10,fontWeight:700,cursor:'pointer',fontSize:13,
          boxShadow:'0 2px 8px rgba(59,130,246,0.25)',
          fontFamily:'system-ui,-apple-system,sans-serif'}}>{t('join')}</button>

        {flash&&<div style={{color:'#ef4444',fontSize:12,fontWeight:500,marginTop:10,width:'100%',textAlign:'center'}}>{flash}</div>}
      </div>
    </div>
  );

  // ── ONLINE ──────────────────────────────────────────────
  if(screen==='online') return (
    <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 24px)',animation:pageAnim,background:'transparent',position:'relative',zIndex:1}}>
      <MenuBG dark={darkMode}/>
      <MapAura map={selectedMap} dark={darkMode}/>
      <button onClick={goBack} style={backChevron}>‹</button>
      <div style={{width:'100%',maxWidth:340,display:'flex',flexDirection:'column',alignItems:'center',position:'relative',zIndex:1}}>

        {/* Header */}
        <ScreenHead icon={<GlobeIcon size={28} color="#fff"/>} iconBg="linear-gradient(135deg,#3b82f6,#2563eb)"
          title={t('playOnline')} sub={t('vsRandomDesc')}/>

        {/* Create section */}
        <div style={{width:'100%',marginBottom:16}}>
          <button onClick={()=>createLobby(false)} style={{
            width:'100%',padding:'14px 16px',background:'#1e293b',color:'white',border:'none',
            borderRadius:12,fontWeight:700,fontSize:14,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',gap:8,
            boxShadow:'0 2px 8px rgba(30,41,59,0.18)',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
            <span style={{display:'flex'}}><PlusIcon size={18} color="#fff"/></span>
            <span>{t('createLobby')}</span>
          </button>
          <div style={{fontSize:10,color:'var(--subtle)',fontWeight:600,marginTop:6,textAlign:'center'}}>
            {t('mode')}: {gameTimeMode==='none'?t('noTimer'):gameTimeMode} · {gameBarr} <BrickMini size={10}/>
          </div>
        </div>

        {flash&&<div style={{color:'#ef4444',fontSize:12,fontWeight:500,marginBottom:10,width:'100%',textAlign:'center'}}>{flash}</div>}

        {/* Lobby list header */}
        <div style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,paddingLeft:2,paddingRight:2}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'#16a34a',
              animation:'piece-pulse 1.6s ease-in-out infinite'}}/>
            <span style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5}}>{t('live')}</span>
            <span style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginLeft:4}}>· {t('openLobbies')}</span>
          </div>
          {lobbyList.length>0&&(
            <div style={{fontSize:10,fontWeight:700,color:'#3b82f6',
              background:'rgba(59,130,246,0.1)',padding:'2px 8px',borderRadius:10}}>
              {lobbyList.length} {t('lobbyCount')}
            </div>
          )}
        </div>

        {/* Scrollable lobby list */}
        <div style={{
          width:'100%',maxHeight:240,overflowY:'auto',overflowX:'hidden',
          borderRadius:12,background:'var(--card)',border:'1.5px solid var(--border)',
          WebkitOverflowScrolling:'touch',
          boxShadow:'inset 0 2px 6px rgba(0,0,0,0.04)'}}>
          {lobbyList.length===0?(
            <div style={{padding:'34px 20px',textAlign:'center'}}>
              <div style={{marginBottom:8,opacity:0.4,display:'flex',justifyContent:'center'}}><MazeIcon size={30} color="var(--muted)"/></div>
              <div style={{fontSize:13,fontWeight:700,color:'var(--muted)',marginBottom:4}}>{t('noLobbies')}</div>
              <div style={{fontSize:11,color:'var(--subtle)',fontWeight:500}}>{t('noLobbiesHint')}</div>
            </div>
          ):(
            <div style={{padding:6,display:'flex',flexDirection:'column',gap:5}}>
              {lobbyList.map(l=>{
                const age=Math.floor((Date.now()-l.ts)/1000);
                const ageLabel=age<60?`${age}s`:`${Math.floor(age/60)}m`;
                const tm=l.tm||'none';
                const isClassic=tm.indexOf('classic-')===0;
                const isBlitz=tm.indexOf('blitz-')===0;
                return(
                  <div key={l.id} onClick={()=>joinLobby(l.id)}
                    style={{padding:'10px 12px',background:'var(--bg)',borderRadius:9,
                      border:'1px solid var(--border-soft)',cursor:'pointer',
                      transition:'all 0.15s'}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:l.tm||l.ch?6:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <div style={{width:30,height:30,borderRadius:8,background:'linear-gradient(135deg,#ef4444,#3b82f6)',
                          display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,
                          boxShadow:'0 2px 6px rgba(0,0,0,0.12)'}}><SwordsIcon size={16} color="#fff"/></div>
                        <div>
                          <div style={{fontSize:13,fontWeight:700,color:'var(--text)',letterSpacing:0.5}}>
                            {t('lobby')} {l.id.slice(0,4).toUpperCase()}
                          </div>
                          <div style={{fontSize:10,color:'var(--subtle)',fontWeight:600,marginTop:1}}>
                            {ageLabel} · 1/2
                          </div>
                        </div>
                      </div>
                      <div style={{padding:'5px 12px',background:'#3b82f6',color:'white',
                        borderRadius:14,fontSize:11,fontWeight:700,
                        boxShadow:'0 2px 6px rgba(59,130,246,0.3)'}}>
                        {t('join')}
                      </div>
                    </div>
                    {(isClassic||isBlitz||l.ch||l.br||l.map)&&(
                      <div style={{display:'flex',gap:4,flexWrap:'wrap',paddingLeft:40}}>
                        {l.map&&(
                          <div style={{padding:'2px 7px',borderRadius:8,fontSize:9,fontWeight:800,letterSpacing:0.3,
                            background:l.map==='duel'?'rgba(139,92,246,0.15)':'rgba(59,130,246,0.12)',
                            color:l.map==='duel'?'#8b5cf6':'#3b82f6'}}>
                            {l.map==='duel'?('\u2694 '+t('duel')):('\uD83C\uDFC1 '+t('classic'))}
                          </div>
                        )}
                        {isClassic&&(
                          <div style={{padding:'2px 7px',borderRadius:8,fontSize:9,fontWeight:800,letterSpacing:0.3,
                            background:'rgba(59,130,246,0.12)',color:'#3b82f6'}}>
                            <ModeGlyph kind="clock" size={10} color="#3b82f6"/> {tm==='classic-3'?'3':tm==='classic-5'?'5':'8'}{t('minLabel')}
                          </div>
                        )}
                        {isBlitz&&(
                          <div style={{padding:'2px 7px',borderRadius:8,fontSize:9,fontWeight:800,letterSpacing:0.3,
                            background:'rgba(245,158,11,0.15)',color:'#d97706'}}>
                            <ModeGlyph kind="bolt" size={10} color="#d97706"/> {tm==='blitz-5'?'5':tm==='blitz-8'?'8':'10'}{t('secLabel')}
                          </div>
                        )}
                        {l.ch&&(
                          <div style={{padding:'2px 7px',borderRadius:8,fontSize:9,fontWeight:800,letterSpacing:0.3,
                            background:'rgba(139,92,246,0.15)',color:'#8b5cf6'}}>
                            <ModeGlyph kind="swirl" size={10} color="#8b5cf6"/> {t('modeChaos')}
                          </div>
                        )}
                        {l.br&&(
                          <div style={{padding:'2px 7px',borderRadius:8,fontSize:9,fontWeight:800,letterSpacing:0.3,
                            background:'var(--card)',color:'var(--muted)',border:'1px solid var(--border-soft)'}}>
                            <BrickMini size={9}/> {l.br}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );

  // ── LOBBY CONFIG ────────────────────────────────────────
  if(screen==='lobbyConfig'){
    const VisRow=({k,icon,desc})=>{
      const sel=lobbyCfgPrivate===(k==='private');
      return(
        <button onClick={()=>setLobbyCfgPrivate(k==='private')} style={{
          width:'100%',padding:'12px 14px',marginBottom:6,
          background:sel?'var(--text)':'var(--card)',
          color:sel?'var(--bg)':'var(--text)',
          border:`1.5px solid ${sel?'var(--text)':'var(--border)'}`,
          borderRadius:11,cursor:'pointer',textAlign:'left',
          display:'flex',alignItems:'center',gap:10,
          fontFamily:'system-ui,-apple-system,sans-serif'}}>
          <span style={{display:'flex'}}>{icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:800,marginBottom:1}}>{t(k)}</div>
            <div style={{fontSize:10,fontWeight:500,opacity:0.7}}>{desc}</div>
          </div>
          {sel&&<span style={{fontSize:14,fontWeight:900}}>✓</span>}
        </button>
      );
    };
    const ModeRow=({k,icon,desc,disabled})=>{
      const sel=lobbyCfgMode===k;
      return(
        <button onClick={()=>!disabled&&setLobbyCfgMode(k)} disabled={disabled} style={{
          width:'100%',padding:'12px 14px',marginBottom:6,
          background:sel?'var(--text)':'var(--card)',
          color:sel?'var(--bg)':'var(--text)',
          border:`1.5px solid ${sel?'var(--text)':'var(--border)'}`,
          borderRadius:11,cursor:disabled?'not-allowed':'pointer',textAlign:'left',
          display:'flex',alignItems:'center',gap:10,opacity:disabled?0.5:1,
          fontFamily:'system-ui,-apple-system,sans-serif'}}>
          <span style={{display:'flex'}}>{icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:800,marginBottom:1,display:'flex',alignItems:'center',gap:6}}>
              {t(k)}
              {disabled&&<span style={{fontSize:8,fontWeight:700,letterSpacing:0.5,
                background:'#f59e0b',color:'white',padding:'1px 6px',borderRadius:6}}>SOON</span>}
            </div>
            <div style={{fontSize:10,fontWeight:500,opacity:0.7}}>{disabled?t('comingSoon'):desc}</div>
          </div>
          {sel&&<span style={{fontSize:14,fontWeight:900}}>✓</span>}
        </button>
      );
    };
    return(
      <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 24px)',background:'transparent',position:'relative',zIndex:1}}>
        <MenuBG dark={darkMode}/>
        <MapAura map={selectedMap} dark={darkMode}/>
        <div style={{width:'100%',maxWidth:340,position:'relative',zIndex:1}}>
          <div style={{textAlign:'center',marginBottom:22}}>
            <div style={{marginBottom:6,display:'flex',justifyContent:'center'}}><GearIcon size={24} color="var(--text)"/></div>
            <div style={{fontSize:20,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>{t('lobbySettings')}</div>
          </div>
          <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginBottom:8,paddingLeft:2}}>
            {t('visibility').toUpperCase()}
          </div>
          <VisRow k="public" icon={<GlobeIcon size={20}/>} desc={t('publicDesc')}/>
          <VisRow k="private" icon={<LockIcon size={20}/>} desc={t('privateDesc')}/>
          <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginTop:16,marginBottom:8,paddingLeft:2}}>
            {t('gameMode').toUpperCase()}
          </div>
          <ModeRow k="classic" icon={<SwordsIcon size={20}/>} desc={t('classicDesc')}/>
          <ModeRow k="ranked" icon={<TrophyIcon size={20}/>} desc={t('rankedDesc')} disabled/>
          {/* Übersicht: diese Lobby wird mit den Einstellungen aus dem Modus-Menü erstellt */}
          <div style={{marginTop:14,padding:'10px 12px',borderRadius:11,
            background:selectedMap==='duel'?'rgba(139,92,246,0.1)':'rgba(59,130,246,0.08)',
            border:'1.5px solid '+(selectedMap==='duel'?'rgba(139,92,246,0.3)':'rgba(59,130,246,0.25)')}}>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:1,color:'var(--subtle)',marginBottom:5}}>{t('thisLobby')}</div>
            <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
              <span style={{padding:'3px 8px',borderRadius:8,fontSize:10,fontWeight:800,
                background:selectedMap==='duel'?'rgba(139,92,246,0.2)':'rgba(59,130,246,0.16)',
                color:selectedMap==='duel'?'#8b5cf6':'#3b82f6'}}>
                {selectedMap==='duel'?('\u2694 '+t('duel')):('\uD83C\uDFC1 '+t('classic'))}
              </span>
              <span style={{fontSize:11,fontWeight:700,color:'var(--muted)'}}>
                {gameTimeMode==='none'?t('noTimer')
                  :gameTimeMode.indexOf('classic-')===0?(gameTimeMode.split('-')[1]+' '+t('minLabel'))
                  :(gameTimeMode.split('-')[1]+t('secLabel')+' '+t('perTurn'))}
              </span>
              <span style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'inline-flex',alignItems:'center',gap:3}}>· {gameBarr} <BrickMini size={10}/></span>
              {chaosMode&&<span style={{fontSize:10,fontWeight:700,color:'#8b5cf6'}}>· {t('modeChaos')}</span>}
              {hammerMode&&<span style={{fontSize:10,fontWeight:700,color:'#d97706'}}>· {t('hammerMode')}</span>}
            </div>
            <div style={{fontSize:9,color:'var(--subtle)',marginTop:6}}>Ändern im Menü unter „{t('mode')}"</div>
          </div>
          <button onClick={()=>createLobby(lobbyCfgPrivate)} style={{
            width:'100%',padding:'14px 16px',marginTop:22,
            background:'#3b82f6',color:'white',border:'none',borderRadius:12,
            fontWeight:800,fontSize:14,cursor:'pointer',
            boxShadow:'0 4px 14px rgba(59,130,246,0.35)',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
            {t('createNow')}
          </button>
          <button onClick={()=>setScreen('online')} style={{...sBack,width:'100%',textAlign:'center'}}>{t('back')}</button>
        </div>
      </div>
    );
  }

  // ── WAITING ─────────────────────────────────────────────
  if(screen==='waiting'){
    const baseUrl=(typeof window!=='undefined'&&window.location)?(window.location.origin+window.location.pathname):'https://yavrukusch.github.io/WrongWay/';
    const shareUrl=baseUrl+'?join='+(privateCode||'');
    const waMsg=encodeURIComponent('Spiel mit mir Wrong Way! Code: '+(privateCode||'')+' · '+shareUrl);
    return(
    <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 30px)',background:'transparent',position:'relative',zIndex:1}}>
      <MenuBG dark={darkMode}/>
      <div style={{width:'100%',maxWidth:340,display:'flex',flexDirection:'column',alignItems:'center',position:'relative',zIndex:1}}>
        <div style={{fontSize:18,fontWeight:800,color:'var(--text)',marginBottom:18,textAlign:'center'}}>
          {onlineRole==='A'?(privateCode?t('waitingPrivate'):t('waitingOpponent')):t('connecting')}
        </div>
        {privateCode&&(
          <>
            <div style={{fontSize:30,fontWeight:900,letterSpacing:7,color:'var(--text)',
              background:'var(--card)',padding:'18px 32px',borderRadius:16,marginBottom:14,
              border:'2px solid var(--border)',boxShadow:'var(--shadow-soft)'}}>
              {privateCode}
            </div>
            <button onClick={()=>{
              try{navigator.clipboard.writeText(privateCode);setCopyFlash(true);setTimeout(()=>setCopyFlash(false),1500);}catch(e){}
            }} style={{padding:'7px 16px',background:'var(--card)',
              border:'1.5px solid var(--border)',borderRadius:20,
              fontSize:11,fontWeight:700,color:'var(--text)',cursor:'pointer',marginBottom:18,
              fontFamily:'system-ui,-apple-system,sans-serif'}}>
              {copyFlash?<span style={{display:'inline-flex',alignItems:'center',gap:5}}><CheckIcon size={13} color="currentColor"/>{t('copied')}</span>:<span style={{display:'inline-flex',alignItems:'center',gap:5}}><ClipboardIcon size={14}/>{t('copyCode')}</span>}
            </button>

            {/* QR Code */}
            <div style={{background:'white',padding:10,borderRadius:14,marginBottom:14,
              boxShadow:'var(--shadow-soft)',border:'1.5px solid var(--border)'}}>
              <img alt="QR" src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=0&data=${encodeURIComponent(shareUrl)}`}
                style={{width:160,height:160,display:'block'}}/>
            </div>
            <div style={{fontSize:10,fontWeight:700,color:'var(--subtle)',letterSpacing:1,marginBottom:18}}>
              {t('scanQR')}
            </div>

            {/* WhatsApp Share */}
            <a href={`https://wa.me/?text=${waMsg}`} target="_blank" rel="noopener noreferrer"
              style={{width:'100%',padding:'12px 14px',background:'#25D366',color:'white',
                border:'none',borderRadius:12,fontWeight:800,cursor:'pointer',fontSize:13,
                textDecoration:'none',textAlign:'center',display:'block',
                boxShadow:'0 4px 12px rgba(37,211,102,0.32)',
                fontFamily:'system-ui,-apple-system,sans-serif',marginBottom:20}}>
              <span style={{display:'inline-flex',alignItems:'center',gap:8,justifyContent:'center'}}><PhoneIcon size={15} color="#fff"/>{t('shareWhatsApp')}</span>
            </a>
          </>
        )}
        <div style={{fontSize:12,color:'var(--subtle)',marginBottom:22,textAlign:'center'}}>
          {onlineRole==='A'?t('shareCode'):t('waitingStart')}
        </div>
        <button onClick={async()=>{await cleanupLobby(lobbyId);setScreen('menu');setLobbyId(null);setPrivateCode(null);}} style={sBack}>{t('cancel')}</button>
      </div>
    </div>
    );
  }

  // ── REPLAY ──────────────────────────────────────────────
  if(screen==='replay'){
    const rEntry=replayHistEntry;
    const rMoves=rEntry?rEntry.moveHist:moveHist;
    const rMap=rEntry?rEntry.map:selectedMap;
    const rSize=rEntry?rEntry.duelSize:duelSize;
    applyBoardSize(rMap,rSize);
    const rs=applyMovesWithOwner(rMoves,replayStep,rMap);
    const curMove=rMoves[replayStep];
    const progress=rMoves.length>0?Math.round((replayStep/rMoves.length)*100):0;
    const rNameA=rEntry&&rEntry.nameA?rEntry.nameA:pname('A');
    const rNameB=rEntry&&rEntry.nameB?rEntry.nameB:pname('B');
    const rPname=p=>p==='A'?rNameA:rNameB;
    const rWinner=rEntry?rEntry.winner:winner;
    const isEnd=replayStep>=rMoves.length;
    // Emote aus aktuellem Move
    const curEmote=curMove&&curMove.type==='emote'?curMove:null;
    // Emote aus vorherigem Move (bleibt kurz sichtbar)
    const prevMove=replayStep>0?rMoves[replayStep-1]:null;
    const prevEmote=prevMove&&prevMove.type==='emote'?prevMove:null;
    const activeEmote=curEmote||prevEmote||null;
    return (
      <div style={{...sCont,paddingBottom:80,paddingTop:'calc(env(safe-area-inset-top) + 16px)'}}>
        {/* Gewinner-Tanz am Ende */}
        {isEnd&&rWinner&&(
          <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
            zIndex:500,pointerEvents:'none',background:'rgba(0,0,0,0.15)'}}>
            <Confetti color={PC[rWinner]}/>
            <div style={{animation:'person-grow 0.3s ease-out both'}}>
              <WinnerPerson color={PC[rWinner]} dark={PD[rWinner]} speed={danceSpeed} dance={danceStyle}/>
            </div>
          </div>
        )}

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',maxWidth:360,marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:28,height:28,borderRadius:9,
              background:'linear-gradient(140deg,#ef4444 0%,#8b5cf6 52%,#3b82f6 100%)',
              display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:'0 2px 8px rgba(99,102,241,0.3)'}}>
              <BrickWallIcon size={16} light/>
            </div>
            <div style={{fontSize:15,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>{t('replay')}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,
            background:'var(--card)',border:'1.5px solid var(--border)',
            borderRadius:20,padding:'4px 12px',boxShadow:'var(--shadow-soft)'}}>
            <ReplayIcon size={12}/>
            <span style={{fontSize:12,fontWeight:800,color:'var(--text)',fontVariantNumeric:'tabular-nums'}}>
              {replayStep}<span style={{color:'var(--subtle)'}}>/{rMoves.length}</span>
            </span>
          </div>
        </div>

        {/* Progress bar */}
        <div style={{width:'100%',maxWidth:360,height:3,background:'var(--border)',borderRadius:2,marginBottom:10,overflow:'hidden'}}>
          <div style={{height:'100%',width:progress+'%',background:'linear-gradient(90deg,#3b82f6,#8b5cf6)',borderRadius:2,transition:'width 0.15s'}}/>
        </div>

        <div style={{fontSize:9,letterSpacing:3,color:'#16a34a',fontWeight:700,textTransform:'uppercase',marginBottom:2}}>{rMap==='duel'?'>> '+t('goalLabel')+' (Rot)':t('goalLabel')}</div>
        <div style={{position:'relative',width:COLS*CELL,height:ROWS*CELL,...sGrid}}>
          {Array.from({length:ROWS},function(_,r){return Array.from({length:COLS},function(_,c){return(
            <div key={r+'-'+c} style={{position:'absolute',left:c*CELL,top:r*CELL,width:CELL,height:CELL,
              background:r===0?'var(--goal)':r===ROWS-1?(rMap==='duel'?'var(--goal)':'var(--start)'):(r+c)%2===0?'var(--cell-b)':'var(--cell-a)',
              border:'1px solid var(--cell-line)',boxSizing:'border-box'}}>
              {r===0&&<div style={{position:'absolute',top:0,left:0,right:0,height:3,background:'linear-gradient(90deg,#16a34a,#22c55e)'}}/>}
              {rMap==='duel'&&r===ROWS-1&&<div style={{position:'absolute',bottom:0,left:0,right:0,height:3,background:'linear-gradient(90deg,#16a34a,#22c55e)'}}/>}
            </div>
          );})})}
          {[...rs.walls].map(function(k){
            var owner=rs.wallOwner[k];
            var wallColor=owner?PC[owner]:(darkMode?'#e2e8f0':'#1e293b');
            return <Wall key={k} wkey={k} color={wallColor} opacity={1} steel={isSteelWall(k)} steelColor={owner?PC[owner]:null}/>;
          })}
          {['A','B'].map(function(p){var pos=p==='A'?rs.pA:rs.pB;var sz=30,off=(CELL-sz)/2;return(
            <div key={p} style={{position:'absolute',left:pos.c*CELL+off,top:pos.r*CELL+off,width:sz,height:sz,
              transition:'left 0.15s ease,top 0.15s ease',zIndex:20,pointerEvents:'none'}}>
              <Piece color={PC[p]} dark={PD[p]}/>
            </div>
          );})}
          {/* Emote-Anzeige neben Spieler */}
          {activeEmote&&(
            <div key={replayStep+'e'} style={{position:'absolute',
              left:(activeEmote.p==='A'?rs.pA.c:rs.pB.c)*CELL+CELL+4,
              top:(activeEmote.p==='A'?rs.pA.r:rs.pB.r)*CELL-18,
              zIndex:30,pointerEvents:'none',animation:'emote-pop 0.35s cubic-bezier(0.34,1.56,0.64,1) both'}}>
              <EmoteChar color={PC[activeEmote.p]} dark={PD[activeEmote.p]} type={activeEmote.emote}/>
            </div>
          )}
        </div>
        <div style={{fontSize:9,letterSpacing:3,color:rMap==='duel'?'#16a34a':'var(--subtle)',fontWeight:rMap==='duel'?700:600,textTransform:'uppercase',marginTop:2,marginBottom:14}}>{rMap==='duel'?'<< '+t('goalLabel')+' (Blau)':t('startLabel')}</div>

        {/* Legende Wandfarben */}
        <div style={{display:'flex',gap:12,marginBottom:12,alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:18,height:5,borderRadius:3,background:'#ef4444'}}/>
            <span style={{fontSize:10,fontWeight:700,color:'var(--subtle)'}}>{rNameA}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:18,height:5,borderRadius:3,background:'#3b82f6'}}/>
            <span style={{fontSize:10,fontWeight:700,color:'var(--subtle)'}}>{rNameB}</span>
          </div>
        </div>

        {/* Current move info */}
        {curMove&&(
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',marginBottom:12,
            background:'var(--card)',border:'1.5px solid var(--border)',borderRadius:12,
            boxShadow:'var(--shadow-soft)'}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:PC[curMove.p],flexShrink:0}}/>
            <span style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>{rPname(curMove.p)}</span>
            <span style={{fontSize:12,color:'var(--subtle)'}}>-</span>
            <span style={{fontSize:12,fontWeight:600,color:'var(--subtle)'}}>
              {curMove.type==='move'?t('step'):curMove.type==='emote'?('Emote'):t('wallPlaced')}
            </span>
          </div>
        )}
        {isEnd&&rWinner&&(
          <div style={{padding:'8px 16px',borderRadius:12,background:PC[rWinner]+'22',
            border:'1.5px solid '+PC[rWinner]+'55',fontSize:13,fontWeight:800,
            color:PC[rWinner],textAlign:'center',marginBottom:12}}>
            {rPname(rWinner)} {t('wins')}
          </div>
        )}

        {/* Navigation */}
        <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:16}}>
          <button onClick={function(){setReplayStep(function(s){return Math.max(0,s-1);});}} disabled={replayStep===0}
            style={{flex:1,padding:'12px',borderRadius:12,border:'1.5px solid var(--border)',
              background:'var(--card)',color:replayStep===0?'var(--subtle)':'var(--text)',
              fontSize:18,cursor:replayStep===0?'not-allowed':'pointer',
              opacity:replayStep===0?0.4:1,fontFamily:'system-ui,-apple-system,sans-serif',
              boxShadow:'var(--shadow-soft)'}}>|◀</button>
          <button onClick={function(){setReplayStep(function(s){return Math.min(rMoves.length,s+1);});}} disabled={replayStep>=rMoves.length}
            style={{flex:1,padding:'12px',borderRadius:12,border:'none',
              background:replayStep>=rMoves.length?'var(--border)':'linear-gradient(135deg,#3b82f6,#8b5cf6)',
              color:'white',fontSize:18,cursor:replayStep>=rMoves.length?'not-allowed':'pointer',
              opacity:replayStep>=rMoves.length?0.4:1,fontFamily:'system-ui,-apple-system,sans-serif',
              boxShadow:replayStep>=rMoves.length?'none':'0 3px 10px rgba(59,130,246,0.3)'}}>▶|</button>
        </div>

        <button onClick={function(){
          setReplayHistEntry(null);
          setScreen(rEntry?'replayHistory':'end');
        }} style={{
          padding:'11px 28px',borderRadius:12,background:'var(--card)',
          border:'1.5px solid var(--border)',color:'var(--text)',cursor:'pointer',
          fontWeight:700,fontSize:13,fontFamily:'system-ui,-apple-system,sans-serif',
          boxShadow:'var(--shadow-soft)'}}>{t('back')}</button>
      </div>
    );
  }

  // ── END ──────────────────────────────────────────────────
  if(screen==='end'){
    const myRematch=onlineRole==='A'?rematchA:rematchB;
    const otherRematch=onlineRole==='A'?rematchB:rematchA;
    const otherDeclined=rematchDeclined&&rematchDeclined!==onlineRole;
    const isLoss=isOwnLoss(winner);
    const canAddFriend=gameMode==='online'&&account&&oppAccountKey&&oppAccountKey!==account.key&&!addFriendSent;
    return (
      <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 32px)',
        background:'transparent',position:'relative',zIndex:1,animation:'fadeSlideUp 0.35s cubic-bezier(0.34,1.56,0.64,1) both'}}>
        <MenuBG dark={darkMode}/>
        {winner&&!isLoss&&<Confetti color={PC[winner]}/>}

        {/* Winner Card */}
        <div style={{width:'100%',maxWidth:300,position:'relative',zIndex:1}}>
          <div style={{borderRadius:22,overflow:'hidden',
            boxShadow:winner?`0 12px 40px ${PC[winner]}40`:'0 8px 24px rgba(0,0,0,0.12)',
            marginBottom:16}}>
            {/* Top color stripe */}
            <div style={{height:6,background:winner?`linear-gradient(90deg,${PC[winner]},${PC[winner]}88)`:'var(--border)'}}/>
            <div style={{background:'var(--card)',padding:'24px 20px',textAlign:'center'}}>
              <div style={{marginBottom:12,animation:'trophy-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both'}}>
                {winner&&isLoss?<SadIcon size={52}/>:<TrophyIcon size={52}/>}
              </div>
              <div style={{fontSize:26,fontWeight:900,letterSpacing:-0.8,lineHeight:1.1,
                color:winner?PC[winner]:'var(--text)',marginBottom:4}}>
                {winner?pname(winner):t('givenUp')}
              </div>
              <div style={{fontSize:14,fontWeight:700,color:'var(--subtle)',marginBottom:gaveUp?8:0}}>
                {winner?t('wins'):''}
              </div>
              {gaveUp&&(
                <div style={{fontSize:12,fontWeight:700,color:'#ef4444',
                  background:'rgba(239,68,68,0.09)',padding:'5px 12px',borderRadius:10,display:'inline-block'}}>
                  {pname(gaveUp)} {t('lostGiveUp')}
                </div>
              )}
            </div>
          </div>

          {/* ELO-Änderung nach Ranked */}
          {isRanked&&eloChange&&(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:'12px 16px',marginBottom:12,
              borderRadius:14,
              background:eloChange.won?'rgba(22,163,74,0.10)':'rgba(239,68,68,0.08)',
              border:'1.5px solid '+(eloChange.won?'rgba(22,163,74,0.25)':'rgba(239,68,68,0.2)')}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--subtle)',letterSpacing:0.5,marginBottom:2}}>RANKED ELO</div>
                <div style={{fontSize:22,fontWeight:900,color:eloChange.won?'#16a34a':'#ef4444',letterSpacing:-0.5}}>
                  {eloChange.change>=0?'+':''}{eloChange.change}
                </div>
                <div style={{fontSize:11,color:'var(--subtle)',fontWeight:600,marginTop:1}}>{eloChange.newRating} ELO</div>
              </div>
            </div>
          )}
          {gameMode==='online'&&otherDeclined&&(
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',marginBottom:12,
              background:'rgba(239,68,68,0.08)',border:'1.5px solid rgba(239,68,68,0.2)',borderRadius:12}}>
              <span style={{fontSize:14}}>✗</span>
              <span style={{fontSize:13,fontWeight:700,color:'#ef4444'}}>{t('rematchDeclined')}</span>
            </div>
          )}
          {gameMode==='online'&&!otherDeclined&&myRematch&&!otherRematch&&(
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',marginBottom:12,
              background:'rgba(245,158,11,0.08)',border:'1.5px solid rgba(245,158,11,0.2)',borderRadius:12}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:'#f59e0b',
                animation:'piece-pulse 1.4s ease-in-out infinite',flexShrink:0}}/>
              <span style={{fontSize:13,fontWeight:700,color:'#f59e0b'}}>{t('rematchWaiting')}</span>
            </div>
          )}
          {gameMode==='online'&&!otherDeclined&&!myRematch&&otherRematch&&(
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',marginBottom:12,
              background:'rgba(22,163,74,0.08)',border:'1.5px solid rgba(22,163,74,0.2)',borderRadius:12}}>
              <span style={{fontSize:14}}>↻</span>
              <span style={{fontSize:13,fontWeight:700,color:'#16a34a'}}>{t('rematchAsked')}</span>
            </div>
          )}

          {/* Action buttons */}
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            {gameMode!=='online'&&(
              <MenuItem icon={<RematchIcon size={18} color="#fff"/>}
                iconBg="linear-gradient(135deg,#16a34a,#15803d)"
                title={t('rematch')} desc={t('rematchDescLocal')||'Same mode, new round'}
                highlight highlightBg="linear-gradient(135deg,#16a34a,#15803d)"
                onClick={()=>initGame(gameMode,'A',null,true)}/>
            )}
            {gameMode==='online'&&!otherDeclined&&!myRematch&&(
              <MenuItem icon={<RematchIcon size={18} color="#fff"/>}
                iconBg="linear-gradient(135deg,#16a34a,#15803d)"
                title={t('rematch')} desc={t('rematchDescOnline')||'Challenge opponent to rematch'}
                highlight highlightBg="linear-gradient(135deg,#16a34a,#15803d)"
                onClick={requestRematch}/>
            )}
            {canAddFriend&&(
              <MenuItem icon={<PeopleIcon size={18} color="#fff"/>}
                iconBg="linear-gradient(135deg,#8b5cf6,#6d28d9)"
                title={t('addFriendTitle')} desc={t('addFriendDesc')}
                onClick={async()=>{
                  await sendFriendRequestByKey(account.key,oppAccountKey);
                  setAddFriendSent(true);
                }}/>
            )}
            {addFriendSent&&(
              <div style={{padding:'10px 14px',borderRadius:12,background:'rgba(139,92,246,0.08)',
                border:'1.5px solid rgba(139,92,246,0.2)',fontSize:13,fontWeight:700,color:'#8b5cf6',textAlign:'center'}}>
                ✓ {t('friends_sent')}
              </div>
            )}
            <MenuItem icon={<ReplayIcon size={18}/>} iconBg="linear-gradient(135deg,#64748b,#475569)"
                title={t('replayBtn')} desc={t('replayDesc')||'Watch game move by move'}
                onClick={()=>{
                  if(gameMode==='online'&&myRematch)declineRematch();
                  setReplayStep(0);setScreen('replay');
                }}/>
            <MenuItem icon={<HomeIcon size={18}/>} iconBg="linear-gradient(135deg,#3b82f6,#2563eb)"
              title={t('menu')} desc="Zurück zum Hauptmenü"
              onClick={()=>{
                if(gameMode==='online'&&myRematch)declineRematch();
                setScreen('menu');setGameMode(null);setLobbyId(null);
              }}/>
          </div>
        </div>
      </div>
    );
  }

  // ── GAME ─────────────────────────────────────────────────
  const isOnlineWait=gameMode==='online'&&!myTurn&&!winner;
  return (
    <div style={{...sCont,paddingBottom:'calc(100px + env(safe-area-inset-bottom, 0px))'}}>

      {/* Ghost */}
      {dragging&&(
        snapPos
          ? <div style={{position:'fixed',pointerEvents:'none',zIndex:1000,width:gW,height:gH,
              background:previewValid?'#f59e0b':'#ef4444',borderRadius:4,opacity:0.9,
              boxShadow:previewValid?'0 0 20px #f59e0b80':'0 0 20px #ef444480',
              left:snapPos.x-gW/2,top:snapPos.y-gH/2,transition:'left 0.05s,top 0.05s,background 0.12s'}}/>
          : <div style={{position:'fixed',pointerEvents:'none',zIndex:1000,width:44,height:44,borderRadius:'50%',
              background:'#94a3b8',opacity:0.85,left:ghostPos.x-22,top:ghostPos.y-22-90,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'white',fontWeight:800}}>✕</div>
      )}

      {/* Hammer-Ghost */}
      {hammerDrag&&(
        <div style={{position:'fixed',pointerEvents:'none',zIndex:1000,
          left:ghostPos.x-24,top:ghostPos.y-24-90,
          animation:'hammer-float 1s ease-in-out infinite'}}>
          <HammerIcon size={48}/>
        </div>
      )}

      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',maxWidth:360,marginBottom:12}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:28,height:28,borderRadius:9,
            background:'linear-gradient(140deg,#ef4444 0%,#8b5cf6 52%,#3b82f6 100%)',
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:'0 2px 8px rgba(99,102,241,0.3)'}}>
            <BrickWallIcon size={16} light/>
          </div>
          <div style={{fontSize:15,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>{t('title')}</div>
        </div>
        {!winner&&(
          <button onClick={handleGiveUp} style={{
            padding:'6px 15px',fontSize:11,fontWeight:800,cursor:'pointer',
            background:giveUpArmed?'#ef4444':'var(--card)',
            color:giveUpArmed?'white':'var(--subtle)',
            border:`1.5px solid ${giveUpArmed?'#ef4444':'var(--border)'}`,
            borderRadius:20,transition:'all 0.2s',boxShadow:giveUpArmed?'0 2px 10px rgba(239,68,68,0.35)':'var(--shadow-soft)',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
            {giveUpArmed?t('sure'):t('giveUp')}
          </button>
        )}

              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {chatMsgs.map((m,i)=>{
                  const mine=m.u===onlineRole;
                  const col=PC[m.u]||'#8b5cf6';
                  return(
                    <div key={i} style={{
                      display:'flex',flexDirection:'column',
                      alignItems:mine?'flex-end':'flex-start'}}>
                      <div style={{fontSize:9,fontWeight:700,color:col,
                        marginBottom:2,paddingLeft:mine?0:4,paddingRight:mine?4:0,letterSpacing:0.5}}>
                        {mine?t('you'):pname(m.u)}
                      </div>
                      <div style={{
                        maxWidth:'82%',padding:'7px 11px',borderRadius:13,
                        background:mine?col:'var(--bg)',
                        color:mine?'white':'var(--text)',
                        border:mine?'none':'1px solid var(--border-soft)',
                        fontSize:12,fontWeight:500,lineHeight:1.35,
                        wordBreak:'break-word',whiteSpace:'pre-wrap',
                        borderBottomRightRadius:mine?4:13,
                        borderBottomLeftRadius:mine?13:4}}>
                        {m.m}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          <div style={{display:'flex',gap:6,marginTop:8}}>
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();sendChat();}}}
              placeholder={t('chatPlaceholder')} maxLength={140}
              style={{flex:1,padding:'10px 12px',borderRadius:10,border:'1.5px solid var(--border)',
                fontSize:13,outline:'none',
                fontFamily:'system-ui,-apple-system,sans-serif',background:'var(--card)',color:'var(--text)',
                boxSizing:'border-box',minWidth:0}}/>
            <button onClick={sendChat} disabled={!chatInput.trim()}
              style={{padding:'10px 16px',background:chatInput.trim()?'#8b5cf6':'var(--border)',
                color:'white',border:'none',borderRadius:10,fontWeight:700,
                cursor:chatInput.trim()?'pointer':'not-allowed',fontSize:13,
                boxShadow:chatInput.trim()?'0 2px 8px rgba(139,92,246,0.3)':'none',
                fontFamily:'system-ui,-apple-system,sans-serif',
                transition:'all 0.15s',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <SendIcon size={16} color="#fff"/>
            </button>
          </div>
        </div>
      )}

      {/* Sprachblase-Button unten links */}
      {!winner&&screen==='game'&&(
        <button onClick={()=>!emoteCooldown&&setEmotePicker(p=>!p)}
          disabled={emoteCooldown}
          style={{
            position:'fixed',left:14,bottom:16,zIndex:200,
            width:48,height:48,borderRadius:'50%',
            background:darkMode?'rgba(30,41,68,0.75)':'rgba(255,255,255,0.78)',
            backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',
            border:`1px solid ${darkMode?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.85)'}`,
            boxShadow:'0 4px 14px rgba(0,0,0,0.12)',
            cursor:emoteCooldown?'not-allowed':'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:22,opacity:emoteCooldown?0.45:1,
            animation:emotePicker?'none':'bubble-pulse 2.5s ease-in-out infinite',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
          <BubbleIcon size={24} color={darkMode?'#c4b5fd':'#8b5cf6'}/>
        </button>
      )}
    </div>
  );
}

const DANCES={

  twerk:{body:'dance-twerk',handL:'twerk-hand-l',handR:'twerk-hand-r',head:'twerk-head',belly:'twerk-belly',legL:'twerk-leg-l',legR:'twerk-leg-r',slow:0.5,fast:0.32,ease:'ease-in-out'}
};

// Gesichts-Content für ein bestimmtes Emote — wird in Kopf eingebettet
function EmoteFace({type,dark,animate}){
  if(type==='laugh')return(
    <g>
      {/* Lachende zusammengekniffene Augen ^^ — dicker, expressiver */}
      <path d="M 18 22 Q 24 14 30 22" stroke="white" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
      <path d="M 34 22 Q 40 14 46 22" stroke="white" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
      {/* Wangen-Röte (rot vor Lachen) */}
      <ellipse cx="16" cy="28" rx="3.5" ry="2.5" fill="#fbb6ce" opacity="0.7"/>
      <ellipse cx="48" cy="28" rx="3.5" ry="2.5" fill="#fbb6ce" opacity="0.7"/>
      {/* Riesiger offener lachender Mund */}
      <path d="M 16 28 Q 32 44 48 28 Q 32 42 16 28 Z" fill="white" stroke={dark} strokeWidth="1"/>

      <path d="M 32 33 L 32 38" stroke="#dc2626" strokeWidth="0.8" opacity="0.6"/>

        <circle cx="14" cy="24" r="1.8" fill="#7dd3fc" style={{animation:'laugh-tear 0.9s ease-in 0s infinite'}}/>

  if(type==='cry')return(
    <g>

      <path d="M 14 14 Q 20 11 28 18" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      <path d="M 50 14 Q 44 11 36 18" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      {/* Zusammengekniffene Augen die viele Tränen produzieren */}
      <path d="M 16 24 Q 22 19 28 24" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      <path d="M 36 24 Q 42 19 48 24" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      {/* Tränen-Wasserfälle */}
      {animate&&<>
        <ellipse cx="20" cy="27" rx="2.5" ry="3" fill="#7dd3fc" style={{['--tx']:'-2px',animation:'tear-spurt 0.7s ease-in 0s infinite'}}/>
        <ellipse cx="44" cy="27" rx="2.5" ry="3" fill="#7dd3fc" style={{['--tx']:'2px',animation:'tear-spurt 0.7s ease-in 0.15s infinite'}}/>
        <ellipse cx="18" cy="27" rx="2" ry="2.5" fill="#7dd3fc" style={{['--tx']:'-3px',animation:'tear-spurt 0.7s ease-in 0.35s infinite'}}/>
        <ellipse cx="46" cy="27" rx="2" ry="2.5" fill="#7dd3fc" style={{['--tx']:'3px',animation:'tear-spurt 0.7s ease-in 0.5s infinite'}}/>
      </>}
      {/* Heulender weit offener Mund */}
      <g style={animate?{transformOrigin:'32px 36px',animation:'mouth-wail 0.6s ease-in-out infinite'}:{}}>
        <ellipse cx="32" cy="36" rx="9" ry="6" fill={dark} stroke="white" strokeWidth="1.5"/>
        <ellipse cx="32" cy="37" rx="5" ry="3" fill="#1e1b1b"/>
      </g>
    </g>
  );
  if(type==='angry')return(
    <g>
      {/* Wütende Augenbrauen V-förmig stark runter */}
      <path d="M 12 12 L 28 22" stroke="white" strokeWidth="3" fill="none" strokeLinecap="round"/>
      <path d="M 52 12 L 36 22" stroke="white" strokeWidth="3" fill="none" strokeLinecap="round"/>
      {/* Rote Gesicht-Röte (Wut-Flush) */}
      {animate&&<ellipse cx="32" cy="26" rx="20" ry="8" fill="#fca5a5" opacity="0.55"
        style={{animation:'face-flush 0.6s ease-in-out infinite'}}/>}
      {/* Funkelnde böse Augen mit kleinem Pupillen-Glow */}
      <circle cx="22" cy="24" r="3" fill="white"/>
      <circle cx="22" cy="24" r="1.5" fill={dark}/>
      <circle cx="42" cy="24" r="3" fill="white"/>
      <circle cx="42" cy="24" r="1.5" fill={dark}/>
      {/* Knurrender Mund mit Reißzähnen */}
      <path d="M 18 32 L 46 32 L 44 36 L 20 36 Z" fill="white" stroke={dark} strokeWidth="1"/>
      <polygon points="22,32 24,38 26,32" fill="white"/>
      <polygon points="38,32 40,38 42,32" fill="white"/>
      <line x1="28" y1="32" x2="28" y2="36" stroke={dark} strokeWidth="0.6"/>
      <line x1="32" y1="32" x2="32" y2="36" stroke={dark} strokeWidth="0.6"/>
      <line x1="36" y1="32" x2="36" y2="36" stroke={dark} strokeWidth="0.6"/>
      {/* Zorn-Ader pulsierend */}
      {animate&&<g style={{transformOrigin:'48px 10px',animation:'vein-throb 0.5s ease-in-out infinite'}}>
        <path d="M 48 8 L 50 12 L 47 13 L 49 17" stroke="#dc2626" strokeWidth="1.8" fill="none" strokeLinecap="round"/>
        <path d="M 50 12 L 53 10" stroke="#dc2626" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
      </g>}
      {/* Dampf-Puffs aus den Ohren */}
      {animate&&<>
        <circle cx="6" cy="18" r="3.5" fill="white" opacity="0.85" style={{['--sx']:'-14px',animation:'steam-puff 0.7s ease-out 0s infinite'}}/>
        <circle cx="6" cy="18" r="2.8" fill="white" opacity="0.75" style={{['--sx']:'-12px',animation:'steam-puff 0.7s ease-out 0.25s infinite'}}/>
        <circle cx="58" cy="18" r="3.5" fill="white" opacity="0.85" style={{['--sx']:'14px',animation:'steam-puff 0.7s ease-out 0.1s infinite'}}/>
        <circle cx="58" cy="18" r="2.8" fill="white" opacity="0.75" style={{['--sx']:'12px',animation:'steam-puff 0.7s ease-out 0.35s infinite'}}/>
      </>}
    </g>

  // confused
  return(
    <g>
      {/* Eine Augenbraue hoch (links), eine schräg runter (rechts) - klassisch verwirrt */}
      <path d="M 14 11 Q 22 6 30 14" stroke="white" strokeWidth="2.4" fill="none" strokeLinecap="round"/>
      <path d="M 36 18 L 50 16" stroke="white" strokeWidth="2.4" fill="none" strokeLinecap="round"/>
      {/* Augen: links weit offen (großes Pupille), rechts zusammengekniffen */}
      <circle cx="22" cy="22" r="4" fill="white"/>
      <circle cx="22" cy="22" r="2" fill={dark}/>
      <path d="M 36 24 Q 42 19 48 24" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      {/* Schiefer kleiner Mund + leicht offen */}
      <path d="M 22 33 Q 28 30 36 34" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      <ellipse cx="29" cy="33" rx="2" ry="1" fill={dark}/>
      {/* Schweißtropfen am Kopf */}
      {animate&&<ellipse cx="50" cy="14" rx="2" ry="3" fill="#7dd3fc"
        style={{['--sw']:'4px',animation:'sweat-drop 1.2s ease-in 0.3s infinite'}}/>}
      {/* Fragezeichen über Kopf — 3 Stück */}
      {animate&&<>
        <text x="48" y="10" fill="#fbbf24" fontSize="16" fontWeight="900" stroke={dark} strokeWidth="0.8"
          style={{animation:'q-mark-float 1.5s ease-out 0s infinite',transformOrigin:'48px 10px'}}>?</text>
        <text x="40" y="4" fill="#fde047" fontSize="11" fontWeight="900" stroke={dark} strokeWidth="0.6"
          style={{animation:'q-mark-float 1.5s ease-out 0.5s infinite',transformOrigin:'40px 4px'}}>?</text>
        <text x="56" y="6" fill="#fbbf24" fontSize="9" fontWeight="900" stroke={dark} strokeWidth="0.5"
          style={{animation:'q-mark-float 1.5s ease-out 0.9s infinite',transformOrigin:'56px 6px'}}>?</text>
      </>}
    </g>
  );
}

function EmoteChar({color,dark,type}){
  // Kleiner Charakter mit emote-spezifischem Gesicht + Body-Animation
  const size={w:72,h:90};

  // Animations-Config je Emote — alle deutlich schneller/dramatischer
  const cfg=(()=>{
    if(type==='laugh')return{body:'laugh-body 0.45s ease-in-out infinite',head:'laugh-head 0.45s ease-in-out infinite',handL:'laugh-hand-l 0.45s ease-in-out infinite',handR:'laugh-hand-r 0.45s ease-in-out infinite'};
    if(type==='cry')return{body:'cry-body 0.6s ease-in-out infinite',head:'cry-head 0.6s ease-in-out infinite',handL:'cry-hand-l 0.6s ease-in-out infinite',handR:'cry-hand-r 0.6s ease-in-out infinite'};
    if(type==='angry')return{body:'angry-body 0.4s ease-in-out infinite',head:'angry-head 0.3s ease-in-out infinite',handL:'angry-hand-l 0.3s ease-in-out infinite',handR:'angry-hand-r 0.3s ease-in-out infinite'};
    return{body:'confused-body 0.9s ease-in-out infinite',head:'confused-head 0.9s ease-in-out infinite',handL:'confused-hand-l 0.9s ease-in-out infinite',handR:'confused-hand-r 0.9s ease-in-out infinite'};
  })();

  return(
    <div style={{
      width:size.w,height:size.h,
      filter:'drop-shadow(0 4px 12px rgba(0,0,0,0.3))'}}>
      <div style={{
        animation:cfg.body,
        transformOrigin:'center bottom',width:'100%',height:'100%'}}>
        <svg width={size.w} height={size.h} viewBox="0 0 72 90" style={{overflow:'visible',display:'block'}}>
          {/* Beine */}
          <circle cx="30" cy="78" r="6" fill={dark}/>
          <circle cx="42" cy="78" r="6" fill={dark}/>
          {/* Körper (rund) */}
          <circle cx="36" cy="56" r="15" fill={color} stroke={dark} strokeWidth="1.8"/>
          {/* Linke Hand */}
          <g style={{transformOrigin:'22px 56px',animation:cfg.handL}}>
            <circle cx="22" cy="56" r="6" fill={dark}/>
          </g>
          {/* Rechte Hand */}
          <g style={{transformOrigin:'50px 56px',animation:cfg.handR}}>
            <circle cx="50" cy="56" r="6" fill={dark}/>
          </g>
          {/* Kopf mit Gesicht */}
          <g style={{transformOrigin:'36px 28px',animation:cfg.head}}>
            <g transform="translate(4,6)">
              <circle cx="32" cy="22" r="16" fill={color} stroke={dark} strokeWidth="1.8"/>
              <EmoteFace type={type} dark={dark} animate={true}/>
            </g>
          </g>
        </svg>
      </div>
    </div>
  );
}

function ReplayHistoryScreen({t,darkMode,goBack,onWatch}){
  const[list,setList]=useState([]);
  useEffect(()=>{setList(loadReplayHistory());},[]);
  const dk=darkMode;
  const card=dk?'#1e293b':'#fff';
  const border=dk?'#334155':'#e2e8f0';
  const txt=dk?'#f1f5f9':'#0f172a';
  const muted=dk?'#94a3b8':'#64748b';
  const fmt=ts=>{
    const d=new Date(ts);
    const pad=n=>String(n).padStart(2,'0');
    return pad(d.getDate())+'.'+pad(d.getMonth()+1)+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  };
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',minHeight:'100vh',
      padding:'0 16px 40px',paddingTop:'calc(env(safe-area-inset-top) + 20px)',
      background:'transparent',position:'relative',zIndex:1,
      animation:'slide-in-right 0.32s cubic-bezier(0.25,1,0.5,1) backwards'}}>
      <MenuBG dark={darkMode}/>
      <button onClick={goBack} style={{position:'fixed',top:'calc(env(safe-area-inset-top) + 14px)',left:14,
        width:40,height:40,borderRadius:'50%',background:card,border:'1.5px solid '+border,
        cursor:'pointer',fontSize:22,display:'flex',alignItems:'center',justifyContent:'center',
        boxShadow:'0 2px 8px rgba(0,0,0,0.08)',zIndex:100,color:txt,fontWeight:700}}>‹</button>
      <div style={{width:'100%',maxWidth:340,position:'relative',zIndex:1}}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:21,fontWeight:900,color:txt,letterSpacing:-0.5,
            display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <ReplayIcon size={20} color={txt}/> Replays
          </div>
          <div style={{fontSize:11,color:muted,fontWeight:600,marginTop:4}}>{t('replayHistSub')||'Replays'}</div>
        </div>
        {list.length===0?(
          <div style={{textAlign:'center',padding:'36px 16px',color:muted,fontSize:14,fontWeight:600}}>
            {t('replayEmpty')||'No games yet.'}
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            {list.map(function(entry,i){
              var wc=entry.winner==='A'?'#ef4444':'#3b82f6';
              var na=entry.nameA||t('red');
              var nb=entry.nameB||t('blue');
              var wname=entry.winner==='A'?na:nb;
              var mapLabel=entry.map==='duel'?('\u2694 '+t('duel')):('\uD83C\uDFC1 '+t('classic'));
              return(
                <button key={i} onClick={function(){onWatch(entry);}}
                  style={{width:'100%',padding:'14px 16px',background:card,border:'1.5px solid '+border,
                    borderRadius:14,cursor:'pointer',textAlign:'left',
                    fontFamily:'system-ui,-apple-system,sans-serif',
                    boxShadow:'0 2px 8px rgba(0,0,0,0.05)',
                    borderLeft:'4px solid '+wc,
                    display:'flex',alignItems:'center',gap:12}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                      <div style={{width:8,height:8,borderRadius:'50%',background:wc,flexShrink:0}}/>
                      <span style={{fontSize:13,fontWeight:800,color:txt}}>{wname} {t('wins')}</span>
                      <span style={{fontSize:9,fontWeight:700,color:muted,marginLeft:'auto'}}>{mapLabel}</span>
                    </div>
                    <div style={{fontSize:11,color:muted,fontWeight:600}}>
                      {na} vs {nb} · {entry.moveHist?entry.moveHist.length:0} {t('step')||'moves'}
                    </div>
                    <div style={{fontSize:10,color:muted,fontWeight:500,marginTop:3}}>{fmt(entry.ts)}</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',color:muted,fontSize:18}}>›</div>
                </button>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}
function WinnerPerson({color,dark,speed,dance}){
  const cfg=DANCES[dance]||DANCES.robot;
  const dur=speed==='fast'?cfg.fast:cfg.slow;
  const ease=cfg.ease;
  const anim=name=>name?`${name} ${dur}s ${ease} infinite`:'none';
  const browDur=dance==='robot'?(dur*0.55):(dur*1.2);
  const browAnim=`brow-pump ${browDur}s ease-in-out infinite`;

  const face=<g>
    {/* Augenbrauen — gebogen, pumpen hoch/runter */}
    <g style={{transformOrigin:'45px 16px',animation:browAnim}}>
      <path d="M 33 17 Q 37 13.5 41 17" stroke="white" strokeWidth="1.7" fill="none" strokeLinecap="round"/>
      <path d="M 49 17 Q 53 13.5 57 17" stroke="white" strokeWidth="1.7" fill="none" strokeLinecap="round"/>
    </g>
    {/* Ekliges Augenkneifen — zusammengekniffene Augen mit Spitze nach oben */}
    <path d="M 35 23.5 Q 39 19.5 43 23.5" stroke="white" strokeWidth="1.7" fill="none" strokeLinecap="round"/>
    <path d="M 47 23.5 Q 51 19.5 55 23.5" stroke="white" strokeWidth="1.7" fill="none" strokeLinecap="round"/>
    {/* Großes Grinsen mit sauberen Zähnen */}
    <g style={{transformOrigin:'45px 30px',animation:anim('robot-grin')}}>
      <path d="M 32 28 L 58 28 Q 45 41 32 28 Z" fill="white" strokeLinejoin="round"/>
      <line x1="38" y1="28" x2="38" y2="32.5" stroke={dark} strokeWidth="0.6"/>
      <line x1="41.5" y1="28" x2="41.5" y2="35" stroke={dark} strokeWidth="0.6"/>
      <line x1="45" y1="28" x2="45" y2="36" stroke={dark} strokeWidth="0.6"/>
      <line x1="48.5" y1="28" x2="48.5" y2="35" stroke={dark} strokeWidth="0.6"/>
      <line x1="52" y1="28" x2="52" y2="32.5" stroke={dark} strokeWidth="0.6"/>
    </g>
  </g>;

  return <div style={{animation:`${cfg.body} ${dur}s ${ease} infinite`,transformOrigin:'center bottom'}}>
    <svg width="220" height="260" viewBox="0 0 90 100" style={{overflow:'visible',display:'block'}}>
      {/* Linkes Bein */}
      <g style={{transformOrigin:'40px 85px',animation:anim(cfg.legL)}}>
        <circle cx="40" cy="85" r="7" fill={dark}/>
      </g>
      {/* Rechtes Bein */}
      <g style={{transformOrigin:'50px 85px',animation:anim(cfg.legR)}}>
        <circle cx="50" cy="85" r="7" fill={dark}/>
      </g>
      {/* Bauch */}
      <g style={{transformOrigin:'45px 55px',animation:anim(cfg.belly)}}>
        <circle cx="45" cy="55" r="16" fill={dark}/>
      </g>
      {/* Linke Hand — näher am Körper */}
      <g style={{transformOrigin:'30px 56px',animation:anim(cfg.handL)}}>
        <circle cx="30" cy="56" r="6.5" fill={dark}/>
      </g>
      {/* Rechte Hand — näher am Körper */}
      <g style={{transformOrigin:'60px 56px',animation:anim(cfg.handR)}}>
        <circle cx="60" cy="56" r="6.5" fill={dark}/>
      </g>
      {/* Kopf */}
      <g style={{transformOrigin:'45px 24px',animation:anim(cfg.head)}}>
        <circle cx="45" cy="24" r="13" fill={dark}/>
        {face}
      </g>
    </svg>
  </div>;
}

function Confetti({color}){
  const pieces=useMemo(()=>{
    const colors=color?[color,'#f59e0b','#10b981','#8b5cf6','#ec4899','#fbbf24']:['#ef4444','#3b82f6','#f59e0b','#10b981','#8b5cf6','#ec4899'];
    return Array.from({length:90},(_,i)=>({
      left:Math.random()*100,
      delay:Math.random()*0.6,
      dur:2.2+Math.random()*2.2,
      color:colors[i%colors.length],
      size:5+Math.random()*7,
      drift:(Math.random()-0.5)*20
    }));
  },[color]);
  return <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9998,overflow:'hidden'}}>
    {pieces.map((p,i)=>(
      <div key={i} style={{
        position:'absolute',top:-20,left:`${p.left}%`,
