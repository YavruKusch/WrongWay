    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){

    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){

function makeHammersWave2(pA,pB,walls,goalA=0,goalB=0){

function bfsDistMap(from,walls){
  const dist=new Map();
  const q=[from];
  dist.set(ck(from.r,from.c),0);
  while(q.length){
    const cur=q.shift();
    const d=dist.get(ck(cur.r,cur.c));
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=cur.r+dr,nc=cur.c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      const k=ck(nr,nc);
      if(dist.has(k))continue;
      if(edgeBlocked(cur.r,cur.c,nr,nc,walls))continue;
      dist.set(k,d+1);
      q.push({r:nr,c:nc});
    }
  }
  return dist;
}
function pickChaosPos(pA,pB,walls,goalA=0,goalB=0){
  const pa=bfsPath(pA,walls,goalA),pb=bfsPath(pB,walls,goalB);
  if(!pa||!pb)return null;
  const lenA=pa.length-1,lenB=pb.length-1;
  // Faire Zone: vertikal zwischen den beiden Spielern (richtungsneutral),
  // mit 1 Reihe Abstand zu beiden Ziellinien, nie hinter/auf einem Spieler.
  const loR=Math.min(pA.r,pB.r),hiR=Math.max(pA.r,pB.r);
  const minR=Math.max(1,loR);
  const maxR=Math.min(ROWS-2,hiR);
  if(maxR<minR)return null;
  const inZone=p=>{
    if(p.r<minR||p.r>maxR)return false;
    if(p.r===pA.r&&p.c===pA.c)return false;
    if(p.r===pB.r&&p.c===pB.c)return false;
    return true;
  };

  // Ungleichgewicht > 1: Item DIREKT auf BFS-Pfad des Schwächeren platzieren
  // → garantiert erreichbar, kein Detour vom Ziel, nicht hinter Mauern
  if(Math.abs(lenA-lenB)>1){
    const weakPath=lenA>lenB?pa:pb;
    // Bevorzugt 2–4 Schritte voraus auf seinem Pfad
    for(let k=2;k<=Math.min(4,weakPath.length-1);k++){
      if(inZone(weakPath[k]))return{r:weakPath[k].r,c:weakPath[k].c};
    }
    // Fallback: erster Pfad-Schritt der in Zone passt
    for(let k=1;k<weakPath.length;k++){
      if(inZone(weakPath[k]))return{r:weakPath[k].r,c:weakPath[k].c};
    }
  }

  // Gleichstand: Position die für beide BFS-erreichbar und ähnlich nah ist
  const dmA=bfsDistMap(pA,walls);
  const dmB=bfsDistMap(pB,walls);
  let best=null,bestScore=Infinity;
  for(let r=minR;r<=maxR;r++){
    for(let c=0;c<COLS;c++){
      if(!inZone({r,c}))continue;
      const dA=dmA.get(ck(r,c)),dB=dmB.get(ck(r,c));
      if(dA===undefined||dB===undefined)continue; // unerreichbar (hinter Mauer)
      // Kleine Summe + kleine Differenz = fair & nicht zu weit
      const score=dA+dB+Math.abs(dA-dB)*3;
      if(score<bestScore){bestScore=score;best={r,c};}
    }
  }
  return best;
}

    if(dTrailer>dLeader)continue;             // Fairness: Schwächeren nie stärker behindern
    const score=dLeader-2.5*Math.max(0,dTrailer)+Math.random()*1.5;
    scored.push({key,score});
  }
  if(!scored.length)return null;
  scored.sort((a,b)=>b.score-a.score);
  const top=scored.slice(0,Math.min(5,scored.length)); // Top-5 → Zufall = unvorhersehbar
  return top[Math.floor(Math.random()*top.length)].key;
}
function getMovesFrom(pos,opp,walls){
  const moves=[];
  for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
    const nr=pos.r+dr,nc=pos.c+dc;
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
    if(edgeBlocked(pos.r,pos.c,nr,nc,walls))continue;
    if(nr===opp.r&&nc===opp.c){
      for(const[d2r,d2c]of[[-1,0],[1,0],[0,-1],[0,1]]){
        const jr=nr+d2r,jc=nc+d2c;
        if(jr===pos.r&&jc===pos.c)continue;
        if(jr<0||jr>=ROWS||jc<0||jc>=COLS)continue;
        if(edgeBlocked(nr,nc,jr,jc,walls))continue;
        moves.push({r:jr,c:jc});
      }
    }else moves.push({r:nr,c:nc});
  }
  return moves;
}

function wallCandidates(targetPos,walls,depth,goalRow=0){
  const path=bfsPath(targetPos,walls,goalRow);
  const result=new Set();
  if(!path)return[];
  const limit=Math.min(depth,path.length);
  for(let i=0;i<limit;i++){
    const node=path[i];
    for(let dr=-1;dr<=0;dr++)for(let dc=-1;dc<=0;dc++){
      const r=node.r+dr,c=node.c+dc;
      if(r>=0&&r<ROWS-1&&c>=0&&c<COLS-1){
        result.add(`H-${r}-${c}`);
        result.add(`V-${r}-${c}`);
      }
    }
  }
  return[...result];
}

function shouldPickupItem(aiPos,humanPos,walls,aiPath,chaosItem,aiBarr,aiGoal=0){
  if(!chaosItem||!aiPath)return null;
  // Item direkt erreichbar?
  const moves=getMovesFrom(aiPos,humanPos,walls);
  const direct=moves.find(m=>m.r===chaosItem.r&&m.c===chaosItem.c);
  if(direct)return direct; // sofort einsacken
  // Detour-Berechnung: AI → Item → Ziel vs AI → Ziel
  const toItem=bfsTo(aiPos,chaosItem,walls);
  if(!toItem||toItem.length<2)return null;
  const fromItem=bfsPath(chaosItem,walls,aiGoal);
  if(!fromItem)return null;
  const itemDist=toItem.length-1;
  const detour=(itemDist+(fromItem.length-1))-(aiPath.length-1);
  // 2 Barrikaden ≈ 4-6 Zugäquivalente; je weniger Barrikaden, desto attraktiver
  const maxDetour=aiBarr<=2?6:aiBarr<=4?4:aiBarr<=7?2:1;
  if(detour>maxDetour)return null;
  const next=toItem[1];
  if(next.r===humanPos.r&&next.c===humanPos.c)return null;
  return next;
}

function aiMove(aiPos,humanPos,walls,aiBarr,humBarr,difficulty,recentAi,chaosItem,aiGoal=0,humGoal=0){
  difficulty=difficulty||'normal';
  if(difficulty==='hard')return aiHard(aiPos,humanPos,walls,aiBarr,humBarr,recentAi,chaosItem,aiGoal,humGoal);
  if(difficulty==='easy')return aiEasy(aiPos,humanPos,walls,aiBarr,chaosItem,aiGoal,humGoal);
  return aiNormal(aiPos,humanPos,walls,aiBarr,chaosItem,aiGoal,humGoal);
}

function moveTowardGoal(aiPos,humanPos,walls,aiPath){
  if(!aiPath||aiPath.length<2)return null;
  const ns=aiPath[1];
  if(ns.r!==humanPos.r||ns.c!==humanPos.c)return ns;
  if(edgeBlocked(aiPos.r,aiPos.c,ns.r,ns.c,walls))return null;
  const dr=ns.r-aiPos.r,dc=ns.c-aiPos.c;
  for(const[d2r,d2c]of[[dr,dc],[-dc,dr],[dc,-dr],[-dr,-dc]]){
    const jr=ns.r+d2r,jc=ns.c+d2c;
    if(jr===aiPos.r&&jc===aiPos.c)continue;
    if(jr<0||jr>=ROWS||jc<0||jc>=COLS)continue;
    if(edgeBlocked(ns.r,ns.c,jr,jc,walls))continue;
    return{r:jr,c:jc};
  }
  return null;
}

function aiEasy(aiPos,humanPos,walls,barrLeft,chaosItem,aiGoal=0,humGoal=0){
  // Schrittrichtung Richtung eigenes Ziel (oben=-1, unten=+1)
  const fwd=aiGoal>aiPos.r?1:-1;
  const aiPath=bfsPath(aiPos,walls,aiGoal);
  const humPath=bfsPath(humanPos,walls,humGoal);
  if(!aiPath)return null;
  const aiD=aiPath.length-1,humD=humPath?humPath.length-1:999;
  if(aiD===1)return{type:'move',pos:aiPath[1]};

  // Easy: nimmt das Item nur wenn quasi gratis (Detour-Toleranz in shouldPickupItem niedrig)
  if(chaosItem){
    const pick=shouldPickupItem(aiPos,humanPos,walls,aiPath,chaosItem,barrLeft,aiGoal);
    if(pick)return{type:'move',pos:pick};
  }

  // Easy: Setzt jetzt deutlich häufiger Mauern, aber wählt suboptimal
  // Mauer-Bedingungen gelockert: Gegner führt oder ist im vorderen Drittel
  const shouldConsiderWall=barrLeft>0&&(humD<=aiD+3||humD<=6);
  // Zufällige Chance, manchmal Mauer auch ohne starken Grund
  const proactive=barrLeft>0&&humD<=aiD+5&&Math.random()<0.45;
  if(shouldConsiderWall||proactive){
    const cands=wallCandidates(humanPos,walls,5,humGoal);
    // Zufällige Reihenfolge → suboptimale Wahl
    for(let i=cands.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [cands[i],cands[j]]=[cands[j],cands[i]];
    }
    for(const k of cands){
      const next=tryWall(k,walls,aiPos,humanPos,aiGoal,humGoal);
      if(!next)continue;
      const nh=bfsPath(humanPos,next,humGoal),na=bfsPath(aiPos,next,aiGoal);
      if(!nh||!na)continue;
      // Gelockert: Gegner muss um ≥1 verlangsamt werden, AI darf max ≤2 leiden
      if((nh.length-1)-humD>=1&&(na.length-1)-aiD<=2){
        return{type:'barricade',walls:next};
      }
    }
  }
  const m=moveTowardGoal(aiPos,humanPos,walls,aiPath);
  if(m)return{type:'move',pos:m};
  const fallback=getMovesFrom(aiPos,humanPos,walls);
  return fallback.length?{type:'move',pos:fallback[0]}:null;
}

function aiNormal(aiPos,humanPos,walls,barrLeft,chaosItem,aiGoal=0,humGoal=0){
  const aiPath=bfsPath(aiPos,walls,aiGoal),humPath=bfsPath(humanPos,walls,humGoal);
  if(!aiPath)return null;
  const aiD=aiPath.length-1,humD=humPath?humPath.length-1:999;
  if(aiD===1)return{type:'move',pos:aiPath[1]};
  // Item einsammeln wenn lohnenswert
  if(chaosItem){
    const pick=shouldPickupItem(aiPos,humanPos,walls,aiPath,chaosItem,barrLeft,aiGoal);
    if(pick)return{type:'move',pos:pick};
  }
  let bestWall=null,bestRel=humD-aiD;
  if(barrLeft>0){
    for(let r=0;r<ROWS-1;r++)for(let c=0;c<COLS-1;c++)for(const t of['H','V']){
      const next=tryWall(`${t}-${r}-${c}`,walls,aiPos,humanPos,aiGoal,humGoal);
      if(!next)continue;
      const nh=bfsPath(humanPos,next,humGoal),na=bfsPath(aiPos,next,aiGoal);
      if(!nh||!na)continue;
      const rel=(nh.length-1)-(na.length-1);
      if(rel>bestRel){bestRel=rel;bestWall=next;}
    }
  }
  const bestMove=moveTowardGoal(aiPos,humanPos,walls,aiPath);
  const minGain=(humD-aiD)>3?3:1;
  if(bestWall&&bestRel-(humD-aiD)>=minGain)return{type:'barricade',walls:bestWall};
  if(bestMove)return{type:'move',pos:bestMove};
  if(bestWall)return{type:'barricade',walls:bestWall};
  return null;
}

// ── Aggressive Duell-KI (nur Duell-Modus, 7x7 & 9x9) ──────────────
// Distanz = kürzester Pfad (BFS = A*-Ergebnis auf ungewichtetem Grid).
// Bewertet jede sinnvolle Mauer und wählt strategisch zwischen Blocken und Vordrang.
function duelDist(pos,walls,goal){const p=bfsPath(pos,walls,goal);return p?p.length-1:Infinity;}
function duelBestWall(aiPos,humPos,walls,aiGoal,humGoal){
  // Kandidaten: Mauern entlang des Gegnerpfads (verlangsamen ihn maximal)
  const cand=wallCandidates(humPos,walls,5,humGoal);
  const baseHum=duelDist(humPos,walls,humGoal);
  const baseAi=duelDist(aiPos,walls,aiGoal);
  let best=null,bestScore=-Infinity;
  for(const key of cand){
    const nw=tryWall(key,walls,aiPos,humPos,aiGoal,humGoal); // null = ungültig / sperrt jemanden ein
    if(!nw)continue;
    const newHum=duelDist(humPos,nw,humGoal);
    const newAi=duelDist(aiPos,nw,aiGoal);
    if(newHum===Infinity||newAi===Infinity)continue;
    const humDelay=newHum-baseHum;   // wie sehr Gegner verlangsamt wird (gut)
    const aiCost=newAi-baseAi;       // wie sehr man sich selbst behindert (schlecht)
    if(humDelay<=0)continue;         // nur Mauern die wirklich blocken
    // Score: Gegner-Verzögerung stark gewichten, Eigenschaden doppelt bestrafen
    const score=humDelay*3-aiCost*2;
    if(score>bestScore){bestScore=score;best={key,walls:nw,humDelay,aiCost};}
  }
  return best;
}
function aiDuel(aiPos,humanPos,walls,aiBarr,humBarr,recentAi,chaosItem,aiGoal,humGoal){
  const initMoves=getMovesFrom(aiPos,humanPos,walls);
  // 1) Sofortiger Sieg
  for(const m of initMoves)if(m.r===aiGoal)return{type:'move',pos:m};
  // Item direkt erreichbar mitnehmen
  if(chaosItem){const d=initMoves.find(m=>m.r===chaosItem.r&&m.c===chaosItem.c);if(d)return{type:'move',pos:d};}

  const aiPath=bfsPath(aiPos,walls,aiGoal);
  const humPath=bfsPath(humanPos,walls,humGoal);
  if(!aiPath)return{type:'move',pos:initMoves[0]||aiPos};
  const aiD=aiPath.length-1;
  const humD=humPath?humPath.length-1:999;
  const advance=()=>{const m=moveTowardGoal(aiPos,humanPos,walls,aiPath);return m?{type:'move',pos:m}:{type:'move',pos:(initMoves[0]||aiPath[1])};};

  // 2) Gegner führt (humD < aiD): aggressiv blocken (70%)
  if(humD<aiD&&aiBarr>0){
    const block=duelBestWall(aiPos,humanPos,walls,aiGoal,humGoal);
    if(block){
      // 70% blocken wenn die Mauer wirklich etwas bringt; sonst vorrücken
      const wantBlock=Math.random()<0.7&&block.humDelay>=1;
      if(wantBlock)return{type:'barricade',key:block.key,walls:block.walls};
    }
    return advance();
  }

  // 3) KI führt oder gleichauf: clever vordrängen, aber Gegner einmauern wenn extrem effektiv
  if(aiBarr>0){
    const block=duelBestWall(aiPos,humanPos,walls,aiGoal,humGoal);
    // Nur blocken wenn es den Gegner deutlich (>=2) verzögert und kaum eigenen Schaden macht
    if(block&&block.humDelay>=2&&block.aiCost<=1&&Math.random()<0.45){
      return{type:'barricade',key:block.key,walls:block.walls};
    }
    // Bei sehr knappem Vorsprung des Gegners zumindest leicht blocken
    if(block&&humD<=aiD+1&&block.humDelay>=1&&block.aiCost<=0&&Math.random()<0.35){
      return{type:'barricade',key:block.key,walls:block.walls};
    }
  }
  return advance();
}

// ── Duell-KI v2: klare Abstufung (Normal solide, Hard nahezu unschlagbar) ──
// Misst wie stark ein einzelner Gegnerzug den eigenen Weg verzoegern koennte (klein = robuster).
function worstWallDelay(target,walls,goal,pA,pB,goalA,goalB){
  const base=duelDist(target,walls,goal);
  if(base===Infinity)return 99;
  const cands=wallCandidates(target,walls,4,goal);
  let worst=0;
  for(const k of cands){
    const nw=tryWall(k,walls,pA,pB,goalA,goalB);
    if(!nw)continue;
    const nd=duelDist(target,nw,goal);
    if(nd===Infinity)continue;
    const delay=nd-base;
    if(delay>worst)worst=delay;
  }
  return worst;
}
// Anzahl kanten-disjunkter Wege zum Ziel (mehr = schwerer mit einer Mauer zu kappen).
function aiDisjoint(start,goal,walls,cap){
  try{return disjointPaths2(start,goal,walls,ROWS,COLS,cap);}catch(_){return 1;}
}

// Duell-Normal: 1-Zug-Vorausschau, blockt optimal gewaehlt & rueckt klug vor.
// Deutlich ueber Easy (optimale Mauerwahl statt zufaellig), klar unter Hard (kein Minimax).
function aiDuelNormal(aiPos,humanPos,walls,aiBarr,humBarr,recentAi,chaosItem,aiGoal,humGoal){
  const initMoves=getMovesFrom(aiPos,humanPos,walls);
  for(const m of initMoves)if(m.r===aiGoal)return{type:'move',pos:m};
  if(chaosItem){const d=initMoves.find(m=>m.r===chaosItem.r&&m.c===chaosItem.c);if(d)return{type:'move',pos:d};}
  const aiPath=bfsPath(aiPos,walls,aiGoal),humPath=bfsPath(humanPos,walls,humGoal);
  if(!aiPath)return{type:'move',pos:initMoves[0]||aiPos};
  const aiD=aiPath.length-1,humD=humPath?humPath.length-1:999;
  const advance=()=>{const m=moveTowardGoal(aiPos,humanPos,walls,aiPath);return m?{type:'move',pos:m}:{type:'move',pos:(initMoves[0]||aiPath[1])};};
  if(chaosItem){const pick=shouldPickupItem(aiPos,humanPos,walls,aiPath,chaosItem,aiBarr,aiGoal);if(pick)return{type:'move',pos:pick};}
  const block=aiBarr>0?duelBestWall(aiPos,humanPos,walls,aiGoal,humGoal):null;
  // Gegner fuehrt oder gleichauf -> aggressiv blocken
  if(block&&humD<=aiD&&block.humDelay>=1&&block.aiCost<=1){
    const p=humD<aiD?0.85:0.55;
    if(Math.random()<p)return{type:'barricade',key:block.key,walls:block.walls};
  }
  // KI fuehrt -> nur sehr effiziente Mauern setzen
  if(block&&block.humDelay>=2&&block.aiCost<=0&&Math.random()<0.4){
    return{type:'barricade',key:block.key,walls:block.walls};
  }
  return advance();
}

// Duell-Hard: Minimax (Alpha-Beta, Tiefe 3) + Pfad-Robustheit.
// Sichert den eigenen Weg ab (schwer blockierbar) und blockt den Gegner vorausschauend.
function aiDuelHard(aiPos,humanPos,walls,aiBarr,humBarr,recentAi,chaosItem,aiGoal,humGoal){
  const initMoves=getMovesFrom(aiPos,humanPos,walls);
  for(const m of initMoves)if(m.r===aiGoal)return{type:'move',pos:m};
  if(chaosItem){const direct=initMoves.find(m=>m.r===chaosItem.r&&m.c===chaosItem.c);if(direct)return{type:'move',pos:direct};}
  const recent=recentAi||[];
  const aiFwdDown=aiGoal>aiPos.r;
  const aiPathInit=bfsPath(aiPos,walls,aiGoal);
  const humPathInit=bfsPath(humanPos,walls,humGoal);

  // Endspiel-Sprint: klar in Front & sehr kurzer Pfad -> direkt durchlaufen.
  if(aiPathInit&&aiPathInit.length>1){
    const aiDI=aiPathInit.length-1;
    const humDI=humPathInit?humPathInit.length-1:999;
    if((aiBarr<=0&&!chaosItem)||(aiDI<=2&&humDI>aiDI)){
      const m=moveTowardGoal(aiPos,humanPos,walls,aiPathInit);
      if(m)return{type:'move',pos:m};
    }
  }

  const t0=Date.now();
  const TIME=700;

  const evalState=(ap,hp,w,ab,hb)=>{
    const apath=bfsPath(ap,w,aiGoal),hpath=bfsPath(hp,w,humGoal);
    if(!apath)return-99999;
    if(!hpath)return 99999;
    if(ap.r===aiGoal)return 50000;
    if(hp.r===humGoal)return-50000;
    const aiD=apath.length-1,humD=hpath.length-1;
    return(humD-aiD)*28 - aiD*4 + humD*1.0 + (ab-hb)*5;
  };

  const genActions=(ap,hp,w,ab,hb,forAi,maxWalls)=>{
    const me=forAi?ap:hp;
    const opp=forAi?hp:ap;
    const myBarr=forAi?ab:hb;
    const meGoal=forAi?aiGoal:humGoal;
    const oppGoal=forAi?humGoal:aiGoal;
    const acts=[];
    const myPath=bfsPath(me,w,meGoal);
    const moves=getMovesFrom(me,opp,w);
    for(const m of moves){
      let pri=0;
      if(myPath&&myPath.length>1&&myPath[1].r===m.r&&myPath[1].c===m.c)pri=30;
      if(meGoal>me.r?m.r>me.r:m.r<me.r)pri+=8;
      acts.push({type:'move',pos:m,_p:pri});
    }
    if(myBarr>0){
      const cands=wallCandidates(opp,w,6,oppGoal);
      const oldOppPath=bfsPath(opp,w,oppGoal);
      const oldOppD=oldOppPath?oldOppPath.length-1:0;
      const myOldD=myPath?myPath.length-1:0;
      const scored=[];
      for(const k of cands){
        const next=tryWall(k,w,ap,hp,aiGoal,humGoal);
        if(!next)continue;
        const np=bfsPath(opp,next,oppGoal);
        if(!np)continue;
        const myNew=bfsPath(me,next,meGoal);
        if(!myNew)continue;
        const gain=((np.length-1)-oldOppD)-((myNew.length-1)-myOldD);
        if(gain<=0)continue;
        scored.push({next,gain});
      }
      scored.sort((a,b)=>b.gain-a.gain);
      const lim=Math.min(maxWalls,scored.length);
      for(let i=0;i<lim;i++)acts.push({type:'barricade',walls:scored[i].next,_p:scored[i].gain*8});
    }
    acts.sort((a,b)=>b._p-a._p);
    return acts;
  };

  const search=(ap,hp,w,ab,hb,depth,maximizing,alpha,beta)=>{
    if(ap.r===aiGoal)return 50000-depth;
    if(hp.r===humGoal)return-50000+depth;
    if(depth===0||Date.now()-t0>TIME)return evalState(ap,hp,w,ab,hb);
    const maxW=depth>=2?4:3;
    const acts=genActions(ap,hp,w,ab,hb,maximizing,maxW);
    if(acts.length===0)return evalState(ap,hp,w,ab,hb);
    if(maximizing){
      let best=-Infinity;
      for(const a of acts){
        const s=a.type==='move'
          ?search(a.pos,hp,w,ab,hb,depth-1,false,alpha,beta)
          :search(ap,hp,a.walls,ab-1,hb,depth-1,false,alpha,beta);
        if(s>best)best=s;
        if(best>alpha)alpha=best;
        if(beta<=alpha)break;
      }
      return best;
    }
    let best=Infinity;
    for(const a of acts){
      const s=a.type==='move'
        ?search(ap,a.pos,w,ab,hb,depth-1,true,alpha,beta)
        :search(ap,hp,a.walls,ab,hb-1,depth-1,true,alpha,beta);
      if(s<best)best=s;
      if(best<beta)beta=best;
      if(beta<=alpha)break;
    }
    return best;
  };

  let bestScore=-Infinity,bestAction=null;
  const myActs=genActions(aiPos,humanPos,walls,aiBarr,humBarr,true,8);
  for(const a of myActs){
    let s=a.type==='move'
      ?search(a.pos,humanPos,walls,aiBarr,humBarr,3,false,-Infinity,Infinity)
      :search(aiPos,humanPos,a.walls,aiBarr-1,humBarr,3,false,-Infinity,Infinity);
    // Resultierender Zustand fuer Robustheits-Bewertung (eigenen Weg schuetzen)
    const rPos=a.type==='move'?a.pos:aiPos;
    const rW=a.type==='move'?walls:a.walls;
    const worst=worstWallDelay(rPos,rW,aiGoal,rPos,humanPos,aiGoal,humGoal);
    s-=worst*9;                                  // schwer blockierbarer Weg = besser
    s+=aiDisjoint(rPos,aiGoal,rW,3)*6;           // mehr Ausweichrouten = besser
    if(a.type==='move'){
      if(aiPathInit&&aiPathInit.length>1&&aiPathInit[1].r===a.pos.r&&aiPathInit[1].c===a.pos.c)s+=20;
      if(aiFwdDown?a.pos.r>aiPos.r:a.pos.r<aiPos.r)s+=6;
      else if(aiFwdDown?a.pos.r<aiPos.r:a.pos.r>aiPos.r)s-=4;
      if(chaosItem){
        const oldD=Math.abs(aiPos.r-chaosItem.r)+Math.abs(aiPos.c-chaosItem.c);
        const newD=Math.abs(a.pos.r-chaosItem.r)+Math.abs(a.pos.c-chaosItem.c);
        if(newD<oldD&&newD<=4)s+=(5-newD)*4;
        if(newD===0)s+=30;
      }
      if(recent.length>=2){
        for(let i=1;i<Math.min(recent.length,5);i++){
          if(recent[i].r===a.pos.r&&recent[i].c===a.pos.c){s-=(6-i)*12;break;}
        }
      }
    }
    if(s>bestScore){bestScore=s;bestAction=a;}
  }
  if(!bestAction){
    if(aiPathInit&&aiPathInit.length>1)return{type:'move',pos:aiPathInit[1]};
    const fm=getMovesFrom(aiPos,humanPos,walls);
    if(fm.length)return{type:'move',pos:fm[0]};
    return null;
  }
  if(bestAction.type==='move')return{type:'move',pos:bestAction.pos};
  return{type:'barricade',walls:bestAction.walls};
}

function aiHard(aiPos,humanPos,walls,aiBarr,humBarr,recentAi,chaosItem,aiGoal=0,humGoal=0){
  const initMoves=getMovesFrom(aiPos,humanPos,walls);
  // Sofortiger Sieg hat absolute Priorität (eigene Zielreihe erreichen)
  for(const m of initMoves)if(m.r===aiGoal)return{type:'move',pos:m};
  // Item-Pickup wenn direkt erreichbar (sehr lohnenswert) — vor Minimax
  if(chaosItem){
    const direct=initMoves.find(m=>m.r===chaosItem.r&&m.c===chaosItem.c);
    if(direct)return{type:'move',pos:direct};
  }
  const recent=recentAi||[];
  // Vorwärts = Richtung eigenes Ziel
  const aiFwdDown=aiGoal>aiPos.r;

  // Endspiel-Sprint: bei kurzem Pfad und klarem Vorsprung direkt zum Ziel laufen,
  // statt unnötig Mauern zu suchen oder im Minimax-Rauschen zu trödeln.
  const aiPathInit=bfsPath(aiPos,walls,aiGoal);
  const humPathInit=bfsPath(humanPos,walls,humGoal);
  if(aiPathInit&&aiPathInit.length>1){
    const aiDI=aiPathInit.length-1;
    const humDI=humPathInit?humPathInit.length-1:999;
    // Reine Zielverfolgung (deterministisch, kein Kreiseln) wenn:
    // - keine Mauern mehr zum Setzen (und kein lohnendes Item), ODER
    // - kurzer Pfad mit Vorsprung, ODER
    // - klar in Führung
    if((aiBarr<=0&&!chaosItem)||(aiDI<=3&&humDI>aiDI+1)||humDI>aiDI+2){
      const m=moveTowardGoal(aiPos,humanPos,walls,aiPathInit);
      if(m)return{type:'move',pos:m};
    }
  }

  // Statische Evaluation: positiver Score = gut für AI
  const evalState=(ap,hp,w,ab,hb)=>{
    const apath=bfsPath(ap,w,aiGoal),hpath=bfsPath(hp,w,humGoal);
    if(!apath)return-99999;
    if(!hpath)return 99999;
    if(ap.r===aiGoal)return 50000;
    if(hp.r===humGoal)return-50000;
    const aiD=apath.length-1,humD=hpath.length-1;
    // Hauptfaktor: relative Distanz
    // Eigener Progress STARK belohnt (verhindert Trödeln/Hin-und-Her)
    // Gegner-Distanz leichter Bonus
    // Mauern-Reserve sekundär
    return(humD-aiD)*25 - aiD*3.5 + humD*0.8 + (ab-hb)*3;
  };

  // Aktionen für aktuellen Spieler generieren, sortiert für Alpha-Beta-Effizienz
  const genActions=(ap,hp,w,ab,hb,forAi,maxWalls)=>{
    const me=forAi?ap:hp;
    const opp=forAi?hp:ap;
    const myBarr=forAi?ab:hb;
    const meGoal=forAi?aiGoal:humGoal;
    const oppGoal=forAi?humGoal:aiGoal;
    const acts=[];
    const myPath=bfsPath(me,w,meGoal);
    const moves=getMovesFrom(me,opp,w);
    for(const m of moves){
      let pri=0;
      if(myPath&&myPath.length>1&&myPath[1].r===m.r&&myPath[1].c===m.c)pri=30;
      // Bonus für Schritt Richtung eigenes Ziel
      if(meGoal>me.r?m.r>me.r:m.r<me.r)pri+=8;
      acts.push({type:'move',pos:m,_p:pri});
    }
    if(myBarr>0){
      const cands=wallCandidates(opp,w,6,oppGoal);
      const oldOppPath=bfsPath(opp,w,oppGoal);
      const oldOppD=oldOppPath?oldOppPath.length-1:0;
      const scored=[];
      for(const k of cands){
        const next=tryWall(k,w,ap,hp,aiGoal,humGoal);
        if(!next)continue;
        const np=bfsPath(opp,next,oppGoal);
        if(!np)continue;
        const myNew=bfsPath(me,next,meGoal);
        if(!myNew)continue;
        // Score: wieviel verlangsamt es Gegner abzüglich Eigenkosten
        const gain=((np.length-1)-oldOppD)-((myNew.length-1)-(myPath?myPath.length-1:0));
        if(gain<=0)continue; // Nur Mauern die wirklich helfen
        scored.push({next,gain});
      }
      scored.sort((a,b)=>b.gain-a.gain);
      const lim=Math.min(maxWalls,scored.length);
      for(let i=0;i<lim;i++){
        acts.push({type:'barricade',walls:scored[i].next,_p:scored[i].gain*8});
      }
    }
    acts.sort((a,b)=>b._p-a._p);
    return acts;
  };

  // Minimax mit Alpha-Beta
  const search=(ap,hp,w,ab,hb,depth,maximizing,alpha,beta)=>{
    if(ap.r===aiGoal)return 50000-depth;
    if(hp.r===humGoal)return-50000+depth;
    if(depth===0)return evalState(ap,hp,w,ab,hb);
    const maxW=depth>=2?6:4;
    const acts=genActions(ap,hp,w,ab,hb,maximizing,maxW);
    if(acts.length===0)return evalState(ap,hp,w,ab,hb);
    if(maximizing){
      let best=-Infinity;
      for(const a of acts){
        const s=a.type==='move'
          ?search(a.pos,hp,w,ab,hb,depth-1,false,alpha,beta)
          :search(ap,hp,a.walls,ab-1,hb,depth-1,false,alpha,beta);
        if(s>best)best=s;
        if(best>alpha)alpha=best;
        if(beta<=alpha)break;
      }
      return best;
    }
    let best=Infinity;
    for(const a of acts){
      const s=a.type==='move'
        ?search(ap,a.pos,w,ab,hb,depth-1,true,alpha,beta)
        :search(ap,hp,a.walls,ab,hb-1,depth-1,true,alpha,beta);
      if(s<best)best=s;
      if(best<beta)beta=best;
      if(beta<=alpha)break;
    }
    return best;
  };

  // Wurzel: 3 Halbzüge tief suchen (AI → Opp → AI → eval)
  let bestScore=-Infinity,bestAction=null;
  const myActs=genActions(aiPos,humanPos,walls,aiBarr,humBarr,true,10);
  for(const a of myActs){
    let s=a.type==='move'
      ?search(a.pos,humanPos,walls,aiBarr,humBarr,2,false,-Infinity,Infinity)
      :search(aiPos,humanPos,a.walls,aiBarr-1,humBarr,2,false,-Infinity,Infinity);
    if(a.type==='move'){
      // Starker Bias auf den BFS-Hauptpfad: verhindert Wechsel zwischen gleich­langen
      // Pfaden, wodurch die AI sonst zickzack laufen würde.
      if(aiPathInit&&aiPathInit.length>1&&aiPathInit[1].r===a.pos.r&&aiPathInit[1].c===a.pos.c){
        s+=20;
      }
      // Zusätzlicher Bonus für tatsächliche Annäherung Richtung eigenes Ziel
      if(aiFwdDown?a.pos.r>aiPos.r:a.pos.r<aiPos.r)s+=6;
      else if(aiFwdDown?a.pos.r<aiPos.r:a.pos.r>aiPos.r)s-=4;
      // Bonus für Annäherung ans Chaos-Item (proportional zum Wert von +2 Barrikaden)
      if(chaosItem){
        const oldD=Math.abs(aiPos.r-chaosItem.r)+Math.abs(aiPos.c-chaosItem.c);
        const newD=Math.abs(a.pos.r-chaosItem.r)+Math.abs(a.pos.c-chaosItem.c);
        if(newD<oldD&&newD<=4)s+=(5-newD)*4; // näher heran lohnt, je näher desto mehr
        if(newD===0)s+=30; // direkt drauf (auch wenn schon oben abgefangen)
      }
      // Starke Cycling-Strafe: verhindert Hin-und-Her zwischen besuchten Feldern
      if(recent.length>=2){
        for(let i=1;i<Math.min(recent.length,5);i++){
          if(recent[i].r===a.pos.r&&recent[i].c===a.pos.c){
            s-=(6-i)*12; // -60 / -48 / -36 / -24 für i=1..4
            break;
          }
        }
      }
    }
    if(s>bestScore){bestScore=s;bestAction=a;}
  }

  // Fallback: vorwärts gehen wenn nichts gefunden
  if(!bestAction){
    const aiPath=bfsPath(aiPos,walls,aiGoal);
    if(aiPath&&aiPath.length>1)return{type:'move',pos:aiPath[1]};
    const fm=getMovesFrom(aiPos,humanPos,walls);
    if(fm.length)return{type:'move',pos:fm[0]};
    return null;
  }

  if(bestAction.type==='move')return{type:'move',pos:bestAction.pos};
  return{type:'barricade',walls:bestAction.walls};
}

function applyMoves(moveList,step,map){
  const sp=startPos(map||'classic');
  let pA={...sp.A},pB={...sp.B};
  const walls=new Set();
  for(let i=0;i<Math.min(step,moveList.length);i++){
    const m=moveList[i];
    if(m.type==='emote')continue;
    if(m.type==='move'){if(m.p==='A')pA={r:m.r,c:m.c};else pB={r:m.r,c:m.c};}
    else if(m.type==='break')walls.delete(m.k);
    else walls.add(m.k);
  }
  return{pA,pB,walls};
}
function applyMovesWithOwner(moveList,step,map){
  const sp=startPos(map||'classic');
  let pA={...sp.A},pB={...sp.B};
  const walls=new Set();
  const wallOwner={};
  for(let i=0;i<Math.min(step,moveList.length);i++){
    const m=moveList[i];
    if(m.type==='emote')continue;
    if(m.type==='move'){if(m.p==='A')pA={r:m.r,c:m.c};else pB={r:m.r,c:m.c};}
    else if(m.type==='break'){walls.delete(m.k);delete wallOwner[m.k];}
    else{walls.add(m.k);wallOwner[m.k]=m.p||null;}
  }
  return{pA,pB,walls,wallOwner};
}

const AVATAR_COLORS=['#ef4444','#3b82f6','#16a34a','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#64748b'];
const PROFILE_KEY=u=>'ww_profiles/'+u;
function normUser(u){return (u||'').trim().toLowerCase();}
async function hashPw(pw){
  try{
    const enc=new TextEncoder().encode(pw+'::wrongway');
    const buf=await crypto.subtle.digest('SHA-256',enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    let h=0;const s=pw+'::wrongway';for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}
    return 'f'+(h>>>0).toString(16);
  }
}
function freshRankedStats(){return{classic:{rating:1000,wins:0,losses:0,games:0},duel:{rating:1000,wins:0,losses:0,games:0}};}
function freshAccountStats(){return{games:0,wins:0,losses:0,streak:0,bestStreak:0,modes:{},ranked:freshRankedStats()};}
function calculateElo(myRating,oppRating,won){
  const K=32,exp=1/(1+Math.pow(10,(oppRating-myRating)/400));
  const change=Math.round(K*((won?1:0)-exp));
  return{newRating:Math.max(100,myRating+change),change:change};
}
async function changeAccountName(oldKey,newName){
  const newKey=normUser(newName);
  if(newKey.length<3)return{err:'tooShort'};
  if(!/^[a-z0-9_]+$/.test(newKey))return{err:'badChars'};
  if(newKey===oldKey)return{err:'sameName'};
  const existing=await stoGet(PROFILE_KEY(newKey));
  if(existing)return{err:'taken'};
  const prof=await stoGet(PROFILE_KEY(oldKey));
  if(!prof)return{err:'notFound'};
  const updated=Object.assign({},prof,{name:newName.trim(),lastNameChange:Date.now()});
  const ok=await stoSet(PROFILE_KEY(newKey),updated);
  if(!ok)return{err:'network'};
  await stoDel(PROFILE_KEY(oldKey));
  return{prof:Object.assign({},updated,{key:newKey})};
}
async function changeAccountPassword(key,oldPw,newPw,confirmPw){
  if(!newPw||newPw.length<6)return{err:'pwTooShort'};
  if(newPw!==confirmPw)return{err:'pwNoMatch'};
  const prof=await stoGet(PROFILE_KEY(key));
  if(!prof)return{err:'notFound'};
  if(prof.pw!==await hashPw(oldPw))return{err:'wrongPw'};
  await stoSet(PROFILE_KEY(key),Object.assign({},prof,{pw:await hashPw(newPw)}));
  return{ok:true};
}

    const p=all[k];if(!p)return;
    await stoSet(PROFILE_KEY(k),Object.assign({},p,{stats:Object.assign({},p.stats||{},{ranked:freshRankedStats()})}));
  }));
  return keys.length;
}async function registerAccount(name,pw,color){
  const key=normUser(name);
  if(key.length<3)return{err:'tooShort'};
  if(!/^[a-z0-9_]+$/.test(key))return{err:'badChars'};
  if((pw||'').length<6)return{err:'pwShort'};
  try{
    const rd=JSON.parse(localStorage.getItem('ww_reg_limit')||'{"ts":[]}');
    const now=Date.now();const fresh=(rd.ts||[]).filter(t=>now-t<86400000);
    if(fresh.length>=3)return{err:'rateLimit'};
    localStorage.setItem('ww_reg_limit',JSON.stringify({ts:[...fresh,now]}));
  }catch(e){}
  const existing=await stoGet(PROFILE_KEY(key));
  if(existing)return{err:'taken'};
  const prof={name:name.trim(),color:color||AVATAR_COLORS[0],pw:await hashPw(pw),created:Date.now(),stats:freshAccountStats()};

function applyMatchResult(stats,won,modeKey){
  const s={...(stats||freshAccountStats())};
  s.modes={...(s.modes||{})};
  s.games=(s.games||0)+1;
  if(won){s.wins=(s.wins||0)+1;s.streak=(s.streak||0)+1;if(s.streak>(s.bestStreak||0))s.bestStreak=s.streak;}
  else{s.losses=(s.losses||0)+1;s.streak=0;}
  const m={...(s.modes[modeKey]||{games:0,wins:0,losses:0})};
  m.games++;if(won)m.wins++;else m.losses++;
  s.modes[modeKey]=m;
  return s;
}

// ── Sound ───────────────────────────────────────────────────
let _ctx=null;
function getCtx(){try{if(_ctx&&_ctx.state==='closed')_ctx=null;if(!_ctx){const C=window.AudioContext||window.webkitAudioContext;if(!C)return null;_ctx=new C();}return _ctx;}catch{return null;}}
async function playSound(type){
  try{
    let ctx=getCtx();if(!ctx)return;
    if(ctx.state!=='running'){
      try{await ctx.resume();}catch(e){}
      if(ctx.state!=='running'&&(ctx.state==='interrupted'||ctx.state==='closed')){
        try{ctx.close();}catch(e){}
        _ctx=null;ctx=getCtx();if(!ctx)return;
        try{await ctx.resume();}catch(e){}
      }
    }
    const now=ctx.currentTime;
    if(type==='move'){
      // Mechanischer Tasten-Klick: kurzer Noise-Tick + leiser tiefer Thump
      const noiseDur=0.025;
      const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*noiseDur),ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.005));
      const ns=ctx.createBufferSource();ns.buffer=buf;
      const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=1800;
      const nsG=ctx.createGain();nsG.gain.setValueAtTime(0.18,now);nsG.gain.exponentialRampToValueAtTime(0.001,now+0.035);
      ns.connect(hp);hp.connect(nsG);nsG.connect(ctx.destination);ns.start(now);
      // Tiefer Thump für den "thock"
      const o=ctx.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(220,now);
      o.frequency.exponentialRampToValueAtTime(90,now+0.05);
      const og=ctx.createGain();og.gain.setValueAtTime(0.22,now);og.gain.exponentialRampToValueAtTime(0.001,now+0.07);
      o.connect(og);og.connect(ctx.destination);o.start(now);o.stop(now+0.09);

      // "h"-Atem am Anfang (gefilterter Noise)
      const hDur=0.1;
      const hBuf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*hDur),ctx.sampleRate);
      const hd=hBuf.getChannelData(0);
      for(let i=0;i<hd.length;i++){
        const env=Math.exp(-i/(hd.length*0.5));
        hd[i]=(Math.random()*2-1)*env;
      }
      const hns=ctx.createBufferSource();hns.buffer=hBuf;
      const hbp=ctx.createBiquadFilter();hbp.type='bandpass';
      hbp.frequency.value=1800;hbp.Q.value=0.8;
      const hg=ctx.createGain();
      hg.gain.value=0.08;
      hns.connect(hbp);hbp.connect(hg);hg.connect(ctx.destination);
      hns.start(now);
    }
  }catch{}
}

function rankTier(r){
  if(r>=1600)return{icon:'crown',name:'Master',color:'#60a5fa'};
  if(r>=1400)return{icon:'diamond',name:'Diamant',color:'#a78bfa'};
  if(r>=1200)return{icon:'gold',name:'Gold',color:'#f59e0b'};
  if(r>=1000)return{icon:'silver',name:'Silber',color:'#94a3b8'};
  return{icon:'bronze',name:'Bronze',color:'#b45309'};
}
function TierIcon({icon,size}){
  const s=size||16;
  if(icon==='crown')return <CrownIcon size={s} color="#60a5fa"/>;
  if(icon==='diamond')return <DiamondIcon size={s} color="#a78bfa"/>;
  if(icon==='gold')return <MedalIcon size={s} color="#f59e0b" letter="1"/>;
  if(icon==='silver')return <MedalIcon size={s} color="#94a3b8" letter="2"/>;
  return <MedalIcon size={s} color="#b45309" letter="3"/>;
}

        {!modeEnabled?(

        ):inQueue?(
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,justifyContent:'center'}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:tier.color,animation:'pulse 1s ease-in-out infinite'}}/>
              <span style={{fontSize:13,fontWeight:700,color:tier.color}}>

            </div>
            <button onClick={leaveQueue} style={{width:'100%',padding:'10px',borderRadius:10,

              fontWeight:700,fontSize:12,fontFamily:'system-ui,-apple-system,sans-serif'}}>
              {t('cancel')}
            </button>
          </div>
        ):(
          <button disabled style={{width:'100%',padding:'13px',borderRadius:11,border:'none',

            fontFamily:'system-ui,-apple-system,sans-serif',cursor:'default'}}>
            {t('rankedOtherActive')}
          </button>
        )}
      </div>
    );
  };

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',minHeight:'100vh',
      padding:'0 16px 40px',paddingTop:'calc(env(safe-area-inset-top) + 20px)',
      background:'transparent',position:'relative',zIndex:1,
      animation:'fadeSlideUp 0.32s cubic-bezier(0.34,1.56,0.64,1) both'}}>
      <MenuBG dark={darkMode}/>
      <button onClick={function(){leaveQueue();goBack();}} style={{position:'fixed',
        top:'calc(env(safe-area-inset-top)+14px)',left:14,

        cursor:'pointer',fontSize:22,display:'flex',alignItems:'center',justifyContent:'center',

      <div style={{width:'100%',maxWidth:340,position:'relative',zIndex:1}}>
        <div style={{textAlign:'center',marginBottom:24,paddingTop:8}}>

function SpectatorScreen({lobbyId,t,darkMode,goBack,account}){
  const[gs,setGs]=React.useState(null);
  const[gone,setGone]=React.useState(false);
  const[specCount,setSpecCount]=React.useState(0);
  const[myEmote,setMyEmote]=React.useState(null); // {type,id} — zuletzt gesendetes Emote
  const[otherEmotes,setOtherEmotes]=React.useState([]); // von anderen Zuschauern
  const SC=Math.min(Math.floor((Math.min(window.innerWidth,440)-48)/COLS),Math.floor((window.innerHeight*0.55)/ROWS));
  const SW=Math.max(4,Math.round(SC*0.2));
  const myKey=account?account.key:SESSION;
  const myName=account?account.name:'👁';
  React.useEffect(()=>{
    if(!lobbyId||!window.db)return;
    // Spielstand live verfolgen
    const gRef=window.db.ref('barricade_game_'+lobbyId);
    const gCb=gRef.on('value',snap=>{const g=snap.val();if(!g){setGone(true);return;}setGs(g);});
    // Anwesenheit registrieren
    const sRef=window.db.ref('ww_spec/'+lobbyId+'/'+myKey);
    sRef.set({ts:Date.now(),name:myName});
    sRef.onDisconnect().remove();
    // Zuschauer-Anzahl live
    const scRef=window.db.ref('ww_spec/'+lobbyId);
    const scCb=scRef.on('value',snap=>{const v=snap.val();setSpecCount(v?Object.keys(v).length:0);});
    // Andere Zuschauer-Emotes empfangen
    const eRef=window.db.ref('ww_spec_emote/'+lobbyId);
    const initTs=Date.now();
    const eCb=eRef.on('value',snap=>{
      const v=snap.val();
      if(!v||!v.type||!v.ts||v.ts<initTs-300||v.from===myKey)return;
      const id=v.ts+Math.random();
      setOtherEmotes(prev=>[...prev.slice(-3),{type:v.type,id,name:v.name||'👁'}]);
      setTimeout(()=>setOtherEmotes(prev=>prev.filter(e=>e.id!==id)),3000);
    });
    return()=>{
      gRef.off('value',gCb);
      scRef.off('value',scCb);
      eRef.off('value',eCb);
      sRef.remove();
    };
  },[lobbyId]);

  const sendEmote=type=>{
    if(!lobbyId||!window.db)return;
    const id=Date.now();
    window.db.ref('ww_spec_emote/'+lobbyId).set({type,ts:id,from:myKey,name:myName});
    setMyEmote({type,id});
    setTimeout(()=>setMyEmote(m=>m&&m.id===id?null:m),2500);
  };

  const dk=darkMode;
  const card=dk?'#1e293b':'#fff';
  const border=dk?'#334155':'#e2e8f0';
  const txt=dk?'#f1f5f9':'#1e293b';
  const muted=dk?'#64748b':'#94a3b8';
  const walls=gs?new Set(gs.walls||[]):new Set();
  const pA=gs?gs.pA:{r:ROWS-1,c:2};
  const pB=gs?gs.pB:{r:ROWS-1,c:6};
  const cells=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)

        const ownD=ownPath?ownPath.length-1:99;
        const humD=humPath?humPath.length-1:99;
        const hammerDist=nh&&nh.path?nh.path.length-1:99;
        // Hammer nur holen wenn:
        // - Gegner NICHT kurz vor dem Ziel (humD>2)
        // - Umweg ist klein (max 3 Schritte)
        // - Kein klarer Vorsprung vorhanden (sonst lieber sprinten)
        // - Kein direkter Schritt Richtung Ziel verfügbar
        const enemyDangerous=humD<=3;
        const detourOk=hammerDist<=4;
        const aiClearlyAhead=ownD<=humD-3;
        if(nh&&nh.path&&nh.path.length>1&&!enemyDangerous&&detourOk&&!aiClearlyAhead){
          const step=nh.path[1];
          // Nur zum Hammer wenn nächster Schritt nicht schlechter als Zielrichtung
          if(!(step.r===a.r&&step.c===a.c))d={type:'move',pos:step};
        }
      }
      if(!d){
        _hamCtx=st.hammerMode?buildHamCtx(hms,hh,a,b):null;
        // Duell-Modus: dedizierte aggressive/strategische KI (A*-Distanz, Blocken/Vordrang)
        if(mp==='duel'&&aiDifficulty==='hard'){
          d=aiDuelHard(b,a,w,bl.B,bl.A,recentAi,chaosItem,aiGoal,humGoal);
        }else if(mp==='duel'&&aiDifficulty==='normal'){
          d=aiDuelNormal(b,a,w,bl.B,bl.A,recentAi,chaosItem,aiGoal,humGoal);
        }else{
          d=aiMove(b,a,w,bl.B,bl.A,aiDifficulty,recentAi,chaosItem,aiGoal,humGoal);
        }
        _hamCtx=null;
      }
      // ── Anti-Stall-Garantie ──
      // Greift NUR wenn der Bot mehrere Züge in Folge keinen Distanz-Fortschritt macht.
      // Dann wird der deterministische BFS-Schritt erzwungen → garantiert Fortschritt, kein Kreiseln.
      // Strategische Barrikaden-Züge und Item-Pickups bleiben unangetastet.
      if(d&&d.type==='move'){
        const beforeP=bfsPath(b,w,aiGoal);
        const beforeD=beforeP?beforeP.length-1:Infinity;
        const afterP=bfsPath(d.pos,w,aiGoal);
        const afterD=afterP?afterP.length-1:Infinity;
        const isItem=!!(chaosItem&&d.pos.r===chaosItem.r&&d.pos.c===chaosItem.c);
        if(afterD<beforeD||isItem)aiProgRef.current.stall=0;
        else aiProgRef.current.stall++;
        if(aiProgRef.current.stall>=3&&afterD>=beforeD&&!isItem&&beforeP){
          const forced=moveTowardGoal(b,a,w,beforeP);
          if(forced){d={type:'move',pos:forced};aiProgRef.current.stall=0;}
        }
      }
      let nextHammers=hms,nextHeld={A:hh.A,B:heldB};
      if(d){
        if(d.type==='move'){
          playSound('move');setPB(d.pos);
          // Chaos-Item einsammeln (AI/B)
          if(chaosItem&&chaosItem.r===d.pos.r&&chaosItem.c===d.pos.c){
            setBarrLeft(p=>({...p,B:p.B+2}));
            setChaosItem(null);
            chaosSpawnRef.current=moves.length+1+18+Math.floor(Math.random()*8);

          // Hammer aufsammeln (AI/B)
          if(st.hammerMode&&!nextHeld.B&&hms&&hms.length){
            const hit=hms.find(h=>h.r===d.pos.r&&h.c===d.pos.c);
            if(hit){
              const wv=waveOf(hit.id);
              const hu=st.hammerUsed||freshHammerUsed();
              if(!hu.B[wv]){
                playSound('pickup');
                nextHeld={...nextHeld,B:true};
                const nextUsedAI={...hu,B:{...hu.B,[wv]:true}};
                setHammerUsed(nextUsedAI);
                collectItem(hit);

                if(nextHeld.A&&nextHeld.B){rem.forEach(collectItem);rem=[];}
                // Wenn beide je einen Wave-1-Hammer haben → restliche Wave-1 entfernen
                const bothUsedW1AI=nextUsedAI.A.w1&&nextUsedAI.B.w1;
                if(bothUsedW1AI){
                  const leftover=rem.filter(h=>h.id.indexOf('hw2-')===-1);
                  leftover.forEach(collectItem);
                  rem=rem.filter(h=>h.id.indexOf('hw2-')===0);
                }
                nextHammers=rem;setHammers(rem);
              }
            }
          }
          moves.push({type:'move',p:'B',r:d.pos.r,c:d.pos.c});
          setWalls(w);setMoveHist(moves);setHammerHeld(nextHeld);
          if(d.pos.r===aiGoal){setAiThinking(false);triggerWin('B');return;}

    const hostAccountKey=account?account.key:null;
    const ok=await stoSet(`barricade_lobby_${id}`,{id,code,isPrivate,hostId:SESSION,hostName,hostAccountKey,guestId:null,ts:Date.now(),...cfg});
    if(!ok){setFlash(t('firebaseError')+(window.lastFbError||'?')+t('checkRules'));return;}
    if(isPrivate)await stoSet(`barricade_code_${code}`,{id});
    else{const list=await stoGet('barricade_lobby_list')||[];await stoSet('barricade_lobby_list',[...list.filter(l=>l.hostId!==SESSION),{id,hostId:SESSION,ts:Date.now(),...cfg}]);}
    setLobbyId(id);setOnlineRole('A');
    setPrivateCode(isPrivate?code:null);
    setScreen('waiting');
  };

  const cleanupLobby=async(id)=>{
    if(!id)return;
    const lobby=await stoGet(`barricade_lobby_${id}`);
    await stoDel(`barricade_lobby_${id}`);
    if(lobby&&lobby.code)await stoDel(`barricade_code_${lobby.code}`);
    const list=await stoGet('barricade_lobby_list')||[];
    await stoSet('barricade_lobby_list',list.filter(l=>l.id!==id));
  };

  const joinLobby=async(id)=>{
    const lobby=await stoGet(`barricade_lobby_${id}`);
    if(!lobby||lobby.guestId){setFlash(t('lobbyFull'));return;}
    // Host-Settings übernehmen
    if(lobby.tm!==undefined)setGameTimeMode(lobby.tm);
    if(lobby.ch!==undefined)setChaosMode(!!lobby.ch);
    if(lobby.br!==undefined)setGameBarr(lobby.br);
    if(lobby.dp!==undefined)setDropMode(lobby.dp);
    if(lobby.hm!==undefined)setHammerMode(!!lobby.hm);
    if(lobby.hd!==undefined)setHammerDrops(lobby.hd);
    if(lobby.map!==undefined)setSelectedMap(lobby.map);
    await stoSet(`barricade_lobby_${id}`,{...lobby,guestId:SESSION,guestName:getDisplayName(account),guestAccountKey:account?account.key:null,ts:Date.now()});
    setLobbyId(id);setOnlineRole('B');setPrivateCode(null);setScreen('waiting');
    for(let i=0;i<40;i++){
      await new Promise(r=>setTimeout(r,500));
      const gs=await stoGet(`barricade_game_${id}`);
      if(gs){
        lastOnlineTs.current=gs.lastUpdated;
        if(gs.nameA||gs.nameB)setPlayerNames({A:gs.nameA||'',B:gs.nameB||''});
        setOppAccountKey(gs.accountKeyA||null);
        initGame('online','B',id,false,lobby.tm,false,lobby.map||selectedMap,lobby.duelSize||'standard');return;
      }
    }
    setFlash(t('hostNotResponding'));setScreen('online');
  };

  const joinByCode=async()=>{
    const code=codeInput.trim().toUpperCase();if(!code){return;}
    const ref=await stoGet(`barricade_code_${code}`);
    if(!ref){setFlash(t('codeNotFound'));return;}
    await joinLobby(ref.id);
  };

  // ── Replay sounds ──
  const lastReplayStep=useRef(0);
  useEffect(()=>{
    if(screen!=='replay'){lastReplayStep.current=replayStep;return;}
    const rMoves=replayHistEntry?replayHistEntry.moveHist:moveHist;
    const rWinner=replayHistEntry?replayHistEntry.winner:winner;
    if(replayStep>lastReplayStep.current){
      const m=rMoves[replayStep-1];
      if(m){
        if(m.type==='emote')playSound(m.emote);
        else if(m.type!=='emote')playSound(m.type==='move'?'move':'wall');
      }
      // Gewinner-Sound wenn Ende erreicht
      if(replayStep>=rMoves.length&&rWinner){
        playSound('win');
        setTimeout(()=>playSound('laugh'),350);
      }
    }
    lastReplayStep.current=replayStep;
  },[replayStep,screen,moveHist,replayHistEntry,winner]);

  // ── Valid moves ──
  const getValidMoves=(pos,opp,w)=>{
    const moves=[];
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=pos.r+dr,nc=pos.c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      if(edgeBlocked(pos.r,pos.c,nr,nc,w))continue;
      if(nr===opp.r&&nc===opp.c){
        for(const[dr2,dc2]of[[-1,0],[1,0],[0,-1],[0,1]]){
          const jr=nr+dr2,jc=nc+dc2;
          if(jr===pos.r&&jc===pos.c)continue;
          if(jr<0||jr>=ROWS||jc<0||jc>=COLS)continue;
          if(edgeBlocked(nr,nc,jr,jc,w))continue;
          moves.push({r:jr,c:jc});
        }
      }else{moves.push({r:nr,c:nc});}
    }
    return moves;
  };

  const cur=turn==='A'?pA:pB;
  const other=turn==='A'?pB:pA;

  const handleCellClick=(r,c)=>{
    if(winner||aiThinking||dragging||!myTurn||screen!=='game')return;
    // Sicherheits-Check für Online+Blitz: sicherstellen dass es noch der eigene Zug ist
    if(gameMode==='online'&&S.current.turn!==onlineRole)return;
    if(!getValidMoves(cur,other,walls).some(m=>m.r===r&&m.c===c))return;
    playSound('move');
    const np={r,c};const isA=turn==='A';
    if(isA)setPA(np);else setPB(np);
    // Chaos-Item einsammeln
    let newBl=barrLeft;
    let nextChaos=chaosItem;
    if(chaosItem&&chaosItem.r===r&&chaosItem.c===c){
      newBl={...barrLeft,[turn]:barrLeft[turn]+2};
      setBarrLeft(newBl);
      setChaosItem(null);
      nextChaos=null;
      // Nächster Spawn in 20–25 Zügen
      chaosSpawnRef.current=S.current.moveHist.length+1+18+Math.floor(Math.random()*8);
      playSound('wall');
    }
    // Hammer-Item aufsammeln (nur wenn man noch keinen hat UND Wave-Limit nicht erreicht)
    let nextHammers=hammers,nextHeld=hammerHeld,nextUsed=hammerUsed;
    if(hammerMode&&!hammerHeld[turn]){
      const hit=hammers.find(h=>h.r===r&&h.c===c);
      if(hit){
        const wv=waveOf(hit.id);
        if(!hammerUsed[turn][wv]){
          playSound('pickup');
          nextHeld={...hammerHeld,[turn]:true};
          nextUsed={...hammerUsed,[turn]:{...hammerUsed[turn],[wv]:true}};
          setHammerHeld(nextHeld);
          setHammerUsed(nextUsed);
          collectItem(hit);
          let rem=hammers.filter(h=>h.id!==hit.id);
          if(nextHeld.A&&nextHeld.B){rem.forEach(collectItem);rem=[];}
          // Wenn beide je einen Wave-1-Hammer gesammelt haben → restliche Wave-1 entfernen
          const bothUsedW1=nextUsed.A.w1&&nextUsed.B.w1;
          if(bothUsedW1){
            const leftover=rem.filter(h=>h.id.indexOf('hw2-')===-1);
            leftover.forEach(collectItem);
            rem=rem.filter(h=>h.id.indexOf('hw2-')===0);
          }
          nextHammers=rem;setHammers(rem);
        }
      }
    }
    const nm=[...S.current.moveHist,{type:'move',p:turn,r,c}];
    setMoveHist(nm);
    const newTurn=turn==='A'?'B':'A';
    if(r===goalRowOf(turn,selectedMap)){
      doSync({pA:isA?np:S.current.pA,pB:isA?S.current.pB:np,walls,barrLeft:newBl,turn:newTurn,winner:turn,moves:nm,chaosItem:nextChaos,hammers:nextHammers,hammerHeld:nextHeld,hammerUsed:nextUsed});
      triggerWin(turn);
      return;
    }
    setTurn(newTurn);setFlash('');
    doSync({pA:isA?np:S.current.pA,pB:isA?S.current.pB:np,walls,barrLeft:newBl,turn:newTurn,winner:null,moves:nm,chaosItem:nextChaos,hammers:nextHammers,hammerHeld:nextHeld,hammerUsed:nextUsed});
  };

  const validDot=(r,c)=>{
    if(winner||aiThinking||dragging||!myTurn||screen!=='game')return false;
    return getValidMoves(cur,other,walls).some(m=>m.r===r&&m.c===c);
  };

  // ── Give up ──
  const handleGiveUp=()=>{
    if(!giveUpArmed){setGiveUpArmed(true);setTimeout(()=>setGiveUpArmed(false),3000);return;}
    setGiveUpArmed(false);
    const loser=gameMode==='online'?onlineRole:gameMode==='pvc'?'A':turn;
    const winP=loser==='A'?'B':'A';
    setGaveUp(loser);
    if(gameMode==='online'){
      const s=S.current;
      doSync({pA:s.pA,pB:s.pB,walls:s.walls,barrLeft:s.barrLeft,turn:s.turn,winner:winP,moves:s.moveHist,chaosItem:s.chaosItem,gaveUp:loser});
    }
    triggerWin(winP);
  };

  // ── Drag ──
  useEffect(()=>{
    if(!dragging)return;
    const OFFSET=90;
    const boardFlip=S.current.gameMode==='online'&&S.current.onlineRole==='B';
    const getRel=(x,y)=>{if(!gridRef.current)return null;const rect=gridRef.current.getBoundingClientRect();let rx=x-rect.left,ry=y-rect.top;if(boardFlip)ry=ROWS*CELL-ry;return{x:rx,y:ry};};
    const onMove=(x,y)=>{
      setGhostPos({x,y});
      const rect=gridRef.current?gridRef.current.getBoundingClientRect():null;
      const inZone=rect&&y<=rect.bottom+20;
      const rel=getRel(x,y-OFFSET);
      if(inZone&&rel&&rel.x>=0&&rel.x<=COLS*CELL&&rel.y>=0&&rel.y<=ROWS*CELL){
        const key=snapWall(rel.x,rel.y,dragging.orient);
        setPreviewKey(key);
        const wp=wallPos(key);
        const dispTop=boardFlip?(ROWS*CELL-wp.top-wp.height):wp.top;
        setSnapPos({x:rect.left+wp.left+wp.width/2,y:rect.top+dispTop+wp.height/2});
      }else{setPreviewKey(null);setSnapPos(null);}
    };
    const onEnd=(x,y)=>{
      if(snapPosRef.current){
        // Blitz-Race-Condition: Timer hat Zug gewechselt während Drag → verwerfen
        if(dragging.dragPlayer&&S.current.turn!==dragging.dragPlayer){
          setDragging(null);setPreviewKey(null);setSnapPos(null);return;
        }
        const rel=getRel(x,y-OFFSET);
        if(rel&&rel.x>=0&&rel.x<=COLS*CELL&&rel.y>=0&&rel.y<=ROWS*CELL){
          const key=snapWall(rel.x,rel.y,dragging.orient);
          const{walls:w,pA:a,pB:b,barrLeft:bl,turn:t,moveHist:mh}=S.current;
          if(bl[t]>0){
            _hamCtx=S.current.hammerMode?buildHamCtx(S.current.hammers,S.current.hammerHeld,a,b):null;
            const next=tryWall(key,w,a,b,goalRowOf('A',S.current.selectedMap),goalRowOf('B',S.current.selectedMap));
            _hamCtx=null;
            if(next){
              playSound('wall');
              setWalls(next);
              const newBl={...bl,[t]:bl[t]-1};setBarrLeft(newBl);
              const nm=[...mh,{type:'wall',p:t,k:key}];setMoveHist(nm);
              const newTurn=t==='A'?'B':'A';setTurn(newTurn);setFlash('');
              doSync({pA:a,pB:b,walls:next,barrLeft:newBl,turn:newTurn,winner:null,moves:nm,chaosItem:S.current.chaosItem});
              setTimeout(()=>window.scrollTo(0,savedScroll.current),0);
            }else setFlash(t('invalidPos'));
          }
        }
      }
      setDragging(null);setPreviewKey(null);setSnapPos(null);
    };
    const mm=e=>onMove(e.clientX,e.clientY);
    const mu=e=>onEnd(e.clientX,e.clientY);
    const tm=e=>{e.preventDefault();const t=e.touches[0];onMove(t.clientX,t.clientY);};
    const te=e=>{e.preventDefault();const t=e.changedTouches[0];onEnd(t.clientX,t.clientY);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
    document.addEventListener('touchmove',tm,{passive:false});document.addEventListener('touchend',te);
    return()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);document.removeEventListener('touchmove',tm);document.removeEventListener('touchend',te);};
  },[dragging]);

  // ── Hammer-Drag: Mauer zerschlagen ──
  useEffect(()=>{
    if(!hammerDrag)return;
    const OFFSET=90;
    const boardFlip=S.current.gameMode==='online'&&S.current.onlineRole==='B';
    const findWall=(x,y)=>{
      if(!gridRef.current)return null;
      const rect=gridRef.current.getBoundingClientRect();
      const rx=x-rect.left;
      let ry=y-OFFSET-rect.top;
      if(boardFlip)ry=ROWS*CELL-ry;
      let best=null,bestD=Infinity;
      for(const k of S.current.walls){
        if(isSteelWall(k))continue;
        const wp=wallPos(k);
        const cx=wp.left+wp.width/2,cy=wp.top+wp.height/2;
        const inside=rx>=wp.left-7&&rx<=wp.left+wp.width+7&&ry>=wp.top-7&&ry<=wp.top+wp.height+7;
        const dd=(rx-cx)*(rx-cx)+(ry-cy)*(ry-cy);
        if(inside&&dd<bestD){bestD=dd;best=k;}
      }
      return best;
    };
    const onMove=(x,y)=>{setGhostPos({x,y});setHammerTarget(findWall(x,y));};
    const onEnd=(x,y)=>{
      const k=hammerTargetRef.current;
      if(k&&S.current.walls.has(k)){
        const me=gameMode==='online'?onlineRole:(gameMode==='pvc'?'A':S.current.turn);
        const w2=new Set(S.current.walls);w2.delete(k);
        setWalls(w2);
        const newHeld={...S.current.hammerHeld,[me]:false};setHammerHeld(newHeld);
        const nm=[...S.current.moveHist,{type:'break',p:me,k}];setMoveHist(nm);
        setBreakingWall(k);setTimeout(()=>setBreakingWall(null),450);
        playSound('break');
        doSync({pA:S.current.pA,pB:S.current.pB,walls:w2,barrLeft:S.current.barrLeft,turn:S.current.turn,winner:null,moves:nm,chaosItem:S.current.chaosItem,hammers:S.current.hammers,hammerHeld:newHeld});
        setTimeout(()=>window.scrollTo(0,savedScroll.current),0);
      }
      setHammerDrag(false);setHammerTarget(null);
    };
    const mm=e=>onMove(e.clientX,e.clientY);
    const mu=e=>onEnd(e.clientX,e.clientY);
    const tm=e=>{e.preventDefault();const tt=e.touches[0];onMove(tt.clientX,tt.clientY);};
    const te=e=>{e.preventDefault();const tt=e.changedTouches[0];onEnd(tt.clientX,tt.clientY);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
    document.addEventListener('touchmove',tm,{passive:false});document.addEventListener('touchend',te);
    return()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);document.removeEventListener('touchmove',tm);document.removeEventListener('touchend',te);};
  },[hammerDrag,gameMode,onlineRole]);

  const startHammerDrag=(e)=>{
    if(winner||aiThinking||!myTurn||screen!=='game')return;
    if(!(hammerMode&&hammerHeld[meRole]&&meRole===turn))return;
    if(!e.touches)e.preventDefault();
    savedScroll.current=window.scrollY;
    const x=e.touches?e.touches[0].clientX:e.clientX,y=e.touches?e.touches[0].clientY:e.clientY;
    setHammerDrag(true);setGhostPos({x,y});setHammerTarget(null);setFlash('');
  };

  const startDrag=(e,orient)=>{
    if(!canDrag)return;
    if(!e.touches)e.preventDefault(); // nur Maus: kein Text-Select
    savedScroll.current=window.scrollY;
    const x=e.touches?e.touches[0].clientX:e.clientX,y=e.touches?e.touches[0].clientY:e.clientY;
    setDragging({orient,dragPlayer:turn});setGhostPos({x,y});setPreviewKey(null);setSnapPos(null);setFlash('');
  };

  const previewValid=useMemo(()=>{
    if(!previewKey)return false;
    _hamCtx=S.current.hammerMode?buildHamCtx(S.current.hammers,S.current.hammerHeld,S.current.pA,S.current.pB):null;
    const v=!!tryWall(previewKey,S.current.walls,S.current.pA,S.current.pB,goalRowOf('A',selectedMap),goalRowOf('B',selectedMap));
    _hamCtx=null;return v;
  },[previewKey,selectedMap]);

  const gW=dragging&&dragging.orient==='H'?CELL*2:WW;
  const gH=dragging&&dragging.orient==='V'?CELL*2:WW;

  // ── 2v2 (Beta) Mount ──
  if(screen==='twovtwo')return <TwoVTwo t={t} darkMode={darkMode} account={account} onRecordResult={(won)=>{const acc=accRef.current;if(!acc)return;const ns=applyMatchResult(acc.stats||freshAccountStats(),won,'2v2');const na={...acc,stats:ns};setAccount(na);saveAccountProfile(acc.key,{stats:ns});}} onExit={()=>{setNavDir('back');setScreen('menu');}}/>;

  // ── MENU ──────────────────────────────────────────────────
  if(screen==='menu'){
    if(adminCfg.maintenance&&!isAdmin()){
      return(
        <div style={{...sPage,background:'transparent',position:'relative',zIndex:1,justifyContent:'center'}}>
          <MenuBG dark={darkMode}/>
          <div style={{position:'relative',zIndex:1,textAlign:'center',maxWidth:300,padding:24}}>
            <div style={{fontSize:48,marginBottom:14}}>🛠️</div>
            <div style={{fontSize:20,fontWeight:900,color:'var(--text)',marginBottom:8}}>Wartung</div>
            <div style={{fontSize:13,color:'var(--subtle)',fontWeight:500,lineHeight:1.6}}>
              {adminCfg.announce?adminCfg.announce:'Das Spiel ist gerade nicht verfügbar. Bitte versuche es später nochmal.'}
            </div>
          </div>
        </div>
      );
    }
    // Aktuellen Modus formatieren
    const modeLabel=gameTimeMode==='none'?t('noTimer')
      :gameTimeMode==='classic-3'?'3 '+t('minLabel')
      :gameTimeMode==='classic-5'?'5 '+t('minLabel')
      :gameTimeMode==='classic-8'?'8 '+t('minLabel')
      :gameTimeMode==='blitz-5'?'5'+t('secLabel')+' '+t('perTurn')
      :gameTimeMode==='blitz-8'?'8'+t('secLabel')+' '+t('perTurn')
      :gameTimeMode==='blitz-10'?'10'+t('secLabel')+' '+t('perTurn')
      :t('noTimer');
    return(
    <div style={{...sPage,background:'transparent',position:'relative',zIndex:1,
      animation:navDir==='back'?'slide-in-left 0.32s cubic-bezier(0.25,1,0.5,1) backwards':'none'}}>
      <MenuBG dark={darkMode}/>
      <MapAura map={selectedMap} dark={darkMode}/>
      <button onClick={()=>{setOptionsTab('main');setShowOptions(true);}} style={{
        position:'fixed',top:'calc(env(safe-area-inset-top) + 14px)',right:14,
        width:40,height:40,borderRadius:'50%',background:'var(--card)',border:'1.5px solid var(--border)',
        cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',
        boxShadow:'var(--shadow-soft)',zIndex:100}}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text)" strokeWidth="2.2" strokeLinecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <button onClick={()=>{setNavDir('fwd');setScreen('friends');}} style={{
        position:'fixed',top:'calc(env(safe-area-inset-top) + 14px)',right:62,
        width:40,height:40,borderRadius:'50%',background:'var(--card)',border:'1.5px solid var(--border)',
        cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
        boxShadow:'var(--shadow-soft)',zIndex:100,overflow:'visible'}}>
        <PeopleIcon size={18} color="var(--text)"/>
        {(pendingInvite||friendReqCount>0)&&(
          <div style={{position:'absolute',top:2,right:2,minWidth:14,height:14,borderRadius:7,
            background:'#ef4444',border:'2px solid var(--card)',
            display:'flex',alignItems:'center',justifyContent:'center',padding:'0 2px'}}>
            {friendReqCount>0&&<span style={{fontSize:8,fontWeight:900,color:'#fff',lineHeight:1}}>{friendReqCount>9?'9+':friendReqCount}</span>}
          </div>
        )}
      </button>
      <button onClick={()=>{setNavDir('fwd');setScreen(account?'profile':'auth');}} style={{
        position:'fixed',top:'calc(env(safe-area-inset-top) + 14px)',left:14,
        width:40,height:40,borderRadius:'50%',
        background:account?account.color:'var(--card)',
        border:account?'1.5px solid rgba(255,255,255,0.5)':'1.5px solid var(--border)',
        cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
        boxShadow:account?('0 2px 10px '+account.color+'55'):'var(--shadow-soft)',zIndex:100,padding:0,overflow:'hidden'}}>
        {account
          ?<span style={{fontSize:17,fontWeight:900,color:'#fff',lineHeight:1}}>{account.name.slice(0,1).toUpperCase()}</span>
          :<PeopleIcon size={18} color="var(--muted)"/>}
      </button>
      {isAdmin()&&(
        <button onClick={()=>setShowAdmin(true)} style={{
          position:'fixed',top:'calc(env(safe-area-inset-top) + 14px)',left:62,
          width:40,height:40,borderRadius:'50%',background:'linear-gradient(135deg,#f59e0b,#ef4444)',border:'none',
          cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 2px 10px rgba(245,158,11,0.4)',zIndex:100}}><ShieldSmIcon size={20} color="#fff"/></button>
      )}
      {adminCfg.announce&&(adminCfg.announceUntil===0||Date.now()<adminCfg.announceUntil)?(
        <div style={{position:'relative',zIndex:1,width:280,marginBottom:14,padding:'10px 14px',
          background:'linear-gradient(135deg,#8b5cf6,#3b82f6)',color:'white',borderRadius:12,
          fontSize:12,fontWeight:700,textAlign:'center',boxShadow:'0 2px 10px rgba(99,102,241,0.3)',
          display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          <MegaphoneIcon size={14} color="#fff"/> {adminCfg.announce}
        </div>
      ):null}
      {pendingInvite&&(
        <div style={{position:'relative',zIndex:1,width:280,marginBottom:14,borderRadius:14,
          background:'var(--card)',border:'1.5px solid #8b5cf644',boxShadow:'0 4px 14px rgba(99,102,241,0.18)',overflow:'hidden'}}>
          <div style={{background:'linear-gradient(90deg,#8b5cf6,#3b82f6)',height:3}}/>
          <div style={{padding:'12px 14px'}}>
            <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:4,display:'flex',alignItems:'center',gap:6}}>
              <GamepadIcon size={15} color="var(--text)"/> <b>{pendingInvite.fromName}</b> {t('friends_incomingInvite')}
            </div>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button onClick={doAcceptInvite} style={{flex:1,padding:'9px',borderRadius:9,
                background:'linear-gradient(135deg,#8b5cf6,#3b82f6)',color:'#fff',border:'none',
                cursor:'pointer',fontWeight:800,fontSize:13,fontFamily:'system-ui,-apple-system,sans-serif'}}>
                {t('friends_join')}
              </button>
