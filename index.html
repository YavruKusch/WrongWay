}
var WSNET={
  sock:null, token:null, roomId:null, role:null, onState:null, settings:null, meta:null, equip:null, browseOn:false, onLobbies:null, _lp:null, _jr:false, lastRecv:0, pongSeen:false, _hb:null, rankedOn:false, rankedMode:null, rankedRating:1000, spectateCode:null, onSpectate:null,

function waitForGame(id,timeoutMs){
  return new Promise(function(resolve){
    var ref=window.db.ref('barricade_game_'+id);
    var done=false;var timer=null;
    var cb=ref.on('value',function(snap){
      var v=snap.val();
      if(v===null||v===undefined)return;
      if(done)return;done=true;
      try{ref.off('value',cb);}catch(e){}
      if(timer)clearTimeout(timer);
      dlTrack('barricade_game_'+id,v);
      var g=null;try{g=JSON.parse(v);}catch(e){}
      resolve(g);
    },function(){ if(!done){done=true;if(timer)clearTimeout(timer);resolve(null);} });
    timer=setTimeout(function(){
      if(done)return;done=true;
      try{ref.off('value',cb);}catch(e){}
      resolve(null);
    },timeoutMs||30000);
  });
}

async function hashPw(pw){
  try{
    const enc=new TextEncoder().encode(pw+'::wrongway');
    const buf=await crypto.subtle.digest('SHA-256',enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    let h=0;const s=pw+'::wrongway';for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}
    return 'f'+(h>>>0).toString(16);
  }
}

function calculateElo(myRating,oppRating,won){
  const K=32,exp=1/(1+Math.pow(10,(oppRating-myRating)/400));
  const change=Math.round(K*((won?1:0)-exp));
  return{newRating:Math.max(100,myRating+change),change:change};
}

async function changeAccountName(uid,newName){
  const newKey=normUser(newName);
  if(newKey.length<3)return{err:'tooShort'};
  if(!/^[a-z0-9_]+$/.test(newKey))return{err:'badChars'};
  const prof=await stoGet(PROFILE_KEY(uid));
  if(!prof)return{err:'notFound'};
  if(normUser(prof.name)===newKey)return{err:'sameName'};
  const existing=await stoGet(USERNAME_KEY(newKey));
  if(existing&&existing.uid!==uid)return{err:'taken'};
  const oldKey=normUser(prof.name);
  const updated=Object.assign({},prof,{name:newName.trim(),lastNameChange:Date.now()});
  // Atomisch: Profil aktualisieren + alte Reservierung loeschen + neue setzen
  const ok=await stoMultiUpdate({
    [PROFILE_KEY(uid)]:updated,
    [USERNAME_KEY(oldKey)]:null,
    [USERNAME_KEY(newKey)]:{uid:uid,name:newName.trim()}
  });
  if(!ok)return{err:'network'};
  return{prof:Object.assign({},updated,{key:uid,isGoogle:prof.isGoogle||false})};
}
async function changeAccountPassword(key,oldPw,newPw,confirmPw){
  if(!newPw||newPw.length<6)return{err:'pwTooShort'};
  if(newPw!==confirmPw)return{err:'pwNoMatch'};
  const user=firebase.auth().currentUser;
  if(!user||!user.email)return{err:'notFound'};
  try{
    // Erneute Bestaetigung mit altem Passwort (Firebase verlangt das fuer sensible Aenderungen)
    const credential=firebase.auth.EmailAuthProvider.credential(user.email,oldPw);
    await user.reauthenticateWithCredential(credential);
    await user.updatePassword(newPw);
    return{ok:true};
  }catch(e){
    const c=e&&e.code?e.code:'';
    if(c==='auth/weak-password')return{err:'pwTooShort'};
    return{err:'wrongPw'};
  }
}
async function adminResetAllRanked(){
  const snap=await window.db.ref('ww_leaderboard').once('value');
  const all=snap.val();
  if(!all)return 0;
  const keys=Object.keys(all);
  const resetMode={rating:1000,wins:0,losses:0};
  var errors=[];
  await Promise.all(keys.map(async function(k){
    const entry=all[k];
    if(!entry||typeof entry!=='object'){return;}
    // Bogus-Eintraege loeschen: kein Name, Name '?', oder Rating > 4000 (Cheat)
    var classicR=(entry.classic&&typeof entry.classic.rating==='number')?entry.classic.rating:0;
    var duelR=(entry.duel&&typeof entry.duel.rating==='number')?entry.duel.rating:0;
    var isBogus=(!entry.name||entry.name==='?'||classicR>4000||duelR>4000);
    if(isBogus){
      try{await window.db.ref('ww_leaderboard/'+k).remove();}
      catch(e){errors.push('del '+k+': '+(e&&e.message?e.message:e));}
      return;
    }
    const update={};
    if(entry.classic)update.classic=resetMode;
    if(entry.duel)update.duel=resetMode;
    if(Object.keys(update).length>0){
      try{await window.db.ref('ww_leaderboard/'+k).update(update);}
      catch(e){errors.push('rst '+k+': '+(e&&e.message?e.message:e));}
    }
  }));
  if(errors.length>0)throw new Error(errors.join(' | '));
  return keys.length;
}

// Loescht die write-geschuetzten Server-Pfade (Coins/XP/Level/Inventar/Kaeufe/Receipts/
// Elo-Reports/Tag/PlayerID), die der Client wegen der Firebase-Regeln nie selbst loeschen
// kann. Gleiches Muster wie im Vite-Client (ProfileScreen.jsx) — muss VOR dem Auth-Delete
// erfolgreich sein, sonst blieben diese Pfade fuer immer verwaist stehen.
async function accountDeleteWsCmd(){
  return new Promise(function(resolve,reject){
    var ws=new WebSocket(WW_URL);
    var authed=false,done=false;
    var tmr=setTimeout(function(){if(!done){done=true;try{ws.close();}catch(e){}reject(new Error('Timeout'));}},8000);
    ws.onopen=function(){
      firebase.auth().currentUser.getIdToken(true).then(function(tok){
        if(done)return;
        ws.send(JSON.stringify({type:'auth',idToken:tok}));
      }).catch(function(e){if(!done){done=true;clearTimeout(tmr);try{ws.close();}catch(e2){}reject(e);}});
    };
    ws.onmessage=function(ev){
      if(done)return;
      var d;try{d=JSON.parse(ev.data);}catch(e){return;}
      if(d.type==='authed'&&!authed){authed=true;ws.send(JSON.stringify({type:'account_delete'}));return;}
      if(d.type==='account_delete_ok'){done=true;clearTimeout(tmr);try{ws.close();}catch(e){}resolve(true);return;}
      if(d.type==='account_delete_err'){done=true;clearTimeout(tmr);try{ws.close();}catch(e){}reject(new Error(d.reason||'Fehler'));}
    };
    ws.onerror=function(){if(!done){done=true;clearTimeout(tmr);reject(new Error('WS-Fehler'));}};
    ws.onclose=function(){if(!done){done=true;clearTimeout(tmr);reject(new Error('Verbindung getrennt'));}};

async function adminFlagWsCmd(flag, value){
  return new Promise(function(resolve,reject){
    var ws=new WebSocket(WW_URL);
    var authed=false,done=false;
    var tmr=setTimeout(function(){if(!done){done=true;try{ws.close();}catch(e){}reject(new Error('Timeout'));}},10000);
    ws.onopen=function(){
      firebase.auth().currentUser.getIdToken(true).then(function(tok){
        if(done)return;
        ws.send(JSON.stringify({type:'auth',idToken:tok}));
      }).catch(function(e){if(!done){done=true;clearTimeout(tmr);try{ws.close();}catch(e2){}reject(e);}});
    };
    ws.onmessage=function(ev){
      if(done)return;
      var d;try{d=JSON.parse(ev.data);}catch(e){return;}
      if(d.type==='authed'&&!authed){authed=true;ws.send(JSON.stringify({type:'admin_set_flag',flag:flag,value:value}));return;}
      if(d.type==='admin_flag_ok'){done=true;clearTimeout(tmr);try{ws.close();}catch(e){}resolve(d);return;}
      if(d.type==='error'){done=true;clearTimeout(tmr);try{ws.close();}catch(e){}reject(new Error(d.grund||'Fehler'));}
    };
    ws.onerror=function(){if(!done){done=true;clearTimeout(tmr);reject(new Error('WS-Fehler'));}};
    ws.onclose=function(){if(!done){done=true;clearTimeout(tmr);reject(new Error('Verbindung getrennt'));}};
  });
}

async function adminWsCmd(msg,okType){ // dedizierter Kurz-WS: auth -> Admin-Befehl -> auf okType warten (Coins, Bans, Report-Aktionen)
  return new Promise(function(resolve,reject){
    var ws=new WebSocket(WW_URL);
    var authed=false,done=false;
    var tmr=setTimeout(function(){if(!done){done=true;try{ws.close();}catch(e){}reject(new Error('Timeout'));}},12000);
    ws.onopen=function(){
      firebase.auth().currentUser.getIdToken(true).then(function(tok){
        if(done)return;
        ws.send(JSON.stringify({type:'auth',idToken:tok}));
      }).catch(function(e){if(!done){done=true;clearTimeout(tmr);try{ws.close();}catch(e2){}reject(e);}});
    };
    ws.onmessage=function(ev){
      if(done)return;
      var d;try{d=JSON.parse(ev.data);}catch(e){return;}
      if(d.type==='authed'&&!authed){authed=true;ws.send(JSON.stringify(msg));return;}
      if(d.type===okType){done=true;clearTimeout(tmr);try{ws.close();}catch(e){}resolve(d);return;}
      if(d.type==='error'){done=true;clearTimeout(tmr);try{ws.close();}catch(e){}reject(new Error(d.grund||'Server-Fehler'));}
    };
    ws.onerror=function(){if(!done){done=true;clearTimeout(tmr);reject(new Error('WS-Fehler'));}};
    ws.onclose=function(){if(!done){done=true;clearTimeout(tmr);reject(new Error('Verbindung getrennt'));}};
  });
}

async function adminMigrateStats(fromUid,toUid){
  // Kopiert Stats + ELO vom alten Konto (fromUid) ins neue Konto (toUid).
  // Name, Farbe und Friends des neuen Kontos bleiben unveraendert.
  // Wird verwendet wenn ein Nutzer versehentlich ein Duplikat-Konto erstellt hat.
  if(!fromUid||!toUid||fromUid===toUid)throw new Error('Ungueltige UIDs');
  const parseRaw=r=>{const v=r.val();return v?(typeof v==='string'?JSON.parse(v):v):null;};
  const[oldProfSnap,newProfSnap,oldLbSnap]=await Promise.all([
    window.db.ref('ww_profiles/'+fromUid).once('value'),
    window.db.ref('ww_profiles/'+toUid).once('value'),
    window.db.ref('ww_leaderboard/'+fromUid).once('value'),
  ]);
  const oldProf=parseRaw(oldProfSnap);
  const newProf=parseRaw(newProfSnap);
  const oldLb=oldLbSnap.val();
  if(!oldProf)throw new Error('Alt-Profil nicht gefunden: '+fromUid);
  if(!newProf)throw new Error('Ziel-Profil nicht gefunden: '+toUid);
  const mergedProf={...newProf,stats:oldProf.stats||{}};
  await window.db.ref('ww_profiles/'+toUid).set(JSON.stringify(mergedProf));
  if(oldLb){
    const parsedLb=typeof oldLb==='string'?JSON.parse(oldLb):oldLb;
    parsedLb.name=newProf.name;parsedLb.color=newProf.color;
    await window.db.ref('ww_leaderboard/'+toUid).set(parsedLb);
  }
  return{ok:true,from:oldProf.name||fromUid,to:newProf.name||toUid};
}

  const key=normUser(name);
  if(key.length<3)return{err:'tooShort'};
  if(!/^[a-z0-9_]+$/.test(key))return{err:'badChars'};
  if((pw||'').length<6)return{err:'pwShort'};
  const em=(email||'').trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em))return{err:'emailInvalid'};
  // Benutzername noch frei?
  const taken=await stoGet(USERNAME_KEY(key));
  if(taken)return{err:'taken'};
  // Firebase Auth Konto anlegen (Passwort wird serverseitig gehasht, verlaesst nie den Server).
  // Gast-Session (anonyme UID) wird dabei UPGEGRADET statt ersetzt: gleiche UID behaelt
  // serverseitige Coins/XP/Inventar — sonst strandet der Gast-Fortschritt auf der alten UID.
  let cred;
  try{
    const curU=firebase.auth().currentUser;
    if(curU&&curU.isAnonymous){
      cred=await curU.linkWithCredential(firebase.auth.EmailAuthProvider.credential(em,pw));
    }else{
      cred=await firebase.auth().createUserWithEmailAndPassword(em,pw);
    }
  }
  catch(e){
    const c=e&&e.code?e.code:'';
    if(c==='auth/email-already-in-use'||c==='auth/credential-already-in-use')return{err:'emailTaken'};
    if(c==='auth/invalid-email')return{err:'emailInvalid'};
    if(c==='auth/weak-password')return{err:'pwShort'};
    if(c==='auth/operation-not-allowed')return{err:'authDisabled'};
    if(c==='auth/too-many-requests')return{err:'tooManyAttempts'};
    return{err:'network'};
  }
  const uid=cred.user.uid;
  // Warten bis Firebase Auth den neuen Nutzer vollstaendig propagiert hat (RTDB-Token-Sync)
  await new Promise(function(resolve){
    var unsub=firebase.auth().onAuthStateChanged(function(u){
      if(u&&u.uid===uid&&!u.isAnonymous){unsub();resolve();}
    });
  });
  const prof={name:name.trim(),color:color||AVATAR_COLORS[0],created:Date.now(),stats:freshAccountStats()};
  const ok=await stoSet(PROFILE_KEY(uid),prof);
  if(!ok){
    try{await firebase.auth().signOut();}catch(e){}
    return{err:'network'};
  }
  await stoSet(USERNAME_KEY(key),{uid:uid,name:name.trim()});
  // Bestaetigunsmail senden und abmelden (Login erst nach Bestaetigung moeglich)
  await sendVerificationEmail(cred.user);
  try{await firebase.auth().signOut();}catch(e){}
  return{err:'verifyRequired'};
}
async function loginAccount(email,pw){
  const em=(email||'').trim();
  if(!em)return{err:'wrongLogin'};
  let cred;
  try{cred=await firebase.auth().signInWithEmailAndPassword(em,pw);}
  catch(e){
    const c=e&&e.code?e.code:'';
    if(c==='auth/invalid-email')return{err:'emailInvalid'};
    if(c==='auth/operation-not-allowed')return{err:'authDisabled'};
    if(c==='auth/too-many-requests')return{err:'tooManyAttempts'};
    return{err:'wrongLogin'};
  }
  const uid=cred.user.uid;
  // E-Mail muss bestaetigt sein
  if(!cred.user.emailVerified){
    await sendVerificationEmail(cred.user);
    try{await firebase.auth().signOut();}catch(e){}
    return{err:'notVerified'};
  }
  let prof=await stoGet(PROFILE_KEY(uid));
  if(!prof){
    // Auth-Konto ohne Profil (z.B. abgebrochene Registrierung) -> minimal anlegen
    prof={name:'Player',color:AVATAR_COLORS[0],created:Date.now(),stats:freshAccountStats()};
    await stoSet(PROFILE_KEY(uid),prof);
  }
  return{prof:{...prof,key:uid}};
}
async function getGoogleProfile(googleUser){
  const uid=googleUser.uid;
  // Strict-Read: Firebase-Fehler werfen statt null zurueckgeben.
  // stoGet() gibt bei Netzwerkfehler null zurueck — das wuerde faelschlicherweise den
  // "neuer Nutzer"-Flow ausloesen und ein Duplikat-Konto mit leeren Stats erstellen.
  let raw;
  try{raw=(await window.db.ref(PROFILE_KEY(uid)).once('value')).val();}
  catch(fbErr){const e=new Error('fb_read');e.isFbError=true;throw e;}
  const prof=raw?(typeof raw==='string'?JSON.parse(raw):raw):null;
  if(!prof)return null;
  // Profil-Reparatur: fehlende Pflichtfelder ergaenzen
  if(!prof.stats||!prof.name){
    const repaired=Object.assign({name:'Player',color:AVATAR_COLORS[0],stats:freshAccountStats()},prof,{isGoogle:true});
    await stoSet(PROFILE_KEY(uid),repaired);
    return{...repaired,key:uid,isGoogle:true};
  }
  return{...prof,key:uid,isGoogle:true};
}
async function createGoogleProfile(googleUser,name,color){
  const nameKey=normUser(name);
  if(nameKey.length<3)return{err:'tooShort'};
  if(!/^[a-z0-9_]+$/.test(nameKey))return{err:'badChars'};
  const uid=googleUser.uid;
  // Race-Condition-Schutz: Profil bereits vorhanden? Strict-Read: bei Firebase-Fehler ABBRUCH statt
  // null-Rueckgabe, die das Ueberschreiben eines bestehenden Profils ausloesen wuerde.
  let alreadyExists;
  try{const _s=await window.db.ref(PROFILE_KEY(uid)).once('value');const _r=_s.val();alreadyExists=_r?(typeof _r==='string'?JSON.parse(_r):_r):null;}
  catch(e){return{err:'network'};}
  if(alreadyExists)return{prof:{...alreadyExists,key:uid,isGoogle:true}};
  const existing=await stoGet(USERNAME_KEY(nameKey));
  if(existing&&existing.uid!==uid)return{err:'taken'};
  // Warten bis RTDB-Token nach Google-Login aktuell ist
  await new Promise(function(resolve){
    var unsub=firebase.auth().onAuthStateChanged(function(u){
      if(u&&u.uid===uid&&!u.isAnonymous){unsub();resolve();}
    });
  });
  const prof={name:name.trim(),color:color||AVATAR_COLORS[0],isGoogle:true,created:Date.now(),stats:freshAccountStats()};
  const ok=await stoSet(PROFILE_KEY(uid),prof);
  if(!ok)return{err:'network'};
  await stoSet(USERNAME_KEY(nameKey),{uid:uid,name:name.trim()});
  return{prof:{...prof,key:uid,isGoogle:true}};
}

// ── Friends System ──────────────────────────────────────────
const FLIST_KEY=u=>'ww_friends/'+u;
const FR_KEY=u=>'ww_freq/'+u;
const PRESENCE_KEY=u=>'ww_presence/'+u;
const INVITE_KEY=u=>'ww_invites/'+u;
// ww_friends/$uid/$friendUid:true (Kindknoten statt JSON-Array) — jede Seite schreibt
// nur die eigene UID als Schluessel, dadurch keine Cross-User-Permission-Denied mehr
// (Firebase-Regel erlaubte frueher nur auth.uid===$uid, ein zweiter User konnte die
// Liste des ersten also nie beschreiben -> einseitige/kaputte Freundschaften).
async function getFriendKeys(uid){
  let v;
  try{const snap=await window.db.ref(FLIST_KEY(uid)).once('value');v=snap.val();}
  catch(e){return[];}
  dlTrack(FLIST_KEY(uid),v);
  if(!v)return[];
  if(typeof v==='string'){
    // Alt-Format (JSON-String-Array) -> einmalig auf Kindknoten migrieren (best-effort)
    let arr=[];try{arr=JSON.parse(v)||[];}catch(e){}
    if(!Array.isArray(arr))arr=[];
    try{
      // update() statt set(): die neue ww_friends-Regel hat KEIN .write am $uid-Parent,
      // set()/remove() dort werden immer abgelehnt. update() ist ein Multi-Path-Write,
      // Firebase prueft jede Kind-Regel ($friendUid) einzeln -> Migration klappt.
      // Ohne diese Migration wuerde der naechste accept-Kind-Write den Alt-String
      // ueberschreiben und die komplette alte Freundesliste zerstoeren.
      if(arr.length){
        const updates={};arr.forEach(k=>{updates[k]=true;});
        await window.db.ref(FLIST_KEY(uid)).update(updates);
      }
      // leeres Alt-Format: String bleibt stehen (Parent-Delete waere denied) — harmlos
    }catch(e){/* Migration best-effort: Liste trotzdem zurueckgeben */}
    return arr;
  }
  return Object.keys(v);
}
async function hasFriend(uid,otherUid){
  return (await getFriendKeys(uid)).indexOf(otherUid)>=0;
}
async function sendFriendRequestByKey(fromKey,toKey){
  if(!toKey||!fromKey)return{err:'friends_notFound'};
  if(toKey===fromKey)return{err:'friends_self'};
  const target=await stoGet(PROFILE_KEY(toKey));
  if(!target)return{err:'friends_notFound'};
  if(await hasFriend(fromKey,toKey))return{err:'friends_already'};
  // Prüfen ob wir IHNEN bereits eine Anfrage geschickt haben (korrekte Richtung)
  const existing=await stoGet(FR_KEY(toKey)+'/'+fromKey);
  if(existing)return{err:'friends_alreadySent'};
  await stoSet(FR_KEY(toKey)+'/'+fromKey,{from:fromKey,ts:Date.now()});
  return{ok:true};
}
async function sendFriendRequest(fromKey,toName){
  const rec=await stoGet(USERNAME_KEY(toName));
  const toKey=rec&&rec.uid?rec.uid:null;
  if(!toKey)return{err:'friends_notFound'};
  if(toKey===fromKey)return{err:'friends_self'};
  if(await hasFriend(fromKey,toKey))return{err:'friends_already'};
  // Pruefen ob wir IHNEN bereits eine Anfrage geschickt haben (korrekte Richtung)
  const existing=await stoGet(FR_KEY(toKey)+'/'+fromKey);
  if(existing)return{err:'friends_alreadySent'};
  await stoSet(FR_KEY(toKey)+'/'+fromKey,{from:fromKey,ts:Date.now()});
  return{ok:true};
}
async function acceptFriendRequest(myKey,fromKey){
  await window.db.ref(FLIST_KEY(myKey)+'/'+fromKey).set(true);
  await window.db.ref(FLIST_KEY(fromKey)+'/'+myKey).set(true);
  await stoDel(FR_KEY(myKey)+'/'+fromKey);
  return{ok:true};
}
async function declineFriendRequest(myKey,fromKey){
  await stoDel(FR_KEY(myKey)+'/'+fromKey);
}
async function removeFriend(myKey,friendKey){
  await window.db.ref(FLIST_KEY(myKey)+'/'+friendKey).remove();
  await window.db.ref(FLIST_KEY(friendKey)+'/'+myKey).remove();
}

async function getPresenceMany(keys){

      const p=snap.val();

// Wendet ein Spielergebnis auf ein Stats-Objekt an (nur Online; modeKey z.B. 'classic','blitz','2v2')
function applyMatchResult(stats,won,modeKey){
  const s={...(stats||freshAccountStats())};
  s.modes={...(s.modes||{})};
  s.games=(s.games||0)+1;
  if(won){s.wins=(s.wins||0)+1;s.streak=(s.streak||0)+1;if(s.streak>(s.bestStreak||0))s.bestStreak=s.streak;}
  else{s.losses=(s.losses||0)+1;s.streak=0;}
  const m={...(s.modes[modeKey]||{games:0,wins:0,losses:0})};
  m.games++;if(won)m.wins++;else m.losses++;
  s.modes[modeKey]=m;
  return s;
}

async function lobbyIndexList2(){
  try{
    const snap=await window.db.ref(LOBBY_INDEX_2V2).once('value');
    const v=snap.val();if(!v)return [];
    const out=[];
    for(const code of Object.keys(v)){
      try{const info=JSON.parse(v[code]);out.push({code,count:info.count||0,updated:info.updated||0});}catch(e){}
    }
    // nur frische (< 5 min) und nicht volle, neueste zuerst
    const now=Date.now();
    return out.filter(l=>now-l.updated<300000&&l.count<4).sort((a,b)=>b.updated-a.updated);
  }catch(e){return [];}
}

function RankedResetAdmin({t}){

          fontFamily:'system-ui,-apple-system,sans-serif'}}>{t('cancel')}</button>
      </div>

  const[ncBusy,setNcBusy]=React.useState(false);
  const[showReset,setShowReset]=React.useState(false);
  const[resetBusy,setResetBusy]=React.useState(false);
  const[resetDone,setResetDone]=React.useState(false);
  const[showPW,setShowPW]=React.useState(false);
  const[pwOld,setPwOld]=React.useState('');
  const[pwNew,setPwNew]=React.useState('');
  const[pwConf,setPwConf]=React.useState('');
  const[pwErr,setPwErr]=React.useState('');
  const[showDeleteAccount,setShowDeleteAccount]=React.useState(false);
  const[deletePw,setDeletePw]=React.useState('');
  const[deleteConfirm,setDeleteConfirm]=React.useState('');
  const[deleteErr,setDeleteErr]=React.useState('');
  const[deleteBusy,setDeleteBusy]=React.useState(false);
  const doDeleteAccount=async()=>{
    setDeleteBusy(true);setDeleteErr('');
    const user=firebase.auth().currentUser;
    if(!user){setDeleteBusy(false);setDeleteErr(t('auth_notFound')||'Fehler');return;}
    try{
      // Reauth ZUERST fuer beide Konto-Typen: ohne frischen Login wirft currentUser.delete()
      // spaeter auth/requires-recent-login — dann waeren Server-/Client-Daten schon geloescht,
      // das Auth-Konto selbst aber nicht (Daten-Verlust ohne echte Loeschung).
      if(account.isGoogle){
        const provider=new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({prompt:'select_account'});
        await user.reauthenticateWithPopup(provider);
      }else{
        const pwVal=deletePw.trim();
        const cred=firebase.auth.EmailAuthProvider.credential(user.email,pwVal);
        await user.reauthenticateWithCredential(cred);
      }
      // ZUERST der Server: loescht die write-geschuetzten Pfade (Coins/XP/Level/Inventar/
      // Kaeufe/Receipts/Elo-Reports/Tag/PlayerID). Ohne Server-Bestaetigung abbrechen —
      // sonst blieben diese Pfade nach dem Auth-Delete fuer immer verwaist stehen.
      try{
        await accountDeleteWsCmd();
      }catch(e){
        setDeleteBusy(false);
        setDeleteErr(t('deleteAccountServerErr')||'Server-Loeschung fehlgeschlagen — bitte erneut versuchen');
        return;
      }
      // Danach die Pfade, die nur der Client loeschen kann (Owner-write laut Rules)
      const uid=user.uid;
      const nameKey=normUser(account.name||'');
      const paths=[
        PROFILE_KEY(uid),
        USERNAME_KEY(nameKey),
        'ww_leaderboard/'+uid,
        'ww_presence/'+uid,
        'ww_friends/'+uid,
        'ww_freq/'+uid,
        'ww_invites/'+uid,
        'ww_ranked_queue/'+uid,
        'ww_ranked_confirm/'+uid
      ];
      await Promise.all(paths.map(function(p){
        return window.db.ref(p).remove().catch(function(){});
      }));
      // Firebase Auth Konto loeschen (frische Referenz)
      await firebase.auth().currentUser.delete();
      onLogout();
    }catch(e){
      const c=e&&e.code?e.code:'';
      if(c==='auth/wrong-password'||c==='auth/invalid-credential')setDeleteErr(t('auth_wrongLogin')||'Falsches Passwort');
      else if(c==='auth/requires-recent-login')setDeleteErr('Bitte abmelden, neu anmelden und dann sofort loeschen');
      else if(c==='auth/popup-blocked'||c==='auth/popup-closed-by-user')setDeleteErr('Google-Anmeldung abgebrochen oder Popup blockiert — bitte erneut versuchen');
      else setDeleteErr('Fehler: '+(c||e.message||'unbekannt'));
      setDeleteBusy(false);
    }
  };
  const[pwOk,setPwOk]=React.useState(false);
  const[pwBusy,setPwBusy]=React.useState(false);

  const doPW=async()=>{
    if(pwBusy)return;
    setPwBusy(true);setPwErr('');setPwOk(false);
    const res=await changeAccountPassword(account.key,pwOld,pwNew,pwConf);
    setPwBusy(false);
    if(res.err){setPwErr(t('pw_'+res.err)||res.err);return;}
    setPwOk(true);setPwOld('');setPwNew('');setPwConf('');
    setTimeout(()=>{setShowPW(false);setPwOk(false);},1800);
  };

  const st=account.stats||freshAccountStats();
  const ranked=st.ranked||freshRankedStats();
  const wr=st.games>0?Math.round(st.wins/st.games*100):0;
  const NC_MS=7*24*60*60*1000;
  const canNC=!account.lastNameChange||(Date.now()-account.lastNameChange>NC_MS);
  const daysLeft=account.lastNameChange?Math.max(1,Math.ceil((NC_MS-(Date.now()-account.lastNameChange))/(24*60*60*1000))):0;

  const doNC=async()=>{
    if(ncBusy||!ncInput.trim())return;
    setNcBusy(true);setNcErr('');
    const res=account.isGoogle
      ?await changeGoogleAccountName(account.key,account.name,ncInput.trim())
      :await changeAccountName(account.key,ncInput.trim());
    setNcBusy(false);
    if(res.err){setNcErr(t('auth_'+(res.err==='sameName'?'wrongPw':res.err))||res.err);
      if(res.err==='sameName')setNcErr(t('nameChangeSame')||'Das ist dein aktueller Name');return;}
    onUpdate(res.prof);setShowNC(false);setNcInput('');
  };
  const doReset=async()=>{
    setResetBusy(true);
    const newStats=Object.assign({},freshAccountStats(),{ranked:freshRankedStats()});
    await saveAccountProfile(account.key,{stats:newStats,statsResetUsed:true});
    onUpdate(Object.assign({},account,{stats:newStats,statsResetUsed:true}));
    setResetBusy(false);setShowReset(false);setResetDone(true);
  };

  const dk=darkMode;
  const card=dk?'#1e293b':'#fff';
  const border=dk?'#334155':'#e2e8f0';
  const txt=dk?'#f1f5f9':'#1e293b';
  const muted=dk?'#64748b':'#94a3b8';
  const inpSt={width:'100%',padding:'12px 14px',borderRadius:10,
    border:'1.5px solid '+border,fontSize:15,background:card,color:txt,
    outline:'none',fontFamily:'system-ui,-apple-system,sans-serif',boxSizing:'border-box'};
  const modeLabel=k=>({classic:t('classic'),blitz:t('modeBlitz'),'2v2':'2 vs 2',chaos:t('modeChaos'),hammer:t('hammerMode'),random:t('randomDrop')}[k]||k);
  const modeKeys=Object.keys(st.modes||{}).filter(k=>st.modes[k]&&st.modes[k].games>0);
  const Lbl=({v})=><div style={{fontSize:11,color:muted,fontWeight:700,letterSpacing:1,marginBottom:8,paddingLeft:2}}>{(v||'').toUpperCase()}</div>;
  var accEmail='';try{var _au=firebase.auth().currentUser;if(_au)accEmail=_au.email||'';}catch(e){}

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',minHeight:'100vh',
      padding:'0 16px 40px',paddingTop:'calc(env(safe-area-inset-top) + 20px)',
      background:'transparent',position:'fixed',inset:0,zIndex:1,
      overflowY:'auto',WebkitOverflowScrolling:'touch',touchAction:'pan-y',overscrollBehavior:'contain',
      animation:'fadeSlideUp 0.40s cubic-bezier(0.22,1,0.36,1) both'}}>
      <MenuBG dark={darkMode}/>
      <button onClick={goBack} style={{position:'fixed',top:'calc(env(safe-area-inset-top)+14px)',left:14,
        width:40,height:40,borderRadius:'50%',background:card,border:'1.5px solid '+border,
        cursor:'pointer',fontSize:22,display:'flex',alignItems:'center',justifyContent:'center',
        zIndex:100,color:txt,fontWeight:700,fontFamily:'system-ui,-apple-system,sans-serif'}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>{t('tutBack')}</button>

      <div style={{width:'100%',maxWidth:340,position:'relative',zIndex:1}}>
        {/* Avatar */}
        <div style={{textAlign:'center',marginBottom:18}}>
          <div style={{position:'relative',display:'inline-block',marginBottom:xpSystemOn&&xp!==null?18:12}}>
            <div style={{width:90,height:90,borderRadius:'50%',background:account.color,
              display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:'0 8px 24px '+account.color+'55,0 0 0 3px var(--card),0 0 0 5px '+account.color+'44'}}>
              <span style={{fontSize:40,fontWeight:900,color:'#fff'}}>{account.name.slice(0,1).toUpperCase()}</span>
            </div>
            {xpSystemOn&&xp!==null&&(
              <div style={{position:'absolute',bottom:-10,left:'50%',transform:'translateX(-50%)',zIndex:2}}>
                <LevelBadge level={levelAusXp(xp)} size='md'/>
              </div>
            )}
          </div>
          <div style={{fontSize:22,fontWeight:900,color:txt,letterSpacing:-0.5}}>{account.name}</div>
          {xpSystemOn&&xp!==null&&(
            <div style={{fontSize:11,color:muted,fontWeight:700,marginTop:3}}>{xp+' XP'}</div>
          )}
          {coins!==null&&coins>0&&(
            <div style={{display:'inline-flex',alignItems:'center',gap:5,marginTop:5,
              padding:'3px 11px',borderRadius:12,
              background:'rgba(245,158,11,0.1)',border:'1px solid rgba(245,158,11,0.25)'}}>
              <span style={{fontSize:13,color:'#f59e0b',lineHeight:1}}>{'●'}</span>
              <span style={{fontSize:12,fontWeight:800,color:'#f59e0b'}}>{coins}</span>
            </div>
          )}
          {coins!==null&&coins>0&&(
            <div style={{fontSize:10,color:muted,fontWeight:600,marginTop:4}}>{t('shopTeaser')}</div>
          )}
          {!xpSystemOn&&<div style={{fontSize:11,color:muted,fontWeight:600,marginTop:4}}>{t('accountHint')}</div>}
        </div>

        {/* Konto-Übersicht */}
        <div style={{background:card,border:'1.5px solid '+border,borderRadius:14,padding:'14px 16px',marginBottom:14}}>
          <div style={{fontSize:10,color:muted,fontWeight:700,letterSpacing:1,marginBottom:10}}>KONTO-DATEN</div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:12,color:muted,fontWeight:600}}>Benutzername</span>
              <span style={{fontSize:13,fontWeight:800,color:txt}}>{account.name}</span>
            </div>
            {accEmail&&(
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:12,color:muted,fontWeight:600}}>E-Mail</span>
                <span style={{fontSize:12,fontWeight:700,color:txt,maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{accEmail}</span>
              </div>
            )}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:12,color:muted,fontWeight:600}}>Passwort</span>
              <span style={{fontSize:13,fontWeight:700,color:txt,letterSpacing:2}}>{account.isGoogle?'Google-Konto':'\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022'}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:12,color:muted,fontWeight:600}}>Farbe</span>
              <div style={{width:22,height:22,borderRadius:'50%',background:account.color,boxShadow:'0 2px 6px '+account.color+'88'}}/>
            </div>
          </div>
        </div>

        {/* Namensänderung */}
        <div style={{marginBottom:14}}>
          {!showNC?(
            <button onClick={()=>{if(canNC)setShowNC(true);}} style={{
              width:'100%',padding:'11px 14px',borderRadius:11,background:card,
              border:'1.5px solid '+border,cursor:canNC?'pointer':'default',
              color:canNC?txt:muted,fontWeight:700,fontSize:13,
              fontFamily:'system-ui,-apple-system,sans-serif',
              display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{display:'flex',alignItems:'center',gap:6}}><PencilIcon size={15} color="currentColor"/> {t('nameChange')}</span>
              <span style={{fontSize:11,color:muted}}>{canNC?t('nameChangeOnce'):(daysLeft+' '+t('days'))}</span>
            </button>
          ):(
            <div style={{background:card,borderRadius:12,border:'1.5px solid '+border,padding:'14px'}}>
              <Lbl v={t('nameChangeNew')}/>
              <input value={ncInput} onChange={e=>setNcInput(e.target.value)}
                placeholder={account.name} maxLength={16} autoCapitalize="off" autoCorrect="off"
                onKeyDown={e=>{if(e.key==='Enter')doNC();}} style={inpSt}/>
              {ncErr&&<div style={{color:'#ef4444',fontSize:12,fontWeight:600,marginTop:6}}>{ncErr}</div>}
              <div style={{display:'flex',gap:8,marginTop:10}}>
                <button onClick={doNC} disabled={ncBusy} style={{flex:1,padding:'11px',borderRadius:9,
                  background:'linear-gradient(135deg,#8b5cf6,#3b82f6)',color:'#fff',border:'none',
                  cursor:ncBusy?'default':'pointer',fontWeight:800,fontSize:13,
                  fontFamily:'system-ui,-apple-system,sans-serif'}}>{ncBusy?'…':'✓ '+t('save')}</button>
                <button onClick={()=>{setShowNC(false);setNcInput('');setNcErr('');}} style={{
                  padding:'11px 16px',borderRadius:9,background:'transparent',border:'1.5px solid '+border,
                  color:muted,cursor:'pointer',fontWeight:700,fontSize:13,
                  fontFamily:'system-ui,-apple-system,sans-serif'}}>{t('cancel')}</button>
              </div>
            </div>
          )}
        </div>

        {/* Passwort ändern – nur für Passwort-Accounts */}
        {!account.isGoogle&&<div style={{marginBottom:14}}>
          {!showPW?(
            <button onClick={()=>setShowPW(true)} style={{
              width:'100%',padding:'11px 14px',borderRadius:11,background:card,
              border:'1.5px solid '+border,cursor:'pointer',color:txt,fontWeight:700,fontSize:13,
              fontFamily:'system-ui,-apple-system,sans-serif',
              display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{display:'flex',alignItems:'center',gap:6}}><LockIcon size={15} color="currentColor"/> {t('pwChange')}</span>
            </button>
          ):(
            <div style={{background:card,borderRadius:12,border:'1.5px solid '+border,padding:'14px'}}>
              <Lbl v={t('pwChange')}/>
              <input value={pwOld} onChange={e=>setPwOld(e.target.value)} placeholder={t('pwOld')}
                type="password" maxLength={32} style={{...inpSt,marginBottom:8}}/>
              <input value={pwNew} onChange={e=>setPwNew(e.target.value)} placeholder={t('pwNew')}
                type="password" maxLength={32} style={{...inpSt,marginBottom:8}}/>
              <input value={pwConf} onChange={e=>setPwConf(e.target.value)} placeholder={t('pwConfirm')}
                type="password" maxLength={32} onKeyDown={e=>{if(e.key==='Enter')doPW();}}
                style={inpSt}/>
              {pwErr&&<div style={{color:'#ef4444',fontSize:12,fontWeight:600,marginTop:6}}>{pwErr}</div>}
              {pwOk&&<div style={{color:'#16a34a',fontSize:12,fontWeight:700,marginTop:6}}>✓ {t('pwChanged')}</div>}
              <div style={{display:'flex',gap:8,marginTop:10}}>
                <button onClick={doPW} disabled={pwBusy} style={{flex:1,padding:'11px',borderRadius:9,
                  background:'linear-gradient(135deg,#16a34a,#22c55e)',color:'#fff',border:'none',
                  cursor:pwBusy?'default':'pointer',fontWeight:800,fontSize:13,
                  fontFamily:'system-ui,-apple-system,sans-serif'}}>{pwBusy?'…':<span style={{display:'inline-flex',alignItems:'center',gap:5}}><LockIcon size={13} color="#fff"/>{t('save')}</span>}</button>
                <button onClick={()=>{setShowPW(false);setPwOld('');setPwNew('');setPwConf('');setPwErr('');}} style={{
                  padding:'11px 16px',borderRadius:9,background:'transparent',border:'1.5px solid '+border,
                  color:muted,cursor:'pointer',fontWeight:700,fontSize:13,
                  fontFamily:'system-ui,-apple-system,sans-serif'}}>{t('cancel')}</button>
              </div>
            </div>
          )}
        </div>}

        {/* Privatsphäre */}
        <div style={{marginBottom:14}}>
          <Lbl v="Privatsphäre"/>
          <button onClick={async()=>{
            const nowPublic=account.profilePublic!==false; // aktuell öffentlich?
            const newPublic=!nowPublic; // umschalten
            const updated={...account,profilePublic:newPublic};
            onUpdate(updated); // App-State + localStorage via App-Effekt
            await saveAccountProfile(account.key,{profilePublic:newPublic});
          }} style={{width:'100%',padding:'13px 16px',borderRadius:12,background:card,
            border:'1.5px solid '+border,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'space-between',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
            <div style={{textAlign:'left'}}>
              <div style={{fontSize:13,fontWeight:800,color:txt}}>
                {account.profilePublic===false?t('profilePrivate'):t('profilePublic')}
              </div>
              <div style={{fontSize:11,color:muted,marginTop:2}}>
                {account.profilePublic===false?t('profilePrivateDesc')||'Nobody sees your stats':t('profilePublicDesc')||'Others can see your stats'}
              </div>
            </div>
            {/* Toggle-Switch */}
            <div style={{width:44,height:26,borderRadius:13,flexShrink:0,
              background:account.profilePublic===false?'#64748b':'#8b5cf6',
              transition:'background 0.2s',position:'relative'}}>
              <div style={{position:'absolute',top:3,
                left:account.profilePublic===false?3:21,
                width:20,height:20,borderRadius:'50%',background:'#fff',
                transition:'left 0.2s',boxShadow:'0 1px 4px rgba(0,0,0,0.25)'}}/>
            </div>
          </button>
        </div>

        {/* Stats */}
        <div style={{marginBottom:14}}>
          <Lbl v={t('stats')}/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            <StatCard label={t('gamesPlayed')} value={st.games||0} color="#8b5cf6"/>
            <StatCard label={t('winrate')} value={wr+'%'} color="#16a34a"/>
            <StatCard label={t('winsLabel')} value={st.wins||0} color="#3b82f6"/>
            <StatCard label={t('lossesLabel')} value={st.losses||0} color="#ef4444"/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <StatCard label={t('streakLabel')} value={<span style={{display:'flex',alignItems:'center',gap:3}}><FlameIcon size={14} color="#f59e0b"/>{st.streak||0}</span>} color="#f59e0b"/>
            <StatCard label={t('bestStreakLabel')} value={<span style={{display:'flex',alignItems:'center',gap:3}}><TrophySmIcon size={14} color="#f59e0b"/>{st.bestStreak||0}</span>} color="#f59e0b"/>
          </div>
        </div>

        {/* Ranked ELO */}
        <div style={{marginBottom:14}}>
          <Lbl v={t('ranked')}/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[['classic',<ModeGlyph kind="clock" size={11} color="#8b5cf6"/>,'#8b5cf6','RACE'],['duel',<SwordsIcon size={11} color="#f59e0b"/>,'#f59e0b','DUELL']].map(([mode,icon,col,lbl])=>{
              const r=ranked[mode]||{rating:1000,wins:0,losses:0,games:0};
              return(
                <div key={mode} style={{background:card,border:'1.5px solid '+border,borderRadius:14,
                  padding:'14px 12px',textAlign:'center'}}>
                  <div style={{fontSize:11,color:muted,fontWeight:700,letterSpacing:0.5,marginBottom:4,display:'flex',alignItems:'center',justifyContent:'center',gap:4}}><span style={{display:'flex'}}>{icon}</span> {lbl}</div>
                  <div style={{fontSize:26,fontWeight:900,color:col,letterSpacing:-0.5}}>{r.rating}</div>
                  <div style={{fontSize:10,color:muted,marginTop:3}}>{r.wins}W · {r.losses}L</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Modus-Aufschlüsselung */}
        {modeKeys.length>0&&(
          <div style={{marginBottom:14}}>
            <Lbl v={t('byMode')}/>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {modeKeys.map(k=>{
                const m=st.modes[k];const mwr=m.games>0?Math.round(m.wins/m.games*100):0;
                return(
                  <div key={k} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                    padding:'10px 14px',background:card,borderRadius:11,border:'1.5px solid '+border}}>
                    <span style={{fontSize:13,fontWeight:800,color:txt}}>{modeLabel(k)}</span>
                    <span style={{fontSize:12,fontWeight:700,color:muted}}>
                      {m.wins}W · {m.losses}L · <span style={{color:'#16a34a'}}>{mwr}%</span>
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Stats zurücksetzen */}
        {!account.statsResetUsed&&!resetDone&&(
          <div style={{marginBottom:14}}>
            {!showReset?(
              <button onClick={()=>setShowReset(true)} style={{
                width:'100%',padding:'12px',borderRadius:11,background:'transparent',
                border:'1.5px solid '+border,color:'#ef4444',cursor:'pointer',
                fontWeight:700,fontSize:13,fontFamily:'system-ui,-apple-system,sans-serif'}}>
                <span style={{display:'inline-flex',alignItems:'center',gap:6}}><TrashIcon size={15} color="#ef4444"/>{t('resetStats')}</span>
              </button>
            ):(
              <div style={{background:'rgba(239,68,68,0.06)',borderRadius:12,
                border:'1.5px solid rgba(239,68,68,0.3)',padding:'16px'}}>
                <div style={{fontSize:13,fontWeight:800,color:'#ef4444',marginBottom:6,display:'flex',alignItems:'center',gap:6}}><WarningIcon size={15} color="#ef4444"/>{t('resetStatsWarn')}</div>
                <div style={{fontSize:12,color:muted,marginBottom:12,lineHeight:1.5}}>{t('resetStatsOnce')}</div>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={doReset} disabled={resetBusy} style={{flex:1,padding:'11px',borderRadius:9,
                    background:'#ef4444',color:'#fff',border:'none',cursor:resetBusy?'default':'pointer',
                    fontWeight:800,fontSize:13,fontFamily:'system-ui,-apple-system,sans-serif'}}>
                    {resetBusy?'…':t('resetStatsConfirm')}
                  </button>
                  <button onClick={()=>setShowReset(false)} style={{padding:'11px 16px',borderRadius:9,
                    background:'transparent',border:'1.5px solid '+border,color:muted,cursor:'pointer',
                    fontWeight:700,fontSize:13,fontFamily:'system-ui,-apple-system,sans-serif'}}>{t('cancel')}</button>
                </div>
              </div>
            )}
          </div>
        )}
        {(account.statsResetUsed||resetDone)&&(
          <div style={{padding:'10px 14px',borderRadius:10,background:card,border:'1.5px solid '+border,
            textAlign:'center',color:muted,fontSize:12,fontWeight:600,marginBottom:14}}>
            {resetDone?('✓ '+t('resetStatsDone')):t('resetStatsUsed')}
          </div>
        )}

        {/* Konto loeschen */}
        <div style={{marginBottom:14,marginTop:4}}>
          {!showDeleteAccount?(
            <button onClick={()=>setShowDeleteAccount(true)} style={{
              width:'100%',padding:'12px',borderRadius:11,background:'transparent',
              border:'1.5px solid rgba(239,68,68,0.35)',color:'#ef4444',cursor:'pointer',
              fontWeight:700,fontSize:13,fontFamily:'system-ui,-apple-system,sans-serif'}}>
              <span style={{display:'inline-flex',alignItems:'center',gap:6}}><TrashIcon size={15} color="#ef4444"/>Konto l\u00f6schen</span>
            </button>

    if(!lobbyId||!window.db)return;

    if(WS_ENABLED){
      // Namen/Map/Groesse kommen NUR im spectate_state-Snapshot mit; die relayten
      // Folge-Updates (type:'state') tragen nur pos/walls/barr/amZug/winner -> Meta aus

      let meta={nameA:'',nameB:'',map:'classic',duelSize:'standard'};

        if(d.type==='spectate_denied'||d.type==='spectate_end'){setGone(true);return;}

          const st=d.settings||{};

// XP → Level (identische Formel wie Server: XP fuer Level n = 25*n^2)
function levelAusXp(totalXp){var lv=0;var rem=typeof totalXp==='number'?totalXp:0;while(lv<100){var needed=25*(lv+1)*(lv+1);if(rem<needed)break;rem-=needed;lv++;}return lv;}

// XP-Fortschritt: Level, XP innerhalb des Levels, XP bis zum naechsten Level, Prozentwert
function xpProgress(totalXp){
  var lv=0;var rem=typeof totalXp==='number'?totalXp:0;
  while(lv<100){var needed=25*(lv+1)*(lv+1);if(rem<needed)break;rem-=needed;lv++;}
  var needed2=lv>=100?0:25*(lv+1)*(lv+1);
  var pct=lv>=100?100:Math.min(100,Math.round(rem/needed2*100));
  return {level:lv,current:lv>=100?0:rem,needed:needed2,pct:pct};
}

// Tier-Farbe je Level (Bronze → Silber → Gold → Platin → Diamond → Master → Legend)
function levelTier(level){
  if(level>=100)return {color:'#f43f5e',glow:'rgba(244,63,94,0.6)'};
  if(level>=75)return {color:'#ec4899',glow:'rgba(236,72,153,0.55)'};
  if(level>=50)return {color:'#8b5cf6',glow:'rgba(139,92,246,0.55)'};
  if(level>=25)return {color:'#f59e0b',glow:'rgba(245,158,11,0.5)'};
  if(level>=10)return {color:'#94a3b8',glow:'rgba(148,163,184,0.42)'};
  return {color:'#b5824a',glow:'rgba(181,130,74,0.5)'};
}

function LevelBadge(props){
  var level=props.level;var size=props.size||'sm';var levelUp=props.levelUp;
  var tier=levelTier(level);
  var cls='ww-lvbadge '+size+(levelUp?' lvup':'');
  var sty={
    background:'linear-gradient(145deg,'+tier.color+','+tier.color+'bb)',
    boxShadow:'0 2px 9px '+tier.glow+',inset 0 1px 0 rgba(255,255,255,0.28),inset 0 -1px 0 rgba(0,0,0,0.15)'
  };
  return <span className={cls} style={sty}>{'Lv.'+level}</span>;
}
