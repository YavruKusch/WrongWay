// ── Game logic ─────────────────────────────────────────────
function ck(r,c){return `${r},${c}`;}
function edgeBlocked(r,c,nr,nc,walls){
  const dr=nr-r,dc=nc-c;
  if(dr===1)  return walls.has(`H-${r}-${c}`)  ||(c>0&&walls.has(`H-${r}-${c-1}`));
  if(dr===-1) return walls.has(`H-${nr}-${c}`) ||(c>0&&walls.has(`H-${nr}-${c-1}`));
  if(dc===1)  return walls.has(`V-${r}-${c}`)  ||(r>0&&walls.has(`V-${r-1}-${c}`));
  if(dc===-1) return walls.has(`V-${r}-${nc}`) ||(r>0&&walls.has(`V-${r-1}-${nc}`));
  return false;
}
function hasPath(pos,walls){
  const vis=new Set(),q=[pos];vis.add(ck(pos.r,pos.c));
  while(q.length){const cur=q.shift();if(cur.r===0)return true;
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=cur.r+dr,nc=cur.c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS){const k=ck(nr,nc);
        if(!vis.has(k)&&!edgeBlocked(cur.r,cur.c,nr,nc,walls)){vis.add(k);q.push({r:nr,c:nc});}}}}
  return false;
}
function bfsPath(pos,walls){
  const vis=new Map(),q=[pos];vis.set(ck(pos.r,pos.c),null);
  while(q.length){const cur=q.shift();
    if(cur.r===0){const path=[];let k=ck(cur.r,cur.c);
      while(k!==null){const[r,c]=k.split(',').map(Number);path.unshift({r,c});k=vis.get(k);}return path;}
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){

let _hamCtx=null; // {hammers, seekers:[{r,c}]} – gesetzt vor tryWall, danach null

function tryWall(key,walls,pA,pB){

  if(type==='H'){if(walls.has(`H-${r}-${c-1}`)||walls.has(`H-${r}-${c+1}`))return null;if(walls.has(`V-${r}-${c}`))return null;}

}
function makeHammers(){

function waveOf(id){return id&&id.indexOf('hw2-')===0?'w2':'w1';}

function makeHammersWave2(pA,pB,walls){
  const pathA=bfsPath(pA,walls),pathB=bfsPath(pB,walls);
  if(!pathA||!pathB)return[];
  const dA=pathA.length-1,dB=pathB.length-1;
  const behind=dA>=dB?pA:pB;
  const ahead=dA>=dB?pB:pA;

  for(let r=1;r<ROWS-1;r++){for(let c=0;c<COLS;c++){

// ── Chaos: faire Drop-Position ─────────────────────────────
function bfsDistMap(from,walls){
  const dist=new Map();
  const q=[from];
  dist.set(ck(from.r,from.c),0);
  while(q.length){
    const cur=q.shift();
    const d=dist.get(ck(cur.r,cur.c));
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=cur.r+dr,nc=cur.c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      const k=ck(nr,nc);
      if(dist.has(k))continue;
      if(edgeBlocked(cur.r,cur.c,nr,nc,walls))continue;
      dist.set(k,d+1);
      q.push({r:nr,c:nc});
    }
  }
  return dist;
}
function pickChaosPos(pA,pB,walls){
  const pa=bfsPath(pA,walls),pb=bfsPath(pB,walls);
  if(!pa||!pb)return null;
  const lenA=pa.length-1,lenB=pb.length-1;
  const minR=Math.floor(ROWS/3); // nicht im letzten Drittel (oben am Ziel)
  const maxR=Math.max(pA.r,pB.r); // nicht hinter hintestem Spieler
  if(maxR<minR)return null;
  const inZone=p=>{
    if(p.r<minR||p.r>maxR)return false;
    if(p.r===pA.r&&p.c===pA.c)return false;
    if(p.r===pB.r&&p.c===pB.c)return false;
    return true;
  };

  // Ungleichgewicht > 1: Item DIREKT auf BFS-Pfad des Schwächeren platzieren
  // → garantiert erreichbar, kein Detour vom Ziel, nicht hinter Mauern
  if(Math.abs(lenA-lenB)>1){
    const weakPath=lenA>lenB?pa:pb;
    // Bevorzugt 2–4 Schritte voraus auf seinem Pfad
    for(let k=2;k<=Math.min(4,weakPath.length-1);k++){
      if(inZone(weakPath[k]))return{r:weakPath[k].r,c:weakPath[k].c};
    }
    // Fallback: erster Pfad-Schritt der in Zone passt
    for(let k=1;k<weakPath.length;k++){
      if(inZone(weakPath[k]))return{r:weakPath[k].r,c:weakPath[k].c};
    }
  }

  // Gleichstand: Position die für beide BFS-erreichbar und ähnlich nah ist
  const dmA=bfsDistMap(pA,walls);
  const dmB=bfsDistMap(pB,walls);
  let best=null,bestScore=Infinity;
  for(let r=minR;r<=maxR;r++){
    for(let c=0;c<COLS;c++){
      if(!inZone({r,c}))continue;
      const dA=dmA.get(ck(r,c)),dB=dmB.get(ck(r,c));
      if(dA===undefined||dB===undefined)continue; // unerreichbar (hinter Mauer)
      // Kleine Summe + kleine Differenz = fair & nicht zu weit
      const score=dA+dB+Math.abs(dA-dB)*3;
      if(score<bestScore){bestScore=score;best={r,c};}
    }
  }
  return best;
}

// ── Random-Drop: Intervall je Häufigkeit ───────────────────
function dropInterval(mode){
  if(mode==='rare')return 30+Math.floor(Math.random()*11);     // 30–40
  if(mode==='often')return 20+Math.floor(Math.random()*6);     // 20–25
  if(mode==='veryoften')return 10+Math.floor(Math.random()*6); // 10–15

}
// ── Random-Drop: faire Wand wählen ─────────────────────────
// Behindert eher den Führenden, niemals den Hinterherlaufenden stärker;
// tryWall garantiert, dass beide immer einen Weg zum Ziel behalten.
function pickFairDropWall(pA,pB,walls){
  const pa=bfsPath(pA,walls),pb=bfsPath(pB,walls);
  if(!pa||!pb)return null;
  const lenA=pa.length-1,lenB=pb.length-1;
  const leaderIsA=lenA<=lenB;                 // kleinere Distanz = näher am Ziel = Vorteil
  const leaderPos=leaderIsA?pA:pB;
  const trailerPos=leaderIsA?pB:pA;
  const lenLeader=leaderIsA?lenA:lenB;
  const lenTrailer=leaderIsA?lenB:lenA;
  const cands=wallCandidates(leaderPos,walls,6);
  const scored=[];
  for(const key of cands){
    const next=tryWall(key,walls,pA,pB);      // null wenn ungültig / sperrt jemanden ein
    if(!next)continue;
    const npL=bfsPath(leaderPos,next),npT=bfsPath(trailerPos,next);
    if(!npL||!npT)continue;
    const dLeader=(npL.length-1)-lenLeader;
    const dTrailer=(npT.length-1)-lenTrailer;
    if(dTrailer>dLeader)continue;             // Fairness: Schwächeren nie stärker behindern
    const score=dLeader-2.5*Math.max(0,dTrailer)+Math.random()*1.5;
    scored.push({key,score});
  }
  if(!scored.length)return null;
  scored.sort((a,b)=>b.score-a.score);
  const top=scored.slice(0,Math.min(5,scored.length)); // Top-5 → Zufall = unvorhersehbar
  return top[Math.floor(Math.random()*top.length)].key;

function getMovesFrom(pos,opp,walls){
  const moves=[];
  for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
    const nr=pos.r+dr,nc=pos.c+dc;
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
    if(edgeBlocked(pos.r,pos.c,nr,nc,walls))continue;
    if(nr===opp.r&&nc===opp.c){
      for(const[d2r,d2c]of[[-1,0],[1,0],[0,-1],[0,1]]){
        const jr=nr+d2r,jc=nc+d2c;
        if(jr===pos.r&&jc===pos.c)continue;
        if(jr<0||jr>=ROWS||jc<0||jc>=COLS)continue;
        if(edgeBlocked(nr,nc,jr,jc,walls))continue;
        moves.push({r:jr,c:jc});
      }
    }else moves.push({r:nr,c:nc});
  }
  return moves;
}

function wallCandidates(targetPos,walls,depth){
  const path=bfsPath(targetPos,walls);
  const result=new Set();
  if(!path)return[];
  const limit=Math.min(depth,path.length);
  for(let i=0;i<limit;i++){
    const node=path[i];
    for(let dr=-1;dr<=0;dr++)for(let dc=-1;dc<=0;dc++){
      const r=node.r+dr,c=node.c+dc;
      if(r>=0&&r<ROWS-1&&c>=0&&c<COLS-1){
        result.add(`H-${r}-${c}`);
        result.add(`V-${r}-${c}`);
      }
    }
  }
  return[...result];
}

function shouldPickupItem(aiPos,humanPos,walls,aiPath,chaosItem,aiBarr){
  if(!chaosItem||!aiPath)return null;
  // Item direkt erreichbar?
  const moves=getMovesFrom(aiPos,humanPos,walls);
  const direct=moves.find(m=>m.r===chaosItem.r&&m.c===chaosItem.c);
  if(direct)return direct; // sofort einsacken
  // Detour-Berechnung: AI → Item → Ziel vs AI → Ziel
  const toItem=bfsTo(aiPos,chaosItem,walls);
  if(!toItem||toItem.length<2)return null;
  const fromItem=bfsPath(chaosItem,walls);
  if(!fromItem)return null;
  const itemDist=toItem.length-1;
  const detour=(itemDist+(fromItem.length-1))-(aiPath.length-1);
  // 2 Barrikaden ≈ 4-6 Zugäquivalente; je weniger Barrikaden, desto attraktiver
  const maxDetour=aiBarr<=2?6:aiBarr<=4?4:aiBarr<=7?2:1;
  if(detour>maxDetour)return null;
  const next=toItem[1];
  if(next.r===humanPos.r&&next.c===humanPos.c)return null;
  return next;
}

function aiMove(aiPos,humanPos,walls,aiBarr,humBarr,difficulty,recentAi,chaosItem){

  if(difficulty==='easy')return aiEasy(aiPos,humanPos,walls,aiBarr,chaosItem);

function moveTowardGoal(aiPos,humanPos,walls,aiPath){

    if(edgeBlocked(ns.r,ns.c,jr,jc,walls))continue;

  return null;

function aiEasy(aiPos,humanPos,walls,barrLeft,chaosItem){

  if(chaosItem){
    const pick=shouldPickupItem(aiPos,humanPos,walls,aiPath,chaosItem,barrLeft);
    if(pick)return{type:'move',pos:pick};
  }

  // Easy: Setzt jetzt deutlich häufiger Mauern, aber wählt suboptimal
  // Mauer-Bedingungen gelockert: Gegner führt oder ist im vorderen Drittel
  const shouldConsiderWall=barrLeft>0&&(humD<=aiD+3||humD<=6);
  // Zufällige Chance, manchmal Mauer auch ohne starken Grund
  const proactive=barrLeft>0&&humD<=aiD+5&&Math.random()<0.45;
  if(shouldConsiderWall||proactive){
    const cands=wallCandidates(humanPos,walls,5);
    // Zufällige Reihenfolge → suboptimale Wahl
    for(let i=cands.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [cands[i],cands[j]]=[cands[j],cands[i]];
    }
    for(const k of cands){
      const next=tryWall(k,walls,aiPos,humanPos);
      if(!next)continue;
      const nh=bfsPath(humanPos,next),na=bfsPath(aiPos,next);
      if(!nh||!na)continue;
      // Gelockert: Gegner muss um ≥1 verlangsamt werden, AI darf max ≤2 leiden
      if((nh.length-1)-humD>=1&&(na.length-1)-aiD<=2){
        return{type:'barricade',walls:next};
      }
    }
  }
  const m=moveTowardGoal(aiPos,humanPos,walls,aiPath);
  if(m)return{type:'move',pos:m};
  const fallback=getMovesFrom(aiPos,humanPos,walls);
  return fallback.length?{type:'move',pos:fallback[0]}:null;
}

function aiNormal(aiPos,humanPos,walls,barrLeft,chaosItem){
  const aiPath=bfsPath(aiPos,walls),humPath=bfsPath(humanPos,walls);
  if(!aiPath)return null;
  const aiD=aiPath.length-1,humD=humPath?humPath.length-1:999;
  if(aiD===1)return{type:'move',pos:aiPath[1]};
  // Item einsammeln wenn lohnenswert
  if(chaosItem){
    const pick=shouldPickupItem(aiPos,humanPos,walls,aiPath,chaosItem,barrLeft);
    if(pick)return{type:'move',pos:pick};
  }
  let bestWall=null,bestRel=humD-aiD;
  if(barrLeft>0){
    for(let r=0;r<ROWS-1;r++)for(let c=0;c<COLS-1;c++)for(const t of['H','V']){
      const next=tryWall(`${t}-${r}-${c}`,walls,aiPos,humanPos);
      if(!next)continue;
      const nh=bfsPath(humanPos,next),na=bfsPath(aiPos,next);
      if(!nh||!na)continue;
      const rel=(nh.length-1)-(na.length-1);
      if(rel>bestRel){bestRel=rel;bestWall=next;}
    }
  }
  const bestMove=moveTowardGoal(aiPos,humanPos,walls,aiPath);
  const minGain=(humD-aiD)>3?3:1;
  if(bestWall&&bestRel-(humD-aiD)>=minGain)return{type:'barricade',walls:bestWall};
  if(bestMove)return{type:'move',pos:bestMove};
  if(bestWall)return{type:'barricade',walls:bestWall};
  return null;
}

function aiHard(aiPos,humanPos,walls,aiBarr,humBarr,recentAi,chaosItem){
  const initMoves=getMovesFrom(aiPos,humanPos,walls);
  // Sofortiger Sieg hat absolute Priorität
  for(const m of initMoves)if(m.r===0)return{type:'move',pos:m};
  // Item-Pickup wenn direkt erreichbar (sehr lohnenswert) — vor Minimax
  if(chaosItem){
    const direct=initMoves.find(m=>m.r===chaosItem.r&&m.c===chaosItem.c);
    if(direct)return{type:'move',pos:direct};
  }
  const recent=recentAi||[];

  // Endspiel-Sprint: bei kurzem Pfad und klarem Vorsprung direkt zum Ziel laufen,
  // statt unnötig Mauern zu suchen oder im Minimax-Rauschen zu trödeln.
  const aiPathInit=bfsPath(aiPos,walls);
  const humPathInit=bfsPath(humanPos,walls);
  if(aiPathInit&&aiPathInit.length>1){
    const aiDI=aiPathInit.length-1;
    const humDI=humPathInit?humPathInit.length-1:999;
    // Reine Zielverfolgung (deterministisch, kein Kreiseln) wenn:
    // - keine Mauern mehr zum Setzen (und kein lohnendes Item), ODER
    // - kurzer Pfad mit Vorsprung, ODER
    // - klar in Führung
    if((aiBarr<=0&&!chaosItem)||(aiDI<=3&&humDI>aiDI+1)||humDI>aiDI+2){
      const m=moveTowardGoal(aiPos,humanPos,walls,aiPathInit);
      if(m)return{type:'move',pos:m};
    }
  }

  // Statische Evaluation: positiver Score = gut für AI
  const evalState=(ap,hp,w,ab,hb)=>{
    const apath=bfsPath(ap,w),hpath=bfsPath(hp,w);
    if(!apath)return-99999;
    if(!hpath)return 99999;
    if(ap.r===0)return 50000;
    if(hp.r===0)return-50000;
    const aiD=apath.length-1,humD=hpath.length-1;
    // Hauptfaktor: relative Distanz
    // Eigener Progress STARK belohnt (verhindert Trödeln/Hin-und-Her)
    // Gegner-Distanz leichter Bonus
    // Mauern-Reserve sekundär
    return(humD-aiD)*25 - aiD*3.5 + humD*0.8 + (ab-hb)*3;
  };

  // Aktionen für aktuellen Spieler generieren, sortiert für Alpha-Beta-Effizienz
  const genActions=(ap,hp,w,ab,hb,forAi,maxWalls)=>{
    const me=forAi?ap:hp;
    const opp=forAi?hp:ap;
    const myBarr=forAi?ab:hb;
    const acts=[];
    const myPath=bfsPath(me,w);
    const moves=getMovesFrom(me,opp,w);
    for(const m of moves){
      let pri=0;
      if(myPath&&myPath.length>1&&myPath[1].r===m.r&&myPath[1].c===m.c)pri=30;
      if(m.r<me.r)pri+=8;
      acts.push({type:'move',pos:m,_p:pri});
    }
    if(myBarr>0){
      const cands=wallCandidates(opp,w,6);
      const oldOppPath=bfsPath(opp,w);
      const oldOppD=oldOppPath?oldOppPath.length-1:0;
      const scored=[];
      for(const k of cands){
        const next=tryWall(k,w,ap,hp);
        if(!next)continue;
        const np=bfsPath(opp,next);
        if(!np)continue;
        const myNew=bfsPath(me,next);
        if(!myNew)continue;
        // Score: wieviel verlangsamt es Gegner abzüglich Eigenkosten
        const gain=((np.length-1)-oldOppD)-((myNew.length-1)-(myPath?myPath.length-1:0));
        if(gain<=0)continue; // Nur Mauern die wirklich helfen
        scored.push({next,gain});
      }
      scored.sort((a,b)=>b.gain-a.gain);
      const lim=Math.min(maxWalls,scored.length);
      for(let i=0;i<lim;i++){
        acts.push({type:'barricade',walls:scored[i].next,_p:scored[i].gain*8});
      }
    }
    acts.sort((a,b)=>b._p-a._p);
    return acts;
  };

  // Minimax mit Alpha-Beta
  const search=(ap,hp,w,ab,hb,depth,maximizing,alpha,beta)=>{
    if(ap.r===0)return 50000-depth;
    if(hp.r===0)return-50000+depth;
    if(depth===0)return evalState(ap,hp,w,ab,hb);
    const maxW=depth>=2?6:4;
    const acts=genActions(ap,hp,w,ab,hb,maximizing,maxW);
    if(acts.length===0)return evalState(ap,hp,w,ab,hb);
    if(maximizing){
      let best=-Infinity;
      for(const a of acts){
        const s=a.type==='move'
          ?search(a.pos,hp,w,ab,hb,depth-1,false,alpha,beta)
          :search(ap,hp,a.walls,ab-1,hb,depth-1,false,alpha,beta);
        if(s>best)best=s;
        if(best>alpha)alpha=best;
        if(beta<=alpha)break;
      }
      return best;
    }
    let best=Infinity;
    for(const a of acts){
      const s=a.type==='move'
        ?search(ap,a.pos,w,ab,hb,depth-1,true,alpha,beta)
        :search(ap,hp,a.walls,ab,hb-1,depth-1,true,alpha,beta);
      if(s<best)best=s;
      if(best<beta)beta=best;
      if(beta<=alpha)break;
    }
    return best;
  };

  // Wurzel: 3 Halbzüge tief suchen (AI → Opp → AI → eval)
  let bestScore=-Infinity,bestAction=null;
  const myActs=genActions(aiPos,humanPos,walls,aiBarr,humBarr,true,10);
  for(const a of myActs){
    let s=a.type==='move'
      ?search(a.pos,humanPos,walls,aiBarr,humBarr,2,false,-Infinity,Infinity)
      :search(aiPos,humanPos,a.walls,aiBarr-1,humBarr,2,false,-Infinity,Infinity);
    if(a.type==='move'){
      // Starker Bias auf den BFS-Hauptpfad: verhindert Wechsel zwischen gleich­langen
      // Pfaden, wodurch die AI sonst zickzack laufen würde.
      if(aiPathInit&&aiPathInit.length>1&&aiPathInit[1].r===a.pos.r&&aiPathInit[1].c===a.pos.c){
        s+=20;
      }
      // Zusätzlicher Bonus für tatsächliche Annäherung Richtung Ziel (kleinere row)
      if(a.pos.r<aiPos.r)s+=6;
      else if(a.pos.r>aiPos.r)s-=4;
      // Bonus für Annäherung ans Chaos-Item (proportional zum Wert von +2 Barrikaden)
      if(chaosItem){
        const oldD=Math.abs(aiPos.r-chaosItem.r)+Math.abs(aiPos.c-chaosItem.c);
        const newD=Math.abs(a.pos.r-chaosItem.r)+Math.abs(a.pos.c-chaosItem.c);
        if(newD<oldD&&newD<=4)s+=(5-newD)*4; // näher heran lohnt, je näher desto mehr
        if(newD===0)s+=30; // direkt drauf (auch wenn schon oben abgefangen)
      }
      // Starke Cycling-Strafe: verhindert Hin-und-Her zwischen besuchten Feldern
      if(recent.length>=2){
        for(let i=1;i<Math.min(recent.length,5);i++){
          if(recent[i].r===a.pos.r&&recent[i].c===a.pos.c){
            s-=(6-i)*12; // -60 / -48 / -36 / -24 für i=1..4
            break;
          }
        }
      }
    }
    if(s>bestScore){bestScore=s;bestAction=a;}
  }

  // Fallback: vorwärts gehen wenn nichts gefunden
  if(!bestAction){
    const aiPath=bfsPath(aiPos,walls);
    if(aiPath&&aiPath.length>1)return{type:'move',pos:aiPath[1]};
    const fm=getMovesFrom(aiPos,humanPos,walls);
    if(fm.length)return{type:'move',pos:fm[0]};
    return null;
  }

  if(bestAction.type==='move')return{type:'move',pos:bestAction.pos};
  return{type:'barricade',walls:bestAction.walls};
}

// ── Replay ─────────────────────────────────────────────────
function applyMoves(moveList,step){
  let pA={...INIT_A},pB={...INIT_B};
  const walls=new Set();
  for(let i=0;i<Math.min(step,moveList.length);i++){
    const m=moveList[i];
    if(m.type==='move'){if(m.p==='A')pA={r:m.r,c:m.c};else pB={r:m.r,c:m.c};}
    else if(m.type==='break')walls.delete(m.k);
    else walls.add(m.k);
  }
  return{pA,pB,walls};
}

  try{

        vib.connect(vibG);vibG.connect(o.frequency);

        // Parallele Formant-Bandpässe für /a/-Vokal
        const f1=ctx.createBiquadFilter();f1.type='bandpass';
        f1.frequency.value=730;f1.Q.value=8;
        const f2=ctx.createBiquadFilter();f2.type='bandpass';
        f2.frequency.value=1090;f2.Q.value=10;
        const g1=ctx.createGain();g1.gain.value=1;
        const g2=ctx.createGain();g2.gain.value=0.65;
        const mix=ctx.createGain();

        // Lowpass für warmen Brustton
        const lp=ctx.createBiquadFilter();lp.type='lowpass';
        lp.frequency.value=3200;lp.Q.value=0.5;

        // Hüllkurve: schneller Attack, mittleres Plateau, schnelles Decay (Lach-typisch)
        const g=ctx.createGain();
        const peak=0.18+Math.random()*0.04;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(peak,t+att);
        g.gain.setValueAtTime(peak*0.85,t+burstDur*0.4);
        g.gain.exponentialRampToValueAtTime(0.001,t+burstDur);

        o.connect(f1);o.connect(f2);
        f1.connect(g1);f2.connect(g2);
        g1.connect(mix);g2.connect(mix);
        mix.connect(lp);lp.connect(g);g.connect(ctx.destination);

        vib.start(t);o.start(t);
        vib.stop(t+burstDur+0.03);o.stop(t+burstDur+0.03);

        // "h"-Aspiration vor jedem Ha (gefilterter Noise-Burst)
        const aspDur=0.025;
        const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*aspDur),ctx.sampleRate);
        const d=buf.getChannelData(0);
        for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1);
        const ns=ctx.createBufferSource();ns.buffer=buf;
        const nbp=ctx.createBiquadFilter();nbp.type='bandpass';
        nbp.frequency.value=1500;nbp.Q.value=0.8;
        const ng=ctx.createGain();
        ng.gain.setValueAtTime(0.05,t-0.012);
        ng.gain.exponentialRampToValueAtTime(0.001,t-0.012+aspDur);
        ns.connect(nbp);nbp.connect(ng);ng.connect(ctx.destination);
        ns.start(t-0.012);

        // Tiefes Einatmen zwischen Bursts (jeden 3. Burst)
        if(i>1&&i%3===0&&i<haCount-1){
          const inDur=0.09;
          const ibuf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*inDur),ctx.sampleRate);
          const id=ibuf.getChannelData(0);
          for(let j=0;j<id.length;j++){
            const env=Math.sin(j/id.length*Math.PI);
            id[j]=(Math.random()*2-1)*env;
          }
          const ins=ctx.createBufferSource();ins.buffer=ibuf;
          const ibp=ctx.createBiquadFilter();ibp.type='bandpass';
          ibp.frequency.value=900;ibp.Q.value=0.6;
          const ig=ctx.createGain();ig.gain.value=0.06;
          ins.connect(ibp);ibp.connect(ig);ig.connect(ctx.destination);
          ins.start(t+burstDur+0.01);
        }
      }
    }else if(type==='cry'){
      // Realistisches Schluchzen: /u/-Formanten (F1=300,F2=870) mit starkem Vibrato (Whimpering)
      const sobs=5;
      for(let i=0;i<sobs;i++){
        const t=now+i*0.42+(Math.random()-0.5)*0.04;
        // Pitch fällt mit jedem Sob, leichte Variation
        const pitch=275-i*18+(Math.random()-0.5)*12;
        const burstDur=0.28+Math.random()*0.05;

        // Einatmen vor dem Sob (das charakteristische Schluchzen)
        const inhaleDur=0.13;
        const inBuf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*inhaleDur),ctx.sampleRate);
        const inD=inBuf.getChannelData(0);
        for(let j=0;j<inD.length;j++){
          const ramp=Math.min(j/(inD.length*0.3),1)*Math.max(0,1-(j-inD.length*0.5)/(inD.length*0.5));
          inD[j]=(Math.random()*2-1)*ramp;
        }
        const ins=ctx.createBufferSource();ins.buffer=inBuf;
        const ibp=ctx.createBiquadFilter();ibp.type='bandpass';
        ibp.frequency.value=1100;ibp.Q.value=0.7;
        const ig=ctx.createGain();ig.gain.value=0.075;
        ins.connect(ibp);ibp.connect(ig);ig.connect(ctx.destination);
        ins.start(t-inhaleDur);

        // Glottal-Quelle für "huh"-Laut
        const o=ctx.createOscillator();o.type='sawtooth';
        o.frequency.setValueAtTime(pitch*1.15,t);
        o.frequency.exponentialRampToValueAtTime(pitch*0.65,t+burstDur*0.92);
        // Starkes Vibrato (Whimpering-Effekt, 7 Hz, größere Amplitude)
        const vib=ctx.createOscillator();vib.type='sine';
        vib.frequency.value=6.5+Math.random();
        const vibG=ctx.createGain();vibG.gain.value=pitch*0.05;
        vib.connect(vibG);vibG.connect(o.frequency);

        // /u/-Formanten
        const f1=ctx.createBiquadFilter();f1.type='bandpass';
        f1.frequency.value=320;f1.Q.value=7;
        const f2=ctx.createBiquadFilter();f2.type='bandpass';
        f2.frequency.value=860;f2.Q.value=9;
        const g1=ctx.createGain();g1.gain.value=1.1;
        const g2=ctx.createGain();g2.gain.value=0.45;
        const mix=ctx.createGain();
        const lp=ctx.createBiquadFilter();lp.type='lowpass';
        lp.frequency.value=2000;lp.Q.value=0.4;

        // Hüllkurve mit Plateau (gezogenes Heulen)
        const g=ctx.createGain();
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.15,t+0.04);
        g.gain.linearRampToValueAtTime(0.13,t+burstDur*0.55);
        g.gain.exponentialRampToValueAtTime(0.001,t+burstDur);

        o.connect(f1);o.connect(f2);
        f1.connect(g1);f2.connect(g2);
        g1.connect(mix);g2.connect(mix);
        mix.connect(lp);lp.connect(g);g.connect(ctx.destination);
        vib.start(t);o.start(t);
        vib.stop(t+burstDur+0.05);o.stop(t+burstDur+0.05);

        // Schniefen am Ende des Sobs
        if(i<sobs-1){
          const sniffT=t+burstDur+0.08;
          const sniffDur=0.11;
          const sBuf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*sniffDur),ctx.sampleRate);
          const sd=sBuf.getChannelData(0);
          for(let j=0;j<sd.length;j++){
            // Schnelles Crescendo wie ein Sniff
            const env=Math.pow(j/sd.length,2);
            sd[j]=(Math.random()*2-1)*env;
          }
          const ns=ctx.createBufferSource();ns.buffer=sBuf;
          const nbp=ctx.createBiquadFilter();nbp.type='bandpass';
          nbp.frequency.value=2400;nbp.Q.value=1.4;
          const ng=ctx.createGain();
          ng.gain.setValueAtTime(0.06,sniffT);
          ng.gain.exponentialRampToValueAtTime(0.001,sniffT+sniffDur);
          ns.connect(nbp);nbp.connect(ng);ng.connect(ctx.destination);
          ns.start(sniffT);
        }
      }
    }else if(type==='angry'){
      // Realistisches "Grrahh!": Knurren das in Schrei übergeht
      // Phase 1: Tiefes Knurren mit Rauheit (Grrrr)
      const growlDur=0.4;
      const growlPitch=110;
      const og=ctx.createOscillator();og.type='sawtooth';
      og.frequency.setValueAtTime(growlPitch,now);
      og.frequency.linearRampToValueAtTime(growlPitch*1.1,now+growlDur);
      // Subharmonik
      const og2=ctx.createOscillator();og2.type='square';
      og2.frequency.setValueAtTime(growlPitch*0.5,now);
      og2.frequency.linearRampToValueAtTime(growlPitch*0.55,now+growlDur);
      // Rauheit-LFO (35 Hz Tremolo)
      const rough=ctx.createOscillator();rough.type='sine';
      rough.frequency.value=35;
      const roughG=ctx.createGain();roughG.gain.value=0.35;
      // Vibrato
      const vib=ctx.createOscillator();vib.type='sine';
      vib.frequency.value=4.5;
      const vibG=ctx.createGain();vibG.gain.value=4;
      vib.connect(vibG);vibG.connect(og.frequency);
      // /r/-ähnliche Formanten (tiefer und rumpelig)
      const f1=ctx.createBiquadFilter();f1.type='bandpass';
      f1.frequency.value=380;f1.Q.value=5;
      const f2=ctx.createBiquadFilter();f2.type='bandpass';
      f2.frequency.value=1200;f2.Q.value=6;
      const lp=ctx.createBiquadFilter();lp.type='lowpass';
      lp.frequency.value=1800;lp.Q.value=2;
      const gMix=ctx.createGain();
      const g=ctx.createGain();
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(0.22,now+0.04);
      g.gain.setValueAtTime(0.22,now+growlDur*0.85);
      g.gain.linearRampToValueAtTime(0.001,now+growlDur);
      // Tremolo per gain modulation
      rough.connect(roughG);roughG.connect(g.gain);
      const g1=ctx.createGain();g1.gain.value=1;
      const g2=ctx.createGain();g2.gain.value=0.5;
      const gSub=ctx.createGain();gSub.gain.value=0.25;
      og.connect(f1);og.connect(f2);og2.connect(gSub);
      f1.connect(g1);f2.connect(g2);
      g1.connect(gMix);g2.connect(gMix);gSub.connect(gMix);
      gMix.connect(lp);lp.connect(g);g.connect(ctx.destination);
      vib.start(now);og.start(now);og2.start(now);rough.start(now);
      vib.stop(now+growlDur+0.05);og.stop(now+growlDur+0.05);
      og2.stop(now+growlDur+0.05);rough.stop(now+growlDur+0.05);

      // Phase 2: Lauter "AHH!" Schrei am Ende
      const yellStart=now+growlDur*0.85;
      const yellDur=0.35;
      const yellPitch=180;
      const oy=ctx.createOscillator();oy.type='sawtooth';
      oy.frequency.setValueAtTime(yellPitch,yellStart);
      oy.frequency.linearRampToValueAtTime(yellPitch*1.25,yellStart+0.08);
      oy.frequency.exponentialRampToValueAtTime(yellPitch*0.7,yellStart+yellDur);
      const yvib=ctx.createOscillator();yvib.type='sine';
      yvib.frequency.value=6;
      const yvibG=ctx.createGain();yvibG.gain.value=yellPitch*0.035;
      yvib.connect(yvibG);yvibG.connect(oy.frequency);
      // /a/-Formanten für AH-Schrei
      const yf1=ctx.createBiquadFilter();yf1.type='bandpass';
      yf1.frequency.value=750;yf1.Q.value=7;
      const yf2=ctx.createBiquadFilter();yf2.type='bandpass';
      yf2.frequency.value=1150;yf2.Q.value=8;
      const ylp=ctx.createBiquadFilter();ylp.type='lowpass';
      ylp.frequency.value=3500;
      const ymix=ctx.createGain();
      const yg=ctx.createGain();
      yg.gain.setValueAtTime(0,yellStart);
      yg.gain.linearRampToValueAtTime(0.28,yellStart+0.05);
      yg.gain.setValueAtTime(0.24,yellStart+yellDur*0.5);
      yg.gain.exponentialRampToValueAtTime(0.001,yellStart+yellDur);
      const yg1=ctx.createGain();yg1.gain.value=1;
      const yg2=ctx.createGain();yg2.gain.value=0.7;
      oy.connect(yf1);oy.connect(yf2);
      yf1.connect(yg1);yf2.connect(yg2);
      yg1.connect(ymix);yg2.connect(ymix);
      ymix.connect(ylp);ylp.connect(yg);yg.connect(ctx.destination);
      yvib.start(yellStart);oy.start(yellStart);
      yvib.stop(yellStart+yellDur+0.05);oy.stop(yellStart+yellDur+0.05);

      // Wütendes Ausatmen am Ende
      const huffT=yellStart+yellDur;
      const huffDur=0.2;
      const hBuf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*huffDur),ctx.sampleRate);
      const hd=hBuf.getChannelData(0);
      for(let i=0;i<hd.length;i++){
        const env=Math.exp(-i/(hd.length*0.4));
        hd[i]=(Math.random()*2-1)*env;
      }
      const hns=ctx.createBufferSource();hns.buffer=hBuf;
      const hbp=ctx.createBiquadFilter();hbp.type='bandpass';
      hbp.frequency.value=550;hbp.Q.value=0.9;
      const hg=ctx.createGain();
      hg.gain.value=0.14;
      hns.connect(hbp);hbp.connect(hg);hg.connect(ctx.destination);
      hns.start(huffT);
    }else if(type==='confused'){
      // Realistisches "Häää?" - aufsteigende Frage-Intonation mit /ä/-Formanten + Vibrato am Ende
      const dur=0.7;
      // /ä/-Formanten (F1=550, F2=1700)
      const o=ctx.createOscillator();o.type='sawtooth';
      // Pitch-Kontur: kurz halten, dann steigen (deutsche Frage-Intonation)
      o.frequency.setValueAtTime(165,now);
      o.frequency.setValueAtTime(175,now+0.06);
      o.frequency.linearRampToValueAtTime(180,now+0.35);
      o.frequency.linearRampToValueAtTime(245,now+dur*0.75);
      o.frequency.linearRampToValueAtTime(295,now+dur);
      // Leichtes Vibrato, stärker zum Ende (typisch für gezogenes "Häää?")
      const vib=ctx.createOscillator();vib.type='sine';
      vib.frequency.value=5.5;
      const vibG=ctx.createGain();
      vibG.gain.setValueAtTime(2,now);
      vibG.gain.linearRampToValueAtTime(8,now+dur);
      vib.connect(vibG);vibG.connect(o.frequency);

      const f1=ctx.createBiquadFilter();f1.type='bandpass';
      f1.frequency.value=550;f1.Q.value=7;
      const f2=ctx.createBiquadFilter();f2.type='bandpass';
      f2.frequency.value=1700;f2.Q.value=9;
      const g1=ctx.createGain();g1.gain.value=1;
      const g2=ctx.createGain();g2.gain.value=0.55;
      const mix=ctx.createGain();
      const lp=ctx.createBiquadFilter();lp.type='lowpass';
      lp.frequency.value=3000;

      const g=ctx.createGain();
      // "h"-Aspiration-Phase + gezogenes ä
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(0.06,now+0.04);
      g.gain.linearRampToValueAtTime(0.17,now+0.12);
      g.gain.setValueAtTime(0.16,now+dur*0.75);
      g.gain.linearRampToValueAtTime(0.13,now+dur*0.92);
      g.gain.exponentialRampToValueAtTime(0.001,now+dur);

      o.connect(f1);o.connect(f2);
      f1.connect(g1);f2.connect(g2);
      g1.connect(mix);g2.connect(mix);
      mix.connect(lp);lp.connect(g);g.connect(ctx.destination);
      vib.start(now);o.start(now);
      vib.stop(now+dur+0.05);o.stop(now+dur+0.05);

      // "h"-Atem am Anfang (gefilterter Noise)
      const hDur=0.1;
      const hBuf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*hDur),ctx.sampleRate);
      const hd=hBuf.getChannelData(0);
      for(let i=0;i<hd.length;i++){
        const env=Math.exp(-i/(hd.length*0.5));
        hd[i]=(Math.random()*2-1)*env;
      }
      const hns=ctx.createBufferSource();hns.buffer=hBuf;
      const hbp=ctx.createBiquadFilter();hbp.type='bandpass';
      hbp.frequency.value=1800;hbp.Q.value=0.8;
      const hg=ctx.createGain();
      hg.gain.value=0.08;
      hns.connect(hbp);hbp.connect(hg);hg.connect(ctx.destination);
      hns.start(now);
    }
  }catch{}
}

  const gridRef=useRef(null);
  const snapPosRef=useRef(null);
  const hammerTargetRef=useRef(null);
  const savedScroll=useRef(0);
  const lastOnlineTs=useRef(0);
  const S=useRef({});
  S.current={pA,pB,walls,barrLeft,turn,winner,moveHist,gameMode,lobbyId,onlineRole,rematchA,rematchB,rematchDeclined,gameNum,chaosItem,goldenWalls,hammers,hammerHeld,hammerUsed,hammerMode,gaveUp};
  useEffect(()=>{snapPosRef.current=snapPos;},[snapPos]);
  useEffect(()=>{hammerTargetRef.current=hammerTarget;},[hammerTarget]);

  // Audio-Context nach Tab-Wechsel/Hintergrund wieder aufwecken
  useEffect(()=>{
    const resume=()=>{try{const c=getCtx();if(c&&(c.state==='suspended'||c.state==='interrupted'))c.resume();}catch(e){}};
    const onVis=()=>{if(document.visibilityState==='visible')resume();};
    document.addEventListener('visibilitychange',onVis);
    document.addEventListener('pointerdown',resume,{passive:true});
    document.addEventListener('touchstart',resume,{passive:true});
    document.addEventListener('click',resume);
    window.addEventListener('focus',resume);
    return()=>{
      document.removeEventListener('visibilitychange',onVis);
      document.removeEventListener('pointerdown',resume);
      document.removeEventListener('touchstart',resume);
      document.removeEventListener('click',resume);
      window.removeEventListener('focus',resume);

  const pname=p=>p==='A'?t('red'):t('blue');
  const isOwnLoss=w=>{
    if(!w)return false;
    if(gameMode==='online')return w!==onlineRole;
    if(gameMode==='pvc')return w==='B';
    return false;
  };
  const winSound=w=>{ if(!isOwnLoss(w)) playSound('win'); };
  const triggerWin=(p,skipAnim)=>{

  const EMOTE_DUR=2600;

  const showEmote=(player,type)=>{

  const triggerEmote=type=>{
    if(emoteCooldown||winner||screen!=='game')return;

  const myTurn=gameMode==='online'?turn===onlineRole:true;
  const canDrag=!winner&&!aiThinking&&myTurn&&barrLeft[turn]>0&&screen==='game';
  const meRole=gameMode==='online'?onlineRole:(gameMode==='pvc'?'A':turn);
  const backMap={modeConfig:'menu',difficulty:'menu',friendPlay:'menu',online:'menu',lobbyConfig:'online'};
  const navTo=(target)=>{setNavDir('fwd');setScreen(target);};
  const goBack=()=>{const tgt=backMap[screen];if(!tgt)return;setNavDir('back');setScreen(tgt);};
  const pageAnim=navDir==='back'?'slide-in-left 0.32s cubic-bezier(0.25,1,0.5,1) both':'slide-in-right 0.32s cubic-bezier(0.25,1,0.5,1) both';
  useEffect(()=>{
    if(!backMap[screen])return;
    let sx=0,sy=0,active=false;
    const ts=e=>{const tt=e.touches[0];if(tt.clientX<40){active=true;sx=tt.clientX;sy=tt.clientY;}};
    const te=e=>{if(!active)return;active=false;const tt=e.changedTouches[0];const dx=tt.clientX-sx,dy=Math.abs(tt.clientY-sy);if(dx>70&&dy<55){triggerHaptic();goBack();}};
    document.addEventListener('touchstart',ts,{passive:true});

  },[screen]);
  const collectItem=(it)=>{
    setCollecting(cs=>[...cs,it]);

  };
  const color=PC[turn];

  // ── Init game ──
  const initGame=(mode,role='A',lid=null,isRematch=false,tmOverride)=>{
    setGameMode(mode);setOnlineRole(role);setLobbyId(lid);
    const tm=tmOverride!==undefined?tmOverride:gameTimeMode;
    if(tmOverride!==undefined)setGameTimeMode(tmOverride);
    setPA({...INIT_A});setPB({...INIT_B});setWalls(new Set());
    let starter;
    const prevMoves=S.current.moveHist;
    if(isRematch&&prevMoves&&prevMoves.length>0&&prevMoves[0].p){
      starter=prevMoves[0].p==='A'?'B':'A';
    }else{
      starter=Math.random()<0.5?'A':'B';
    }
    setBarrLeft({A:gameBarr,B:gameBarr});setTurn(starter);setWinner(null);setGaveUp(null);setMoveHist([]);
    setChaosItem(null);
    chaosSpawnRef.current=18+Math.floor(Math.random()*8); // 18–25
    setHammerHeld({A:false,B:false});
    setHammerUsed(freshHammerUsed());
    setHammers(hammerMode?makeHammers():[]);
    setBreakingWall(null);setHammerDrag(false);setHammerTarget(null);setCollecting([]);
    hammerWave2Ref.current=false;
    hammerWave1ClearedRef.current=null;
    dropNextRef.current=dropMode?dropInterval(dropMode):99999;
    setGoldenWalls(new Set());
    // Timer initialisieren falls Classic-Mode aktiv
    const classicSecs=tm==='classic-3'?180:tm==='classic-5'?300:tm==='classic-8'?480:0;
    setTimeLeft({A:classicSecs,B:classicSecs});
    setFlash('');setAiThinking(false);setGiveUpArmed(false);
    setDragging(null);setPreviewKey(null);setSnapPos(null);
    setRematchA(false);setRematchB(false);setRematchDeclined(null);
    setChatMsgs([]);setChatInput('');
    if(mode!=='online')setGameNum(0);

  };

  // ── Sync online ──
  const doSync=(gs)=>{
    const{gameMode:gm,lobbyId:lid,rematchA:rA,rematchB:rB,rematchDeclined:rD,gameNum:gN}=S.current;
    if(gm!=='online'||!lid)return;
    stoSet(`barricade_game_${lid}`,{
      ...gs,
      walls:[...gs.walls],
      rematchA:gs.rematchA===undefined?rA:gs.rematchA,
      rematchB:gs.rematchB===undefined?rB:gs.rematchB,
      rematchDeclined:gs.rematchDeclined===undefined?rD:gs.rematchDeclined,
      gameNum:gs.gameNum===undefined?(gN||1):gs.gameNum,
      chaosItem:gs.chaosItem===undefined?chaosItem:gs.chaosItem,
      goldenWalls:gs.goldenWalls!==undefined?gs.goldenWalls:[...goldenWalls],
      hammers:gs.hammers===undefined?hammers:gs.hammers,
      hammerHeld:gs.hammerHeld===undefined?hammerHeld:gs.hammerHeld,
      hammerUsed:gs.hammerUsed===undefined?hammerUsed:gs.hammerUsed,
      lastUpdated:Date.now()
    });
  };

  // ── Classic-Timer-Tick ──
  // Helpers
  const getTurnTime=mode=>{
    if(!mode)return 0;
    if(mode.indexOf('classic-')===0)return 60;
    if(mode==='blitz-5')return 5;
    if(mode==='blitz-8')return 8;
    if(mode==='blitz-10')return 10;
    return 0;
  };
  const isTimerMode=mode=>mode&&(mode.indexOf('classic-')===0||mode.indexOf('blitz-')===0);

  // Reset Zug-Zeit bei jedem Turn-Wechsel (oder Spielstart)
  useEffect(()=>{
    if(!isTimerMode(gameTimeMode))return;
    setTurnTimeLeft(getTurnTime(gameTimeMode));
  },[turn,gameNum,gameTimeMode]);

  // ── Chaos-Item Spawn ──
  useEffect(()=>{
    if(!chaosMode||winner||screen!=='game'||chaosItem)return;
    if(moveHist.length<chaosSpawnRef.current)return;
    // Online: nur der Host spawnt, syncs via doSync; Guest übernimmt aus gs.chaosItem
    if(gameMode==='online'&&onlineRole!=='A')return;
    const pos=pickChaosPos(pA,pB,walls);
    if(pos){
      setChaosItem(pos);
      playSound('wall');
      if(gameMode==='online'){
        doSync({pA:S.current.pA,pB:S.current.pB,walls:S.current.walls,barrLeft:S.current.barrLeft,turn:S.current.turn,winner:null,moves:S.current.moveHist,chaosItem:pos});
      }
    }
  },[moveHist.length,chaosMode,winner,screen,chaosItem,pA,pB,walls,gameMode,onlineRole]);

  // ── Hammer 2. Welle: Countdown startet wenn alle Wave-1 weg, spawnt nach 50 Zügen ──
  const hammerWave1ClearedRef=useRef(null); // moveHist.length zu dem Zeitpunkt
  useEffect(()=>{
    if(!hammerMode||hammerDrops!==2||winner||screen!=='game')return;
    if(hammerWave2Ref.current)return;
    const wave1Remaining=hammers.some(h=>h.id.indexOf('hw2-')===-1);
    const anyUsed=hammerUsed.A.w1||hammerUsed.B.w1;
    if(wave1Remaining||!anyUsed){hammerWave1ClearedRef.current=null;return;}
    // Wave 1 komplett eingesammelt → Countdown-Startpunkt merken
    if(hammerWave1ClearedRef.current===null){
      hammerWave1ClearedRef.current=moveHist.length;
      return;
    }
    // Warte 50 Züge seit Wave-1-Abschluss
    if(moveHist.length-hammerWave1ClearedRef.current<50)return;
    if(gameMode==='online'&&onlineRole!=='A')return;
    const wave=makeHammersWave2(pA,pB,walls);
    if(wave.length){
      hammerWave2Ref.current=true;
      const merged=[...S.current.hammers,...wave];
      setHammers(merged);
      playSound('pickup');
      if(gameMode==='online'){
        doSync({pA:S.current.pA,pB:S.current.pB,walls:S.current.walls,barrLeft:S.current.barrLeft,turn:S.current.turn,winner:null,moves:S.current.moveHist,chaosItem:S.current.chaosItem,hammers:merged,hammerHeld:S.current.hammerHeld});
      }
    }
  },[hammers,hammerUsed,moveHist.length,hammerMode,hammerDrops,winner,screen,pA,pB,walls,gameMode,onlineRole]);

  // ── Random-Wand-Drop ──
  useEffect(()=>{
    if(!dropMode||winner||screen!=='game')return;
    if(moveHist.length<dropNextRef.current)return;
    if(gameMode==='online'&&onlineRole!=='A')return; // nur Host dropt, syncs via walls
    const key=pickFairDropWall(pA,pB,walls);
    if(key){
      const next=new Set([...walls,key]);
      setWalls(next);
      setGoldenWalls(prev=>{const g=new Set([...prev]);g.add(key);return g;});
      playSound('wall');
      dropNextRef.current=moveHist.length+dropInterval(dropMode);
      if(gameMode==='online'){
        const gw=new Set([...S.current.goldenWalls]);gw.add(key);
        doSync({pA:S.current.pA,pB:S.current.pB,walls:next,barrLeft:S.current.barrLeft,turn:S.current.turn,winner:null,moves:S.current.moveHist,chaosItem:S.current.chaosItem,goldenWalls:[...gw]});
      }
    }else{
      dropNextRef.current=moveHist.length+3; // kein fairer Drop möglich → bald erneut
    }
  },[moveHist.length,dropMode,winner,screen,pA,pB,walls,gameMode,onlineRole]);

  useEffect(()=>{
    if(screen!=='game')return;
    if(winner)return;
    if(!isTimerMode(gameTimeMode))return;
    const isBlitz=gameTimeMode.indexOf('blitz-')===0;
    const iv=setInterval(()=>{
      // Zug-Zeit runterzählen
      setTurnTimeLeft(tt=>{
        if(tt<=0)return 0;
        const nt=tt-1;
        if(nt<=0){
          if(isBlitz){
            // Blitz: aktueller Spieler wird übersprungen, anderer ist dran
            const newTurn=turn==='A'?'B':'A';
            setTurn(newTurn);
            if(gameMode==='online'){
              const s=S.current;
              doSync({pA:s.pA,pB:s.pB,walls:s.walls,barrLeft:s.barrLeft,turn:newTurn,winner:null,moves:s.moveHist,chaosItem:s.chaosItem});
            }
            return getTurnTime(gameTimeMode);
          }
          // Classic: aktueller Spieler verliert
          const other=turn==='A'?'B':'A';
          setWinner(other);
          return 0;
        }
        return nt;
      });
      // Gesamt-Zeit nur für Classic runterzählen
      if(!isBlitz){
        setTimeLeft(tl=>{
          const cur=tl[turn];
          if(cur<=0)return tl;
          const next=cur-1;
          if(next<=0){
            const other=turn==='A'?'B':'A';
            setWinner(other);
            return{...tl,[turn]:0};
          }
          return{...tl,[turn]:next};
        });
      }
    },1000);
    return()=>clearInterval(iv);
  },[screen,winner,turn,gameTimeMode,gameMode]);

  // ── AI ──
  useEffect(()=>{
    if(gameMode!=='pvc'||turn!=='B'||winner||screen!=='game')return;
    setAiThinking(true);
    const delay=aiDifficulty==='hard'?1100:aiDifficulty==='easy'?500:700;
    const t=setTimeout(()=>{
      const st=S.current;
      let a=st.pA,b=st.pB,w=new Set(st.walls),bl=st.barrLeft,moves=[...st.moveHist];
      const hms=st.hammers,hh=st.hammerHeld||{A:false,B:false};
      // Letzte 5 AI-Positionen (inkl. aktuelle) für Anti-Cycling
      const recentAi=[{r:b.r,c:b.c}];
      for(let i=moves.length-1;i>=0&&recentAi.length<6;i--){
        const m=moves[i];
        if(m.type==='move'&&m.p==='B')recentAi.push({r:m.r,c:m.c});
      }
      // Hammer gratis nutzen, falls die AI sich selbst befreien kann
      let heldB=!!hh.B;
      if(st.hammerMode&&heldB){
        const bk=aiHammerBreak(b,w);
        if(bk){
          w.delete(bk);
          moves.push({type:'break',p:'B',k:bk});
          heldB=false;
          setBreakingWall(bk);setTimeout(()=>setBreakingWall(null),450);
          playSound('break');
        }
      }
      // Zug bestimmen: smarte Hammer-Logik
      let d=null;
      if(st.hammerMode&&!heldB&&hms&&hms.length){
        const nh=nearestHammer(b,w,hms);
        const ownPath=bfsPath(b,w);
        const humPath=bfsPath(a,w);
        const ownD=ownPath?ownPath.length-1:99;
        const humD=humPath?humPath.length-1:99;
        const hammerDist=nh&&nh.path?nh.path.length-1:99;
        // Hammer nur holen wenn:
        // - Gegner NICHT kurz vor dem Ziel (humD>2)
        // - Umweg ist klein (max 3 Schritte)
        // - Kein klarer Vorsprung vorhanden (sonst lieber sprinten)
        // - Kein direkter Schritt Richtung Ziel verfügbar
        const enemyDangerous=humD<=3;
        const detourOk=hammerDist<=4;
        const aiClearlyAhead=ownD<=humD-3;
        if(nh&&nh.path&&nh.path.length>1&&!enemyDangerous&&detourOk&&!aiClearlyAhead){
          const step=nh.path[1];
          // Nur zum Hammer wenn nächster Schritt nicht schlechter als Zielrichtung
          if(!(step.r===a.r&&step.c===a.c))d={type:'move',pos:step};
        }
      }
      if(!d){
        _hamCtx=st.hammerMode?buildHamCtx(hms,hh,a,b):null;
        d=aiMove(b,a,w,bl.B,bl.A,aiDifficulty,recentAi,chaosItem);
        _hamCtx=null;
      }
      let nextHammers=hms,nextHeld={A:hh.A,B:heldB};
      if(d){
        if(d.type==='move'){
          playSound('move');setPB(d.pos);
          // Chaos-Item einsammeln (AI/B)
          if(chaosItem&&chaosItem.r===d.pos.r&&chaosItem.c===d.pos.c){
            setBarrLeft(p=>({...p,B:p.B+2}));
            setChaosItem(null);
            chaosSpawnRef.current=moves.length+1+18+Math.floor(Math.random()*8);
            playSound('wall');
          }
          // Hammer aufsammeln (AI/B)
          if(st.hammerMode&&!nextHeld.B&&hms&&hms.length){
            const hit=hms.find(h=>h.r===d.pos.r&&h.c===d.pos.c);
            if(hit){
              const wv=waveOf(hit.id);
              const hu=st.hammerUsed||freshHammerUsed();
              if(!hu.B[wv]){
                playSound('pickup');
                nextHeld={...nextHeld,B:true};
                const nextUsedAI={...hu,B:{...hu.B,[wv]:true}};
                setHammerUsed(nextUsedAI);
                collectItem(hit);
                let rem=hms.filter(h=>h.id!==hit.id);
                if(nextHeld.A&&nextHeld.B){rem.forEach(collectItem);rem=[];}
                // Wenn beide je einen Wave-1-Hammer haben → restliche Wave-1 entfernen
                const bothUsedW1AI=nextUsedAI.A.w1&&nextUsedAI.B.w1;
                if(bothUsedW1AI){
                  const leftover=rem.filter(h=>h.id.indexOf('hw2-')===-1);
                  leftover.forEach(collectItem);
                  rem=rem.filter(h=>h.id.indexOf('hw2-')===0);
                }
                nextHammers=rem;setHammers(rem);
              }
            }
          }
          moves.push({type:'move',p:'B',r:d.pos.r,c:d.pos.c});
          setWalls(w);setMoveHist(moves);setHammerHeld(nextHeld);
          if(d.pos.r===0){setAiThinking(false);triggerWin('B');return;}
        }else{
          playSound('wall');setWalls(d.walls);setBarrLeft(p=>({...p,B:p.B-1}));
          const nk=[...d.walls].find(k=>!w.has(k));
          if(nk)moves.push({type:'wall',p:'B',k:nk});
          setMoveHist(moves);setHammerHeld(nextHeld);
        }
      }else{setWalls(w);setMoveHist(moves);setHammerHeld(nextHeld);}
      setTurn('A');setAiThinking(false);
    },delay);
    return()=>clearTimeout(t);
  },[turn,gameMode,winner,screen,aiDifficulty]);

  // ── Online realtime listener ──
  useEffect(()=>{
    if(gameMode!=='online'||!lobbyId||(screen!=='game'&&screen!=='end'))return;
    const ref=window.db.ref(`barricade_game_${lobbyId}`);
    const cb=ref.on('value',snap=>{
      const v=snap.val();if(!v)return;
      let gs;try{gs=JSON.parse(v);}catch{return;}
      // Robuste Filterung: Updates aus alter Runde oder mit weniger moves ignorieren.
      // Clock-Skew-sicher (kein Date.now()-Vergleich mehr).
      const newGN=gs.gameNum||1;
      const oldGN=S.current.gameNum||0;
      const newMoveCount=(gs.moves||[]).length;
      const oldMoveCount=S.current.moveHist.length;
      if(newGN<oldGN)return;
      if(newGN===oldGN&&newMoveCount<oldMoveCount)return;
      lastOnlineTs.current=gs.lastUpdated||Date.now();

      // Timer-Modus aus Spielzustand uebernehmen (beide Spieler sehen dieselbe Minutenanzahl)
      if(gs.tm!==undefined&&gs.tm!==S.current.gameTimeMode){
        setGameTimeMode(gs.tm);
        if(typeof gs.tm==='string'&&gs.tm.indexOf('classic-')===0){
          const cs=gs.tm==='classic-3'?180:gs.tm==='classic-5'?300:480;
          setTimeLeft(tl=>(tl.A>0||tl.B>0)?tl:{A:cs,B:cs});
        }
      }

      // Neue Runde erkannt → Spiel mit neuer Rolle starten
      if(newGN>oldGN&&oldGN>0){
        const myNewRole=gs.swapRoles?(S.current.onlineRole==='A'?'B':'A'):S.current.onlineRole;
        setOnlineRole(myNewRole);
        setPA(gs.pA);setPB(gs.pB);setWalls(new Set(gs.walls||[]));
        setBarrLeft(gs.barrLeft);setTurn(gs.turn);setMoveHist(gs.moves||[]);
        setChaosItem(gs.chaosItem||null);
        setGoldenWalls(new Set(gs.goldenWalls||[]));
        setHammers(gs.hammers||[]);
        setHammerHeld(gs.hammerHeld||{A:false,B:false});
        setHammerUsed(gs.hammerUsed||freshHammerUsed());
        setWinner(null);setCelebrating(false);setGaveUp(null);
        setRematchA(false);setRematchB(false);setRematchDeclined(null);
        setGameNum(newGN);
        setGiveUpArmed(false);setFlash('');
        // Timer zurücksetzen
        const rtm=gs.tm||gameTimeMode;
        const classicSecs=rtm==='classic-3'?180:rtm==='classic-5'?300:rtm==='classic-8'?480:0;
        setTimeLeft({A:classicSecs,B:classicSecs});
        // Chat leeren
        setChatMsgs([]);setChatInput('');
        setScreen('game');
        return;
      }
      setGameNum(newGN);

      // Rematch flags
      const rA=gs.rematchA||false,rB=gs.rematchB||false,rD=gs.rematchDeclined||null;
      setRematchA(rA);setRematchB(rB);setRematchDeclined(rD);

      // Beide wollen Rematch → Spieler A (im aktuellen Spiel) erstellt neue Runde
      if(rA&&rB&&!rD&&S.current.onlineRole==='A'&&S.current.winner){
        const swap=Math.random()<0.5;
        const prevMoves=S.current.moveHist||[];
        const prevStarter=prevMoves.length>0&&prevMoves[0].p?prevMoves[0].p:'A';
        // Fair: derjenige der letztes Mal NICHT angefangen hat, beginnt jetzt
        // swap=false: gleiche Rollen → opposite role
        // swap=true: getauschte Rollen → gleiche role (= andere Person)
        const startTurn=swap?prevStarter:(prevStarter==='A'?'B':'A');
        const ngs={
          pA:{...INIT_A},pB:{...INIT_B},walls:[],
          barrLeft:{A:gameBarr,B:gameBarr},turn:startTurn,winner:null,moves:[],
          rematchA:false,rematchB:false,rematchDeclined:null,
          gameNum:newGN+1,swapRoles:swap,
          chaosItem:null,
          hammers:hammerMode?makeHammers():[],hammerHeld:{A:false,B:false},
          tm:S.current.gameTimeMode,
          lastUpdated:Date.now()
        };
        stoSet(`barricade_game_${lobbyId}`,ngs);
        stoSet(`barricade_chat_${lobbyId}`,[]);
        lastOnlineTs.current=ngs.lastUpdated;
        return;
      }

      // Normales Game-Update
      const newMoves=gs.moves||[];
      const oldLen=S.current.moveHist.length;
      if(newMoves.length>oldLen){
        const last=newMoves[newMoves.length-1];

      }

      const nextCI=gs.chaosItem||null;

        chaosSpawnRef.current=newMoves.length+18+Math.floor(Math.random()*8);
      }

  // ── Online Emote-Listener (Gegner-Emotes empfangen) ──
  useEffect(()=>{

  // ── Heartbeat: Anwesenheit prüfen, 15s Timeout = automatischer Verlust ──
  useEffect(()=>{
    if(gameMode!=='online'||!lobbyId||screen!=='game'||winner)return;
    const myRef=window.db.ref(`barricade_hb_${lobbyId}/${onlineRole}`);
    const send=()=>myRef.set(Date.now());
    send();
    // OnDisconnect: setzt 0 wenn Verbindung weg → Gegner sieht sofort dass wir weg sind
    myRef.onDisconnect().set(0);
    const iv=setInterval(send,2000);
    // Beim Zurückkehren in den Tab sofort Lebenszeichen senden
    const onVis=()=>{if(document.visibilityState==='visible')send();};
    document.addEventListener('visibilitychange',onVis);
    return()=>{clearInterval(iv);myRef.onDisconnect().cancel();document.removeEventListener('visibilitychange',onVis);};
  },[gameMode,lobbyId,screen,winner,onlineRole]);

  useEffect(()=>{
    if(gameMode!=='online'||!lobbyId||screen!=='game'||winner)return;
    const oppRole=onlineRole==='A'?'B':'A';
    oppLastSeenRef.current=Date.now();
    const ref=window.db.ref(`barricade_hb_${lobbyId}/${oppRole}`);
    const cb=ref.on('value',snap=>{
      const v=snap.val();
      if(v&&v>0)oppLastSeenRef.current=v;
    });
    return()=>ref.off('value',cb);
  },[gameMode,lobbyId,screen,winner,onlineRole]);

  useEffect(()=>{
    if(gameMode!=='online'||screen!=='game'||winner){setOppCountdown(null);return;}
    let lastTick=Date.now();
    const iv=setInterval(()=>{
      const nowT=Date.now();
      const gap=nowT-lastTick;
      lastTick=nowT;
      // Eigener Tab war im Hintergrund (Timer pausiert) → Grace statt Fehlurteil
      if(gap>3000){
        oppLastSeenRef.current=nowT;
        setOppCountdown(null);
        return;
      }
      const last=oppLastSeenRef.current;
      if(!last)return;
      const elapsed=nowT-last;
      if(elapsed>15000){
        const winP=onlineRole;
        const s=S.current;
        if(s.winner)return;
        doSync({pA:s.pA,pB:s.pB,walls:s.walls,barrLeft:s.barrLeft,turn:s.turn,winner:winP,moves:s.moveHist,chaosItem:s.chaosItem});
        setOppCountdown(null);
        triggerWin(winP,true);
      }else if(elapsed>5000){
        setOppCountdown(Math.ceil((15000-elapsed)/1000));
      }else{
        setOppCountdown(null);
      }
    },500);
    // Beim Zurückkehren in den Tab: Gegner-Timer zurücksetzen (Grace)
    const onVis=()=>{
      if(document.visibilityState==='visible'){
        oppLastSeenRef.current=Date.now();
        lastTick=Date.now();
        setOppCountdown(null);
      }
    };
    document.addEventListener('visibilitychange',onVis);
    return()=>{clearInterval(iv);document.removeEventListener('visibilitychange',onVis);};

      const stale=all.filter(l=>now-l.ts>=15000);

        }

  const joinLobby=async(id)=>{

    // Host-Settings übernehmen

    if(lobby.br!==undefined)setGameBarr(lobby.br);

    setLobbyId(id);setOnlineRole('B');setPrivateCode(null);setScreen('waiting');

  const joinByCode=async()=>{

  // ── Replay sounds ──
  const lastReplayStep=useRef(0);
  useEffect(()=>{
    if(screen!=='replay'){lastReplayStep.current=replayStep;return;}
    if(replayStep>lastReplayStep.current){
      const m=moveHist[replayStep-1];
      if(m)playSound(m.type==='move'?'move':'wall');
    }
    lastReplayStep.current=replayStep;
  },[replayStep,screen,moveHist]);

  // ── Valid moves ──
  const getValidMoves=(pos,opp,w)=>{
    const moves=[];
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=pos.r+dr,nc=pos.c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      if(edgeBlocked(pos.r,pos.c,nr,nc,w))continue;
      if(nr===opp.r&&nc===opp.c){
        for(const[dr2,dc2]of[[-1,0],[1,0],[0,-1],[0,1]]){
          const jr=nr+dr2,jc=nc+dc2;
          if(jr===pos.r&&jc===pos.c)continue;
          if(jr<0||jr>=ROWS||jc<0||jc>=COLS)continue;
          if(edgeBlocked(nr,nc,jr,jc,w))continue;
          moves.push({r:jr,c:jc});
        }
      }else{moves.push({r:nr,c:nc});}
    }
    return moves;
  };

  const cur=turn==='A'?pA:pB;
  const other=turn==='A'?pB:pA;

  const handleCellClick=(r,c)=>{
    if(winner||aiThinking||dragging||!myTurn||screen!=='game')return;
    if(!getValidMoves(cur,other,walls).some(m=>m.r===r&&m.c===c))return;
    playSound('move');
    const np={r,c};const isA=turn==='A';
    if(isA)setPA(np);else setPB(np);
    // Chaos-Item einsammeln
    let newBl=barrLeft;
    let nextChaos=chaosItem;
    if(chaosItem&&chaosItem.r===r&&chaosItem.c===c){
      newBl={...barrLeft,[turn]:barrLeft[turn]+2};
      setBarrLeft(newBl);
      setChaosItem(null);
      nextChaos=null;
      // Nächster Spawn in 20–25 Zügen
      chaosSpawnRef.current=S.current.moveHist.length+1+18+Math.floor(Math.random()*8);
      playSound('wall');
    }
    // Hammer-Item aufsammeln (nur wenn man noch keinen hat UND Wave-Limit nicht erreicht)
    let nextHammers=hammers,nextHeld=hammerHeld,nextUsed=hammerUsed;
    if(hammerMode&&!hammerHeld[turn]){
      const hit=hammers.find(h=>h.r===r&&h.c===c);
      if(hit){
        const wv=waveOf(hit.id);
        if(!hammerUsed[turn][wv]){
          playSound('pickup');
          nextHeld={...hammerHeld,[turn]:true};
          nextUsed={...hammerUsed,[turn]:{...hammerUsed[turn],[wv]:true}};
          setHammerHeld(nextHeld);
          setHammerUsed(nextUsed);
          collectItem(hit);
          let rem=hammers.filter(h=>h.id!==hit.id);
          if(nextHeld.A&&nextHeld.B){rem.forEach(collectItem);rem=[];}
          // Wenn beide je einen Wave-1-Hammer gesammelt haben → restliche Wave-1 entfernen
          const bothUsedW1=nextUsed.A.w1&&nextUsed.B.w1;
          if(bothUsedW1){
            const leftover=rem.filter(h=>h.id.indexOf('hw2-')===-1);
            leftover.forEach(collectItem);
            rem=rem.filter(h=>h.id.indexOf('hw2-')===0);
          }
          nextHammers=rem;setHammers(rem);
        }
      }
    }
    const nm=[...S.current.moveHist,{type:'move',p:turn,r,c}];
    setMoveHist(nm);
    const newTurn=turn==='A'?'B':'A';
    if(r===0){
      doSync({pA:isA?np:S.current.pA,pB:isA?S.current.pB:np,walls,barrLeft:newBl,turn:newTurn,winner:turn,moves:nm,chaosItem:nextChaos,hammers:nextHammers,hammerHeld:nextHeld,hammerUsed:nextUsed});
      triggerWin(turn);
      return;
    }
    setTurn(newTurn);setFlash('');
    doSync({pA:isA?np:S.current.pA,pB:isA?S.current.pB:np,walls,barrLeft:newBl,turn:newTurn,winner:null,moves:nm,chaosItem:nextChaos,hammers:nextHammers,hammerHeld:nextHeld,hammerUsed:nextUsed});
  };

  const validDot=(r,c)=>{

  // ── Give up ──

  // ── Drag ──
  useEffect(()=>{
    if(!dragging)return;
    const OFFSET=90;
    const getRel=(x,y)=>{if(!gridRef.current)return null;const rect=gridRef.current.getBoundingClientRect();return{x:x-rect.left,y:y-rect.top};};
    const onMove=(x,y)=>{
      setGhostPos({x,y});
      const rect=gridRef.current?gridRef.current.getBoundingClientRect():null;
      const inZone=rect&&y<=rect.bottom+20;
      const rel=getRel(x,y-OFFSET);
      if(inZone&&rel&&rel.x>=0&&rel.x<=COLS*CELL&&rel.y>=0&&rel.y<=ROWS*CELL){
        const key=snapWall(rel.x,rel.y,dragging.orient);

        const wp=wallPos(key);
        setSnapPos({x:rect.left+wp.left+wp.width/2,y:rect.top+wp.top+wp.height/2});
      }else{setPreviewKey(null);setSnapPos(null);}
    };
    const onEnd=(x,y)=>{
      if(snapPosRef.current){
        const rel=getRel(x,y-OFFSET);
        if(rel&&rel.x>=0&&rel.x<=COLS*CELL&&rel.y>=0&&rel.y<=ROWS*CELL){
          const key=snapWall(rel.x,rel.y,dragging.orient);
          const{walls:w,pA:a,pB:b,barrLeft:bl,turn:t,moveHist:mh}=S.current;
          if(bl[t]>0){
            _hamCtx=S.current.hammerMode?buildHamCtx(S.current.hammers,S.current.hammerHeld,a,b):null;
            const next=tryWall(key,w,a,b);

    const tm=e=>{e.preventDefault();const t=e.touches[0];onMove(t.clientX,t.clientY);};
    const te=e=>{e.preventDefault();const t=e.changedTouches[0];onEnd(t.clientX,t.clientY);};

  },[dragging]);

  // ── Hammer-Drag: Mauer zerschlagen ──
  useEffect(()=>{
    if(!hammerDrag)return;
    const OFFSET=90;
    const findWall=(x,y)=>{
      if(!gridRef.current)return null;
      const rect=gridRef.current.getBoundingClientRect();
      const rx=x-rect.left,ry=y-OFFSET-rect.top;
      let best=null,bestD=Infinity;
      for(const k of S.current.walls){
        if(isSteelWall(k))continue;
        const wp=wallPos(k);
        const cx=wp.left+wp.width/2,cy=wp.top+wp.height/2;
        const inside=rx>=wp.left-7&&rx<=wp.left+wp.width+7&&ry>=wp.top-7&&ry<=wp.top+wp.height+7;
        const dd=(rx-cx)*(rx-cx)+(ry-cy)*(ry-cy);
        if(inside&&dd<bestD){bestD=dd;best=k;}
      }
      return best;
    };
    const onMove=(x,y)=>{setGhostPos({x,y});setHammerTarget(findWall(x,y));};
    const onEnd=(x,y)=>{
      const k=hammerTargetRef.current;
      if(k&&S.current.walls.has(k)){

        const nm=[...S.current.moveHist,{type:'break',p:me,k}];setMoveHist(nm);
        setBreakingWall(k);setTimeout(()=>setBreakingWall(null),450);
        playSound('break');

        setTimeout(()=>window.scrollTo(0,savedScroll.current),0);
      }
      setHammerDrag(false);setHammerTarget(null);
    };
    const mm=e=>onMove(e.clientX,e.clientY);
    const mu=e=>onEnd(e.clientX,e.clientY);
    const tm=e=>{e.preventDefault();const tt=e.touches[0];onMove(tt.clientX,tt.clientY);};
