                    background:'#ef4444',color:'white',border:'none',cursor:'pointer',fontWeight:800,fontSize:13,
                    fontFamily:'system-ui,-apple-system,sans-serif'}}>Ja, leeren</button>
                  <button onClick={()=>setClearConfirm(false)} style={{flex:1,padding:'10px',borderRadius:9,
                    background:'var(--bg)',color:'var(--text)',border:'1.5px solid var(--border)',cursor:'pointer',fontWeight:700,fontSize:13,
                    fontFamily:'system-ui,-apple-system,sans-serif'}}>Abbrechen</button>
                </div>
              </div>
            ):(
              <button onClick={()=>setClearConfirm(true)} style={{width:'100%',padding:'11px',borderRadius:10,
                background:'var(--bg)',color:'var(--text)',border:'1.5px solid var(--border)',cursor:'pointer',
                fontWeight:700,fontSize:13,fontFamily:'system-ui,-apple-system,sans-serif'}}>
                🧹 Offene 2v2-Lobbys leeren
              </button>
            )}
            {adminFlash?<div style={{textAlign:'center',fontSize:12,color:'#16a34a',fontWeight:700,marginTop:10}}>{adminFlash}</div>:null}
          </div>
        </div>
      )}
      {showTutorial&&<TutorialModal t={t} darkMode={darkMode} step={tutStep} setStep={setTutStep} onClose={closeTutorial}/>}
      {helpKey&&<ModeHelpModal kind={helpKey} lang={lang} onClose={()=>setHelpKey(null)}/>}
    </div>
    );
  }

  // ── MODE CONFIG ─────────────────────────────────────────
  if(screen==='modeConfig'){
    const TimeBtn=({val,label,disabled})=>{
      const sel=gameTimeMode===val;
      return(
        <button onClick={()=>!disabled&&setGameTimeMode(val)} disabled={disabled} style={{
          flex:1,padding:'10px 4px',borderRadius:10,
          background:sel?'var(--text)':'var(--card)',
          color:sel?'var(--bg)':'var(--text)',
          border:`1.5px solid ${sel?'var(--text)':'var(--border)'}`,
          cursor:disabled?'not-allowed':'pointer',
          opacity:disabled?0.45:1,
          fontSize:12,fontWeight:800,letterSpacing:0.3,
          fontFamily:'system-ui,-apple-system,sans-serif',
          position:'relative'}}>
          {label}
          {disabled&&<div style={{position:'absolute',top:-6,right:-4,
            fontSize:7,fontWeight:800,background:'#f59e0b',color:'white',
            padding:'1px 4px',borderRadius:5,letterSpacing:0.5}}>SOON</div>}
        </button>
      );
    };
    const DropBtn=({val,label})=>{
      const sel=dropMode===val;
      return(
        <button onClick={()=>setDropMode(d=>d===val?false:val)} style={{
          flex:1,padding:'7px 2px',borderRadius:8,
          background:sel?'#ec4899':'var(--bg)',
          color:sel?'white':'var(--text)',
          border:`1.5px solid ${sel?'#ec4899':'var(--border)'}`,
          cursor:'pointer',fontSize:10,fontWeight:800,letterSpacing:0.2,
          fontFamily:'system-ui,-apple-system,sans-serif'}}>
          {label}
        </button>
      );
    };
    const SectionHeader=({label,icon})=>(
      <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginTop:14,marginBottom:8,paddingLeft:2,display:'flex',alignItems:'center',gap:5}}>
        {icon}{label}
      </div>
    );
    return(
      <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 20px)',animation:pageAnim,background:'transparent',position:'relative',zIndex:1}}>
        <MenuBG dark={darkMode}/>
        <button onClick={goBack} style={backChevron}>‹</button>
        <div style={{width:'100%',maxWidth:340}}>
          <div style={{textAlign:'center',marginBottom:14}}>
            <div style={{marginBottom:4,display:'flex',justifyContent:'center'}}><MazeIcon size={30} color="#8b5cf6"/></div>
            <div style={{fontSize:20,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>{t('mode')}</div>
          </div>

          {/* Aktive Auswahl */}
          {(gameTimeMode!=='none'||chaosMode||dropMode||hammerMode)&&(
            <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap',justifyContent:'center'}}>
              {gameTimeMode.indexOf('classic-')===0&&(
                <div style={{padding:'4px 10px',borderRadius:11,fontSize:11,fontWeight:800,
                  background:'rgba(59,130,246,0.12)',color:'#3b82f6',display:'flex',alignItems:'center',gap:5}}>
                  <ModeGlyph kind="clock" size={12} color="#3b82f6"/><span>{gameTimeMode==='classic-3'?'3':gameTimeMode==='classic-5'?'5':'8'} {t('minLabel')}</span>
                </div>
              )}
              {gameTimeMode.indexOf('blitz-')===0&&(
                <div style={{padding:'4px 10px',borderRadius:11,fontSize:11,fontWeight:800,
                  background:'rgba(245,158,11,0.15)',color:'#d97706',display:'flex',alignItems:'center',gap:5}}>
                  <ModeGlyph kind="bolt" size={12} color="#d97706"/><span>{gameTimeMode==='blitz-5'?'5':gameTimeMode==='blitz-8'?'8':'10'} {t('secLabel')}</span>
                </div>
              )}
              {chaosMode&&(
                <div style={{padding:'4px 10px',borderRadius:11,fontSize:11,fontWeight:800,
                  background:'rgba(139,92,246,0.15)',color:'#8b5cf6',display:'flex',alignItems:'center',gap:5}}>
                  <ModeGlyph kind="swirl" size={12} color="#8b5cf6"/><span>{t('modeChaos')}</span>
                </div>
              )}
              {dropMode&&(
                <div style={{padding:'4px 10px',borderRadius:11,fontSize:11,fontWeight:800,
                  background:'rgba(236,72,153,0.15)',color:'#ec4899',display:'flex',alignItems:'center',gap:5}}>
                  <ModeGlyph kind="burst" size={12} color="#ec4899"/><span>{t('randomDrop')}</span>
                </div>
              )}
              {hammerMode&&(
                <div style={{padding:'4px 10px',borderRadius:11,fontSize:11,fontWeight:800,
                  background:'rgba(245,158,11,0.15)',color:'#d97706',display:'flex',alignItems:'center',gap:5}}>
                  <ModeGlyph kind="hammer" size={13}/><span>{t('hammerMode')}</span>
                </div>
              )}
            </div>
          )}

          {/* Classic */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <SectionHeader icon={<SwordsIcon size={12} color="#64748b"/>} label={t('classic').toUpperCase() + ' · ' + t('totalTime').toUpperCase()}/>
            <HelpDot onClick={()=>setHelpKey('classic')} style={{marginBottom:6}}/>
          </div>
          <div style={{display:'flex',gap:6}}>
            <TimeBtn val="none" label={t('noTimer')}/>
            <TimeBtn val="classic-3" label={'3 '+t('minLabel')}/>
            <TimeBtn val="classic-5" label={'5 '+t('minLabel')}/>
            <TimeBtn val="classic-8" label={'8 '+t('minLabel')}/>
          </div>

          {/* Blitz */}
          {(adminCfg.features.blitz||isAdmin())&&(
          <div style={{opacity:adminCfg.features.blitz?1:0.45,position:'relative'}}>
            {!adminCfg.features.blitz&&<div style={{position:'absolute',top:0,right:0,fontSize:8,fontWeight:800,background:'#ef4444',color:'white',padding:'2px 6px',borderRadius:6,zIndex:1}}>AUS</div>}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <SectionHeader icon={<ModeGlyph kind="bolt" size={12} color="#64748b"/>} label={t('modeBlitz').toUpperCase() + ' · ' + t('perTurn').toUpperCase()}/>
              <HelpDot onClick={()=>setHelpKey('blitz')} style={{marginBottom:6}}/>
            </div>
            <div style={{display:'flex',gap:6}}>
              <TimeBtn val="blitz-5" label={'5 '+t('secLabel')} disabled={!adminCfg.features.blitz&&!isAdmin()}/>
              <TimeBtn val="blitz-8" label={'8 '+t('secLabel')} disabled={!adminCfg.features.blitz&&!isAdmin()}/>
              <TimeBtn val="blitz-10" label={'10 '+t('secLabel')} disabled={!adminCfg.features.blitz&&!isAdmin()}/>
            </div>
          </div>
          )}

          {/* Chaos */}
          {(adminCfg.features.chaos||adminCfg.features.drop||isAdmin())&&(
          <div style={{position:'relative'}}>
            {(!adminCfg.features.chaos&&!adminCfg.features.drop)&&<div style={{position:'absolute',top:0,right:0,fontSize:8,fontWeight:800,background:'#ef4444',color:'white',padding:'2px 6px',borderRadius:6,zIndex:1}}>AUS</div>}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <SectionHeader icon={<ModeGlyph kind="swirl" size={12} color="#64748b"/>} label={t('modeChaos').toUpperCase()}/>
              <div style={{display:'flex',gap:6,marginBottom:6}}>
                <HelpDot onClick={()=>setHelpKey('chaos')}/>
                <HelpDot onClick={()=>setHelpKey('random')}/>
              </div>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'stretch'}}>
              {(adminCfg.features.chaos||isAdmin())&&(
              <button onClick={()=>setChaosMode(c=>!c)} style={{
                flex:1,padding:'11px 7px',opacity:adminCfg.features.chaos?1:0.45,
                background:chaosMode?'#8b5cf6':'var(--card)',
                color:chaosMode?'white':'var(--text)',
                border:`1.5px solid ${chaosMode?'#8b5cf6':'var(--border)'}`,
                borderRadius:11,cursor:adminCfg.features.chaos?'pointer':'default',textAlign:'center',
                fontSize:12,fontWeight:800,letterSpacing:0.2,
                fontFamily:'system-ui,-apple-system,sans-serif',
                boxShadow:chaosMode?'0 4px 14px rgba(139,92,246,0.35)':'none',
                transition:'all 0.2s'}}>
                <div style={{marginBottom:3,display:'flex',justifyContent:'center',height:20,alignItems:'center'}}>{chaosMode?<CheckIcon size={18} color="currentColor"/>:<CrateIcon size={20}/>}</div>
                <div>{t('chaosBarrDrop')}</div>
                <div style={{fontSize:9,fontWeight:600,opacity:0.75,marginTop:3,lineHeight:1.25}}>
                  {t('chaosBarrDropDesc')}
                </div>
              </button>
              )}
              {(adminCfg.features.drop||isAdmin())&&(
              <div style={{flex:1,padding:'11px 7px',display:'flex',flexDirection:'column',opacity:adminCfg.features.drop?1:0.45,
                background:dropMode?'rgba(236,72,153,0.10)':'var(--card)',
                border:`1.5px solid ${dropMode?'#ec4899':'var(--border)'}`,
                borderRadius:11,textAlign:'center',transition:'all 0.2s'}}>
                <div style={{marginBottom:3,display:'flex',justifyContent:'center',height:20,alignItems:'center'}}>{dropMode?<CheckIcon size={18} color="#ec4899"/>:<ModeGlyph kind="burst" size={18} color="#ec4899"/>}</div>
                <div style={{fontSize:12,fontWeight:800,color:dropMode?'#ec4899':'var(--text)'}}>{t('randomDrop')}</div>
                <div style={{fontSize:9,fontWeight:600,color:'var(--subtle)',marginTop:3,marginBottom:7,lineHeight:1.25}}>{t('randomDropDesc')}</div>
                <div style={{display:'flex',gap:4,marginTop:'auto'}}>
                  <DropBtn val="rare" label={t('dropRare')}/>
                  <DropBtn val="often" label={t('dropOften')}/>
                  <DropBtn val="veryoften" label={t('dropVeryOften')}/>
                </div>
              </div>
              )}
            </div>
          </div>
          )}

          {(adminCfg.features.hammer||isAdmin())&&(
          <div style={{marginTop:8,opacity:adminCfg.features.hammer?1:0.45,position:'relative'}}>
            {!adminCfg.features.hammer&&<div style={{position:'absolute',top:-4,right:0,fontSize:8,fontWeight:800,background:'#ef4444',color:'white',padding:'2px 6px',borderRadius:6,zIndex:1}}>AUS</div>}
            <div style={{position:'absolute',top:6,right:6,zIndex:2}}><HelpDot onClick={()=>setHelpKey('hammer')}/></div>
            <button onClick={()=>adminCfg.features.hammer&&setHammerMode(h=>!h)} style={{
              width:'100%',padding:'11px 12px',
              background:hammerMode?'#f59e0b':'var(--card)',
              color:hammerMode?'white':'var(--text)',
              border:`1.5px solid ${hammerMode?'#f59e0b':'var(--border)'}`,
              borderRadius:11,cursor:'pointer',textAlign:'left',
              display:'flex',alignItems:'center',gap:10,
              fontFamily:'system-ui,-apple-system,sans-serif',
              boxShadow:hammerMode?'0 4px 14px rgba(245,158,11,0.35)':'none',transition:'all 0.2s'}}>
              <span style={{display:'flex',width:24,justifyContent:'center'}}>{hammerMode?<CheckIcon size={20} color="currentColor"/>:<HammerIcon size={22}/>}</span>
              <span>
                <div style={{fontSize:13,fontWeight:800}}>{t('hammerMode')}</div>
                <div style={{fontSize:9,fontWeight:600,opacity:0.8,marginTop:2,lineHeight:1.25}}>{t('hammerDesc')}</div>
              </span>
            </button>
            {hammerMode&&(
              <div style={{display:'flex',gap:6,marginTop:6}}>
                {[{v:1,l:t('hammerOnce')},{v:2,l:t('hammerTwice')}].map(o=>{
                  const sel=hammerDrops===o.v;
                  return <button key={o.v} onClick={()=>setHammerDrops(o.v)} style={{
                    flex:1,padding:'8px 4px',borderRadius:9,
                    background:sel?'#f59e0b':'var(--card)',color:sel?'white':'var(--text)',
                    border:`1.5px solid ${sel?'#f59e0b':'var(--border)'}`,
                    cursor:'pointer',fontSize:11,fontWeight:800,letterSpacing:0.2,
                    fontFamily:'system-ui,-apple-system,sans-serif'}}>{o.l}</button>;
                })}
              </div>
            )}
          </div>
          )}

          {/* Barricades */}
          <SectionHeader icon={<BrickMini size={11}/>} label={t('barricadesLabel')}/>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:14,
            padding:'8px 14px',background:'var(--card)',border:'1.5px solid var(--border)',borderRadius:11}}>
            <button onClick={()=>setGameBarr(b=>Math.max(8,b-1))}
              style={{width:32,height:32,borderRadius:8,
                background:'var(--bg)',border:'1.5px solid var(--border)',
                cursor:'pointer',fontSize:18,fontWeight:800,color:'var(--text)',
                fontFamily:'system-ui,-apple-system,sans-serif'}}>−</button>
            <div style={{fontSize:24,fontWeight:900,color:'var(--text)',minWidth:28,textAlign:'center'}}>{gameBarr}</div>
            <button onClick={()=>setGameBarr(b=>Math.min(15,b+1))}
              style={{width:32,height:32,borderRadius:8,
                background:'var(--bg)',border:'1.5px solid var(--border)',
                cursor:'pointer',fontSize:18,fontWeight:800,color:'var(--text)',
                fontFamily:'system-ui,-apple-system,sans-serif'}}>+</button>
          </div>

        </div>
        {helpKey&&<ModeHelpModal kind={helpKey} lang={lang} onClose={()=>setHelpKey(null)}/>}
    </div>
    );
  }

  // ── DIFFICULTY ──────────────────────────────────────────
  if(screen==='difficulty') return (
    <div style={{...sPage,animation:pageAnim,background:'transparent',position:'relative',zIndex:1}}>
      <MenuBG dark={darkMode}/>
      <button onClick={goBack} style={backChevron}>‹</button>
      <div style={{fontSize:20,fontWeight:800,color:'var(--text)',marginBottom:24,position:'relative',zIndex:1}}>{t('chooseDifficulty')}</div>
      <div style={{display:'flex',flexDirection:'column',gap:10,width:280,position:'relative',zIndex:1}}>
        {[
          {k:'easy',color:'#16a34a'},
          {k:'normal',color:'#eab308'},
          {k:'hard',color:'#ef4444'}
        ].map(d=>(
          <button key={d.k} onClick={()=>{setAiDifficulty(d.k);initGame('pvc');}} style={{
            padding:'14px 16px',background:'var(--card)',border:`1.5px solid ${d.color}30`,
            borderRadius:12,cursor:'pointer',textAlign:'left',
            boxShadow:'var(--shadow-soft)',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:2}}>
              <span style={{display:'flex'}}><DotIcon size={16} color={d.color}/></span>
              <span style={{fontSize:15,fontWeight:800,color:d.color}}>{t(d.k)}</span>
            </div>
            <div style={{fontSize:11,color:'var(--subtle)',fontWeight:500,marginLeft:26}}>{t(d.k+'Desc')}</div>
          </button>
        ))}
      </div>
    </div>
  );

  // ── FRIEND PLAY ─────────────────────────────────────────
  if(screen==='friendPlay') return (
    <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 20px)',animation:pageAnim,background:'transparent',position:'relative',zIndex:1}}>
      <MenuBG dark={darkMode}/>
      <button onClick={goBack} style={backChevron}>‹</button>
      <div style={{width:'100%',maxWidth:340,display:'flex',flexDirection:'column',position:'relative',zIndex:1}}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{marginBottom:4,display:'flex',justifyContent:'center'}}><PeopleIcon size={30} color="#8b5cf6"/></div>
          <div style={{fontSize:20,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>{t('friendPlay')}</div>
        </div>

        {/* Private Lobby erstellen */}
        <button onClick={()=>createLobby(true)} style={{
          width:'100%',padding:'16px 16px',marginBottom:16,
          background:'linear-gradient(135deg,#8b5cf6,#3b82f6)',color:'white',border:'none',
          borderRadius:14,fontWeight:800,fontSize:14,cursor:'pointer',
          display:'flex',alignItems:'center',gap:10,
          boxShadow:'0 4px 14px rgba(139,92,246,0.35)',
          fontFamily:'system-ui,-apple-system,sans-serif'}}>
          <span style={{display:'flex'}}><LockIcon size={22} color="#fff"/></span>
          <div style={{flex:1,textAlign:'left'}}>
            <div style={{fontWeight:800,fontSize:14}}>{t('privateLobby')}</div>
            <div style={{fontSize:10,fontWeight:500,opacity:0.85,marginTop:2}}>{t('shareCode')}</div>
          </div>
          <span style={{fontSize:18}}>›</span>
        </button>

        {/* Join via code */}
        <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginBottom:6,paddingLeft:2}}>
          {t('orJoinCode')}
        </div>
        <input value={codeInput} onChange={e=>setCodeInput(e.target.value.toUpperCase())} placeholder="XXXX"
          maxLength={4}
          style={{width:'100%',padding:'12px 12px',borderRadius:10,border:'1.5px solid var(--border)',
            fontSize:18,fontWeight:800,letterSpacing:6,textAlign:'center',outline:'none',
            fontFamily:'system-ui,-apple-system,sans-serif',background:'var(--card)',color:'var(--text)',
            marginBottom:6,display:'block',boxSizing:'border-box'}}/>
        <button onClick={joinByCode} style={{width:'100%',padding:'12px 14px',background:'#3b82f6',color:'white',
          border:'none',borderRadius:10,fontWeight:700,cursor:'pointer',fontSize:13,
          boxShadow:'0 2px 8px rgba(59,130,246,0.25)',
          fontFamily:'system-ui,-apple-system,sans-serif'}}>{t('join')}</button>

        {flash&&<div style={{color:'#ef4444',fontSize:12,fontWeight:500,marginTop:10,width:'100%',textAlign:'center'}}>{flash}</div>}
      </div>
    </div>
  );

  // ── ONLINE ──────────────────────────────────────────────
  if(screen==='online') return (
    <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 24px)',animation:pageAnim,background:'transparent',position:'relative',zIndex:1}}>
      <MenuBG dark={darkMode}/>
      <button onClick={goBack} style={backChevron}>‹</button>
      <div style={{width:'100%',maxWidth:340,display:'flex',flexDirection:'column',alignItems:'center',position:'relative',zIndex:1}}>

        {/* Header */}
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{marginBottom:6,display:'flex',justifyContent:'center'}}><GlobeIcon size={26} color="#3b82f6"/></div>
          <div style={{fontSize:22,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>{t('playOnline')}</div>
        </div>

        {/* Create section */}
        <div style={{width:'100%',marginBottom:16}}>
          <button onClick={()=>createLobby(false)} style={{
            width:'100%',padding:'14px 16px',background:'#1e293b',color:'white',border:'none',
            borderRadius:12,fontWeight:700,fontSize:14,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',gap:8,
            boxShadow:'0 2px 8px rgba(30,41,59,0.18)',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
            <span style={{display:'flex'}}><PlusIcon size={18} color="#fff"/></span>
            <span>{t('createLobby')}</span>
          </button>
          <div style={{fontSize:10,color:'var(--subtle)',fontWeight:600,marginTop:6,textAlign:'center'}}>
            {t('mode')}: {gameTimeMode==='none'?t('noTimer'):gameTimeMode} · {gameBarr} <BrickMini size={10}/>
          </div>
        </div>

        {flash&&<div style={{color:'#ef4444',fontSize:12,fontWeight:500,marginBottom:10,width:'100%',textAlign:'center'}}>{flash}</div>}

        {/* Lobby list header */}
        <div style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,paddingLeft:2,paddingRight:2}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'#16a34a',
              animation:'piece-pulse 1.6s ease-in-out infinite'}}/>
            <span style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5}}>{t('live')}</span>
            <span style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginLeft:4}}>· {t('openLobbies')}</span>
          </div>
          {lobbyList.length>0&&(
            <div style={{fontSize:10,fontWeight:700,color:'#3b82f6',
              background:'rgba(59,130,246,0.1)',padding:'2px 8px',borderRadius:10}}>
              {lobbyList.length} {t('lobbyCount')}
            </div>
          )}
        </div>

        {/* Scrollable lobby list */}
        <div style={{
          width:'100%',maxHeight:240,overflowY:'auto',overflowX:'hidden',
          borderRadius:12,background:'var(--card)',border:'1.5px solid var(--border)',
          WebkitOverflowScrolling:'touch',
          boxShadow:'inset 0 2px 6px rgba(0,0,0,0.04)'}}>
          {lobbyList.length===0?(
            <div style={{padding:'34px 20px',textAlign:'center'}}>
              <div style={{marginBottom:8,opacity:0.4,display:'flex',justifyContent:'center'}}><MazeIcon size={30} color="var(--muted)"/></div>
              <div style={{fontSize:13,fontWeight:700,color:'var(--muted)',marginBottom:4}}>{t('noLobbies')}</div>
              <div style={{fontSize:11,color:'var(--subtle)',fontWeight:500}}>{t('noLobbiesHint')}</div>
            </div>
          ):(
            <div style={{padding:6,display:'flex',flexDirection:'column',gap:5}}>
              {lobbyList.map(l=>{
                const age=Math.floor((Date.now()-l.ts)/1000);
                const ageLabel=age<60?`${age}s`:`${Math.floor(age/60)}m`;
                const tm=l.tm||'none';
                const isClassic=tm.indexOf('classic-')===0;
                const isBlitz=tm.indexOf('blitz-')===0;
                return(
                  <div key={l.id} onClick={()=>joinLobby(l.id)}
                    style={{padding:'10px 12px',background:'var(--bg)',borderRadius:9,
                      border:'1px solid var(--border-soft)',cursor:'pointer',
                      transition:'all 0.15s'}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:l.tm||l.ch?6:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <div style={{width:30,height:30,borderRadius:8,background:'linear-gradient(135deg,#ef4444,#3b82f6)',
                          display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,
                          boxShadow:'0 2px 6px rgba(0,0,0,0.12)'}}><SwordsIcon size={16} color="#fff"/></div>
                        <div>
                          <div style={{fontSize:13,fontWeight:700,color:'var(--text)',letterSpacing:0.5}}>
                            {t('lobby')} {l.id.slice(0,4).toUpperCase()}
                          </div>
                          <div style={{fontSize:10,color:'var(--subtle)',fontWeight:600,marginTop:1}}>
                            {ageLabel} · 1/2
                          </div>
                        </div>
                      </div>
                      <div style={{padding:'5px 12px',background:'#3b82f6',color:'white',
                        borderRadius:14,fontSize:11,fontWeight:700,
                        boxShadow:'0 2px 6px rgba(59,130,246,0.3)'}}>
                        {t('join')}
                      </div>
                    </div>
                    {(isClassic||isBlitz||l.ch||l.br)&&(
                      <div style={{display:'flex',gap:4,flexWrap:'wrap',paddingLeft:40}}>
                        {isClassic&&(
                          <div style={{padding:'2px 7px',borderRadius:8,fontSize:9,fontWeight:800,letterSpacing:0.3,
                            background:'rgba(59,130,246,0.12)',color:'#3b82f6'}}>
                            <ModeGlyph kind="clock" size={10} color="#3b82f6"/> {tm==='classic-3'?'3':tm==='classic-5'?'5':'8'}{t('minLabel')}
                          </div>
                        )}
                        {isBlitz&&(
                          <div style={{padding:'2px 7px',borderRadius:8,fontSize:9,fontWeight:800,letterSpacing:0.3,
                            background:'rgba(245,158,11,0.15)',color:'#d97706'}}>
                            <ModeGlyph kind="bolt" size={10} color="#d97706"/> {tm==='blitz-5'?'5':tm==='blitz-8'?'8':'10'}{t('secLabel')}
                          </div>
                        )}
                        {l.ch&&(
                          <div style={{padding:'2px 7px',borderRadius:8,fontSize:9,fontWeight:800,letterSpacing:0.3,
                            background:'rgba(139,92,246,0.15)',color:'#8b5cf6'}}>
                            <ModeGlyph kind="swirl" size={10} color="#8b5cf6"/> {t('modeChaos')}
                          </div>
                        )}
                        {l.br&&(
                          <div style={{padding:'2px 7px',borderRadius:8,fontSize:9,fontWeight:800,letterSpacing:0.3,
                            background:'var(--card)',color:'var(--muted)',border:'1px solid var(--border-soft)'}}>
                            <BrickMini size={9}/> {l.br}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );

  // ── LOBBY CONFIG ────────────────────────────────────────
  if(screen==='lobbyConfig'){
    const VisRow=({k,icon,desc})=>{
      const sel=lobbyCfgPrivate===(k==='private');
      return(
        <button onClick={()=>setLobbyCfgPrivate(k==='private')} style={{
          width:'100%',padding:'12px 14px',marginBottom:6,
          background:sel?'var(--text)':'var(--card)',
          color:sel?'var(--bg)':'var(--text)',
          border:`1.5px solid ${sel?'var(--text)':'var(--border)'}`,
          borderRadius:11,cursor:'pointer',textAlign:'left',
          display:'flex',alignItems:'center',gap:10,
          fontFamily:'system-ui,-apple-system,sans-serif'}}>
          <span style={{display:'flex'}}>{icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:800,marginBottom:1}}>{t(k)}</div>
            <div style={{fontSize:10,fontWeight:500,opacity:0.7}}>{desc}</div>
          </div>
          {sel&&<span style={{fontSize:14,fontWeight:900}}>✓</span>}
        </button>
      );
    };
    const ModeRow=({k,icon,desc,disabled})=>{
      const sel=lobbyCfgMode===k;
      return(
        <button onClick={()=>!disabled&&setLobbyCfgMode(k)} disabled={disabled} style={{
          width:'100%',padding:'12px 14px',marginBottom:6,
          background:sel?'var(--text)':'var(--card)',
          color:sel?'var(--bg)':'var(--text)',
          border:`1.5px solid ${sel?'var(--text)':'var(--border)'}`,
          borderRadius:11,cursor:disabled?'not-allowed':'pointer',textAlign:'left',
          display:'flex',alignItems:'center',gap:10,opacity:disabled?0.5:1,
          fontFamily:'system-ui,-apple-system,sans-serif'}}>
          <span style={{display:'flex'}}>{icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:800,marginBottom:1,display:'flex',alignItems:'center',gap:6}}>
              {t(k)}
              {disabled&&<span style={{fontSize:8,fontWeight:700,letterSpacing:0.5,
                background:'#f59e0b',color:'white',padding:'1px 6px',borderRadius:6}}>SOON</span>}
            </div>
            <div style={{fontSize:10,fontWeight:500,opacity:0.7}}>{disabled?t('comingSoon'):desc}</div>
          </div>
          {sel&&<span style={{fontSize:14,fontWeight:900}}>✓</span>}
        </button>
      );
    };
    return(
      <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 24px)',background:'transparent',position:'relative',zIndex:1}}>
        <MenuBG dark={darkMode}/>
        <div style={{width:'100%',maxWidth:340,position:'relative',zIndex:1}}>
          <div style={{textAlign:'center',marginBottom:22}}>
            <div style={{marginBottom:6,display:'flex',justifyContent:'center'}}><GearIcon size={24} color="var(--text)"/></div>
            <div style={{fontSize:20,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>{t('lobbySettings')}</div>
          </div>
          <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginBottom:8,paddingLeft:2}}>
            {t('visibility').toUpperCase()}
          </div>
          <VisRow k="public" icon={<GlobeIcon size={20}/>} desc={t('publicDesc')}/>
          <VisRow k="private" icon={<LockIcon size={20}/>} desc={t('privateDesc')}/>
          <div style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5,marginTop:16,marginBottom:8,paddingLeft:2}}>
            {t('gameMode').toUpperCase()}
          </div>
          <ModeRow k="classic" icon={<SwordsIcon size={20}/>} desc={t('classicDesc')}/>
          <ModeRow k="ranked" icon={<TrophyIcon size={20}/>} desc={t('rankedDesc')} disabled/>
          <button onClick={()=>createLobby(lobbyCfgPrivate)} style={{
            width:'100%',padding:'14px 16px',marginTop:22,
            background:'#3b82f6',color:'white',border:'none',borderRadius:12,
            fontWeight:800,fontSize:14,cursor:'pointer',
            boxShadow:'0 4px 14px rgba(59,130,246,0.35)',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
            {t('createNow')}
          </button>
          <button onClick={()=>setScreen('online')} style={{...sBack,width:'100%',textAlign:'center'}}>{t('back')}</button>
        </div>
      </div>
    );
  }

  // ── WAITING ─────────────────────────────────────────────
  if(screen==='waiting'){
    const baseUrl=(typeof window!=='undefined'&&window.location)?(window.location.origin+window.location.pathname):'https://yavrukusch.github.io/WrongWay/';
    const shareUrl=baseUrl+'?join='+(privateCode||'');
    const waMsg=encodeURIComponent('Spiel mit mir Wrong Way! Code: '+(privateCode||'')+' · '+shareUrl);
    return(
    <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 30px)',background:'transparent',position:'relative',zIndex:1}}>
      <MenuBG dark={darkMode}/>
      <div style={{width:'100%',maxWidth:340,display:'flex',flexDirection:'column',alignItems:'center',position:'relative',zIndex:1}}>
        <div style={{fontSize:18,fontWeight:800,color:'var(--text)',marginBottom:18,textAlign:'center'}}>
          {onlineRole==='A'?(privateCode?t('waitingPrivate'):t('waitingOpponent')):t('connecting')}
        </div>
        {privateCode&&(
          <>
            <div style={{fontSize:30,fontWeight:900,letterSpacing:7,color:'var(--text)',
              background:'var(--card)',padding:'18px 32px',borderRadius:16,marginBottom:14,
              border:'2px solid var(--border)',boxShadow:'var(--shadow-soft)'}}>
              {privateCode}
            </div>
            <button onClick={()=>{
              try{navigator.clipboard.writeText(privateCode);setCopyFlash(true);setTimeout(()=>setCopyFlash(false),1500);}catch(e){}
            }} style={{padding:'7px 16px',background:'var(--card)',
              border:'1.5px solid var(--border)',borderRadius:20,
              fontSize:11,fontWeight:700,color:'var(--text)',cursor:'pointer',marginBottom:18,
              fontFamily:'system-ui,-apple-system,sans-serif'}}>
              {copyFlash?<span style={{display:'inline-flex',alignItems:'center',gap:5}}><CheckIcon size={13} color="currentColor"/>{t('copied')}</span>:<span style={{display:'inline-flex',alignItems:'center',gap:5}}><ClipboardIcon size={14}/>{t('copyCode')}</span>}
            </button>

            {/* QR Code */}
            <div style={{background:'white',padding:10,borderRadius:14,marginBottom:14,
              boxShadow:'var(--shadow-soft)',border:'1.5px solid var(--border)'}}>
              <img alt="QR" src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=0&data=${encodeURIComponent(shareUrl)}`}
                style={{width:160,height:160,display:'block'}}/>
            </div>
            <div style={{fontSize:10,fontWeight:700,color:'var(--subtle)',letterSpacing:1,marginBottom:18}}>
              {t('scanQR')}
            </div>

            {/* WhatsApp Share */}
            <a href={`https://wa.me/?text=${waMsg}`} target="_blank" rel="noopener noreferrer"
              style={{width:'100%',padding:'12px 14px',background:'#25D366',color:'white',
                border:'none',borderRadius:12,fontWeight:800,cursor:'pointer',fontSize:13,
                textDecoration:'none',textAlign:'center',display:'block',
                boxShadow:'0 4px 12px rgba(37,211,102,0.32)',
                fontFamily:'system-ui,-apple-system,sans-serif',marginBottom:20}}>
              <span style={{display:'inline-flex',alignItems:'center',gap:8,justifyContent:'center'}}><PhoneIcon size={15} color="#fff"/>{t('shareWhatsApp')}</span>
            </a>
          </>
        )}
        <div style={{fontSize:12,color:'var(--subtle)',marginBottom:22,textAlign:'center'}}>
          {onlineRole==='A'?t('shareCode'):t('waitingStart')}
        </div>
        <button onClick={async()=>{await cleanupLobby(lobbyId);setScreen('menu');setLobbyId(null);setPrivateCode(null);}} style={sBack}>{t('cancel')}</button>
      </div>
    </div>
    );
  }

  // ── REPLAY ──────────────────────────────────────────────
  if(screen==='replay'){
    const rs=applyMoves(moveHist,replayStep);
    const curMove=moveHist[replayStep];
    return (
      <div style={{...sCont,paddingBottom:80}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',maxWidth:360,marginBottom:12}}>
          <div style={{fontSize:16,fontWeight:800,color:'var(--text)'}}>{t('replay')}</div>
          <div style={{fontSize:12,color:'var(--subtle)',fontWeight:600}}>
            {replayStep} / {moveHist.length}
          </div>
        </div>
        <div style={{fontSize:9,letterSpacing:3,color:'#16a34a',fontWeight:700,textTransform:'uppercase',marginBottom:2}}>{t('goalLabel')}</div>
        <div style={{position:'relative',width:COLS*CELL,height:ROWS*CELL,...sGrid}}>
          {Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},(_,c)=>(
            <div key={`${r}-${c}`} style={{position:'absolute',left:c*CELL,top:r*CELL,width:CELL,height:CELL,
              background:r===0?'var(--goal)':r===ROWS-1?'var(--start)':(r+c)%2===0?'var(--cell-b)':'var(--cell-a)',
              border:'1px solid var(--cell-line)',boxSizing:'border-box'}}>
              {r===0&&<div style={{position:'absolute',top:0,left:0,right:0,height:3,background:'linear-gradient(90deg,#16a34a,#22c55e)'}}/>}
            </div>
          )))}
          {[...rs.walls].map(k=><Wall key={k} wkey={k} color={darkMode?'#e2e8f0':'#1e293b'} opacity={1} steel={isSteelWall(k)}/>)}
          {['A','B'].map(p=>{const pos=p==='A'?rs.pA:rs.pB;const sz=30,off=(CELL-sz)/2;return(
            <div key={p} style={{position:'absolute',left:pos.c*CELL+off,top:pos.r*CELL+off,width:sz,height:sz,
              transition:'left 0.15s ease,top 0.15s ease',zIndex:20,pointerEvents:'none'}}>
              <Piece color={PC[p]} dark={PD[p]}/>
            </div>
          );})}
        </div>
        <div style={{fontSize:9,letterSpacing:3,color:'var(--subtle)',fontWeight:600,textTransform:'uppercase',marginTop:2,marginBottom:16}}>{t('startLabel')}</div>
        {curMove&&(
          <div style={{fontSize:12,color:'var(--muted)',fontWeight:600,marginBottom:10}}>
            {pname(curMove.p)} – {curMove.type==='move'?t('step'):t('wallPlaced')}
          </div>
        )}
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <button onClick={()=>setReplayStep(s=>Math.max(0,s-1))} disabled={replayStep===0} style={rBtn(replayStep===0)}>◀</button>
          <button onClick={()=>setReplayStep(s=>Math.min(moveHist.length,s+1))} disabled={replayStep>=moveHist.length} style={rBtn(replayStep>=moveHist.length)}>▶</button>
        </div>
        <button onClick={()=>setScreen('end')} style={{...sBack,marginTop:16}}>{t('back')}</button>
      </div>
    );
  }

  // ── END ──────────────────────────────────────────────────
  if(screen==='end'){
    const myRematch=onlineRole==='A'?rematchA:rematchB;
    const otherRematch=onlineRole==='A'?rematchB:rematchA;
    const otherDeclined=rematchDeclined&&rematchDeclined!==onlineRole;
    return (
      <div style={sPage}>
        {winner&&!isOwnLoss(winner)&&<Confetti color={PC[winner]}/>}
        <div style={{marginBottom:8,display:'flex',justifyContent:'center',animation:'trophy-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both'}}>{winner&&isOwnLoss(winner)?<SadIcon size={48}/>:<TrophyIcon size={48}/>}</div>
        <div style={{fontSize:24,fontWeight:900,color:winner?PC[winner]:'var(--muted)',marginBottom:4,letterSpacing:-0.5}}>
          {winner?`${pname(winner)} ${t('wins')}`:t('givenUp')}
        </div>
        {gaveUp&&(
          <div style={{fontSize:13,fontWeight:700,color:'#ef4444',marginTop:2,marginBottom:2}}>
            {pname(gaveUp)} {t('lostGiveUp')}
          </div>
        )}

        {gameMode==='online'&&otherDeclined&&(
          <div style={{fontSize:13,fontWeight:700,color:'#ef4444',marginTop:14,padding:'8px 16px',background:'rgba(239,68,68,0.1)',borderRadius:20}}>
            ✗ {t('rematchDeclined')}
          </div>
        )}
        {gameMode==='online'&&!otherDeclined&&myRematch&&!otherRematch&&(
          <div style={{fontSize:13,fontWeight:700,color:'#f59e0b',marginTop:14,padding:'8px 16px',background:'rgba(245,158,11,0.1)',borderRadius:20,display:'flex',alignItems:'center',gap:8}}>
            <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'#f59e0b',animation:'piece-pulse 1.4s ease-in-out infinite'}}/>
            {t('rematchWaiting')}
          </div>
        )}
        {gameMode==='online'&&!otherDeclined&&!myRematch&&otherRematch&&(
          <div style={{fontSize:13,fontWeight:700,color:'#16a34a',marginTop:14,padding:'8px 16px',background:'rgba(22,163,74,0.1)',borderRadius:20}}>
            ↻ {t('rematchAsked')}
          </div>
        )}

        <div style={{display:'flex',flexDirection:'column',gap:10,width:240,marginTop:24}}>
          {gameMode!=='online'&&<GBtn onClick={()=>initGame(gameMode,'A',null,true)} dark><span style={{display:'inline-flex',alignItems:'center',gap:8,justifyContent:'center'}}><RematchIcon size={16}/>{t('rematch')}</span></GBtn>}
          {gameMode==='online'&&!otherDeclined&&!myRematch&&<GBtn onClick={requestRematch} dark><span style={{display:'inline-flex',alignItems:'center',gap:8,justifyContent:'center'}}><RematchIcon size={16}/>{t('rematch')}</span></GBtn>}
          {moveHist.length>0&&<GBtn onClick={()=>{setReplayStep(0);setScreen('replay');}} outline><span style={{display:'inline-flex',alignItems:'center',gap:8,justifyContent:'center'}}><ReplayIcon size={16}/>{t('replayBtn')}</span></GBtn>}
          <GBtn onClick={()=>{
            if(gameMode==='online'&&!otherDeclined)declineRematch();
            setScreen('menu');setGameMode(null);setLobbyId(null);
          }} outline><span style={{display:'inline-flex',alignItems:'center',gap:8,justifyContent:'center'}}><HomeIcon size={16}/>{t('menu')}</span></GBtn>
        </div>
      </div>
    );
  }

  // ── GAME ─────────────────────────────────────────────────
  const isOnlineWait=gameMode==='online'&&!myTurn&&!winner;
  return (
    <div style={{...sCont,paddingBottom:'calc(100px + env(safe-area-inset-bottom, 0px))'}}>

      {/* Ghost */}
      {dragging&&(
        snapPos
          ? <div style={{position:'fixed',pointerEvents:'none',zIndex:1000,width:gW,height:gH,
              background:previewValid?'#f59e0b':'#ef4444',borderRadius:4,opacity:0.9,
              boxShadow:previewValid?'0 0 20px #f59e0b80':'0 0 20px #ef444480',
              left:snapPos.x-gW/2,top:snapPos.y-gH/2,transition:'left 0.05s,top 0.05s,background 0.12s'}}/>
          : <div style={{position:'fixed',pointerEvents:'none',zIndex:1000,width:44,height:44,borderRadius:'50%',
              background:'#94a3b8',opacity:0.85,left:ghostPos.x-22,top:ghostPos.y-22-90,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'white',fontWeight:800}}>✕</div>
      )}

      {/* Hammer-Ghost */}
      {hammerDrag&&(
        <div style={{position:'fixed',pointerEvents:'none',zIndex:1000,
          left:ghostPos.x-24,top:ghostPos.y-24-90,
          animation:'hammer-float 1s ease-in-out infinite'}}>
          <HammerIcon size={48}/>
        </div>
      )}

      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',maxWidth:360,marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>{t('title')}</div>
        {!winner&&(
          <button onClick={handleGiveUp} style={{
            padding:'5px 14px',fontSize:11,fontWeight:700,cursor:'pointer',
            background:giveUpArmed?'#ef4444':'transparent',
            color:giveUpArmed?'white':'var(--subtle)',
            border:`1px solid ${giveUpArmed?'#ef4444':'var(--border)'}`,
            borderRadius:20,transition:'all 0.2s',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
            {giveUpArmed?t('sure'):t('giveUp')}
          </button>
        )}
      </div>

      {/* Mode badges */}
      {(gameTimeMode!=='none'||chaosMode||dropMode||hammerMode)&&(
        <div style={{display:'flex',gap:6,marginBottom:8,width:'100%',maxWidth:360,flexWrap:'wrap'}}>
          {gameTimeMode.indexOf('classic-')===0&&(
            <div style={{padding:'3px 9px',borderRadius:10,fontSize:10,fontWeight:800,letterSpacing:0.4,
              background:'rgba(59,130,246,0.12)',color:'#3b82f6',display:'flex',alignItems:'center',gap:4}}>
              <ModeGlyph kind="clock" size={11} color="#3b82f6"/><span>{gameTimeMode==='classic-3'?'3':gameTimeMode==='classic-5'?'5':'8'} {t('minLabel')}</span>
            </div>
          )}
          {gameTimeMode.indexOf('blitz-')===0&&(
            <div style={{padding:'3px 9px',borderRadius:10,fontSize:10,fontWeight:800,letterSpacing:0.4,
              background:'rgba(245,158,11,0.15)',color:'#d97706',display:'flex',alignItems:'center',gap:4}}>
              <ModeGlyph kind="bolt" size={11} color="#d97706"/><span>{gameTimeMode==='blitz-5'?'5':gameTimeMode==='blitz-8'?'8':'10'} {t('secLabel')}</span>
            </div>
          )}
          {chaosMode&&(
            <div style={{padding:'3px 9px',borderRadius:10,fontSize:10,fontWeight:800,letterSpacing:0.4,
              background:'rgba(139,92,246,0.15)',color:'#8b5cf6',display:'flex',alignItems:'center',gap:4}}>
              <ModeGlyph kind="swirl" size={11} color="#8b5cf6"/><span>{t('modeChaos')}</span>
              {chaosItem&&<span style={{width:5,height:5,borderRadius:'50%',background:'#8b5cf6',animation:'piece-pulse 1.4s ease-in-out infinite'}}/>}
            </div>
          )}
          {dropMode&&(
            <div style={{padding:'3px 9px',borderRadius:10,fontSize:10,fontWeight:800,letterSpacing:0.4,
              background:'rgba(236,72,153,0.15)',color:'#ec4899',display:'flex',alignItems:'center',gap:4}}>
              <ModeGlyph kind="burst" size={11} color="#ec4899"/><span>{t('randomDrop')}</span>
            </div>
          )}
          {hammerMode&&(
            <div style={{padding:'3px 9px',borderRadius:10,fontSize:10,fontWeight:800,letterSpacing:0.4,
              background:'rgba(245,158,11,0.15)',color:'#d97706',display:'flex',alignItems:'center',gap:4}}>
              <ModeGlyph kind="hammer" size={12}/><span>{t('hammerMode')}</span>
            </div>
          )}
        </div>
      )}

      {/* Score cards */}
      <div style={{display:'flex',gap:8,marginBottom:10,width:'100%',maxWidth:360}}>
        {['A','B'].map(p=>{
          const active=turn===p&&!winner;
          return(
            <div key={p} style={{flex:1,padding:'8px 12px',borderRadius:12,
              background:active?PC[p]:'var(--score-bg)',
              border:`1.5px solid ${active?PC[p]:'var(--score-border)'}`,
              boxShadow:active?`0 3px 12px ${PC[p]}35`:'var(--shadow-soft)',
              transition:'all 0.2s',display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:12,height:12,borderRadius:'50%',flexShrink:0,
                background:active?'rgba(255,255,255,0.9)':PC[p],
                border:active?`2px solid rgba(255,255,255,0.5)`:`2px solid ${PD[p]}`}}/>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:active?'rgba(255,255,255,0.75)':'var(--subtle)'}}>{pname(p)}</div>
                <div style={{fontSize:12,fontWeight:700,color:active?'white':'var(--text)'}}>{barrLeft[p]} {t('walls')}</div>
              </div>
              {gameTimeMode&&gameTimeMode.indexOf('classic-')===0&&(
                <div style={{marginLeft:'auto',fontSize:13,fontWeight:800,letterSpacing:0.5,
                  fontVariantNumeric:'tabular-nums',
                  color:active?'white':(timeLeft[p]<=30?'#ef4444':'var(--text)')}}>
                  {Math.floor(timeLeft[p]/60)}:{(timeLeft[p]%60).toString().padStart(2,'0')}
                </div>
              )}
              {active&&!winner&&!(gameTimeMode&&gameTimeMode.indexOf('classic-')===0)&&(
                <div style={{marginLeft:'auto',fontSize:9,letterSpacing:0.5,
                  color:'rgba(255,255,255,0.75)',fontWeight:600}}>
                  {isOnlineWait&&p===turn?t('statusWait'):aiThinking&&p==='B'?t('statusThink'):t('statusTurn')}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {flash&&<div style={{color:'#ef4444',fontSize:11,marginBottom:4,fontWeight:500}}>{flash}</div>}

      <div style={{fontSize:9,letterSpacing:3,color:'#16a34a',fontWeight:700,textTransform:'uppercase',marginBottom:2}}>{t('goalLabel')}</div>

      {/* Grid */}
      <div ref={gridRef} style={{position:'relative',width:COLS*CELL,height:ROWS*CELL,touchAction:'auto',...sGrid}}>
        {Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},(_,c)=>{
          const isA=pA.r===r&&pA.c===c,isB=pB.r===r&&pB.c===c;
          const vDot=validDot(r,c);
          const isGoal=r===0,isStart=r===ROWS-1;
          let bg=(r+c)%2===0?'var(--cell-b)':'var(--cell-a)';
          if(isGoal)bg='var(--goal)';if(isStart)bg='var(--start)';
          return(
            <div key={`${r}-${c}`} data-r={r} data-c={c} onClick={()=>handleCellClick(r,c)}
              style={{position:'absolute',left:c*CELL,top:r*CELL,width:CELL,height:CELL,
                background:bg,border:'1px solid var(--cell-line)',
                display:'flex',alignItems:'center',justifyContent:'center',
                cursor:vDot&&!dragging?'pointer':'default',boxSizing:'border-box'}}>
              {isGoal&&<div style={{position:'absolute',top:0,left:0,right:0,height:3,background:'linear-gradient(90deg,#16a34a,#22c55e)',pointerEvents:'none'}}/>}
              {isStart&&<div style={{position:'absolute',bottom:0,left:0,right:0,height:2,background:'var(--border)',pointerEvents:'none'}}/>}
              {vDot&&!isA&&!isB&&<div style={{width:10,height:10,borderRadius:'50%',background:color,opacity:0.32,pointerEvents:'none'}}/>}
            </div>
          );
        }))}
        {[...walls].map(k=><Wall key={k} wkey={k} color={darkMode?'#e2e8f0':'#1e293b'} opacity={1} animate golden={goldenWalls.has(k)} steel={isSteelWall(k)}/>)}
        {previewKey&&<Wall wkey={previewKey} color={previewValid?'#f59e0b':'#ef4444'} opacity={0.6}/>}
        {breakingWall&&<BreakingWall wkey={breakingWall} dark={darkMode}/>}
        {hammerDrag&&hammerTarget&&<Wall wkey={hammerTarget} color={'#f59e0b'} opacity={0.9}/>}
        {chaosItem&&(
          <div style={{position:'absolute',left:chaosItem.c*CELL,top:chaosItem.r*CELL,
            width:CELL,height:CELL,display:'flex',alignItems:'center',justifyContent:'center',
            pointerEvents:'none',zIndex:15}}>
            <div style={{animation:'hammer-float 2.6s ease-in-out infinite'}}>
              <div style={{animation:'hammer-shine 2s ease-in-out infinite'}}><CrateIcon size={Math.round(CELL*0.72)}/></div>
            </div>
          </div>
        )}
        {hammers.map(h=>(
          <div key={h.id} style={{position:'absolute',left:h.c*CELL,top:h.r*CELL,width:CELL,height:CELL,
            display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none',zIndex:15}}>
            <div style={{animation:'hammer-float 2.4s ease-in-out infinite'}}>
              <div style={{animation:'hammer-shine 2s ease-in-out infinite'}}><HammerIcon size={Math.round(CELL*0.72)}/></div>
            </div>
          </div>
        ))}
        {collecting.map(h=>(
          <div key={'col'+h.id} style={{position:'absolute',left:h.c*CELL,top:h.r*CELL,width:CELL,height:CELL,
            display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none',zIndex:18}}>
            <div style={{animation:'item-collect 0.6s ease-out forwards'}}><HammerIcon size={Math.round(CELL*0.72)}/></div>
          </div>
        ))}
        {['A','B'].map(p=>{
          const pos=p==='A'?pA:pB;const sz=30,off=(CELL-sz)/2;
          const isActive=turn===p&&!winner;
          return(
            <div key={p} style={{position:'absolute',left:pos.c*CELL+off,top:pos.r*CELL+off,
              width:sz,height:sz,
              transition:'left 0.18s cubic-bezier(0.25,0.46,0.45,0.94),top 0.18s cubic-bezier(0.25,0.46,0.45,0.94)',
              zIndex:20,pointerEvents:'none'}}>
              {isActive&&<div style={{position:'absolute',inset:-2,borderRadius:'50%',
                background:PC[p],animation:'piece-pulse 1.6s ease-in-out infinite'}}/>}
              <Piece color={PC[p]} dark={PD[p]}/>
            </div>
          );
        })}
      </div>

      <div style={{fontSize:9,letterSpacing:3,color:'var(--subtle)',fontWeight:600,textTransform:'uppercase',marginTop:2}}>{t('startLabel')}</div>

      {!winner&&gameTimeMode&&((gameTimeMode.indexOf('classic-')===0&&turnTimeLeft<=30)||gameTimeMode.indexOf('blitz-')===0)&&(
        <div style={{position:'fixed',top:'calc(env(safe-area-inset-top) + 14px)',right:64,zIndex:51,pointerEvents:'none'}}>
          <div style={{background:'rgba(239,68,68,0.45)',color:'white',padding:'4px 10px',borderRadius:12,fontSize:11,fontWeight:800,letterSpacing:0.5,backdropFilter:'blur(6px)',display:'flex',alignItems:'center',gap:5}}>
            <ModeGlyph kind="clock" size={11} color="#ffffff"/>
            <span style={{fontVariantNumeric:'tabular-nums'}}>{turnTimeLeft}s</span>
          </div>
        </div>
      )}

      {(isOnlineWait||oppCountdown!==null)&&(
        <div style={{position:'fixed',bottom:80,left:0,right:0,display:'flex',justifyContent:'center',zIndex:50,pointerEvents:'none'}}>
          <div style={{background:oppCountdown!==null?'rgba(239,68,68,0.92)':'rgba(15,23,42,0.75)',color:'white',padding:'8px 20px',borderRadius:20,fontSize:12,fontWeight:600,backdropFilter:'blur(8px)',display:'flex',alignItems:'center',gap:8}}>
            {oppCountdown!==null?(<>
              <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'white',animation:'piece-pulse 1s ease-in-out infinite'}}/>
              {t('reconnecting')} · {oppCountdown}s
            </>):t('opponentTurn')}
          </div>
        </div>
      )}

      {celebrating&&winner&&(
        <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
          zIndex:500,pointerEvents:'none',background:'rgba(0,0,0,0.15)'}}>
          <div style={{animation:'person-grow 0.3s ease-out both'}}>
            <WinnerPerson color={PC[winner]} dark={PD[winner]} speed={danceSpeed} dance={danceStyle}/>
          </div>
        </div>
      )}

      {winner&&!celebrating&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.45)',
          display:'flex',alignItems:'center',justifyContent:'center',zIndex:500}}
          onClick={()=>setScreen('end')}>
          {!isOwnLoss(winner)&&<Confetti color={PC[winner]}/>}
          <div style={{background:'var(--card)',borderRadius:22,padding:'32px 44px',textAlign:'center',
            boxShadow:'0 24px 64px rgba(0,0,0,0.25)',zIndex:9999,position:'relative'}}>
            <div style={{marginBottom:10,display:'flex',justifyContent:'center',animation:'trophy-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both'}}>{isOwnLoss(winner)?<SadIcon size={48}/>:<TrophyIcon size={48}/>}</div>
            <div style={{fontSize:22,fontWeight:900,color:PC[winner],letterSpacing:-0.5}}>{pname(winner)} {t('wins')}</div>
            <div style={{fontSize:11,color:'var(--subtle)',marginTop:10,fontWeight:500}}>{t('tapContinue')}</div>
          </div>
        </div>
      )}

      {/* Floating barricade chips */}
      {!winner&&myTurn&&!isOnlineWait&&(
        <div style={{position:'fixed',bottom:'calc(16px + env(safe-area-inset-bottom, 0px))',left:0,right:0,zIndex:200,
          display:'flex',justifyContent:'center',alignItems:'flex-end',gap:12,pointerEvents:'none'}}>
          <div style={{position:'absolute',bottom:'100%',marginBottom:5,
            fontSize:9,color:'var(--muted)',fontWeight:600,letterSpacing:1,
            background:darkMode?'rgba(20,30,50,0.7)':'rgba(255,255,255,0.72)',backdropFilter:'blur(8px)',
            padding:'2px 10px',borderRadius:20,border:`1px solid ${darkMode?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)'}`}}>
            {barrLeft[turn]} {t('wallsLeft')}
          </div>
          {[['H'],['V']].map(([orient])=>(
            <div key={orient}
              onMouseDown={e=>startDrag(e,orient)}
              onTouchStart={e=>startDrag(e,orient)}
              style={{pointerEvents:'all',
                width:orient==='H'?84:42,height:orient==='V'?54:42,
                display:'flex',alignItems:'center',justifyContent:'center',
                cursor:canDrag?'grab':'not-allowed',touchAction:'none',
                borderRadius:12,background:darkMode?'rgba(30,41,68,0.7)':'rgba(255,255,255,0.7)',
                backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',
                border:`1px solid ${darkMode?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.85)'}`,
                boxShadow:'0 4px 14px rgba(0,0,0,0.1)',opacity:canDrag?1:0.35}}>
              <div style={{width:orient==='H'?58:WW,height:orient==='V'?28:WW,
                background:canDrag?(darkMode?'#e2e8f0':'#1e293b'):(darkMode?'#475569':'#aaa'),borderRadius:3,pointerEvents:'none'}}/>
            </div>
          ))}
        </div>
      )}

      {/* Hammer-Slot unten rechts (wenn man einen Hammer hält) */}
      {!winner&&!isOnlineWait&&hammerMode&&meRole===turn&&hammerHeld[meRole]&&(
        <div onMouseDown={startHammerDrag} onTouchStart={startHammerDrag}
          style={{position:'fixed',right:'calc(16px + env(safe-area-inset-right, 0px))',
            bottom:'calc(78px + env(safe-area-inset-bottom, 0px))',zIndex:210,
            width:60,height:60,borderRadius:16,touchAction:'none',cursor:'grab',
            display:'flex',alignItems:'center',justifyContent:'center',
            background:darkMode?'rgba(30,41,68,0.82)':'rgba(255,255,255,0.88)',
            backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',
            border:'1.5px solid #f59e0b',opacity:hammerDrag?0.4:1,
            boxShadow:'0 4px 16px rgba(245,158,11,0.4)',
            animation:hammerDrag?'none':'hammer-shine 1.8s ease-in-out infinite'}}>
          <HammerIcon size={34}/>
          <div style={{position:'absolute',bottom:-16,left:-10,right:-10,textAlign:'center',
            fontSize:8,fontWeight:700,color:'var(--muted)',letterSpacing:0.2,whiteSpace:'nowrap'}}>{t('hammerHint')}</div>
        </div>
      )}

      {/* Emote-Anzeigen (beide Spieler) - eigener links unten, Gegner rechts unten */}
      {['A','B'].map(p=>{
        const em=emotes[p];
        if(!em)return null;
        const myRole=gameMode==='online'?onlineRole:(gameMode==='pvc'?'A':null);
        const isMine=myRole?p===myRole:false;
        const posStyle=isMine
          ?{left:14,bottom:74}
          :myRole?{right:14,bottom:74}:{left:p==='A'?14:96,bottom:74};
        return(
          <div key={`emote-${p}-${em.id}`} style={{
            position:'fixed',...posStyle,
            zIndex:450,pointerEvents:'none',
            animation:'emote-pop 0.32s cubic-bezier(0.34,1.56,0.64,1) both'}}>
            <EmoteChar color={PC[p]} dark={PD[p]} type={em.type}/>
          </div>
        );
      })}

      {/* Emote-Picker (Clash Royale Style 2x2 mit Charakter-Köpfen) */}
      {emotePicker&&!winner&&(
        <div onClick={()=>setEmotePicker(false)} style={{
          position:'fixed',inset:0,zIndex:480}}>
          <div onClick={e=>e.stopPropagation()} style={{
            position:'fixed',left:14,bottom:74,
            background:darkMode?'rgba(22,30,51,0.96)':'rgba(255,255,255,0.97)',
            borderRadius:18,padding:10,
            display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,
            border:`1.5px solid ${darkMode?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.06)'}`,
            boxShadow:'0 8px 28px rgba(0,0,0,0.25)',
            animation:'picker-pop 0.22s cubic-bezier(0.34,1.56,0.64,1) both',
            transformOrigin:'bottom left'}}>
            {[
              {k:'laugh'},
              {k:'cry'},
              {k:'angry'},
              {k:'confused'}
            ].map(e=>{
              const myRole=gameMode==='online'?onlineRole:(gameMode==='pvc'?'A':turn);
              const c=PC[myRole]||PC.A;
              const d=PD[myRole]||PD.A;
              return(
                <button key={e.k} onClick={()=>triggerEmote(e.k)}
                  disabled={emoteCooldown}
                  style={{
                    width:58,height:58,padding:0,
                    background:darkMode?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.04)',
                    border:'none',borderRadius:12,
                    cursor:emoteCooldown?'not-allowed':'pointer',
                    opacity:emoteCooldown?0.4:1,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    transition:'transform 0.12s',
                    fontFamily:'system-ui,-apple-system,sans-serif'}}>
                  <EmoteHead color={c} dark={d} type={e.k} size={48}/>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Online Game-Chat */}
      {gameMode==='online'&&lobbyId&&(
        <div style={{width:'100%',maxWidth:360,marginTop:24,marginBottom:80}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,paddingLeft:2,paddingRight:2}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <BubbleIcon size={14} color="#8b5cf6"/>
              <span style={{fontSize:10,color:'var(--subtle)',fontWeight:700,letterSpacing:1.5}}>{t('lobbyChat')}</span>
            </div>
            {chatMsgs.length>0&&(
              <div style={{fontSize:10,fontWeight:700,color:'#8b5cf6',
                background:'rgba(139,92,246,0.1)',padding:'2px 8px',borderRadius:10}}>
                {chatMsgs.length}
              </div>
            )}
          </div>

          <div ref={chatScrollRef} style={{
            width:'100%',height:160,overflowY:'auto',overflowX:'hidden',
            borderRadius:12,background:'var(--card)',border:'1.5px solid var(--border)',
            WebkitOverflowScrolling:'touch',
            boxShadow:'inset 0 2px 6px rgba(0,0,0,0.04)',
            boxSizing:'border-box',padding:8}}>
            {chatMsgs.length===0?(
              <div style={{padding:'22px 16px',textAlign:'center'}}>
                <div style={{marginBottom:4,opacity:0.4,display:'flex',justifyContent:'center'}}><BubbleIcon size={24} color="var(--muted)"/></div>
                <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',marginBottom:3}}>{t('noChat')}</div>
                <div style={{fontSize:10,color:'var(--subtle)',fontWeight:500}}>{t('chatHint')}</div>
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {chatMsgs.map((m,i)=>{
                  const mine=m.u===onlineRole;
                  const col=PC[m.u]||'#8b5cf6';
                  return(
                    <div key={i} style={{
                      display:'flex',flexDirection:'column',
                      alignItems:mine?'flex-end':'flex-start'}}>
                      <div style={{fontSize:9,fontWeight:700,color:col,
                        marginBottom:2,paddingLeft:mine?0:4,paddingRight:mine?4:0,letterSpacing:0.5}}>
                        {mine?t('you'):pname(m.u)}
                      </div>
                      <div style={{
                        maxWidth:'82%',padding:'7px 11px',borderRadius:13,
                        background:mine?col:'var(--bg)',
                        color:mine?'white':'var(--text)',
                        border:mine?'none':'1px solid var(--border-soft)',
                        fontSize:12,fontWeight:500,lineHeight:1.35,
                        wordBreak:'break-word',whiteSpace:'pre-wrap',
                        borderBottomRightRadius:mine?4:13,
                        borderBottomLeftRadius:mine?13:4}}>
                        {m.m}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          <div style={{display:'flex',gap:6,marginTop:8}}>
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();sendChat();}}}
              placeholder={t('chatPlaceholder')} maxLength={140}
              style={{flex:1,padding:'10px 12px',borderRadius:10,border:'1.5px solid var(--border)',
                fontSize:13,outline:'none',
                fontFamily:'system-ui,-apple-system,sans-serif',background:'var(--card)',color:'var(--text)',
                boxSizing:'border-box',minWidth:0}}/>
            <button onClick={sendChat} disabled={!chatInput.trim()}
              style={{padding:'10px 16px',background:chatInput.trim()?'#8b5cf6':'var(--border)',
                color:'white',border:'none',borderRadius:10,fontWeight:700,
                cursor:chatInput.trim()?'pointer':'not-allowed',fontSize:13,
                boxShadow:chatInput.trim()?'0 2px 8px rgba(139,92,246,0.3)':'none',
                fontFamily:'system-ui,-apple-system,sans-serif',
                transition:'all 0.15s',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <SendIcon size={16} color="#fff"/>
            </button>
          </div>
        </div>
      )}

      {/* Sprachblase-Button unten links */}
      {!winner&&screen==='game'&&(
        <button onClick={()=>!emoteCooldown&&setEmotePicker(p=>!p)}
          disabled={emoteCooldown}
          style={{
            position:'fixed',left:14,bottom:16,zIndex:200,
            width:48,height:48,borderRadius:'50%',
            background:darkMode?'rgba(30,41,68,0.75)':'rgba(255,255,255,0.78)',
            backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',
            border:`1px solid ${darkMode?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.85)'}`,
            boxShadow:'0 4px 14px rgba(0,0,0,0.12)',
            cursor:emoteCooldown?'not-allowed':'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:22,opacity:emoteCooldown?0.45:1,
            animation:emotePicker?'none':'bubble-pulse 2.5s ease-in-out infinite',
            fontFamily:'system-ui,-apple-system,sans-serif'}}>
          <BubbleIcon size={24} color={darkMode?'#c4b5fd':'#8b5cf6'}/>
        </button>
      )}
    </div>
  );
}

const DANCES={
  robot:{body:'dance-robot',handL:'robot-hand-l',handR:'robot-hand-r',head:'robot-head',belly:null,legL:null,legR:null,slow:1.7,fast:1.1,ease:'cubic-bezier(0.65,0,0.35,1)'},
  twerk:{body:'dance-twerk',handL:'twerk-hand-l',handR:'twerk-hand-r',head:'twerk-head',belly:'twerk-belly',legL:'twerk-leg-l',legR:'twerk-leg-r',slow:0.5,fast:0.32,ease:'ease-in-out'}
};

// Gesichts-Content für ein bestimmtes Emote — wird in Kopf eingebettet
function EmoteFace({type,dark,animate}){
  if(type==='laugh')return(
    <g>
      {/* Lachende zusammengekniffene Augen ^^ — dicker, expressiver */}
      <path d="M 18 22 Q 24 14 30 22" stroke="white" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
      <path d="M 34 22 Q 40 14 46 22" stroke="white" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
      {/* Wangen-Röte (rot vor Lachen) */}
      <ellipse cx="16" cy="28" rx="3.5" ry="2.5" fill="#fbb6ce" opacity="0.7"/>
      <ellipse cx="48" cy="28" rx="3.5" ry="2.5" fill="#fbb6ce" opacity="0.7"/>
      {/* Riesiger offener lachender Mund */}
      <path d="M 16 28 Q 32 44 48 28 Q 32 42 16 28 Z" fill="white" stroke={dark} strokeWidth="1"/>
      {/* Zunge */}
      <ellipse cx="32" cy="36" rx="6" ry="3" fill="#f87171"/>
      <path d="M 32 33 L 32 38" stroke="#dc2626" strokeWidth="0.8" opacity="0.6"/>
      {/* Lach-Tränen aus den Augen */}
      {animate&&<>
        <circle cx="14" cy="24" r="1.8" fill="#7dd3fc" style={{animation:'laugh-tear 0.9s ease-in 0s infinite'}}/>
        <circle cx="50" cy="24" r="1.8" fill="#7dd3fc" style={{animation:'laugh-tear 0.9s ease-in 0.4s infinite'}}/>
      </>}
    </g>
  );
  if(type==='cry')return(
    <g>
      {/* Augenbrauen stark runter - traurig zusammengezogen */}
      <path d="M 14 14 Q 20 11 28 18" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      <path d="M 50 14 Q 44 11 36 18" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      {/* Zusammengekniffene Augen die viele Tränen produzieren */}
      <path d="M 16 24 Q 22 19 28 24" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      <path d="M 36 24 Q 42 19 48 24" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
      {/* Tränen-Wasserfälle */}
      {animate&&<>
        <ellipse cx="20" cy="27" rx="2.5" ry="3" fill="#7dd3fc" style={{['--tx']:'-2px',animation:'tear-spurt 0.7s ease-in 0s infinite'}}/>
        <ellipse cx="44" cy="27" rx="2.5" ry="3" fill="#7dd3fc" style={{['--tx']:'2px',animation:'tear-spurt 0.7s ease-in 0.15s infinite'}}/>
        <ellipse cx="18" cy="27" rx="2" ry="2.5" fill="#7dd3fc" style={{['--tx']:'-3px',animation:'tear-spurt 0.7s ease-in 0.35s infinite'}}/>
        <ellipse cx="46" cy="27" rx="2" ry="2.5" fill="#7dd3fc" style={{['--tx']:'3px',animation:'tear-spurt 0.7s ease-in 0.5s infinite'}}/>
      </>}
      {/* Heulender weit offener Mund */}
      <g style={animate?{transformOrigin:'32px 36px',animation:'mouth-wail 0.6s ease-in-out infinite'}:{}}>
        <ellipse cx="32" cy="36" rx="9" ry="6" fill={dark} stroke="white" strokeWidth="1.5"/>
        <ellipse cx="32" cy="37" rx="5" ry="3" fill="#1e1b1b"/>
      </g>
    </g>
  );
  if(type==='angry')return(
    <g>
      {/* Wütende Augenbrauen V-förmig stark runter */}
      <path d="M 12 12 L 28 22" stroke="white" strokeWidth="3" fill="none" strokeLinecap="round"/>
      <path d="M 52 12 L 36 22" stroke="white" strokeWidth="3" fill="none" strokeLinecap="round"/>
      {/* Rote Gesicht-Röte (Wut-Flush) */}
      {animate&&<ellipse cx="32" cy="26" rx="20" ry="8" fill="#fca5a5" opacity="0.55"
        style={{animation:'face-flush 0.6s ease-in-out infinite'}}/>}
      {/* Funkelnde böse Augen mit kleinem Pupillen-Glow */}
      <circle cx="22" cy="24" r="3" fill="white"/>
      <circle cx="22" cy="24" r="1.5" fill={dark}/>

function Confetti({color}){
  const pieces=useMemo(()=>{
    const colors=color?[color,'#f59e0b','#10b981','#8b5cf6','#ec4899','#fbbf24']:['#ef4444','#3b82f6','#f59e0b','#10b981','#8b5cf6','#ec4899'];
    return Array.from({length:90},(_,i)=>({
      left:Math.random()*100,
      delay:Math.random()*0.6,
      dur:2.2+Math.random()*2.2,
      color:colors[i%colors.length],
      size:5+Math.random()*7,
      drift:(Math.random()-0.5)*20
    }));
  },[color]);
  return <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9998,overflow:'hidden'}}>
    {pieces.map((p,i)=>(
      <div key={i} style={{
        position:'absolute',top:-20,left:`${p.left}%`,
        width:p.size,height:p.size*0.55,background:p.color,
        borderRadius:1,
        animation:`confetti-fall ${p.dur}s linear ${p.delay}s forwards`,
        marginLeft:p.drift+'vw'
      }}/>
    ))}
  </div>;
}
