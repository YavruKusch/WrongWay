function FriendsScreen({account,t,darkMode,goBack,onInvite,onSpectate,friendLobbyState,onCancelInvite,pendingInvite,onAcceptInvite,onDeclineInvite,showPresence=true,showInGame=true}){
  const[tab,setTab]=React.useState('list');
  const[friends,setFriends]=React.useState([]);
  const[requests,setRequests]=React.useState([]);
  const[addInput,setAddInput]=React.useState('');
  const[addMsg,setAddMsg]=React.useState({type:'',text:''});
  const[addBusy,setAddBusy]=React.useState(false);
  const[loading,setLoading]=React.useState(true);
  const[searchResults,setSearchResults]=React.useState([]);
  const[searching,setSearching]=React.useState(false);

  // Prefix-Suche ab 2 Zeichen (wie Instagram) — debounced, max 8 Treffer, kein neuer
  // Index noetig (orderByKey ist immer indiziert). Bei exaktem Vollnamen bleibt durch
  // den Präfix-Bereich automatisch nur der eine Treffer übrig.
  React.useEffect(()=>{
    const q=normUser(addInput);
    if(q.length<2||!window.db){setSearchResults([]);setSearching(false);return;}
    let cancelled=false;
    setSearching(true);
    const h=setTimeout(async()=>{
      try{
        const snap=await window.db.ref('ww_usernames').orderByKey().startAt(q).endAt(q+String.fromCharCode(0xf8ff)).limitToFirst(8).once('value');
        const v=snap.val()||{};
        if(!cancelled){
          // Werte sind JSON-Strings (per stoSet geschrieben) -> erst parsen, sonst 0 Treffer
          setSearchResults(Object.keys(v).map(k=>{let r=v[k];if(typeof r==='string'){try{r=JSON.parse(r);}catch(e){r=null;}}return r;}).filter(r=>r&&r.uid&&r.uid!==account.key).map(r=>({key:r.uid,name:r.name||'?'})));
          setSearching(false);
        }
      }catch(e){if(!cancelled){setSearchResults([]);setSearching(false);}}
    },250);
    return()=>{cancelled=true;clearTimeout(h);};
  },[addInput,account.key]);

  React.useEffect(()=>{
    if(!account)return;
    let cancelled=false;
    const load=async()=>{
      const keys=await getFriendKeys(account.key);
      const reqs=await stoGetChildren(FR_KEY(account.key));
      const fps=await Promise.all(keys.map(k=>stoGet(PROFILE_KEY(k)).then(p=>p?Object.assign({},p,{key:k}):null)));
      const presence=await getPresenceMany(keys);
      const reqKeys=Object.keys(reqs);
      const rps=await Promise.all(reqKeys.map(k=>stoGet(PROFILE_KEY(k)).then(p=>p?Object.assign({},p,{key:k,ts:reqs[k].ts}):null)));
      if(!cancelled){
        setFriends(fps.filter(Boolean).map(f=>{
          const pr=presence[f.key]||{status:'offline',lobbyId:null};
          return Object.assign({},f,{status:pr.status,lobbyId:pr.lobbyId});
        }).sort((a,b)=>(a.status==='offline'?1:a.status==='online'?0:-1)-(b.status==='offline'?1:b.status==='online'?0:-1)));
        setRequests(rps.filter(Boolean));
        setLoading(false);
      }
    };
    load();const iv=setInterval(load,30000);
    var reqRef=window.db.ref(FR_KEY(account.key));
    var onReq=function(){load();};
    reqRef.on('value',onReq);
    return()=>{cancelled=true;clearInterval(iv);try{reqRef.off('value',onReq);}catch(e){}};
  },[account]);

  const doAdd=async()=>{
    if(addBusy||!addInput.trim())return;
    setAddBusy(true);setAddMsg({type:'',text:''});
    const res=await sendFriendRequest(account.key,addInput.trim());
    setAddBusy(false);
    if(res.err)setAddMsg({type:'err',text:t(res.err)||res.err});
    else{setAddMsg({type:'ok',text:t('friends_sent')});setAddInput('');setSearchResults([]);}
  };
  const doAddByKey=async(key)=>{
    if(addBusy)return;
    setAddBusy(true);setAddMsg({type:'',text:''});
    const res=await sendFriendRequestByKey(account.key,key);
    setAddBusy(false);
    if(res.err)setAddMsg({type:'err',text:t(res.err)||res.err});

  const[removeArmed,setRemoveArmed]=React.useState(null);

  const dk=darkMode;

  const tabBtn=(key,label)=>(
    <button key={key} onClick={()=>setTab(key)} style={{flex:1,padding:'9px 4px',borderRadius:8,border:'none',cursor:'pointer',

  const rowStyle={display:'flex',alignItems:'center',gap:12,padding:'12px 14px',

              {tab==='requests'&&(requests.length===0

                      style={{flex:1,padding:'12px 14px',borderRadius:10,border:'1.5px solid '+border,

                    <button onClick={doAdd} disabled={addBusy} style={{padding:'12px 16px',borderRadius:10,

                  </div>
                  {normUser(addInput).length>=2&&(
                    <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:6}}>
                      {searching?(
                        <div style={{fontSize:12,color:muted,padding:'8px 0',textAlign:'center'}}>…</div>
                      ):searchResults.length===0?(

                      ):searchResults.map(r=>(

                          <Av prof={{name:r.name}} sz={30}/>
                          <div style={{flex:1,fontSize:13,fontWeight:700,color:text2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</div>
                          <PlusIcon size={14} color={muted}/>
                        </div>
                      ))}
                    </div>
                  )}
                  {addMsg.text&&(
                    <div style={{marginTop:10,padding:'10px 14px',borderRadius:9,fontSize:13,fontWeight:600,textAlign:'center',
                      background:addMsg.type==='ok'?'rgba(22,163,74,0.1)':'rgba(239,68,68,0.1)',

                  )}
                </div>
              )}
            </div>
          )
        }
      </div>
    </div>
  );
}

  paddingTop:'calc(env(safe-area-inset-top) + 12px)',paddingLeft:8,paddingRight:8,paddingBottom:8,
  fontFamily:'system-ui,-apple-system,sans-serif',userSelect:'none',WebkitUserSelect:'none',
  touchAction:'pan-y',overflowY:'auto'};
// Stretch-Helper damit kein weißer Bereich beim Scrollen sichtbar wird
const scrollStretch={minHeight:'calc(100dvh + 1px)',display:'flex',flexDirection:'column',alignItems:'center',width:'100%'};
const sGrid={background:'var(--grid-bg)',borderRadius:14,overflow:'hidden',
  boxShadow:'var(--shadow-card)',border:'1.5px solid var(--border)'};
const sBack={background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--subtle)',
  fontWeight:600,padding:'8px 0',fontFamily:'system-ui,-apple-system,sans-serif',marginTop:8};
const backChevron={position:'fixed',left:'calc(10px + env(safe-area-inset-left, 0px))',top:'calc(env(safe-area-inset-top) + 14px)',zIndex:300,
  height:36,paddingLeft:10,paddingRight:14,borderRadius:18,display:'flex',alignItems:'center',justifyContent:'center',gap:4,
  background:'var(--card)',border:'1.5px solid var(--border)',color:'var(--text)',
  fontSize:13,fontWeight:800,lineHeight:1,cursor:'pointer',
  boxShadow:'0 3px 0 rgba(0,0,0,0.08),0 2px 8px rgba(0,0,0,0.06)',fontFamily:'system-ui,-apple-system,sans-serif'};

// ── 2v2 (Beta) – eigenständige Komponente mit Online-Lobby ──
function TwoVTwo({t,darkMode,onExit,account,onRecordResult}){
  const[wallBarPos]=React.useState(function(){try{return localStorage.getItem('ww_wallbarpos')||'bottom';}catch(e){return 'bottom';}});
  const[sub,setSub]=React.useState('config');
  const[tokens,setTokens]=React.useState({A1:{r:ROWS2-1,c:3},A2:{r:ROWS2-1,c:5},B1:{r:0,c:3},B2:{r:0,c:5}});
  const[walls,setWalls]=React.useState(new Set());
  const[barr,setBarr]=React.useState({A:BARR2,B:BARR2});
  const[turn,setTurn]=React.useState('A1');
  const[winner,setWinner]=React.useState(null);
  const[flash,setFlash]=React.useState('');
  const[dragging,setDragging]=React.useState(null);
  const[ghostPos,setGhostPos]=React.useState({x:0,y:0});
  const[previewKey,setPreviewKey]=React.useState(null);
  const[previewValid,setPreviewValid]=React.useState(true);
  const[snapPos,setSnapPos]=React.useState(null);
  const[celebrating,setCelebrating]=React.useState(false);
  const[danceStyle,setDanceStyle]=React.useState('robot');
  const[danceSpeed,setDanceSpeed]=React.useState('slow');
  // Online-State
  const[isOnline,setIsOnline]=React.useState(false);
  const[isHost,setIsHost]=React.useState(false);
  const[lobbyCode,setLobbyCode]=React.useState('');
  const[joinInput,setJoinInput]=React.useState('');
  const[joinError,setJoinError]=React.useState('');
  const[lobbyPlayers,setLobbyPlayers]=React.useState({});
  const[myToken,setMyToken]=React.useState(null);
  const[playerMap,setPlayerMap]=React.useState({});
  const[codeFlash,setCodeFlash]=React.useState(false);
  const[lobbyLoading,setLobbyLoading]=React.useState(false);
  const[reached,setReached]=React.useState({A1:false,A2:false,B1:false,B2:false});
  const[openLobbies,setOpenLobbies]=React.useState([]);
  const[listLoading,setListLoading]=React.useState(false);
  const[hostUid,setHostUid]=React.useState(null);
  const[votes,setVotes]=React.useState({});
  const[startTeam,setStartTeam]=React.useState('A');
  // WS-2v2: Server-autoritativer Online-Modus (Firebase bleibt als ?ws=0-Fallback)
  const useWS=WS_ENABLED;
  const[removed,setRemoved]=React.useState({A1:false,A2:false,B1:false,B2:false});
  const[dcMap,setDcMap]=React.useState({});
  const[wsPresent,setWsPresent]=React.useState(4);
  const[wsNames,setWsNames]=React.useState({});
  const[wsYouKey,setWsYouKey]=React.useState(null);
  const[winReason,setWinReason]=React.useState(null);
  const[tickSec,setTickSec]=React.useState(0);
  const[removedMeReason,setRemovedMeReason]=React.useState(null);
  const[showRules,setShowRules]=React.useState(false);
  const wsMsgRef=React.useRef(null);
  const wsTrampRef=React.useRef(null);
  if(!wsTrampRef.current){wsTrampRef.current=function(d){if(wsMsgRef.current)wsMsgRef.current(d);};}
  const wsLastSlotRef=React.useRef({A:null,B:null});
  const wsTurnEndsRef=React.useRef(0);
  const wsActiveRef=React.useRef(false);

  const myUidRef=React.useRef(null);
  if(!myUidRef.current){
    try{let u=localStorage.getItem('ww_uid');if(!u){u='P'+Math.random().toString(36).slice(2,6).toUpperCase();localStorage.setItem('ww_uid',u);}myUidRef.current=u;}
    catch(e){myUidRef.current='P'+Math.random().toString(36).slice(2,6).toUpperCase();}
  }
  const uid=myUidRef.current;
  const gridRef=React.useRef(null);
  const snapPosRef=React.useRef(null);
  const St=React.useRef({});
  St.current={tokens,walls,barr,turn,winner,isOnline,myToken,lobbyCode,isHost,playerMap,reached,removed,sub,lobbyPlayers,wsYouKey,removedMeReason};
  React.useEffect(()=>{snapPosRef.current=snapPos;},[snapPos]);

  const lKey=c=>'barricade_2v2_lobby_'+c;
  const gKey=c=>'barricade_2v2_game_'+c;

  const myTeam=myToken?TEAM_2V2(myToken):null;
  // Perspektive: Team B startet oben -> Brett vertikal spiegeln, damit B sich (wie 1v1-Race) unten sieht.
  const boardFlip=isOnline&&myTeam==='B';
  const team=TEAM_2V2(turn);
  const cur=tokens[turn];
  const others=ORDER_2V2.filter(id=>id!==turn&&tokens[id]&&!removed[id]).map(id=>tokens[id]);
  const myTurnNow=!winner&&sub==='game'&&!removedMeReason&&(!isOnline||turn===myToken);
  const noMovesNow=myTurnNow&&!reached[turn]&&!!cur&&validMoves2(cur,others,walls,ROWS2,COLS2).length===0;
  const canPlace=myTurnNow&&barr[isOnline?(myTeam||team):team]>0;
  const teamName=tm=>tm==='A'?t('red'):t('blue');
  const sz=Math.round(CELL2*0.66),off=(CELL2-sz)/2;

  const triggerWin=tm=>{
    playSound('win');setWinner(tm);
    if(St.current.isOnline&&myToken&&onRecordResult){
      const myTeamNow=TEAM_2V2(myToken);
      onRecordResult(tm===myTeamNow);
    }
    setDanceStyle(Math.random()<0.5?'robot':'twerk');
    setDanceSpeed(Math.random()<0.5?'fast':'slow');
    setTimeout(()=>playSound('laugh'),350);
    setCelebrating(true);setTimeout(()=>setCelebrating(false),2200);
  };

  const doSync2v2=update=>{
    if(useWS)return; // WS-Modus: der Server ist die Wahrheit, kein Firebase-Schreiben
    const{lobbyCode:lc,isOnline:io,playerMap:pm,reached:rc}=St.current;
    if(!io||!lc)return;
    stoSet(gKey(lc),{tokens:update.tokens,walls:[...update.walls],barr:update.barr,turn:update.turn,winner:update.winner||null,reached:update.reached||rc,players:pm,lastUpdated:Date.now()});
  };

  // WS: Spieler-Meta (Name/Account-Key) fuer Lobby-Anzeige
  const wsMeta=()=>({name:(account&&account.name)?account.name:('Gast-'+uid),akey:(account&&account.key)?account.key:null});
  // WS: naechster am Zug lokal vorhersagen (gleiche Logik wie Server) fuer fluessiges UI
  const tv2NextLocal=(curTurn,rem)=>{
    const oth=curTurn.charAt(0)==='A'?'B':'A';
    const ids=oth==='A'?['A1','A2']:['B1','B2'];
    const list=ids.filter(function(s){return !rem[s];});
    if(list.length===0)return curTurn;
    if(list.length===1)return list[0];
    const last=wsLastSlotRef.current[oth];
    return (last===list[0])?list[1]:list[0];
  };
  // WS: kompletter Reset der Spiel-/Lobby-States vor neuem Erstellen/Beitreten
  const wsResetStates=()=>{
    setWinner(null);setWinReason(null);setCelebrating(false);setFlash('');
    setReached({A1:false,A2:false,B1:false,B2:false});
    setRemoved({A1:false,A2:false,B1:false,B2:false});
    setDcMap({});setVotes({});setRemovedMeReason(null);setMyToken(null);
    wsLastSlotRef.current={A:null,B:null};wsTurnEndsRef.current=0;
  };

  // ── Online: Lobby erstellen ──
  const createLobby=async()=>{
    if(useWS){
      setLobbyLoading(true);setJoinError('');wsResetStates();
      setIsOnline(true);wsActiveRef.current=true;
      WSNET.openLobby(randId(4),{mode:'2v2'},wsMeta(),wsTrampRef.current);
      return;
    }
    setLobbyLoading(true);setJoinError('');
    setWinner(null);setCelebrating(false);setReached({A1:false,A2:false,B1:false,B2:false});setFlash('');
    const code=randId(4);
    const lobby={host:uid,players:{[uid]:{team:'A',name:uid,joinedAt:Date.now()}},status:'waiting',lastUpdated:Date.now()};
    const ok=await stoSet(lKey(code),lobby);
    setLobbyLoading(false);
    if(!ok){setJoinError('Firebase-Fehler – Verbindung prüfen');return;}
    lobbyIndexSet2(code,{count:1,updated:Date.now()});
    setLobbyCode(code);setIsHost(true);setIsOnline(true);setLobbyPlayers(lobby.players);
    setSub('lobby');
  };

  // ── Online: Lobby beitreten (per Code-Eingabe) ──
  const joinLobby=async()=>{
    const code=joinInput.trim().toUpperCase();
    if(!/^[A-Z0-9]{4}$/.test(code)){setJoinError('Ungültiger Code (4 Zeichen)');return;}
    joinByCode(code);
  };
  // ── Online: Lobby beitreten (per Code, von Liste oder Eingabe) ──
  const joinByCode=async(code)=>{
    if(useWS){
      setJoinError('');setLobbyLoading(true);wsResetStates();
      setIsOnline(true);wsActiveRef.current=true;
      WSNET.joinRoom(code,wsMeta(),wsTrampRef.current);
      return;
    }
    setJoinError('');setLobbyLoading(true);
    setWinner(null);setCelebrating(false);setReached({A1:false,A2:false,B1:false,B2:false});setFlash('');
    const data=await stoGet(lKey(code));
    setLobbyLoading(false);
    if(!data){setJoinError('Lobby nicht gefunden');lobbyIndexDel2(code);return;}
    if(data.status!=='waiting'){setJoinError('Lobby bereits gestartet');return;}
    const ps=data.players||{};
    const pCount=Object.keys(ps).length;
    if(pCount>=4&&!ps[uid]){setJoinError(t('lobbyFull4'));return;}
    const aCount=Object.values(ps).filter(p=>p.team==='A').length;
    const bCount=Object.values(ps).filter(p=>p.team==='B').length;
    const initTeam=aCount<=bCount?'A':'B';
    const newPs={...ps,[uid]:{team:initTeam,name:uid,joinedAt:Date.now()}};
    const updated={...data,players:newPs,lastUpdated:Date.now()};
    await stoSet(lKey(code),updated);
    lobbyIndexSet2(code,{count:Object.keys(newPs).length,updated:Date.now()});
    setLobbyCode(code);setIsHost(data.host===uid);setIsOnline(true);setLobbyPlayers(updated.players);
    setSub('lobby');
  };

  // ── Online: Team wechseln (frei – Start nur bei 2+2) ──
  const switchTeam=async()=>{
    if(useWS){
      const lp=St.current.lobbyPlayers||{};
      const me=St.current.wsYouKey?lp[St.current.wsYouKey]:null;
      const nt=(me&&me.team==='A')?'B':'A';
      try{WSNET._send({type:'tv2_team',team:nt});}catch(e){}
      return;
    }
    const lc=St.current.lobbyCode;
    const data=await stoGet(lKey(lc));
    if(!data||!data.players)return;
    const myP=data.players[uid];if(!myP)return;
    const newTeam=myP.team==='A'?'B':'A';
    stoSet(lKey(lc),{...data,players:{...data.players,[uid]:{...myP,team:newTeam}},lastUpdated:Date.now()});
    lobbyIndexSet2(lc,{count:Object.keys(data.players).length,updated:Date.now()});
  };

  // ── Online: Lobby verlassen (Host wird ggf. übergeben) ──
  const leaveLobby=async()=>{
    if(useWS){
      wsActiveRef.current=false;
      try{WSNET.leaveRoom();}catch(e){}
      wsResetStates();
      setIsOnline(false);setIsHost(false);setLobbyCode('');setLobbyPlayers({});setPlayerMap({});setHostUid(null);setWsYouKey(null);
      setSub('config');
      return;
    }
    const lc=St.current.lobbyCode;
    const data=await stoGet(lKey(lc));
    if(data&&data.players){
      const ps={...data.players};delete ps[uid];
      const remaining=Object.keys(ps);
      if(remaining.length===0){
        await stoDel(lKey(lc));lobbyIndexDel2(lc);
      }else{
        let newHost=data.host;
        if(data.host===uid)newHost=remaining.sort((a,b)=>ps[a].joinedAt-ps[b].joinedAt)[0];
        await stoSet(lKey(lc),{...data,host:newHost,players:ps,lastUpdated:Date.now()});
        lobbyIndexSet2(lc,{count:remaining.length,updated:Date.now()});
      }
    }
    setIsOnline(false);setIsHost(false);setLobbyCode('');setLobbyPlayers({});setMyToken(null);setPlayerMap({});setHostUid(null);
    setSub('config');
  };

  // ── Online: Spiel starten (Host) ──
  const startOnlineGame=async()=>{
    if(useWS){try{WSNET._send({type:'tv2_start'});}catch(e){}return;}
    const lc=St.current.lobbyCode;
    const data=await stoGet(lKey(lc));if(!data)return;
    const ps=data.players||{};
    const aP=Object.entries(ps).filter(function(e){return e[1].team==='A';}).sort(function(a,b){return a[1].joinedAt-b[1].joinedAt;});
    const bP=Object.entries(ps).filter(function(e){return e[1].team==='B';}).sort(function(a,b){return a[1].joinedAt-b[1].joinedAt;});
    if(aP.length!==2||bP.length!==2){setFlash('Genau 2 pro Team nötig!');setTimeout(()=>setFlash(''),3000);return;}
    const pm={};pm[aP[0][0]]='A1';pm[aP[1][0]]='A2';pm[bP[0][0]]='B1';pm[bP[1][0]]='B2';
    const sTeam=Math.random()<0.5?'A':'B';
    const startToken=sTeam+'1';
    const initTok={A1:{r:ROWS2-1,c:3},A2:{r:ROWS2-1,c:5},B1:{r:0,c:3},B2:{r:0,c:5}};
    const gs={tokens:initTok,walls:[],barr:{A:BARR2,B:BARR2},turn:startToken,winner:null,reached:{A1:false,A2:false,B1:false,B2:false},players:pm,startTeam:sTeam,votes:{},lastUpdated:Date.now()};
    await stoSet(gKey(lc),gs);
    stoSet(lKey(lc),{...data,status:'playing',playerMap:pm,lastUpdated:Date.now()});
    lobbyIndexDel2(lc);
  };

  // ── Online: Revanche-Neustart (vom Leader=A1-Spieler) – anderes Team beginnt ──
  const restartOnline=async(gs)=>{
    const lc=St.current.lobbyCode;
    const newStart=gs.startTeam==='A'?'B':'A';
    const initTok={A1:{r:ROWS2-1,c:3},A2:{r:ROWS2-1,c:5},B1:{r:0,c:3},B2:{r:0,c:5}};
    const ng={tokens:initTok,walls:[],barr:{A:BARR2,B:BARR2},turn:newStart+'1',winner:null,reached:{A1:false,A2:false,B1:false,B2:false},players:gs.players,startTeam:newStart,votes:{},lastUpdated:Date.now()};
    await stoSet(gKey(lc),ng);
  };

  // ── Endscreen: Revanche wählen (Stimme abgeben) ──
  const voteRematch=async()=>{
    if(useWS){try{WSNET._send({type:'tv2_vote'});}catch(e){}return;}
    const lc=St.current.lobbyCode;
    const gs=await stoGet(gKey(lc));if(!gs)return;
    const v={...(gs.votes||{})};v[uid]=true;
    await stoSet(gKey(lc),{...gs,votes:v,lastUpdated:Date.now()});
  };

  // ── Endscreen: zurück zur Lobby ──
  const backToLobbyFromGame=async()=>{
    if(useWS){try{WSNET._send({type:'tv2_to_lobby'});}catch(e){}return;}
    const lc=St.current.lobbyCode;
    const gs=await stoGet(gKey(lc));
    if(gs&&gs.players){const pm={...gs.players};delete pm[uid];const v={...(gs.votes||{})};delete v[uid];
      await stoSet(gKey(lc),{...gs,players:pm,votes:v,lastUpdated:Date.now()});}
    const ld=await stoGet(lKey(lc));
    if(ld){const ps={...(ld.players||{})};if(!ps[uid])ps[uid]={team:'A',name:uid,joinedAt:Date.now()};
      await stoSet(lKey(lc),{...ld,status:'waiting',players:ps,lastUpdated:Date.now()});
      lobbyIndexSet2(lc,{count:Object.keys(ps).length,updated:Date.now()});}
    setWinner(null);setCelebrating(false);setMyToken(null);setVotes({});setSub('lobby');
  };

  // ── Endscreen: zum Hauptmenü (verlässt Spiel + Lobby) ──
  const exitFromGame=async()=>{
    if(useWS){
      wsActiveRef.current=false;
      try{WSNET.leaveRoom();}catch(e){}
      onExit();
      return;
    }
    const lc=St.current.lobbyCode;
    if(isOnline){
      const gs=await stoGet(gKey(lc));
      if(gs&&gs.players){const pm={...gs.players};delete pm[uid];const v={...(gs.votes||{})};delete v[uid];
        await stoSet(gKey(lc),{...gs,players:pm,votes:v,lastUpdated:Date.now()});}
      const ld=await stoGet(lKey(lc));
      if(ld&&ld.players){const ps={...ld.players};delete ps[uid];
        if(Object.keys(ps).length===0){await stoDel(lKey(lc));lobbyIndexDel2(lc);}
        else{let nh=ld.host;if(ld.host===uid)nh=Object.keys(ps).sort((a,b)=>ps[a].joinedAt-ps[b].joinedAt)[0];await stoSet(lKey(lc),{...ld,host:nh,players:ps,lastUpdated:Date.now()});lobbyIndexSet2(lc,{count:Object.keys(ps).length,updated:Date.now()});}}
    }
    onExit();
  };

  // ── Lokal: Revanche (anderes Team beginnt) ──
  const rematchLocal=()=>{
    const newStart=startTeam==='A'?'B':'A';setStartTeam(newStart);
    setTokens({A1:{r:ROWS2-1,c:3},A2:{r:ROWS2-1,c:5},B1:{r:0,c:3},B2:{r:0,c:5}});
    setWalls(new Set());setBarr({A:BARR2,B:BARR2});setReached({A1:false,A2:false,B1:false,B2:false});
    setTurn(newStart+'1');setWinner(null);setFlash('');setCelebrating(false);
  };

  // ── Online: offene Lobbys laden ──
  const refreshLobbies=async()=>{
    if(useWS){
      setListLoading(true);
      try{WSNET._send({type:'list_lobbies',mode:'2v2'});}catch(e){}
      return;
    }
    setListLoading(true);
    const list=await lobbyIndexList2();
    setOpenLobbies(list);setListLoading(false);
  };
  React.useEffect(()=>{
    if(sub!=='online')return;
    if(useWS){
      setListLoading(true);
      WSNET.startBrowse(function(list){
        const out=[];const arr=list||[];
        for(let i=0;i<arr.length;i++){if(arr[i].mode==='2v2')out.push({code:arr[i].code,count:arr[i].count||1});}
        setOpenLobbies(out);setListLoading(false);
      },wsTrampRef.current,'2v2');
      return function(){WSNET.stopBrowse();};
    }
    refreshLobbies();
    const iv=setInterval(refreshLobbies,5000);
    return function(){clearInterval(iv);};
  },[sub]);

  // ── Lobby-Listener ──
  React.useEffect(()=>{
    if(useWS)return; // WS-Modus: tv2_lobby-Pushes vom Server, kein Firebase
    if(sub!=='lobby'||!lobbyCode)return;
    const ref=window.db.ref(lKey(lobbyCode));
    const cb=ref.on('value',snap=>{
      const v=snap.val();if(!v)return;
      let data;try{data=JSON.parse(v);}catch(e){return;}
      setLobbyPlayers(data.players||{});
      setHostUid(data.host||null);
      const becameHost=data.host===uid&&!St.current.isHost;
      setIsHost(data.host===uid);
      if(becameHost){setFlash('Du bist jetzt Host');setTimeout(()=>setFlash(''),2500);}
      if(data.status==='playing'&&data.playerMap){
        const tok=data.playerMap[uid];
        if(tok){setMyToken(tok);setPlayerMap(data.playerMap);setSub('game');}
      }
    });
    return function(){ref.off('value',cb);};
  },[sub,lobbyCode]);

  // ── Game-Listener (online) ──
  React.useEffect(()=>{
    if(useWS)return; // WS-Modus: tv2_state-Pushes vom Server, kein Firebase
    if(sub!=='game'||!isOnline||!lobbyCode)return;
    const ref=window.db.ref(gKey(lobbyCode));
    const cb=ref.on('value',snap=>{
      const v=snap.val();if(!v)return;
      let gs;try{gs=JSON.parse(v);}catch(e){return;}
      if(gs.tokens)setTokens(gs.tokens);
      if(gs.walls)setWalls(new Set(gs.walls));
      if(gs.barr)setBarr(gs.barr);
      if(gs.turn)setTurn(gs.turn);
      if(gs.players)setPlayerMap(gs.players);
      if(gs.reached)setReached(gs.reached);
      if(gs.startTeam)setStartTeam(gs.startTeam);
      setVotes(gs.votes||{});
      if(gs.winner&&!St.current.winner)triggerWin(gs.winner);
      else setWinner(gs.winner||null);
      // Leader (A1-Spieler) startet neu, wenn alle 4 anwesenden Spieler Revanche gewählt haben
      if(gs.winner&&gs.players){
        const ids=Object.keys(gs.players);
        const leader=ids.find(u=>gs.players[u]==='A1');
        const allVoted=ids.length===4&&ids.every(u=>gs.votes&&gs.votes[u]);
        if(allVoted&&uid===leader)restartOnline(gs);
      }
    });
    return function(){ref.off('value',cb);};
  },[sub,isOnline,lobbyCode]);

  // ── Bewegen ──
  const moveTo=(r,c)=>{
    if(!myTurnNow||dragging||reached[turn]||!cur)return;
    if(!validMoves2(cur,others,walls,ROWS2,COLS2).some(m=>m.r===r&&m.c===c))return;
    if(isOnline&&useWS){
      // optimistisch: Position + Zugwechsel sofort, reached/Sieg entscheidet der Server (kommt in ms)
      playSound('move');
      const ntw={A1:tokens.A1,A2:tokens.A2,B1:tokens.B1,B2:tokens.B2};
      ntw[turn]={r,c};
      setTokens(ntw);
      const nxw=tv2NextLocal(turn,removed);
      wsLastSlotRef.current[nxw.charAt(0)]=nxw;
      setTurn(nxw);
      try{WSNET.move({r:r,c:c});}catch(e){}
      return;
    }
    playSound('move');
    const nt={A1:tokens.A1,A2:tokens.A2,B1:tokens.B1,B2:tokens.B2};
    nt[turn]={r,c};
    setTokens(nt);
    const nextTurn=NEXT_2V2[turn];
    const newReached={A1:reached.A1,A2:reached.A2,B1:reached.B1,B2:reached.B2};
    if(r===GOAL_2V2[turn]){
      newReached[turn]=true;
      setReached(newReached);
      const tm=TEAM_2V2(turn);
      const teammate=turn==='A1'?'A2':turn==='A2'?'A1':turn==='B1'?'B2':'B1';
      if(newReached[teammate]){
        if(isOnline)doSync2v2({tokens:nt,walls,barr,turn:nextTurn,winner:tm,reached:newReached});
        triggerWin(tm);return;
      }
      setFlash(t('tv2MateWait'));
      setTimeout(()=>setFlash(''),2800);
    }
    setTurn(nextTurn);
    if(isOnline)doSync2v2({tokens:nt,walls,barr,turn:nextTurn,winner:null,reached:newReached});
  };

  const skipTurn=()=>{
    if(!myTurnNow||(!reached[turn]&&!noMovesNow))return;
    if(isOnline&&useWS){
      const nxs=tv2NextLocal(turn,removed);
      wsLastSlotRef.current[nxs.charAt(0)]=nxs;
      setTurn(nxs);setFlash('');
      try{WSNET.skipTurn();}catch(e){}
      return;
    }
    const nextTurn=NEXT_2V2[turn];
    setTurn(nextTurn);setFlash('');
    if(isOnline)doSync2v2({tokens,walls,barr,turn:nextTurn,winner:null,reached});
  };

  const validDot=(r,c)=>myTurnNow&&!dragging&&!reached[turn]&&!!cur&&validMoves2(cur,others,walls,ROWS2,COLS2).some(m=>m.r===r&&m.c===c);

  const startDrag=(e,orient)=>{
    if(!canPlace)return;e.preventDefault();
    const pt=e.touches?e.touches[0]:e;
    setDragging({orient});setGhostPos({x:pt.clientX,y:pt.clientY});
  };

  // ── Drag-Wand ──
  React.useEffect(()=>{
    if(!dragging)return;
    const OFFSET=90;
    const getRel=(x,y)=>{if(!gridRef.current)return null;const rect=gridRef.current.getBoundingClientRect();let rx=x-rect.left,ry=y-rect.top;if(boardFlip)ry=ROWS2*CELL2-ry;return{x:rx,y:ry};};
    const onMove=(x,y)=>{
      setGhostPos({x,y});
      const rect=gridRef.current?gridRef.current.getBoundingClientRect():null;
      const inZone=rect&&y<=rect.bottom+90&&y>=rect.top-20;
      const rel=getRel(x,y-OFFSET);
      if(inZone&&rel&&rel.x>=0&&rel.x<=COLS2*CELL2&&rel.y>=-CELL2&&rel.y<=ROWS2*CELL2+CELL2){
        const key=snapWall2(rel.x,rel.y,dragging.orient,ROWS2,COLS2,CELL2);
        setPreviewKey(key);
        setPreviewValid(quickValidWall2(key,St.current.walls,St.current.tokens,ROWS2,COLS2));
        const wp=wallPos2(key,CELL2);
        const dispTop=boardFlip?(ROWS2*CELL2-wp.top-wp.height):wp.top;
        setSnapPos({x:rect.left+wp.left+wp.width/2,y:rect.top+dispTop+wp.height/2});
      }else{setPreviewKey(null);setSnapPos(null);}
    };
    const onEnd=(x,y)=>{
      if(snapPosRef.current){
        const rel=getRel(x,y-OFFSET);
        if(rel&&rel.x>=0&&rel.x<=COLS2*CELL2&&rel.y>=-CELL2&&rel.y<=ROWS2*CELL2+CELL2){
          const key=snapWall2(rel.x,rel.y,dragging.orient,ROWS2,COLS2,CELL2);
          const{walls:w,tokens:tk,barr:bl,turn:tn,isOnline:io}=St.current;
          const tmm=TEAM_2V2(tn);
          if(bl[tmm]>0){
            const next=tryWall2(key,w,tk,ROWS2,COLS2);
            if(next){
              playSound('wall');
              const nextTurn=(io&&useWS)?tv2NextLocal(tn,St.current.removed||{}):NEXT_2V2[tn];
              if(io&&useWS)wsLastSlotRef.current[nextTurn.charAt(0)]=nextTurn;
              const newBl={A:bl.A,B:bl.B};newBl[tmm]=bl[tmm]-1;
              setWalls(next);setBarr(newBl);setFlash('');setTurn(nextTurn);
              if(io){
                if(useWS){try{WSNET.wall(key);}catch(e){}}
                else doSync2v2({tokens:tk,walls:next,barr:newBl,turn:nextTurn,winner:null,reached:St.current.reached});
              }
            }else setFlash(t('invalidPos'));
          }
        }
      }
      setDragging(null);setPreviewKey(null);setSnapPos(null);
    };
    const mm=e=>onMove(e.clientX,e.clientY);
    const mu=e=>onEnd(e.clientX,e.clientY);
    const tmv=e=>{e.preventDefault();const p=e.touches[0];onMove(p.clientX,p.clientY);};
    const te=e=>{e.preventDefault();const p=e.changedTouches[0];onEnd(p.clientX,p.clientY);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
    document.addEventListener('touchmove',tmv,{passive:false});document.addEventListener('touchend',te);
    return function(){document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);document.removeEventListener('touchmove',tmv);document.removeEventListener('touchend',te);};
  },[dragging]);

  // ── WS-2v2: Server-Nachrichten verarbeiten (Plain-Assignment NACH allen Deklarationen) ──
  const applyTv2State=function(d){
    if(d.tokens)setTokens(d.tokens);
    if(d.walls)setWalls(new Set(d.walls));
    if(d.barr)setBarr(d.barr);
    if(d.turn){setTurn(d.turn);wsLastSlotRef.current[d.turn.charAt(0)]=d.turn;}
    if(d.reached)setReached(d.reached);
    if(d.removed)setRemoved(d.removed);
    if(d.names)setWsNames(d.names);
    if(d.dc)setDcMap(d.dc);
    if(typeof d.present==='number')setWsPresent(d.present);
    if(d.votes)setVotes(d.votes);
    if(typeof d.turnMs==='number')wsTurnEndsRef.current=d.turnMs>0?(Date.now()+d.turnMs):0;
    if(d.skipped&&d.skipped===St.current.myToken){setFlash(t('turnSkipped'));setTimeout(function(){setFlash('');},2200);}
    if(d.removedSlot){
      if(d.removedSlot===St.current.myToken){
        setRemovedMeReason(d.removedReason||'disconnect');
        wsActiveRef.current=false;
      }else{
        const meTok=St.current.myToken;
        const sameTeam=meTok&&d.removedSlot.charAt(0)===meTok.charAt(0);
        setFlash(sameTeam?t('tv2MateGone'):((d.removedName||'?')+' '+t('tv2LeftGame')));
        setTimeout(function(){setFlash('');},3500);
      }
    }
    if(d.winner){
      setWinReason(d.winReason||null);
      if(!St.current.winner)triggerWin(d.winner);
    }else if(d.winner===null&&St.current.winner){setWinner(null);setWinReason(null);}
  };
  wsMsgRef.current=function(d){
    if(!useWS||!d)return;
    if(d.type==='room_created'||d.type==='room_joined'){
      setLobbyCode(d.code);
      if(WSNET.roomId!==d.code)WSNET.roomId=d.code;
      setIsOnline(true);setLobbyLoading(false);setJoinError('');
      return;
    }
    if(d.type==='tv2_lobby'){
      const mp={};let hk=null;
      const arr=d.players||[];
      for(let i=0;i<arr.length;i++){mp['p'+i]={team:arr[i].team,name:arr[i].name,on:arr[i].on!==false};if(arr[i].host)hk='p'+i;}
      setLobbyPlayers(mp);setHostUid(hk);setWsYouKey('p'+d.you);
      const becameHost=!!d.host&&!St.current.isHost&&St.current.sub==='lobby';
      setIsHost(!!d.host);
      if(becameHost){setFlash(t('tv2NowHost'));setTimeout(function(){setFlash('');},2500);}
      setLobbyLoading(false);
      if(St.current.sub!=='lobby'&&(St.current.sub!=='game'||St.current.winner||St.current.removedMeReason)){
        wsResetStates();
        setSub('lobby');
      }
      return;
    }
    if(d.type==='tv2_match'){
      setMyToken(d.slot);
      setWinner(null);setWinReason(null);setCelebrating(false);setVotes({});
      setRemovedMeReason(null);setFlash('');
      wsLastSlotRef.current={A:null,B:null};
      applyTv2State(d);
      setSub('game');
      return;
    }
    if(d.type==='tv2_state'){applyTv2State(d);return;}
    if(d.type==='tv2_resync'){
      if(d.phase==='game'){
        if(d.slot)setMyToken(d.slot);
        setRemovedMeReason(null);
        applyTv2State(d);
        if(St.current.sub!=='game')setSub('game');
      }
      return; // phase 'lobby': der Server schickt direkt danach tv2_lobby
    }
    if(d.type==='error'){
      const g=d.grund||'';
      if(g==='raum nicht gefunden'){setJoinError(t('tv2NotFound'));setLobbyLoading(false);}
      else if(g==='raum voll'){setJoinError(t('lobbyFull4'));setLobbyLoading(false);}
      else if(g==='team voll'){setFlash(t('tv2TeamFull'));setTimeout(function(){setFlash('');},2000);}
      else if(g==='teams unvollstaendig'){setFlash(t('tv2Need22'));setTimeout(function(){setFlash('');},2500);}
      else if(g==='spieler getrennt'){setFlash(t('tv2NotAllOn'));setTimeout(function(){setFlash('');},2500);}
      return;
    }
    if(d.type==='reconnect_failed'){
      if(St.current.sub==='lobby'||St.current.sub==='game'){
        wsActiveRef.current=false;
        try{WSNET.close();}catch(e){}
        wsResetStates();
        setIsOnline(false);setIsHost(false);setLobbyCode('');setLobbyPlayers({});setWsYouKey(null);
        setJoinError(t('tv2ConnLost'));
        setSub('online');
      }
      return;
    }
  };

  // ── WS-2v2: Zug-Countdown-Anzeige (Server skippt autoritativ, hier nur Anzeige) ──
  React.useEffect(()=>{
    if(!useWS||!isOnline||sub!=='game'||winner){setTickSec(0);return;}
    const iv=setInterval(function(){
      const e=wsTurnEndsRef.current;
      if(!e){setTickSec(0);return;}
      const ms=e-Date.now();
      setTickSec(ms>0?Math.ceil(ms/1000):0);
    },250);
    return function(){clearInterval(iv);};
  },[sub,isOnline,winner]);

  // ── WS-2v2: beim Verlassen der Komponente sauber abmelden ──
  React.useEffect(()=>{
    return function(){
      if(!WS_ENABLED)return;
      try{WSNET.stopBrowse();}catch(e){}
      if(wsActiveRef.current){wsActiveRef.current=false;try{WSNET.leaveRoom();}catch(e){}}
    };
  },[]);

  // ── CONFIG ──
  if(sub==='config'){
    return(
      <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 20px)',background:'transparent',position:'relative',zIndex:1}}>
        <MenuBG dark={darkMode}/>
        <button onClick={onExit} style={backChevron}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>{t('tutBack')}</button>
        <div style={{width:'100%',maxWidth:340,position:'relative',zIndex:1}}>
          <div style={{textAlign:'center',marginBottom:18}}>
            <div style={{marginBottom:8,display:'flex',justifyContent:'center'}}>
              <div style={{width:64,height:64,borderRadius:18,
                background:'linear-gradient(140deg,#ef4444 0%,#8b5cf6 50%,#3b82f6 100%)',
                display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:'0 10px 28px rgba(99,102,241,0.3)'}}>
                <PeopleIcon size={32} color="white"/>
              </div>
            </div>
            <div style={{fontSize:24,fontWeight:900,color:'var(--text)',letterSpacing:-0.8}}>2 vs 2</div>
          </div>
          <div style={{background:'var(--card)',borderRadius:16,padding:'14px 16px',border:'1.5px solid var(--border)',marginBottom:16,boxShadow:'var(--shadow-soft)'}}>
            <div style={{display:'flex',justifyContent:'center',marginBottom:10}}>
              <div style={{position:'relative',width:COLS2*9,height:ROWS2*9,borderRadius:8,overflow:'hidden',border:'1px solid var(--border)',background:'var(--grid-bg)'}}>
                <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:'linear-gradient(90deg,#ef4444,#f87171)'}}/>
                <div style={{position:'absolute',bottom:0,left:0,right:0,height:3,background:'linear-gradient(90deg,#3b82f6,#60a5fa)'}}/>
                {[['A1',{r:ROWS2-1,c:3}],['A2',{r:ROWS2-1,c:5}],['B1',{r:0,c:3}],['B2',{r:0,c:5}]].map(function(en){
                  return <div key={en[0]} style={{position:'absolute',left:en[1].c*9+1,top:en[1].r*9+1,width:7,height:7,borderRadius:'50%',background:PC2[en[0]]}}/>;
                })}
              </div>
            </div>
            <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.8,textAlign:'center'}}>
              {t('tv2BoardInfo')}
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <button onClick={()=>setSub('online')} style={{padding:'14px 16px',
              background:'linear-gradient(135deg,#ef4444 0%,#3b82f6 100%)',color:'white',
              border:'none',borderRadius:12,cursor:'pointer',fontWeight:800,fontSize:14,
              fontFamily:'system-ui,-apple-system,sans-serif',
              boxShadow:'0 2px 12px rgba(99,102,241,0.3)',
              display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              <GlobeIcon size={16}/>{t('onlineLobby4')}
            </button>
            <button onClick={()=>{
              setIsOnline(false);setTokens({A1:{r:ROWS2-1,c:3},A2:{r:ROWS2-1,c:5},B1:{r:0,c:3},B2:{r:0,c:5}});
              setWalls(new Set());setBarr({A:BARR2,B:BARR2});setReached({A1:false,A2:false,B1:false,B2:false});
              setTurn(Math.random()<0.5?'A1':'B1');setWinner(null);setFlash('');setCelebrating(false);
              setSub('game');
            }} style={{padding:'12px 16px',background:'var(--card)',color:'var(--text)',
              border:'1.5px solid var(--border)',borderRadius:12,cursor:'pointer',fontWeight:700,fontSize:13,
              fontFamily:'system-ui,-apple-system,sans-serif',
              display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              <PhoneIcon size={15}/>{t('tv2Hotseat')}
            </button>
          </div>
          <div style={{background:'var(--card)',borderRadius:16,padding:'14px 16px',border:'1.5px solid var(--border)',marginTop:14,boxShadow:'var(--shadow-soft)'}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--subtle)',letterSpacing:1.5,marginBottom:10}}>{t('tv2RulesTitle')}</div>
            {[t('tv2Rule1'),t('tv2Rule2'),t('tv2Rule3'),t('tv2Rule4')].map(function(rule,ri){
              return(
                <div key={ri} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:ri<3?8:0}}>
                  <span style={{color:'#8b5cf6',fontWeight:900,fontSize:13,lineHeight:1.5,flexShrink:0}}>{'\u203a'}</span>
                  <span style={{fontSize:12,color:'var(--text)',lineHeight:1.5}}>{rule}</span>
                </div>
              );
            })}
            <button onClick={()=>setShowRules(!showRules)} style={{width:'100%',marginTop:12,padding:'8px 10px',
              background:'var(--bg)',border:'1.5px solid var(--border)',borderRadius:10,cursor:'pointer',
              fontFamily:'system-ui,-apple-system,sans-serif',fontWeight:700,fontSize:11,color:'var(--subtle)',
              display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              {t('tv2MoreBtn')}
              <span style={{fontSize:9,transition:'transform 0.2s ease',transform:showRules?'rotate(180deg)':'rotate(0deg)',display:'inline-block'}}>{'\u25be'}</span>
            </button>
            <div style={{overflow:'hidden',transition:'max-height 0.28s ease',maxHeight:showRules?600:0}}>
              <div style={{paddingTop:12}}>
                <div style={{fontSize:12,fontWeight:800,color:'var(--text)',marginBottom:4}}>{t('tv2TrapTitle')}</div>
                <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.6,marginBottom:12}}>{t('tv2TrapText')}</div>
                <div style={{fontSize:12,fontWeight:800,color:'var(--text)',marginBottom:4}}>{t('tv2PassTitle')}</div>
                <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>{t('tv2PassText')}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── ONLINE: Erstellen / Beitreten ──
  if(sub==='online'){
    return(
      <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 20px)',background:'transparent',position:'relative',zIndex:1}}>
        <MenuBG dark={darkMode}/>
        <button onClick={()=>setSub('config')} style={backChevron}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>{t('tutBack')}</button>
        <div style={{width:'100%',maxWidth:320,position:'relative',zIndex:1}}>
          <div style={{textAlign:'center',marginBottom:22}}>
            <div style={{fontSize:20,fontWeight:900,color:'var(--text)',letterSpacing:-0.5}}>Online 2 vs 2</div>
            <div style={{fontSize:11,color:'var(--subtle)',marginTop:4}}>{t('tv2OnlineSub')}</div>
          </div>

          {/* Erstellen */}
          <div style={{background:'var(--card)',borderRadius:16,padding:'18px 16px',border:'1.5px solid var(--border)',marginBottom:14,boxShadow:'var(--shadow-soft)'}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--subtle)',letterSpacing:1.5,marginBottom:10}}>{t('tv2CreateNew')}</div>
            <button onClick={createLobby} disabled={lobbyLoading} style={{width:'100%',padding:'13px',
              background:lobbyLoading?'var(--border)':'#3b82f6',color:lobbyLoading?'var(--subtle)':'white',
              border:'none',borderRadius:10,cursor:lobbyLoading?'not-allowed':'pointer',
              fontWeight:800,fontSize:14,fontFamily:'system-ui,-apple-system,sans-serif',
              boxShadow:lobbyLoading?'none':'0 2px 8px rgba(59,130,246,0.3)'}}>
              {lobbyLoading?t('tv2Creating'):t('tv2CreateBtn')}
            </button>
          </div>

          {/* Offene Lobbys */}
          <div style={{background:'var(--card)',borderRadius:16,padding:'18px 16px',border:'1.5px solid var(--border)',marginBottom:14,boxShadow:'var(--shadow-soft)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--subtle)',letterSpacing:1.5}}>{t('tv2OpenLob')}</div>
              <button onClick={refreshLobbies} disabled={listLoading} style={{padding:'4px 10px',borderRadius:8,
                background:'var(--bg)',border:'1.5px solid var(--border)',cursor:listLoading?'wait':'pointer',
                fontSize:11,fontWeight:700,color:'var(--text)',fontFamily:'system-ui,-apple-system,sans-serif'}}>
                {listLoading?'…':('↻ '+t('refresh'))}
              </button>
            </div>
            {openLobbies.length===0?(
              <div style={{textAlign:'center',padding:'14px 0',fontSize:12,color:'var(--subtle)',fontWeight:500}}>
                {listLoading?t('loading'):t('noLobbiesCreate')}
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:180,overflowY:'auto',touchAction:'pan-y',WebkitOverflowScrolling:'touch'}}>
                {openLobbies.map(function(lob){
                  return(
                    <button key={lob.code} onClick={function(){joinByCode(lob.code);}} disabled={lobbyLoading}
                      style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                        padding:'10px 12px',borderRadius:10,background:'var(--bg)',
                        border:'1.5px solid var(--border)',cursor:'pointer',width:'100%',
                        fontFamily:'system-ui,-apple-system,sans-serif'}}>
                      <span style={{fontSize:16,fontWeight:900,letterSpacing:3,color:'var(--text)'}}>{lob.code}</span>
                      <span style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:11,fontWeight:700,color:'var(--subtle)'}}>{lob.count}/4</span>
                        <span style={{display:'flex',gap:3}}>
                          {[0,1,2,3].map(i=><span key={i} style={{width:7,height:7,borderRadius:'50%',background:i<lob.count?'#16a34a':'var(--border)'}}/>)}
                        </span>
                        <span style={{fontSize:11,fontWeight:800,color:'#3b82f6'}}>→</span>
                      </span>
                    </button>
                  );
                })}
              </div>
            )}
          </div>

          {/* Beitreten */}
          <div style={{background:'var(--card)',borderRadius:16,padding:'18px 16px',border:'1.5px solid var(--border)',boxShadow:'var(--shadow-soft)'}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--subtle)',letterSpacing:1.5,marginBottom:10}}>{t('tv2CodeJoin')}</div>
            <input
              value={joinInput}
              onChange={e=>setJoinInput(e.target.value.toUpperCase().slice(0,4))}
              placeholder={t('tv2CodePh')}
              maxLength={4}
              style={{width:'100%',padding:'12px 14px',borderRadius:10,fontSize:20,fontWeight:800,
                textAlign:'center',letterSpacing:4,textTransform:'uppercase',
                background:'var(--bg)',border:'1.5px solid var(--border)',color:'var(--text)',
                fontFamily:'system-ui,-apple-system,sans-serif',boxSizing:'border-box',outline:'none',marginBottom:10}}
            />
            <button onClick={joinLobby} disabled={lobbyLoading||joinInput.length!==4} style={{width:'100%',padding:'13px',
              background:lobbyLoading||joinInput.length!==4?'var(--border)':'#1e293b',
              color:lobbyLoading||joinInput.length!==4?'var(--subtle)':'white',
              border:'none',borderRadius:10,cursor:lobbyLoading||joinInput.length!==4?'not-allowed':'pointer',
              fontWeight:800,fontSize:14,fontFamily:'system-ui,-apple-system,sans-serif'}}>
              {lobbyLoading?t('joiningGame'):t('joinSuffix')}
            </button>
            {joinError?<div style={{marginTop:10,fontSize:12,color:'#ef4444',fontWeight:600,textAlign:'center'}}>{joinError}</div>:null}
          </div>
        </div>
      </div>
    );
  }

  // ── LOBBY: Warteraum mit Team-Auswahl ──
  if(sub==='lobby'){
    const ps=lobbyPlayers;
    const entries=Object.entries(ps);
    const aPlayers=entries.filter(function(e){return e[1].team==='A';});
    const bPlayers=entries.filter(function(e){return e[1].team==='B';});
    const total=entries.length;
    const allOn=!useWS||entries.every(function(e){return e[1].on!==false;});
    const canStart=isHost&&aPlayers.length===2&&bPlayers.length===2&&allOn;
    const youKey=useWS?wsYouKey:uid;
    const myEntry=youKey?ps[youKey]:null;
    const myCurrentTeam=myEntry?myEntry.team:null;

    const copyCode=()=>{
      try{navigator.clipboard.writeText(lobbyCode);}catch(e){}
      setCodeFlash(true);setTimeout(()=>setCodeFlash(false),1500);
    };
    // Hilfsfunktion: Spielerzeile rendern
    const PlayerRow=function({pUid,pData}){
      const isMe=pUid===uid;
      const col=pData.team==='A'?'#ef4444':'#3b82f6';
      return(
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',borderRadius:10,
          background:isMe?'var(--bg)':'transparent',
          border:isMe?'1.5px solid var(--border)':'1.5px solid transparent',marginBottom:4}}>
          <div style={{width:28,height:28,borderRadius:'50%',background:col,
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:11,fontWeight:800,color:'white',flexShrink:0}}>{pUid.slice(0,2)}</div>
          <div style={{flex:1,fontSize:12,fontWeight:700,color:'var(--text)',minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {pUid}{isMe?' (Du)':''}{pUid===St.current.isHost&&false?<CrownIcon size={11} color="#f59e0b"/>:''}
          </div>
          {isMe&&(
            <button onClick={switchTeam} style={{padding:'5px 10px',borderRadius:8,
              background:'var(--bg)',border:'1.5px solid var(--border)',
              fontSize:11,fontWeight:700,cursor:'pointer',color:'var(--text)',
              fontFamily:'system-ui,-apple-system,sans-serif',whiteSpace:'nowrap'}}>
              → {myCurrentTeam==='A'?t('blue'):t('red')}
            </button>
          )}
        </div>
      );
    };

    return(
      <div style={{...sPage,justifyContent:'flex-start',paddingTop:'calc(env(safe-area-inset-top) + 20px)',background:'transparent',position:'relative',zIndex:1}}>
        <MenuBG dark={darkMode}/>
        <button onClick={leaveLobby} style={backChevron}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>{t('tutBack')}</button>
        <div style={{width:'100%',maxWidth:340,position:'relative',zIndex:1}}>

          {/* Code + Teilen */}
          <div style={{textAlign:'center',marginBottom:16}}>
            <div style={{fontSize:12,color:'var(--subtle)',fontWeight:600,letterSpacing:1,marginBottom:6}}>{t('tv2LobbyCode')}</div>
            <button onClick={copyCode} style={{
              display:'inline-flex',alignItems:'center',gap:10,
              background:'var(--card)',border:'2px solid var(--border)',borderRadius:14,
              padding:'10px 20px',cursor:'pointer',fontFamily:'system-ui,-apple-system,sans-serif'}}>
              <span style={{fontSize:28,fontWeight:900,letterSpacing:6,color:'var(--text)'}}>{lobbyCode}</span>
              <span style={{fontSize:11,fontWeight:700,color:codeFlash?'#16a34a':'var(--subtle)'}}>{codeFlash?t('tv2Copied'):t('tv2Copy')}</span>
            </button>
            <div style={{fontSize:10,color:'var(--subtle)',marginTop:8,fontWeight:500}}>{t('shareCode')}</div>
          </div>

          <div style={{display:'flex',gap:10,marginBottom:14}}>
            {['A','B'].map(tm=>{
              const tPlayers=tm==='A'?aPlayers:bPlayers;
              const col=tm==='A'?'#ef4444':'#3b82f6';
              const full=tPlayers.length===2;
              return(
                <div key={tm} onClick={function(){if(myCurrentTeam!==tm)switchTeam();}}
                  style={{flex:1,background:'var(--card)',borderRadius:14,
                  border:'1.5px solid '+(myCurrentTeam===tm?col:'var(--border)'),padding:'12px 10px',
                  boxShadow:'var(--shadow-soft)',cursor:myCurrentTeam!==tm?'pointer':'default',
                  minHeight:120}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:col}}/>
                    <div style={{fontSize:12,fontWeight:800,color:col}}>{teamName(tm)}</div>
                    <div style={{marginLeft:'auto',fontSize:10,color:full?'#16a34a':'var(--subtle)',fontWeight:700}}>{tPlayers.length}/2{full?' ✓':''}</div>
                  </div>
                  {tPlayers.map(function(entry){
                    const pUid=entry[0];const isMe=pUid===youKey;
                    const dispNm=entry[1].name||pUid;
                    const offline=useWS&&entry[1].on===false;
                    return(
                      <div key={pUid} style={{padding:'7px 10px',borderRadius:8,marginBottom:4,
                        background:isMe?'var(--bg)':'transparent',
                        border:isMe?'1.5px solid var(--border)':'1.5px solid transparent',
                        display:'flex',alignItems:'center',gap:6,opacity:offline?0.45:1}}>
                        <div style={{width:22,height:22,borderRadius:'50%',background:col,flexShrink:0,
                          display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,color:'white'}}>
                          {dispNm.slice(0,2)}
                        </div>
                        <span style={{flex:1,fontSize:11,fontWeight:700,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          {dispNm}{isMe?' ('+t('tv2You')+')':''}{offline?' \u00b7 offline':''}{pUid===hostUid?<CrownIcon size={11} color="#f59e0b"/>:''}
                        </span>
                      </div>
                    );
                  })}
                  {tPlayers.length===0&&(
                    <div style={{padding:'8px 10px',borderRadius:8,border:'1.5px dashed var(--border)',
                      display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <span style={{fontSize:10,color:'var(--subtle)',fontWeight:600}}>{t('tv2Empty')}</span>
                    </div>
                  )}
                  {myCurrentTeam!==tm&&(
                    <div style={{marginTop:6,textAlign:'center',fontSize:11,fontWeight:700,color:col}}>{'\u2192'} {t('tv2Here')}</div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Status + Start */}
          <div style={{background:'var(--card)',borderRadius:14,padding:'12px 16px',border:'1.5px solid var(--border)',marginBottom:10,boxShadow:'var(--shadow-soft)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>{t('playersLabel')}: {total}/4</div>
              <div style={{display:'flex',gap:4}}>
                {[0,1,2,3].map(i=>(
                  <div key={i} style={{width:10,height:10,borderRadius:'50%',
                    background:i<total?'#16a34a':'var(--border)'}}/>
                ))}
              </div>
            </div>
            {canStart?(
              <button onClick={startOnlineGame} style={{width:'100%',padding:'13px',
                background:'#16a34a',color:'white',border:'none',borderRadius:10,
                cursor:'pointer',fontWeight:800,fontSize:15,fontFamily:'system-ui,-apple-system,sans-serif',
                boxShadow:'0 2px 10px rgba(22,163,74,0.35)'}}>
                {'\u25b6'} {t('startGame')}
              </button>
            ):(
              <div style={{textAlign:'center',fontSize:12,fontWeight:600,color:'var(--subtle)',padding:'8px 0'}}>
                {isHost?(aPlayers.length===2&&bPlayers.length===2?(allOn?t('readyState'):t('tv2NotAllOn')):t('waitingPlayers4')):t('waitingHost4')}
              </div>
            )}
          </div>
          {flash?<div style={{textAlign:'center',fontSize:12,color:'#ef4444',fontWeight:700}}>{flash}</div>:null}
          <button onClick={leaveLobby} style={{width:'100%',padding:'10px',background:'transparent',
            border:'1.5px solid var(--border)',borderRadius:10,cursor:'pointer',
            color:'var(--subtle)',fontWeight:600,fontSize:13,
            fontFamily:'system-ui,-apple-system,sans-serif'}}>{t('leave')}</button>
        </div>
      </div>
    );
  }

  // ── GAME ──
  const activeTm=isOnline?(myTurnNow?myTeam:TEAM_2V2(turn)):team;
  return(
    <div style={{...sCont,background:'transparent',position:'relative',zIndex:1,paddingBottom:'calc(104px + env(safe-area-inset-bottom, 0px))'}}>
      <MenuBG dark={darkMode}/>
      <button onClick={()=>{if(isOnline)leaveLobby();else setSub('config');}} style={backChevron}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>{t('tutBack')}</button>

      {/* Team-Status */}
      <div className="ww-players" style={{width:Math.min(COLS2*CELL2+26,window.innerWidth-16),maxWidth:'96vw',marginBottom:8,marginTop:6,position:'relative',zIndex:1}}>
        {['A','B'].map((tm,idx)=>{
          const active=TEAM_2V2(turn)===tm&&!winner;
          const col=tm==='A'?'#ef4444':'#3b82f6';
          const colD=tm==='A'?'#7f1d1d':'#1e3a5f';
          const isMy=isOnline&&myTeam===tm;
          return(
            <React.Fragment key={tm}>
            <div className={"ww-pcard p"+tm+(active?" live":" dim")}>
              <div className="ww-sheen2"/>
              <div className="ww-figslot">
                <div className="ww-stone" style={{width:38,height:38,position:'relative'}}>
                  <div style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',borderRadius:'50%',
                    background:`radial-gradient(circle at 38% 32%, ${col}, ${colD} 100%)`,
                    boxShadow:`inset 0 2px 3px rgba(255,255,255,0.28),inset 0 -4px 7px rgba(0,0,0,0.4),inset 0 0 0 1px rgba(0,0,0,0.12),0 3px 6px rgba(0,0,0,0.4)`}}/>
                  <div className="ww-stone-tex"/>
                  <div className="ww-stone-sheen"/>
                </div>
              </div>
              <div className="ww-pinfo">
                <div className="ww-pname">{teamName(tm)}{isMy?' \u2605':''}</div>
                <div className="ww-pwalls">
                  <svg width="12" height="12" viewBox="0 0 24 24" style={{opacity:0.85}}><g fill="currentColor"><rect x="2" y="5" width="9" height="5" rx="1"/><rect x="13" y="5" width="9" height="5" rx="1"/><rect x="7" y="12" width="10" height="5" rx="1"/></g></svg>
                  {barr[tm]}
                </div>
              </div>
              {active&&isOnline&&useWS&&tickSec>0&&(
                <div className="ww-pclock">
                  <div className="ww-ptime" style={{color:tickSec<=5?'#fde047':'#fff'}}>{tickSec}s</div>
                  <div className="ww-pcap">{t('timeLabel')}</div>
                </div>
              )}
            </div>
            {idx===0&&(
              <div className="ww-vs"><div className="ww-vt">VS</div><div className="ww-vd"><i/><i/><i/></div></div>
            )}
            </React.Fragment>
          );
        })}
      </div>

      {isOnline&&!myTurnNow&&!winner&&!removedMeReason&&(
        <div style={{fontSize:10,color:'var(--subtle)',fontWeight:600,marginBottom:4,letterSpacing:0.5}}>
          {(isOnline&&useWS&&wsNames[turn]?wsNames[turn]:(TEAM_2V2(turn)==='A'?t('tv2Bottom'):t('tv2Top')))+' \u00b7 '+teamName(TEAM_2V2(turn))}...
        </div>
      )}
      {isOnline&&useWS&&!winner&&ORDER_2V2.some(function(id){return dcMap[id]&&!removed[id];})&&(
        <div style={{fontSize:10,color:'#f59e0b',fontWeight:700,marginBottom:4}}>
          {ORDER_2V2.filter(function(id){return dcMap[id]&&!removed[id];}).map(function(id){return wsNames[id]||id;}).join(', ')+' '+t('tv2PlayerDc')}
        </div>
      )}
      {/* Phase-Indikator */}
      {!winner&&(
        <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,textTransform:'uppercase',
          marginBottom:4,padding:'4px 12px',borderRadius:8,display:'flex',alignItems:'center',gap:8,
          background:TEAM_2V2(turn)==='A'?'rgba(239,68,68,0.15)':'rgba(59,130,246,0.15)',
          color:TEAM_2V2(turn)==='A'?'#ef4444':'#3b82f6'}}>
          <span>{TEAM_2V2(turn)==='A'?('\u2191 '+t('tv2RoundBottom')):('\u2193 '+t('tv2RoundTop'))}</span>
          {isOnline&&useWS&&tickSec>0&&(
            <span style={{fontWeight:900,color:tickSec<=5?'#ef4444':'inherit',minWidth:26,textAlign:'right'}}>{tickSec}s</span>
          )}
        </div>
      )}

      <div className="ww-goalext t" style={{width:Math.min(COLS2*CELL2+26,window.innerWidth-16),maxWidth:'96vw',color:boardFlip?'#3b82f6':'#ef4444',marginBottom:2}}>
        <span className="ln"/>
        <span className="ar">{'\u25b2'}</span>
        <span className="nm2">{t('tv2Goal')}</span>
        <span className="ln"/>
      </div>

      <div style={{position:'relative',width:COLS2*CELL2+26,margin:'0 auto',borderRadius:24,padding:13,
        background:darkMode?'linear-gradient(160deg,#5f6b7e,#2e3748 36%,#141a26)':'linear-gradient(160deg,#ffffff,#ced6e2 36%,#9aa6ba)',
        boxShadow:'0 26px 56px rgba(0,0,0,0.5),0 9px 20px rgba(0,0,0,0.38),inset 0 2px 0 rgba(255,255,255,0.28),inset 0 -3px 6px rgba(0,0,0,0.5),inset 0 0 0 1px rgba(0,0,0,0.2)'}}>
        <div className="ww-edge ww-edge-t" style={{opacity:darkMode?0.85:0.5}}/>
        <div className="ww-edge ww-edge-b" style={{opacity:darkMode?0.85:0.5}}/>
        <div className="ww-stud ww-stud-l"/>
        <div className="ww-stud ww-stud-r"/>
      <div ref={gridRef} style={{position:'relative',width:COLS2*CELL2,height:ROWS2*CELL2,touchAction:'auto',...sGrid,
        background:darkMode?'linear-gradient(170deg,#1c2740,#161e33 52%,#0f1729)':'linear-gradient(170deg,#fcfcfb,#f1f3f6 52%,#e9edf2)',
        border:'none',
        boxShadow:darkMode?'inset 0 0 0 2px #05080f,inset 0 3px 9px rgba(0,0,0,0.18),inset 0 -3px 9px rgba(0,0,0,0.1)':'inset 0 0 0 2px #b6bfce,inset 0 3px 9px rgba(0,0,0,0.18),inset 0 -3px 9px rgba(0,0,0,0.1)',
        transform:boardFlip?'scaleY(-1)':'none'}}>
        <div className="ww-board-tex" style={{mixBlendMode:darkMode?'screen':'multiply',opacity:darkMode?0.12:0.4}}/>
        <div className="ww-board-veins" style={{opacity:darkMode?0.3:0.45}}/>
        <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,pointerEvents:'none',zIndex:0,background:darkMode?'radial-gradient(120% 65% at 50% -6%,rgba(125,160,220,0.1),transparent 48%)':'radial-gradient(120% 65% at 50% -6%,rgba(255,255,255,0.5),transparent 48%)'}}/>
        <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,pointerEvents:'none',zIndex:0,
          backgroundImage:`linear-gradient(${darkMode?'rgba(255,255,255,0.08)':'rgba(20,28,45,0.11)'} 1px,transparent 1px),linear-gradient(90deg,${darkMode?'rgba(255,255,255,0.08)':'rgba(20,28,45,0.11)'} 1px,transparent 1px),radial-gradient(circle at 0 0, ${darkMode?'rgba(255,255,255,0.13)':'rgba(20,28,45,0.16)'} 1.4px, transparent 2px)`,
          backgroundSize:`${CELL2}px ${CELL2}px,${CELL2}px ${CELL2}px,${CELL2}px ${CELL2}px`}}/>
        {Array.from({length:ROWS2},function(_,r){return Array.from({length:COLS2},function(_,c){
          const vDot=validDot(r,c);
          let bg='transparent';
          return(
            <div key={r+'-'+c} onClick={()=>moveTo(r,c)}
              style={{position:'absolute',left:c*CELL2,top:r*CELL2,width:CELL2,height:CELL2,
                background:bg,
                display:'flex',alignItems:'center',justifyContent:'center',
                cursor:vDot&&!dragging?'pointer':'default',boxSizing:'border-box'}}>
              {r===0&&<div style={{position:'absolute',top:0,left:0,right:0,bottom:0,background:'linear-gradient(180deg,rgba(239,68,68,0.18) 0%,rgba(239,68,68,0.08) 60%,transparent 100%)',boxShadow:'inset 0 0 0 1.5px rgba(239,68,68,0.36),inset 0 2px 8px rgba(239,68,68,0.22)',pointerEvents:'none',animation:'ww-goalpulse 3s ease-in-out infinite'}}/>}
              {r===ROWS2-1&&<div style={{position:'absolute',top:0,left:0,right:0,bottom:0,background:'linear-gradient(0deg,rgba(59,130,246,0.18) 0%,rgba(59,130,246,0.08) 60%,transparent 100%)',boxShadow:'inset 0 0 0 1.5px rgba(59,130,246,0.36),inset 0 -2px 8px rgba(59,130,246,0.22)',pointerEvents:'none',animation:'ww-goalpulse 3s ease-in-out infinite'}}/>}
              {vDot&&<div style={{width:Math.round(CELL2*0.26),height:Math.round(CELL2*0.26),borderRadius:'50%',pointerEvents:'none',background:`radial-gradient(circle at 40% 34%,rgba(255,255,255,0.6),${PC2[turn]} 62%,${PD2[turn]})`,boxShadow:`0 0 8px ${PC2[turn]}aa,0 1px 2px rgba(0,0,0,0.32),inset 0 1px 1px rgba(255,255,255,0.4)`,animation:'ww-dotb 1.7s ease-in-out infinite'}}/>}
            </div>
          );
        });})}
        {Array.from(walls).map(k=><Wall2 key={k} wkey={k} color={darkMode?'#e2e8f0':'#1e293b'} opacity={1} animate/>)}
        {previewKey&&<Wall2 wkey={previewKey} color={previewValid?'#f59e0b':'#ef4444'} opacity={0.6}/>}
        {ORDER_2V2.map(function(id){
          const pos=tokens[id];const active=turn===id&&!winner;
          if(!pos||removed[id])return null;
          return(
            <div key={id} style={{position:'absolute',left:pos.c*CELL2+off,top:pos.r*CELL2+off,
              width:sz,height:sz,
              transition:'left 0.25s cubic-bezier(0.34,1.3,0.5,1),top 0.25s cubic-bezier(0.34,1.3,0.5,1)',
              zIndex:20,pointerEvents:'none',transform:boardFlip?'scaleY(-1)':'none'}}>
              {active&&<div style={{position:'absolute',inset:-2,borderRadius:'50%',background:PC2[id],animation:'piece-pulse 1.6s ease-in-out infinite'}}/>}
              <div key={'land'+pos.r+'-'+pos.c} style={{position:'absolute',inset:-3,borderRadius:'50%',
                border:'2px solid '+PC2[id],animation:'ww-land 0.5s ease-out forwards',pointerEvents:'none'}}/>
              <Piece color={PC2[id]} dark={PD2[id]} size={sz}/>
              <div style={{position:'absolute',right:-2,bottom:-2,width:13,height:13,borderRadius:'50%',
                background:reached[id]?'#16a34a':'white',color:reached[id]?'white':PD2[id],fontSize:9,fontWeight:900,lineHeight:'13px',textAlign:'center',
                boxShadow:'0 1px 3px rgba(0,0,0,0.3)',fontFamily:'system-ui,sans-serif'}}>{reached[id]?'✓':id[1]}</div>
            </div>
          );
        })}
      </div>
      </div>

      <div style={{fontSize:9,letterSpacing:3,color:boardFlip?'#ef4444':'#3b82f6',fontWeight:700,textTransform:'uppercase',marginTop:2}}>{'\u25bc'} {t('tv2Goal')} {'\u25bc'}</div>

      {flash&&<div style={{position:'fixed',bottom:120,left:0,right:0,textAlign:'center',zIndex:60,pointerEvents:'none'}}>
        <span style={{background:'rgba(239,68,68,0.92)',color:'white',padding:'7px 16px',borderRadius:16,fontSize:12,fontWeight:700}}>{flash}</span>
      </div>}

      {celebrating&&winner&&(
        <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:500,pointerEvents:'none',background:'rgba(0,0,0,0.15)'}}>
          <div style={{animation:'person-grow 0.3s ease-out both'}}>
            <WinnerPerson color={winner==='A'?'#ef4444':'#3b82f6'} dark={winner==='A'?'#7f1d1d':'#1e3a5f'} speed={danceSpeed} dance={danceStyle}/>
          </div>
        </div>
      )}

      {removedMeReason&&isOnline&&!winner&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:600,padding:20}}>
          <div style={{background:'var(--card)',borderRadius:22,padding:'26px 24px 22px',textAlign:'center',boxShadow:'0 24px 64px rgba(0,0,0,0.3)',width:'100%',maxWidth:300}}>
            <div style={{fontSize:17,fontWeight:900,color:'var(--text)',letterSpacing:-0.3,marginBottom:6}}>{t('tv2Removed')}</div>
            <div style={{fontSize:12,color:'var(--subtle)',marginBottom:18,fontWeight:500}}>
              {removedMeReason==='afk'?t('tv2RemovedAfk'):t('tv2RemovedDc')}
            </div>
            <button onClick={exitFromGame} style={{width:'100%',padding:'12px',
              background:'var(--bg)',color:'var(--text)',border:'1.5px solid var(--border)',borderRadius:12,
              cursor:'pointer',fontWeight:700,fontSize:13,fontFamily:'system-ui,-apple-system,sans-serif'}}>
              {t('menu')}
            </button>
          </div>
        </div>
      )}

      {winner&&!celebrating&&(()=>{
        const ids=Object.keys(playerMap);
        const voteCount=useWS?ORDER_2V2.filter(s=>votes&&votes[s]).length:ids.filter(u=>votes&&votes[u]).length;
        const iVoted=useWS?!!(votes&&myToken&&votes[myToken]):!!(votes&&votes[uid]);
        const present=useWS?wsPresent:ids.length;
        const col=winner==='A'?'#ef4444':'#3b82f6';
        return(
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:500,padding:20}}>
            <Confetti color={col}/>
            <div style={{background:'var(--card)',borderRadius:22,padding:'28px 28px 22px',textAlign:'center',boxShadow:'0 24px 64px rgba(0,0,0,0.3)',position:'relative',width:'100%',maxWidth:300}}>
              <div style={{marginBottom:8,display:'flex',justifyContent:'center',animation:'trophy-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both'}}><TrophyIcon size={44}/></div>
              <div style={{fontSize:21,fontWeight:900,color:col,letterSpacing:-0.5,marginBottom:4}}>Team {teamName(winner)} {t('wins')}</div>
              {winReason==='forfeit'&&<div style={{fontSize:11,color:'var(--subtle)',fontWeight:600,marginBottom:4}}>{t('tv2ByForfeit')}</div>}
              {isOnline?(
                <>
                  <div style={{fontSize:11,color:'var(--subtle)',marginBottom:16,fontWeight:500}}>{t('whatsNext')}</div>
                  <button onClick={voteRematch} disabled={iVoted||present<4} style={{width:'100%',padding:'13px',marginBottom:8,
                    background:iVoted?'rgba(22,163,74,0.15)':(present<4?'var(--border)':'#16a34a'),
                    color:iVoted?'#16a34a':(present<4?'var(--subtle)':'white'),
                    border:iVoted?'1.5px solid #16a34a':'none',borderRadius:12,
                    cursor:iVoted||present<4?'default':'pointer',fontWeight:800,fontSize:15,

// Animierte Mini-Demo je Modus
function ModeDemo({kind,dark}){
  const C=5,R=7,CL=28,WW=6;
  const N={classic:6,blitz:6,chaos:6,random:6,hammer:6,twovtwo:7}[kind]||6;
  const[f,setF]=React.useState(0);
  React.useEffect(()=>{setF(0);const iv=setInterval(()=>setF(x=>x+1),850);return ()=>clearInterval(iv);},[kind]);
  const cycle=Math.floor(f/N),fi=f%N;
  const wallColor=dark?'#e2e8f0':'#1e293b';
  const cells=[];
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    const isGoal=r===0||(kind==='twovtwo'&&r===R-1);
    cells.push(<div key={r+'-'+c} style={{position:'absolute',left:c*CL,top:r*CL,width:CL,height:CL,
      background:isGoal?'var(--goal)':((r+c)%2===0?'var(--cell-b)':'var(--cell-a)'),
      border:'1px solid var(--cell-line)',boxSizing:'border-box'}}/>);
  }
  const Tok=(r,c,col,dk,id)=>(<div key={id} style={{position:'absolute',left:c*CL+4,top:r*CL+4,width:CL-8,height:CL-8,zIndex:5,
    transition:'left 0.45s cubic-bezier(.25,.46,.45,.94),top 0.45s cubic-bezier(.25,.46,.45,.94)'}}><Piece color={col} dark={dk} size={CL-8}/></div>);
  const Wall=(key,dk)=>{
    const a=key.split('-');const ty=a[0],r=+a[1],c=+a[2];
    const p=ty==='H'?{left:c*CL,top:(r+1)*CL-WW/2,width:2*CL,height:WW,anim:'wall-enter-h'}:{left:(c+1)*CL-WW/2,top:r*CL,width:WW,height:2*CL,anim:'wall-enter-v'};
    return <div key={key+'-'+dk} style={{position:'absolute',left:p.left,top:p.top,width:p.width,height:p.height,
      background:wallColor,borderRadius:WW/2,zIndex:6,boxShadow:'0 2px 6px rgba(0,0,0,0.22)',
      animation:`${p.anim} 0.3s cubic-bezier(0.34,1.56,0.64,1) both`}}/>;
  };
  const dot=(r,c,k)=>(<div key={'d'+k} style={{position:'absolute',left:c*CL+CL/2-4,top:r*CL+CL/2-4,width:8,height:8,borderRadius:'50%',background:'#ef4444',opacity:0.38,zIndex:4}}/>);
  const ov=[];

  if(kind==='classic'||kind==='blitz'){
    const rp=[6,5,5,5,4,3];
    const br=[6,6,5,5,5,4],bc=[3,3,3,3,2,2];
    ov.push(Tok(rp[fi],1,'#ef4444','#7f1d1d','r'+cycle));
    ov.push(Tok(br[fi],bc[fi],'#3b82f6','#1e3a5f','b'+cycle));
    if(fi>=3)ov.push(Wall('H-3-2',cycle));
    if(fi<5&&fi!==3)ov.push(dot(rp[fi]-1,1,'n'));
    const dur=kind==='blitz'?'0.85s':(N*0.85)+'s';
    ov.push(<div key={'bar'+(kind==='blitz'?fi:cycle)} style={{position:'absolute',left:8,top:-15,width:C*CL-16,height:8,borderRadius:4,background:'var(--border)',zIndex:7,overflow:'hidden'}}>
      <div style={{height:'100%',borderRadius:4,background:kind==='blitz'?'#f59e0b':'#3b82f6',animation:`demoBar ${dur} linear infinite`}}/></div>);
    ov.push(<div key="ic" style={{position:'absolute',right:-3,top:-37,zIndex:7,display:'flex'}}><ModeGlyph kind={kind==='blitz'?'bolt':'clock'} size={14} color="#f59e0b"/></div>);
  }

  if(kind==='chaos'){
    const tp=[[6,1],[5,1],[5,2],[4,2],[4,2],[4,2]];
    const bp=[6,6,5,5,4,4];
    const got=fi>=3;
    if(!got)ov.push(<div key={'cr'+cycle} style={{position:'absolute',left:2*CL+3,top:4*CL+3,width:CL-6,height:CL-6,zIndex:4}}><CrateIcon size={CL-6}/></div>);
    ov.push(Tok(bp[fi],3,'#3b82f6','#1e3a5f','b'+cycle));
    ov.push(Tok(tp[fi][0],tp[fi][1],'#ef4444','#7f1d1d','t'+cycle));
    if(got)ov.push(<div key={'p2'+cycle} style={{position:'absolute',left:2*CL+5,top:3.4*CL,fontSize:13,fontWeight:900,color:'#16a34a',zIndex:8,animation:'demoFloat 1.6s ease-out'}}>+2</div>);
    ov.push(<div key="cnt" style={{position:'absolute',right:-4,top:-32,fontSize:11,fontWeight:800,color:'var(--text)',zIndex:7,display:'flex',alignItems:'center',gap:3}}>{got?8:6}<BrickMini size={10}/></div>);
  }

  if(kind==='random'){
    const goldenBg='linear-gradient(135deg,#92400e 0%,#f59e0b 30%,#fde68a 50%,#f59e0b 70%,#92400e 100%)';
    const drops=['H-2-1','V-3-2','H-4-0','H-1-2'];
    for(let i=0;i<Math.min(fi,drops.length);i++){
      const key=drops[i];const a=key.split('-');const ty=a[0],r=+a[1],c=+a[2];
      const isH=ty==='H';
      const p=isH?{left:c*CL,top:(r+1)*CL-WW/2,width:2*CL,height:WW}:{left:(c+1)*CL-WW/2,top:r*CL,width:WW,height:2*CL};
      ov.push(<div key={key+i+cycle} style={{position:'absolute',...p,background:goldenBg,borderRadius:WW/2,zIndex:6,
        animation:(isH?'golden-drop-h':'golden-drop-v')+' 0.38s cubic-bezier(0.34,1.56,0.64,1) both, golden-glow 1.6s 0.38s ease-in-out infinite'}}/>);
    }
    const rp=[6,5,5,4,4,3];
    const br=[6,6,5,5,4,4];
    ov.push(Tok(rp[fi],1,'#ef4444','#7f1d1d','r'+cycle));
    ov.push(Tok(br[fi],3,'#3b82f6','#1e3a5f','b'+cycle));
  }

  if(kind==='hammer'){
    if(fi<=1)ov.push(<div key={'w'+cycle} style={{position:'absolute',left:CL,top:4*CL-WW/2,width:2*CL,height:WW,background:wallColor,borderRadius:WW/2,zIndex:6,boxShadow:'0 2px 6px rgba(0,0,0,0.22)',animation:'none'}}/>);
    if(fi===2)ov.push(<div key={'ws'+cycle} style={{position:'absolute',left:CL,top:4*CL-WW/2,width:2*CL,height:WW,background:wallColor,borderRadius:WW/2,zIndex:6,boxShadow:'0 2px 6px rgba(0,0,0,0.22)',animation:'demoShatter 0.85s ease-in forwards'}}/>);
    if(fi===0)ov.push(<div key={'hi'+cycle} style={{position:'absolute',left:2*CL+CL/2-9,top:5*CL+CL/2-9,fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',zIndex:4}}>🔨</div>);
    const rr=[6,5,5,4,3,2];
    ov.push(Tok(rr[fi],2,'#ef4444','#7f1d1d','r'+cycle));
    ov.push(Tok(1,3,'#3b82f6','#1e3a5f','b'+cycle));
    if(fi>=1&&fi<=2)ov.push(<div key="hm" style={{position:'absolute',left:1.5*CL,top:3.2*CL,fontSize:19,zIndex:8,transformOrigin:'bottom center',animation:'demoSwing 0.7s ease-in-out infinite'}}>🔨</div>);
  }

  if(kind==='twovtwo'){
    const a1r=[6,5,5,5,5,4,4],a2r=[0,0,1,1,1,1,2];
    const b1r=[6,6,6,5,5,5,5],b2r=[0,0,0,0,1,1,1];
    ov.push(Tok(a1r[fi],1,'#ef4444','#7f1d1d','a1'+cycle));
    ov.push(Tok(a2r[fi],1,'#f87171','#991b1b','a2'+cycle));
    ov.push(Tok(b1r[fi],3,'#3b82f6','#1e3a5f','b1'+cycle));
    ov.push(Tok(b2r[fi],3,'#60a5fa','#1e4d8f','b2'+cycle));
  }

  return(
    <div style={{position:'relative',width:C*CL,height:R*CL,borderRadius:10,
      border:'1.5px solid var(--border)',background:'var(--grid-bg)',boxShadow:'var(--shadow-soft)'}}>
      {cells}
      <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:'linear-gradient(90deg,#16a34a,#22c55e)',zIndex:3}}/>
      {kind==='twovtwo'&&<div style={{position:'absolute',bottom:0,left:0,right:0,height:3,background:'linear-gradient(90deg,#16a34a,#22c55e)',zIndex:3}}/>}
      {ov}
    </div>
  );
}

// ── Tutorial ───────────────────────────────────────────────
function TutBoard({step,dark}){
  const C=5,R=6,CL=30,WW=6;
  const cells=[];
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    const isGoal=r===0;
    cells.push(<div key={r+'-'+c} style={{position:'absolute',left:c*CL,top:r*CL,width:CL,height:CL,
      background:isGoal?'var(--goal)':((r+c)%2===0?'var(--cell-b)':'var(--cell-a)'),
      border:'1px solid var(--cell-line)',boxSizing:'border-box'}}/>);
  }
  const tok=(r,c,col,dk)=>(<div style={{position:'absolute',left:c*CL+5,top:r*CL+5,width:CL-10,height:CL-10,zIndex:5}}><Piece color={col} dark={dk} size={CL-10}/></div>);
  const dot=(r,c)=>(<div key={'d'+r+'-'+c} style={{position:'absolute',left:c*CL+CL/2-4,top:r*CL+CL/2-4,width:8,height:8,borderRadius:'50%',background:'#ef4444',opacity:0.4,zIndex:4}}/>);
  const hWall=(r,c)=>(<div key={'h'+r+'-'+c} style={{position:'absolute',left:c*CL,top:(r+1)*CL-WW/2,width:2*CL,height:WW,background:dark?'#e2e8f0':'#1e293b',borderRadius:WW/2,zIndex:6}}/>);
  const vWall=(r,c)=>(<div key={'v'+r+'-'+c} style={{position:'absolute',left:(c+1)*CL-WW/2,top:r*CL,width:WW,height:2*CL,background:dark?'#e2e8f0':'#1e293b',borderRadius:WW/2,zIndex:6}}/>);
  const extra=[];
  if(step===0){extra.push(tok(5,2,'#ef4444','#7f1d1d'));
    extra.push(<div key="arr" style={{position:'absolute',left:C*CL/2-9,top:CL*1.3,fontSize:22,color:'#16a34a',zIndex:7,fontWeight:900}}>↑</div>);}
  if(step===1){extra.push(tok(3,2,'#ef4444','#7f1d1d'));extra.push(dot(2,2));extra.push(dot(4,2));extra.push(dot(3,1));extra.push(dot(3,3));}
  if(step===2){extra.push(tok(5,2,'#ef4444','#7f1d1d'));extra.push(tok(2,2,'#3b82f6','#1e3a5f'));extra.push(hWall(1,1));}
  if(step===3){extra.push(tok(2,2,'#3b82f6','#1e3a5f'));
    extra.push(vWall(1,1));extra.push(vWall(1,2));extra.push(hWall(2,1));
    extra.push(<div key="ok" style={{position:'absolute',left:2*CL+CL/2-5,top:1.1*CL,fontSize:18,zIndex:7}}>↑</div>);}
  if(step===4){extra.push(tok(0,2,'#ef4444','#7f1d1d'));
    extra.push(<div key="tr" style={{position:'absolute',left:C*CL/2-16,top:-30,zIndex:7}}><TrophyIcon size={32}/></div>);}
  return(
    <div style={{position:'relative',width:C*CL,height:R*CL,borderRadius:10,overflow:'visible',
      border:'1.5px solid var(--border)',background:'var(--grid-bg)',boxShadow:'var(--shadow-soft)'}}>
      {cells}
      <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:'linear-gradient(90deg,#16a34a,#22c55e)',zIndex:3}}/>
      {extra}
    </div>
  );
}

          {step>0&&(
            <button onClick={()=>setStep(step-1)} style={{flex:1,padding:'12px',borderRadius:12,
              background:'var(--bg)',color:'var(--text)',border:'1.5px solid var(--border)',cursor:'pointer',
              fontWeight:700,fontSize:14,fontFamily:'system-ui,-apple-system,sans-serif'}}>{t('tutBack')}</button>
          )}
          <button onClick={()=>{if(last)onClose();else setStep(step+1);}} style={{flex:step>0?1.4:1,padding:'12px',borderRadius:12,
            background:last?'#16a34a':'#3b82f6',color:'white',border:'none',cursor:'pointer',
            fontWeight:800,fontSize:14,fontFamily:'system-ui,-apple-system,sans-serif',
            boxShadow:last?'0 2px 10px rgba(22,163,74,0.35)':'0 2px 10px rgba(59,130,246,0.3)'}}>
            {last?t('tutDone'):t('tutNext')}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Mount ─────────────────────────────────────────────────
function triggerHaptic(){
  if(window.__hapticOn===false)return;
  if(navigator.vibrate){try{navigator.vibrate(25);}catch(_){}}
  try{
    const C=window.AudioContext||window.webkitAudioContext;
    if(!C)return;
    const ctx=new C();
    const buf=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*0.01),ctx.sampleRate);
    const src=ctx.createBufferSource();
    src.buffer=buf;src.connect(ctx.destination);src.start(0);
    src.onended=function(){try{ctx.close();}catch(_){}};
  }catch(_){}
}
document.addEventListener('pointerdown',e=>{
  try{const b=e.target&&e.target.closest?e.target.closest('button,[role="button"]'):null;if(b&&!b.disabled)triggerHaptic();}catch(_){}
},true);
const loader=document.getElementById('loader');
const root=ReactDOM.createRoot(document.getElementById('root'));
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err){
      return React.createElement('div',{style:{position:'fixed',inset:0,background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',padding:24,zIndex:9999}},
        React.createElement('div',{style:{maxWidth:340,textAlign:'center'}},
          React.createElement('div',{style:{fontSize:16,fontWeight:800,color:'#ef4444',marginBottom:12}},'Render-Fehler'),
          React.createElement('div',{style:{fontSize:12,color:'#64748b',wordBreak:'break-word',background:'#f1f5f9',padding:12,borderRadius:8,textAlign:'left'}},
            String(this.state.err))
        )
      );
    }
    return this.props.children;
  }
}
root.render(React.createElement(ErrorBoundary,null,React.createElement(App,null)));
requestAnimationFrame(()=>requestAnimationFrame(()=>{if(loader)loader.style.display='none';}));
</script>
