var LANGS=['de','en','tr','fr'];
var SECS=[['impressum','Impressum','Imprint','K\u00fcnye','Mentions'],
          ['privacy','Datenschutz','Privacy','Gizlilik','Confidentialit\u00e9'],
          ['terms','AGB','Terms','Ko\u015fullar','CGU']];
var lang=(navigator.language||'en').slice(0,2);
if(LANGS.indexOf(lang)<0)lang='en';
var sec='privacy';
function render(){
  var lt=document.getElementById('langTabs');lt.innerHTML='';
  LANGS.forEach(function(l){
    var b=document.createElement('button');b.textContent=l.toUpperCase();
    if(l===lang)b.className='on';
    b.onclick=function(){lang=l;render();};lt.appendChild(b);
  });
  var st=document.getElementById('secTabs');st.innerHTML='';
  SECS.forEach(function(s){
    var b=document.createElement('button');
    b.textContent=s[1+LANGS.indexOf(lang)];
    if(s[0]===sec)b.className='on';
    b.onclick=function(){sec=s[0];render();};st.appendChild(b);
  });
  var data=(legalData[sec]&&(legalData[sec][lang]||legalData[sec].en))||[];
  var c=document.getElementById('content');c.innerHTML='';
  data.forEach(function(line,i){
    var el=document.createElement(i===0?'h2':'p');el.textContent=line;c.appendChild(el);
  });
}
render();
</script>
